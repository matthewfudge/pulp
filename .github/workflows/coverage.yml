name: Coverage

# Non-blocking coverage artifact. Informational only; no merge gate.
# Local equivalent: scripts/run_coverage.sh.
# Full design: planning/coverage-sanitizers-spec-2026-04-16.md
#              planning/coverage-tooling-decision-2026-04-21.md (Phase 0 spike)
#
# Per-PR coverage is macOS-only. Pulp's team actively develops and tests
# on macOS, so per-PR coverage measures the macOS development surface —
# the surface a contributor can actually move and verify locally. The
# `coverage` job's matrix is event-conditional (see the `matrix-config`
# job below):
#   - pull_request → macOS leg only
#   - push (to main) + workflow_dispatch → full {linux, macos, windows}
#     matrix, so the canonical main-branch head and manual runs keep a
#     complete per-OS Codecov picture.
# Linux / Windows / Android coverage on PRs is provided by the nightly
# `cross-platform-check.yml` lane instead, which runs the full non-macOS
# build + test every night and files per-platform tracking issues on
# breakage. Each OS still produces its own Cobertura XML and uploads to
# Codecov tagged with an OS-axis flag (`os-linux`, `os-macos`,
# `os-windows`) so Codecov can union same-file coverage across OSes via
# the flag mechanism. We do NOT try to merge profdata across
# architectures — llvm-profdata merge is not architecture-portable;
# cross-OS unions happen at the Codecov flag layer. See
# planning/coverage-tooling-decision-2026-04-21.md §7.

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      linux_runner_selector_json:
        description: "Optional JSON runs-on override for Linux coverage"
        required: false
        default: ""
        type: string
      macos_runner_selector_json:
        description: "Optional JSON runs-on override for macOS coverage"
        required: false
        default: ""
        type: string
      windows_runner_selector_json:
        description: "Optional JSON runs-on override for Windows coverage"
        required: false
        default: ""
        type: string

concurrency:
  # pulp#1884: do NOT cancel in-progress coverage runs on force-push.
  # Codecov's `after_n_builds: 4` (pulp#1883) waits for all per-OS uploads
  # before posting; if a force-push cancels the in-flight run mid-upload,
  # some legs upload and others don't, Codecov gets stuck waiting for the
  # missing leg, and the PR merges with no coverage signal (~70% of recent
  # merges hit this). Letting the older run finish costs some compute on
  # stale commits but guarantees every push ends with a real conclusion
  # (success/failure) for the required `Diff coverage required` check.
  #
  # KNOWN LIMITATION (codex P2 on pulp#1911): GitHub Actions concurrency
  # only exposes `group` and `cancel-in-progress`. There is no
  # `queue: max` / queue-depth knob — when `cancel-in-progress: false`
  # and a run is already in progress, only ONE additional run is queued
  # per group; any further pushes during that window REPLACE the queued
  # run (they are silently dropped, NOT queued behind it). So a rapid
  # push, push, push burst is observed as: run #1 active, run #3 queued,
  # run #2 cancelled before it started. The final commit always runs,
  # which is what required-gate semantics actually need (we only block
  # merge on the head SHA), but intermediate SHAs do not get their own
  # coverage report. If you need a coverage report for an intermediate
  # SHA, re-run the workflow manually via `workflow_dispatch` after the
  # active run finishes. Upstream tracking:
  #   https://github.com/orgs/community/discussions/12835
  #
  # DELIBERATELY kept `false` (not flipped to `true`): the Coverage-run
  # hang fixed alongside this comment was caused by missing
  # `timeout-minutes` on the `coverage` matrix job and `coverage-diff-gate`
  # — NOT by superseded runs piling up. Those job-level timeouts now bound
  # every run to a few hours max regardless of `cancel-in-progress`.
  # Flipping to `true` would reintroduce the pulp#1884 Codecov
  # stuck-upload bug (cancel mid-`after_n_builds: 4` → no coverage signal
  # on ~70% of merges). The timeout backstop is the correct fix; staying
  # `false` preserves the coverage signal.
  group: coverage-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Detect iOS-relevant changes (closes #1887) ─────────────────────────
  # Companion to #1876, which path-filtered the shipyard validation lane
  # via `--label-exclude slow` in `.shipyard/config.toml`. The GH-Actions
  # Coverage workflow runs the Swift coverage step through a different
  # code path (`tools/scripts/run_swift_coverage.py`) which configures
  # an iOS try-compile via `cmake -DCMAKE_SYSTEM_NAME=iOS`. That leg
  # adds ~25-30 min to every PR — including TS-only, doc-only, and
  # harness-only PRs that can't possibly affect the iOS toolchain.
  #
  # On `pull_request`, this job inspects the diff and only sets
  # `outputs.ios=true` when iOS-relevant files changed. On `push` to
  # main and `workflow_dispatch`, `outputs.ios` is forced to `true` so
  # the full iOS try-compile still runs on the canonical lanes (Phase 3
  # of the spec — "always run on main + nightly"). The downstream
  # macOS-leg Swift step + Apple LCOV verify/upload all gate on this
  # output, so a TS-only PR exits the macOS leg in <20 min instead of
  # ~45-60 min.
  changed-files:
    runs-on: ubuntu-latest
    # dorny/paths-filter@v3 in PR mode requires pull-requests:read; without
    # it the action silently returns no changed files, which would defeat
    # the iOS-relevant path filter that gates the slow Swift coverage leg.
    permissions:
      contents: read
      pull-requests: read
    outputs:
      # 'true' when the iOS-relevant lane should run on this event:
      #   - pull_request   → true iff any path under `ios` filter matched
      #   - push / dispatch → forced to true (full coverage on canonical lanes)
      ios: ${{ github.event_name != 'pull_request' || steps.filter.outputs.ios == 'true' }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false
          lfs: false
      - id: filter
        # Skip the filter on non-PR events; the job-level output expression
        # above forces `ios=true` for push + workflow_dispatch. We still
        # run the action on PR events where it diffs against the base ref.
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          # iOS-relevant surface — keep narrow but inclusive enough that
          # any CMake/toolchain/iOS-platform change triggers the slow
          # lane. Mirrors the path list documented in issue #1887.
          filters: |
            ios:
              - 'CMakeLists.txt'
              - '**/CMakeLists.txt'
              - 'tools/cmake/**'
              - '**/*.cmake'
              - 'apple/**'
              - 'core/platform/**'
              - 'tools/scripts/run_swift_coverage.py'
              - '.github/workflows/coverage.yml'

  # ── Resolve per-OS runs-on via shared helper ───────────────────────────
  # Uses tools/scripts/resolve_runs_on.py in `default` mode (same pattern
  # as sanitizers.yml). Each OS resolves to, in priority order:
  #   1. workflow_dispatch input (e.g. linux_runner_selector_json)
  #   2. repo variable override (e.g. PULP_COVERAGE_LINUX_RUNS_ON_JSON)
  #   3. hard-coded default label (ubuntu-latest / macos-latest / windows-latest)
  # No behavior change when the repo variables are unset — matches today's
  # single-job baseline on Linux and adds macOS/Windows on the standard
  # GitHub-hosted labels. Set PULP_COVERAGE_<OS>_RUNS_ON_JSON to route any
  # one leg to Namespace without a code change.
  resolve-runners:
    runs-on: ubuntu-latest
    outputs:
      linux_runs_on: ${{ steps.resolve.outputs.linux_runs_on }}
      macos_runs_on: ${{ steps.resolve.outputs.macos_runs_on }}
      windows_runs_on: ${{ steps.resolve.outputs.windows_runs_on }}
      android_kotlin_runs_on: ${{ steps.resolve.outputs.android_kotlin_runs_on }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false
          lfs: false
      - id: resolve
        env:
          EXPLICIT_LINUX_RUNNER_SELECTOR_JSON: ${{ inputs.linux_runner_selector_json || '' }}
          EXPLICIT_MACOS_RUNNER_SELECTOR_JSON: ${{ inputs.macos_runner_selector_json || '' }}
          EXPLICIT_WINDOWS_RUNNER_SELECTOR_JSON: ${{ inputs.windows_runner_selector_json || '' }}
          LINUX_RUNS_ON_JSON: ${{ vars.PULP_COVERAGE_LINUX_RUNS_ON_JSON }}
          MACOS_RUNS_ON_JSON: ${{ vars.PULP_NAMESPACE_BUILD_MACOS_RUNS_ON_JSON || vars.PULP_COVERAGE_MACOS_RUNS_ON_JSON }}
          WINDOWS_RUNS_ON_JSON: ${{ vars.PULP_COVERAGE_WINDOWS_RUNS_ON_JSON }}
          ANDROID_KOTLIN_RUNS_ON_JSON: ${{ vars.PULP_NAMESPACE_BUILD_MACOS_RUNS_ON_JSON || vars.PULP_COVERAGE_ANDROID_KOTLIN_RUNS_ON_JSON }}
        run: |
          set -euo pipefail
          resolve() {
            python3 tools/scripts/resolve_runs_on.py \
              --target-name "$1" \
              --mode default \
              --explicit-env "$2" \
              --override-env "$3" \
              --default-label "$4"
          }
          linux=$(resolve \
            "Coverage (Linux)" \
            EXPLICIT_LINUX_RUNNER_SELECTOR_JSON \
            LINUX_RUNS_ON_JSON \
            ubuntu-latest)
          macos=$(resolve \
            "Coverage (macOS)" \
            EXPLICIT_MACOS_RUNNER_SELECTOR_JSON \
            MACOS_RUNS_ON_JSON \
            macos-latest)
          android_kotlin=$(resolve \
            "Coverage (Android, Kotlin)" \
            "" \
            ANDROID_KOTLIN_RUNS_ON_JSON \
            macos-latest)
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            # Keep PR Windows coverage on GitHub-hosted runners until the
            # Namespace Windows queue is reliably assigning jobs again.
            windows='"windows-latest"'
          else
            windows=$(resolve \
              "Coverage (Windows)" \
              EXPLICIT_WINDOWS_RUNNER_SELECTOR_JSON \
              WINDOWS_RUNS_ON_JSON \
              windows-latest)
          fi
          {
            echo "linux_runs_on=${linux}"
            echo "macos_runs_on=${macos}"
            echo "windows_runs_on=${windows}"
            echo "android_kotlin_runs_on=${android_kotlin}"
          } >>"${GITHUB_OUTPUT}"

  # ── Change classifier ──────────────────────────────────────────────────
  # Decides whether this PR needs the native coverage matrix at all. A PR
  # that touches only docs / planning markdown / git-hooks / Shipyard config
  # cannot move the C++/Swift coverage number — so the 3-OS coverage matrix
  # (150 min/leg) and the Android Kotlin lane are skipped at the job level
  # (no runner is ever allocated). The REQUIRED `coverage-diff-gate` still
  # runs and reports a fast green from Ubuntu for those skip-safe PRs.
  #
  # Mirrors the `classify` job in build.yml so the two stay in lockstep.
  # Fail-closed: tools/scripts/classify_changes.py treats any uncertainty
  # as "native build required". See that script's module docstring +
  # tools/scripts/test_classify_changes.py.
  classify:
    runs-on: ubuntu-latest
    outputs:
      native_build_required: ${{ steps.classify.outputs.native_build_required }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          lfs: false
      - id: classify
        run: |
          python3 tools/scripts/classify_changes.py \
            --mode=diff \
            --base "${{ github.event.pull_request.base.sha || 'origin/main' }}"

  # ── Build the event-conditional coverage matrix ────────────────────────
  # Per-PR coverage is macOS-only; push-to-main and workflow_dispatch keep
  # the full 3-OS matrix. This job emits the `coverage` job's matrix
  # `include` list as JSON so the conditional lives in one place:
  #   - pull_request → [macOS]
  #   - push / workflow_dispatch → [linux, macOS, windows]
  # The per-OS `runs_on_json` values are threaded through from the
  # `resolve-runners` job so the matrix legs still honour any repo-variable
  # or workflow_dispatch runner overrides. `os-windows` / `os-linux` flags
  # are unchanged — they simply don't appear on PR runs.
  matrix-config:
    runs-on: ubuntu-latest
    needs: [resolve-runners]
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
    steps:
      - id: build
        env:
          EVENT_NAME: ${{ github.event_name }}
          LINUX_RUNS_ON_JSON: ${{ needs.resolve-runners.outputs.linux_runs_on }}
          MACOS_RUNS_ON_JSON: ${{ needs.resolve-runners.outputs.macos_runs_on }}
          WINDOWS_RUNS_ON_JSON: ${{ needs.resolve-runners.outputs.windows_runs_on }}
        shell: bash
        run: |
          set -euo pipefail
          # One include entry per OS leg. macOS is always present; Linux
          # and Windows are appended only for non-pull_request events.
          #
          # `runs_on_json` MUST be encoded with `tojson`, never `tostring`.
          # The downstream `coverage` job consumes it via
          # `fromJSON(matrix.runs_on_json)`, which requires valid JSON.
          # `tostring` on a JSON string scalar (e.g. "macos-latest") strips
          # the quotes and emits a bare `macos-latest`, which `fromJSON`
          # rejects. `tojson` always emits valid JSON — a string stays
          # quoted, an array stays an array, an object stays an object.
          macos=$(jq -nc \
            --argjson runs_on "${MACOS_RUNS_ON_JSON}" \
            '{os:"macos", label:"macOS", flag:"os-macos", runs_on_json:($runs_on|tojson)}')
          if [ "${EVENT_NAME}" = "pull_request" ]; then
            # Per-PR coverage is macOS-only — Linux/Windows coverage is
            # provided by the nightly cross-platform-check.yml lane.
            include=$(jq -nc --argjson m "${macos}" '[$m]')
          else
            linux=$(jq -nc \
              --argjson runs_on "${LINUX_RUNS_ON_JSON}" \
              '{os:"linux", label:"Linux", flag:"os-linux", runs_on_json:($runs_on|tojson)}')
            windows=$(jq -nc \
              --argjson runs_on "${WINDOWS_RUNS_ON_JSON}" \
              '{os:"windows", label:"Windows", flag:"os-windows", runs_on_json:($runs_on|tojson)}')
            include=$(jq -nc \
              --argjson l "${linux}" \
              --argjson m "${macos}" \
              --argjson w "${windows}" \
              '[$l, $m, $w]')
          fi
          matrix=$(jq -nc --argjson inc "${include}" '{include:$inc}')
          echo "matrix=${matrix}" >> "${GITHUB_OUTPUT}"
          echo "Coverage matrix for event '${EVENT_NAME}': ${matrix}"

  coverage:
    needs: [resolve-runners, changed-files, classify, matrix-config]
    # Skip the entire native coverage matrix (no runner allocated) when the
    # PR touches no C++/Swift build input. The required `coverage-diff-gate`
    # job below still runs and reports a skip-safe green.
    if: needs.classify.outputs.native_build_required == 'true'
    name: Coverage report (${{ matrix.label }}, Clang)
    # Hard backstop against a wedged matrix leg. A healthy coverage build
    # runs ~1h; 150 min leaves generous headroom for a slow self-hosted
    # runner without ever letting a leg squat for GitHub's 6h job limit.
    # Critically, this also bounds the QUEUED state: when a self-hosted
    # macOS runner pool (routed via PULP_COVERAGE_MACOS_RUNS_ON_JSON) is
    # saturated, a leg that never gets a runner now fails on this timeout
    # instead of hanging indefinitely — which previously kept the whole
    # Coverage run `in_progress` for 4h+ and starved the downstream gate.
    timeout-minutes: 150
    strategy:
      # Don't cancel other OSes when one fails — coverage is advisory
      # and we want every OS to attempt an upload independently so the
      # Codecov dashboard has the widest cross-OS picture possible even
      # when one leg flakes.
      #
      # The matrix `include` list is built by the `matrix-config` job and
      # is event-conditional: pull_request → macOS leg only; push to main
      # and workflow_dispatch → full {linux, macos, windows}. Per-PR
      # coverage therefore measures the macOS development surface only;
      # Linux/Windows coverage on PRs is provided by the nightly
      # cross-platform-check.yml lane.
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix-config.outputs.matrix) }}
    runs-on: ${{ fromJSON(matrix.runs_on_json) }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false
          # No current coverage input is stored as an LFS object. Keep this
          # false so self-hosted macOS coverage does not fail when git-lfs
          # tries to install its own pre-push hook in the reused workspace.
          lfs: false

      - name: Set up Namespace macOS cache
        if: matrix.os == 'macos' && contains(matrix.runs_on_json, 'namespace-profile')
        uses: ./.github/actions/setup-namespace-macos-cache

      - name: Install Linux dependencies + Clang tooling
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang llvm lld \
            libasound2-dev libdbus-1-dev libdrm-dev libegl1-mesa-dev \
            libgbm-dev libgl1-mesa-dev libx11-dev libxext-dev libxfixes-dev \
            libxi-dev libxinerama-dev libxkbcommon-dev libxrandr-dev \
            libxrender-dev libxss-dev libxtst-dev libwayland-dev wayland-protocols

      - name: Verify Clang tooling (macOS)
        # macOS runners ship Apple Clang with llvm-cov / llvm-profdata
        # already on PATH in Xcode's toolchain. Surface any missing
        # tool early with a clear message instead of mid-build. xcrun
        # --find resolves through the active Xcode even when PATH
        # doesn't include the bin directly.
        if: matrix.os == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          for tool in clang llvm-profdata llvm-cov; do
            if ! command -v "${tool}" >/dev/null 2>&1; then
              path=$(xcrun --find "${tool}" 2>/dev/null || true)
              if [ -n "${path}" ]; then
                bin_dir=$(dirname "${path}")
                echo "Found ${tool} via xcrun: ${path}"
                # $GITHUB_PATH applies to SUBSEQUENT steps only, so also
                # export into this step's $PATH for the version checks
                # below and anything else downstream in-step.
                echo "${bin_dir}" >> "$GITHUB_PATH"
                export PATH="${bin_dir}:${PATH}"
              else
                echo "ERROR: ${tool} not found on macOS runner" >&2
                exit 1
              fi
            fi
          done
          clang --version
          llvm-profdata --help | head -1 || true
          llvm-cov --version | head -1

      - name: Install Clang toolchain (Windows)
        # windows-latest ships LLVM/Clang at C:\Program Files\LLVM\bin
        # but not always on PATH in the default shell. Add it
        # unconditionally; scripts/run_coverage.sh needs
        # clang + llvm-profdata + llvm-cov reachable from bash.
        # PULP_ENABLE_COVERAGE requires Clang — MSVC is rejected by
        # tools/cmake/PulpInstrumentation.cmake because llvm-cov and
        # MSVC's /fsanitize-coverage emit incompatible profile shapes.
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $llvmBin = "C:\Program Files\LLVM\bin"
          if (-not (Test-Path $llvmBin)) {
            Write-Host "LLVM not preinstalled, installing via choco"
            choco install llvm --no-progress -y
          }
          Add-Content $env:GITHUB_PATH $llvmBin
          Write-Host "Added $llvmBin to PATH"

      # gcovr is no longer needed — scripts/run_coverage.sh now drives
      # the LLVM → Cobertura conversion via `llvm-cov export --format=lcov`
      # plus the vendored `tools/scripts/lcov_cobertura.py` converter. The
      # old gcovr flow (via `--llvm-cov-binary` per test binary) silently
      # dropped ~99.9% of the coverage data once the `-object` set widened
      # to include `libpulp-*.a` archives. Kept as a marker so the soak
      # delete is easy to find if gcovr resurfaces for another reason.

      - name: run_coverage.sh fixture tests (#569 / #570)
        # Assert the canonical ignore-regex excludes _deps/catch2-build
        # spam (#569) AND that the stale-cache guard trips loudly
        # instead of silently producing empty profdata (#570). Runs
        # before the heavy build so a regex/guard regression fails
        # fast without burning the full coverage build. Linux-only —
        # the fixture is pure-Python and the behavior it checks is
        # script-level, not platform-specific, so one leg is enough.
        if: matrix.os == 'linux'
        run: python3 tools/scripts/test_run_coverage.py
        shell: bash

      - name: Bootstrap dependencies
        run: ./setup.sh --ci --deps-only
        shell: bash

      - name: Fetch prebuilt Skia (macOS)
        # scripts/run_coverage.sh configures with examples enabled. The
        # design-tool example requires Skia when GPU support is enabled,
        # and fresh macOS coverage checkouts do not have the LFS-declared
        # Skia binaries on disk. Reuse the same pinned, sha256-verified
        # fetch path as build.yml so coverage can configure on the current
        # self-hosted macOS runners.
        if: matrix.os == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/scripts/fetch_skia_for_release.py darwin-arm64

      - name: Run coverage suite
        # Coverage never fails the run — thresholds come later per
        # the #290 hardening initiative. `continue-on-error` combined
        # with `strategy.fail-fast: false` above means a flake on any
        # one OS doesn't cancel the others, so the Codecov dashboard
        # still gets partial multi-OS coverage data.
        #
        # On Windows, pin CMAKE_GENERATOR=Ninja so cmake doesn't fall
        # back to the default "Visual Studio 17 2022" generator, which
        # ignores -DCMAKE_CXX_COMPILER=clang++ and picks MSVC cl.exe
        # instead. Pulp's coverage build requires Clang source-based
        # instrumentation (PulpInstrumentation.cmake rejects MSVC),
        # so the VS-generator path fails silently with no profraw
        # emitted. Ninja honours CMAKE_C/CXX_COMPILER cleanly.
        continue-on-error: true
        shell: bash
        env:
          CMAKE_GENERATOR: ${{ matrix.os == 'windows' && 'Ninja' || '' }}
          PULP_COVERAGE_CMAKE_ARGS: ${{ matrix.os == 'linux' && '-DPULP_BUILD_PYTHON=ON' || '' }}
          # Coverage workflow targets C++ source coverage. The Rust CLI
          # (#778, Phase 8 PR #1) gets its own `cli-rust` Codecov tier
          # via a separate cargo-llvm-cov job (planned in PR #783) —
          # this job doesn't need the Rust binary built. Skipping
          # avoids macOS-runner ring-crate build failure (#785) without
          # losing C++ coverage data.
          PULP_SKIP_RUST_CLI: '1'
        run: scripts/run_coverage.sh

      - name: Install Python coverage tooling
        # tools/scripts/** is a blind spot in the current dashboard:
        # the repo already has Python unit tests for the gate and
        # automation scripts, but their coverage never reaches
        # Codecov. Keep the first expansion intentionally narrow:
        # Linux-only, tools/scripts-only, same workflow.
        #
        # Use a dedicated venv rather than mutating the system
        # interpreter. That keeps the step working on Namespace's
        # PEP-668-strict runner image without relying on
        # `--break-system-packages`.
        if: matrix.os == 'linux'
        shell: bash
        run: |
          python3 -m venv build-coverage/python-venv
          build-coverage/python-venv/bin/python -m pip install --upgrade pip
          build-coverage/python-venv/bin/python -m pip install 'coverage>=7.10' PyYAML

      - name: Run Python tools coverage
        # Mirror scripts/run_coverage.sh semantics: keep going even if a
        # test fails so we can still emit partial coverage for review.
        if: matrix.os == 'linux'
        continue-on-error: true
        shell: bash
        run: build-coverage/python-venv/bin/python tools/scripts/run_python_coverage.py

      - name: Run Swift apple coverage
        # SwiftPM has its own coverage pipeline (`swift test
        # --enable-code-coverage`) distinct from the native Clang lane.
        # Keep it on the macOS leg where the Apple package actually
        # builds, and stage repo-relative LCOV for upload plus the
        # original Swift JSON for local summaries/debugging.
        #
        # Gated on `needs.changed-files.outputs.ios` (closes #1887): the
        # underlying `run_swift_coverage.py` configures an iOS try-compile
        # via `cmake -DCMAKE_SYSTEM_NAME=iOS`, which adds ~25-30 min to
        # every PR. Skip it on PRs whose diff doesn't touch iOS-relevant
        # paths; always run on push-to-main and workflow_dispatch so the
        # canonical lane still exercises the iOS toolchain daily.
        if: matrix.os == 'macos' && needs.changed-files.outputs.ios == 'true'
        continue-on-error: true
        shell: bash
        run: python3 tools/scripts/run_swift_coverage.py

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report-${{ matrix.os }}-${{ github.sha }}
          path: build-coverage/coverage/
          retention-days: 30

      - name: Upload summary
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v6
        with:
          name: coverage-summary-${{ matrix.os }}-${{ github.sha }}
          path: build-coverage/coverage/summary.txt
          retention-days: 90

      - name: Upload Python HTML report
        if: always() && matrix.os == 'linux'
        uses: actions/upload-artifact@v6
        with:
          name: coverage-python-report-${{ github.sha }}
          path: build-coverage/python/html/
          retention-days: 30
          if-no-files-found: error

      - name: Upload Python summary
        if: always() && matrix.os == 'linux'
        continue-on-error: true
        uses: actions/upload-artifact@v6
        with:
          name: coverage-python-summary-${{ github.sha }}
          path: build-coverage/python/summary.txt
          retention-days: 90
          if-no-files-found: error

      - name: Upload Apple summary
        # Same gate as the Swift coverage step — when the iOS lane is
        # skipped (closes #1887), there is no apple/summary.txt to
        # upload and `if-no-files-found: error` would hard-fail the leg.
        if: always() && matrix.os == 'macos' && needs.changed-files.outputs.ios == 'true'
        continue-on-error: true
        uses: actions/upload-artifact@v6
        with:
          name: coverage-apple-summary-${{ github.sha }}
          path: build-coverage/apple/summary.txt
          retention-days: 90
          if-no-files-found: error

      - name: Verify Cobertura XML exists
        # Fail loudly if the coverage build didn't produce a cobertura file.
        # Without this check, a silent build failure (e.g. a missing transitive
        # include that breaks under Clang strict mode) produces zero profraw
        # → no cobertura → Codecov upload "succeeds" with no files → dashboard
        # stays empty. We had exactly this class of silent failure until
        # state_tree.hpp missing <algorithm> was caught on 2026-04-21.
        #
        # Pin shell: bash so the POSIX `test` + `wc -c <` syntax works on
        # the windows runner too (default shell there is pwsh, which treats
        # `<` as a reserved redirection operator and errors out).
        shell: bash
        run: |
          xml=build-coverage/coverage.cobertura.xml
          test -s "$xml" || {
            echo "::error::coverage.cobertura.xml is missing or empty."
            echo "::error::Coverage build likely failed — check the 'Run coverage suite' step above."
            exit 1
          }
          size=$(wc -c < "$xml")
          # A2 first cut: assertion logic extracted to
          # tools/scripts/verify_cobertura_xml.py so the inline-Python
          # heredoc isn't duplicated across the native + Python lanes
          # (and stays unit-testable). #605 contract preserved
          # verbatim — non-empty file + lines-valid > 0.
          python3 tools/scripts/verify_cobertura_xml.py "$xml" \
            --label "coverage.cobertura.xml" \
            --hint "llvm-cov / lcov_cobertura filtered out every source file — check scripts/run_coverage.sh's COVERAGE_IGNORE_REGEX and -object list against the actual profraw source paths."

      - name: Verify Python Cobertura XML exists
        # coverage.py emits Cobertura XML too. Keep the same
        # file-non-empty + lines-valid assertions we use for the native
        # report so a broken Python lane doesn't silently upload nothing.
        if: always() && matrix.os == 'linux'
        shell: bash
        run: |
          xml=build-coverage/python/coverage.python.xml
          test -s "$xml" || {
            echo "::error::coverage.python.xml is missing or empty."
            echo "::error::Python tools coverage likely failed — check the 'Run Python tools coverage' step above."
            exit 1
          }
          # A2 first cut: shared verifier (see native lane above).
          python3 tools/scripts/verify_cobertura_xml.py "$xml" \
            --label "coverage.python.xml" \
            --hint "coverage.py did not record any executable tools/scripts lines."

      - name: Verify Apple LCOV exists
        # Swift coverage is exported to repo-relative LCOV so Codecov
        # can attribute apple/Sources/** files against the git tree
        # instead of discarding LLVM JSON with absolute runner paths.
        #
        # Gated on `needs.changed-files.outputs.ios` (closes #1887): the
        # Swift apple coverage step above is skipped on PRs whose diff
        # doesn't touch iOS-relevant paths, so the LCOV file legitimately
        # won't exist — don't fail the leg in that case.
        if: always() && matrix.os == 'macos' && needs.changed-files.outputs.ios == 'true'
        shell: bash
        run: |
          lcov=build-coverage/apple/coverage.apple.lcov
          test -s "$lcov" || {
            echo "::error::coverage.apple.lcov is missing or empty."
            echo "::error::Swift apple coverage likely failed — check the 'Run Swift apple coverage' step above."
            exit 1
          }
          count=$(grep -c '^SF:apple/Sources/' "$lcov" || true)
          if [ "$count" -eq 0 ]; then
            echo "::error::coverage.apple.lcov contains no apple/Sources entries."
            exit 1
          fi
          echo "coverage.apple.lcov has ${count} apple/Sources entries"

      - name: Upload Cobertura XML
        # Artifact naming: the Linux leg keeps the historical unsuffixed
        # name `coverage-cobertura-${sha}`; macOS and Windows upload
        # under OS-suffixed names (`coverage-cobertura-macos-${sha}`,
        # `coverage-cobertura-windows-${sha}`). The downstream
        # `coverage-diff-gate` job downloads whichever of the three
        # exist and merges them via merge_cobertura.py — on
        # `pull_request` events only the macOS leg runs, so only the
        # macOS artifact is produced and the gate measures the macOS
        # development surface (see the `matrix-config` job).
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.os == 'linux' && format('coverage-cobertura-{0}', github.sha) || format('coverage-cobertura-{0}-{1}', matrix.os, github.sha) }}
          path: build-coverage/coverage.cobertura.xml
          retention-days: 14
          if-no-files-found: error

      - name: Upload Python Cobertura XML
        if: always() && matrix.os == 'linux'
        uses: actions/upload-artifact@v6
        with:
          name: coverage-python-${{ github.sha }}
          path: build-coverage/python/coverage.python.xml
          retention-days: 14
          if-no-files-found: error

      - name: Upload Apple LCOV
        # Same iOS-lane gate as the verify step above (closes #1887) —
        # `if-no-files-found: error` would hard-fail the leg when the
        # Swift step legitimately skipped on a non-iOS PR diff.
        if: always() && matrix.os == 'macos' && needs.changed-files.outputs.ios == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: coverage-apple-${{ github.sha }}
          path: build-coverage/apple/coverage.apple.lcov
          retention-days: 14
          if-no-files-found: error

      - name: Compute Codecov upload file list
        id: codecov_files
        if: always()
        shell: bash
        run: |
          files="build-coverage/coverage.cobertura.xml"
          if [ "${{ matrix.os }}" = "linux" ] && [ -f build-coverage/python/coverage.python.xml ]; then
            files="${files},build-coverage/python/coverage.python.xml"
          fi
          if [ "${{ matrix.os }}" = "macos" ] && [ -f build-coverage/apple/coverage.apple.lcov ]; then
            files="${files},build-coverage/apple/coverage.apple.lcov"
          fi
          echo "files=${files}" >> "${GITHUB_OUTPUT}"

      - name: Upload coverage to Codecov
        # #566 Phase 1 PR 4 adds a per-OS flag on each matrix leg
        # (`os-linux`, `os-macos`, `os-windows`) so Codecov can
        # cross-filter coverage by OS. Cross-OS unions of the same
        # file happen at the Codecov flag layer — NOT via
        # llvm-profdata merge, which is not architecture-portable
        # (see planning decision doc §7).
        #
        # Subsystem / platform / surface breakdown comes from the
        # `component_management` block in codecov.yml, which slices
        # each upload by path (#603 made this switch on main after
        # Codecov rejected the 20-flag-per-upload pattern with
        # "Multiple flags detected. Please ensure one flag per
        # upload."). A single per-OS flag per upload is the
        # supported shape.
        #
        # fail_ci_if_error: false — coverage is still advisory in
        # Phase 1. Phase 3 adds a diff-cover gate for per-PR
        # enforcement (see coverage-diff-gate below, pinned to Linux).
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: ${{ steps.codecov_files.outputs.files }}
          flags: ${{ matrix.flag }}
          disable_search: true
          # Token makes upload more reliable (avoids tokenless rate limits);
          # action silently falls back to tokenless if the secret is unset
          # (e.g. in forked-PR context where secrets aren't exposed).
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true

  # ── Queued-leg watchdog (codex P1 on pulp#2521) ────────────────────────
  # `timeout-minutes` on the `coverage` matrix job ONLY bounds execution
  # AFTER a runner is assigned — it does NOT expire a leg still sitting
  # `queued` waiting for a runner. When the macOS coverage leg is routed
  # to a self-hosted / Namespace pool (PULP_COVERAGE_MACOS_RUNS_ON_JSON)
  # and that pool has no idle worker, the leg can squat in `queued` until
  # GitHub's self-hosted queue timeout (up to 24h). While it does, the
  # `coverage` job never reaches a terminal state, so the REQUIRED
  # `coverage-diff-gate` (`needs: coverage`) stays blocked and the PR's
  # required check is stuck for hours.
  #
  # The repo-wide `stale-run-reaper.yml` does NOT cover this: a run with
  # one queued leg + other legs running shows as `in_progress`, so the
  # reaper ages it from `run_started_at` against a 4h cutoff — far too
  # slow, and not a per-leg signal at all.
  #
  # This watchdog is the explicit queued-job reaper. It runs on a
  # GitHub-hosted runner (NEVER self-hosted, so it can never itself be
  # the thing that's stuck), starts immediately (no `needs:`), and polls
  # THIS run's own jobs. If any coverage leg has been `queued` longer
  # than QUEUED_GRACE_MINUTES, it cancels the whole run via the
  # `runs/{id}/cancel` API — there is no public API to cancel a single
  # matrix leg, and cancelling the run is what the required gate needs
  # anyway: `coverage-diff-gate`'s `if: always()` precondition step then
  # reaches a real terminal `cancelled` conclusion instead of hanging.
  coverage-queue-watchdog:
    name: Coverage queue watchdog
    # Gate on the same classifier output as the `coverage` matrix — when
    # the matrix is skipped (skip-safe docs/planning PR) there are no
    # coverage legs to reap and the watchdog has nothing to do.
    needs: [classify]
    if: needs.classify.outputs.native_build_required == 'true'
    # GitHub-hosted on purpose: the watchdog must never queue behind the
    # same saturated self-hosted pool it is meant to reap.
    runs-on: ubuntu-latest
    # Hard upper bound on the watchdog itself. The watchdog only needs to
    # catch a leg that NEVER gets a runner, so it polls for the full
    # QUEUED_GRACE_MINUTES window plus the margin MAX_POLLS provides, then
    # exits. This bound must exceed the POLL_SECONDS * MAX_POLLS poll
    # window (60s * 160 = 160 min) so the loop is never killed mid-window.
    # In the common case the watchdog still exits EARLY — the moment every
    # coverage leg has left `queued` (the `queued_legs == 0` branch) — so
    # it almost never runs the full window.
    timeout-minutes: 165
    permissions:
      # actions: write is required to POST runs/{id}/cancel.
      actions: write
      contents: read
    steps:
      - name: Reap a coverage leg stuck in the runner queue
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          SELF_JOB_NAME: Coverage queue watchdog
          # A coverage leg that has not been assigned a runner this long
          # is treated as orphaned by a saturated pool and reaped.
          #
          # Tuned from measured data: across 44 recent coverage legs the
          # queue wait was median ~30 min, p90 ~52 min, max ~83 min under
          # deep-queue load, and 89% of legs waited >= 25 min then ran and
          # SUCCEEDED. The original 25-min grace therefore false-cancelled
          # the large majority of healthy coverage runs. 150 min sits
          # comfortably above the ~83-min observed legitimate max, so the
          # watchdog now fires only on a leg that is genuinely orphaned by
          # a dead/saturated pool — never on a leg that is merely waiting
          # out a deep but healthy queue.
          #
          # This long grace does NOT mean the watchdog usually runs for
          # 150 min: it still exits EARLY (the `queued_legs == 0` branch)
          # the moment the leg starts, which in the common case is well
          # inside the window.
          QUEUED_GRACE_MINUTES: '150'
          # Poll cadence + total watch window. POLL_SECONDS * MAX_POLLS
          # (60s * 160 = 160 min) must comfortably exceed
          # QUEUED_GRACE_MINUTES so a leg that queues at t=0 is still
          # observed past the grace cutoff, while staying inside this
          # job's timeout-minutes.
          POLL_SECONDS: '60'
          MAX_POLLS: '160'
        run: |
          set -euo pipefail

          # The run's created_at is when EVERY job in this run — including
          # any leg still sitting in `queued` — was created. Ageing a
          # queued leg from this timestamp is correct and needs no
          # per-job `queued_at` (the jobs API does not expose one). It
          # also means a leg already orphaned before this watchdog's
          # first poll is still aged correctly.
          run_created_at=$(
            gh api "repos/${REPO}/actions/runs/${RUN_ID}" \
              --jq '.created_at' 2>/dev/null || echo ""
          )
          if [ -z "${run_created_at}" ]; then
            echo "::warning::Could not read run created_at; watchdog cannot age queued legs. Exiting without action."
            exit 0
          fi

          # timestamp -> epoch. GNU date first, Python fallback (mirrors
          # stale-run-reaper.yml).
          to_epoch() {
            date -u -d "$1" +%s 2>/dev/null \
              || python3 -c "import datetime,sys; print(int(datetime.datetime.fromisoformat(sys.argv[1].replace('Z','+00:00')).timestamp()))" "$1" \
              2>/dev/null || echo ""
          }

          run_created_epoch=$(to_epoch "${run_created_at}")
          if [ -z "${run_created_epoch}" ]; then
            echo "::warning::Could not parse run created_at '${run_created_at}'; exiting without action."
            exit 0
          fi

          echo "Repo:               ${REPO}"
          echo "Run id:             ${RUN_ID}"
          echo "Run created_at:     ${run_created_at}"
          echo "Queued grace:       ${QUEUED_GRACE_MINUTES} min"
          echo "Poll cadence:       ${POLL_SECONDS}s x ${MAX_POLLS}"

          poll=0
          while [ "${poll}" -lt "${MAX_POLLS}" ]; do
            poll=$((poll + 1))
            now_epoch=$(date -u +%s)

            # Per-job: name <TAB> status. A coverage leg that has not
            # been assigned a runner has status=queued. The jobs API has
            # no per-job `queued_at`, so the leg is aged from the run's
            # created_at (resolved once, above) — not a per-job field.
            # Exclude the watchdog's own job so it can never reap itself.
            jobs_tsv=$(
              gh api --paginate \
                -H "Accept: application/vnd.github+json" \
                "repos/${REPO}/actions/runs/${RUN_ID}/jobs?per_page=100" \
                --jq '.jobs[] | [.name, .status] | @tsv' \
                2>/dev/null || true
            )

            queued_legs=0
            stuck_leg=""
            stuck_age_min=0
            while IFS=$'\t' read -r job_name job_status; do
              [ -z "${job_name}" ] && continue
              [ "${job_name}" = "${SELF_JOB_NAME}" ] && continue
              # Only the REQUIRED native coverage legs — `Coverage report
              # (macOS, Clang)` / `(Linux, Clang)` / `(Windows, Clang)`.
              # These are the legs the required `Diff coverage required`
              # gate depends on and the ones that route to a saturated
              # self-hosted / Namespace pool. Match a name that both
              # starts with `Coverage report (` AND ends with `, Clang)`.
              #
              # `Coverage report (Android, Kotlin)` ends `, Kotlin)` and
              # is deliberately NOT reaped: the Android lane is advisory,
              # is not part of the required diff-coverage dependency
              # chain, and reaping it would cancel the whole run —
              # including the required native gate — for an advisory leg.
              case "${job_name}" in
                "Coverage report ("*", Clang)") ;;
                *) continue ;;
              esac
              [ "${job_status}" != "queued" ] && continue

              queued_legs=$((queued_legs + 1))
              age_min=$(( (now_epoch - run_created_epoch) / 60 ))
              echo "  poll ${poll}: '${job_name}' still queued (${age_min} min since run created)"
              if [ "${age_min}" -ge "${QUEUED_GRACE_MINUTES}" ] && [ "${age_min}" -gt "${stuck_age_min}" ]; then
                stuck_leg="${job_name}"
                stuck_age_min="${age_min}"
              fi
            done <<< "${jobs_tsv}"

            if [ -n "${stuck_leg}" ]; then
              echo "::error::Coverage leg '${stuck_leg}' has been queued ${stuck_age_min} min (>= ${QUEUED_GRACE_MINUTES} min grace) — the runner pool is saturated and never assigned it a runner. Cancelling run ${RUN_ID} so the required 'Diff coverage required' gate reaches a terminal conclusion instead of hanging."
              # POST cancel. Once GitHub accepts this (202) the run —
              # including this watchdog job — is torn down; the cancel is
              # already committed, so a mid-call kill is harmless.
              gh api --method POST \
                -H "Accept: application/vnd.github+json" \
                "repos/${REPO}/actions/runs/${RUN_ID}/cancel" >/dev/null 2>&1 \
                || echo "::warning::cancel POST failed (run may already be completing) — relying on stale-run-reaper.yml as the slower backstop."
              exit 0
            fi

            if [ "${queued_legs}" -eq 0 ]; then
              echo "  poll ${poll}: no coverage leg is queued — every leg has a runner or has finished. Watchdog done."
              exit 0
            fi

            sleep "${POLL_SECONDS}"
          done

          echo "Watchdog window elapsed (${MAX_POLLS} polls) with no leg past the ${QUEUED_GRACE_MINUTES}-min grace — nothing reaped."

  android-kotlin-coverage:
    # Keep Android JVM coverage on the always-on Coverage workflow so
    # Codecov's main-branch head never drops back to `android: null`
    # just because a non-Android commit skipped android.yml entirely.
    # This lane measures Kotlin unit-testable source only; APK build and
    # emulator/device smoke remain in android.yml.
    name: Coverage report (Android, Kotlin)
    needs: [resolve-runners, classify]
    # Skip-safe (docs/planning-only) PRs can't move the Kotlin coverage
    # number either, so gate this lane on the same classifier output as the
    # native coverage matrix.
    # follow-up: a finer android-path gate would skip this on C++-only PRs too
    if: needs.classify.outputs.native_build_required == 'true'
    runs-on: ${{ fromJSON(needs.resolve-runners.outputs.android_kotlin_runs_on) }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install macOS CMake generator deps
        if: runner.os == 'macOS'
        shell: bash
        run: |
          if ! command -v ninja >/dev/null 2>&1; then
            brew install ninja
          fi

      - name: Install Android SDK packages
        shell: bash
        run: |
          for attempt in 1 2 3; do
            if sdkmanager \
              "platforms;android-35" \
              "build-tools;34.0.0" \
              "ndk;30.0.14904198"; then
              exit 0
            fi
            sleep $((attempt * 10))
          done
          exit 1

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: android-coverage-${{ runner.os }}-${{ hashFiles('android/**/*.gradle.kts', 'android/app/src/test/**/*.kt') }}
          restore-keys: |
            android-coverage-${{ runner.os }}-
            ${{ runner.os }}-gradle-

      - name: Run Kotlin unit tests + JaCoCo report
        working-directory: android
        run: ./gradlew :app:testDebugUnitTest :app:jacocoDebugUnitTestReport
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/30.0.14904198

      - name: Verify JaCoCo XML exists
        shell: bash
        run: |
          xml=android/app/build/reports/jacoco/jacocoDebugUnitTestReport/jacocoDebugUnitTestReport.xml
          test -s "$xml" || {
            echo "::error::Android JaCoCo XML is missing or empty."
            exit 1
          }
          python3 - <<'PY'
          import pathlib
          import sys
          import xml.etree.ElementTree as ET

          path = pathlib.Path(
              "android/app/build/reports/jacoco/jacocoDebugUnitTestReport/"
              "jacocoDebugUnitTestReport.xml"
          )
          root = ET.parse(path).getroot()
          line = root.find("counter[@type='LINE']")
          if line is None:
              print("::error::Android JaCoCo XML has no LINE counter.")
              sys.exit(1)
          total = int(line.attrib["missed"]) + int(line.attrib["covered"])
          if total == 0:
              print("::error::Android JaCoCo XML reports zero measured lines.")
              sys.exit(1)
          print(f"Android JaCoCo XML lines: {line.attrib['covered']}/{total}")
          PY

      - name: Upload Kotlin coverage artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: android-kotlin-coverage-${{ github.sha }}
          path: |
            android/app/build/reports/jacoco/jacocoDebugUnitTestReport/**
            android/app/build/reports/tests/testDebugUnitTest/**
          retention-days: 14
          if-no-files-found: error

      - name: Upload Android Kotlin coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: android/app/build/reports/jacoco/jacocoDebugUnitTestReport/jacocoDebugUnitTestReport.xml
          disable_search: true
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true

  pulp-react-coverage:
    # Keep @pulp/react's main-branch Codecov upload in the canonical
    # Coverage workflow. The path-filtered pulp-react build workflow still
    # validates PRs, but it must not be the only main upload for a SHA whose
    # native Coverage run was superseded before any OS legs uploaded.
    name: Coverage report (@pulp/react, Vitest)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: packages/pulp-react/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: packages/pulp-react

      - name: Build
        run: npm run build
        working-directory: packages/pulp-react

      - name: Test (with coverage)
        run: npm run test:coverage
        working-directory: packages/pulp-react

      - name: Verify Cobertura XML exists
        shell: bash
        run: |
          xml=packages/pulp-react/coverage/cobertura-coverage.xml
          test -s "$xml" || {
            echo "::error::cobertura-coverage.xml is missing or empty."
            echo "::error::Vitest coverage step likely failed — check the 'Test (with coverage)' step above."
            exit 1
          }
          size=$(wc -c < "$xml")
          echo "cobertura-coverage.xml size: ${size} bytes"
          lines_valid=$(python3 -c "import xml.etree.ElementTree as E; print(E.parse('$xml').getroot().attrib.get('lines-valid', '0'))")
          if [ "${lines_valid}" = "0" ]; then
            echo "::error::cobertura-coverage.xml is structurally empty (lines-valid=0)."
            exit 1
          fi
          echo "cobertura-coverage.xml has lines-valid=${lines_valid}"

      - name: Upload pulp-react coverage artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: pulp-react-coverage-${{ github.sha }}
          path: packages/pulp-react/coverage/cobertura-coverage.xml
          retention-days: 14
          if-no-files-found: error

      - name: Upload pulp-react coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: packages/pulp-react/coverage/cobertura-coverage.xml
          flags: pulp-react
          disable_search: true
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true

  coverage-diff-gate:
    # Per-PR diff-coverage gate. REQUIRED — sub-threshold diff coverage
    # hard-fails the PR. The job still posts a summary comment so
    # contributors see the number alongside the failing check.
    #
    # The gate runs diff-cover over a MERGED Cobertura XML produced by
    # tools/scripts/merge_cobertura.py. The merge takes max(hits) per
    # (filename, line) across whatever per-OS artifacts exist, so a line
    # covered on any OS counts as covered overall. The merge mechanism is
    # kept (push-to-main and workflow_dispatch still produce all three
    # per-OS XMLs), but on `pull_request` events ONLY the macOS Cobertura
    # XML exists — per-PR coverage is macOS-only (see the `matrix-config`
    # job). So per-PR this gate measures the macOS development surface:
    # the lines a contributor can actually exercise and verify locally.
    #
    # Platform-specific source — `**/platform/linux/**`,
    # `**/platform/windows/**`, `android/**`, `*_linux.*`, `*_win*.*` —
    # is ABSENT from the macOS XML, so diff-cover does not gate it
    # per-PR. That code is validated by the nightly cross-platform lane
    # (cross-platform-check.yml). The "Note platform-specific paths…"
    # step below makes that gap visible in the PR comment (a note, not a
    # block — blocking would hurt macOS-first development velocity).
    #
    # Runs only on pull_request events — the gate question "of the lines
    # this PR adds, how many are covered?" is meaningless on a direct
    # push to main where there is no diff to compute against.
    #
    # NOTE: the previous dynamic name `Diff coverage required (${{ ... }})`
    # did NOT evaluate at runtime — GitHub Actions renders `name:` at
    # job-creation time, before `needs.coverage.result` is available, so
    # the literal `${{ }}` template appeared in the check name on every
    # PR and the gate stayed `[cancelled]` (zero enforcement value).
    # The static name below renders correctly, lets us add the check to
    # branch-protection's required-status-checks list, and shows the
    # threshold inside the rendered PR comment body instead of the name.
    name: Diff coverage required
    # GitHub-hosted runner on purpose: a pure diff-coverage gate must
    # never queue behind a saturated self-hosted macOS pool. Combined
    # with `if: always()` below, this guarantees the required check can
    # always START and reach a terminal conclusion once the upstream
    # `coverage` job ends — whether it succeeded, failed, or was
    # cancelled — instead of squatting in `queued` for hours.
    runs-on: ubuntu-24.04
    # Hard backstop. diff-cover + the per-tier gate finish in a few
    # minutes; 30 min absorbs slow artifact downloads and pip installs
    # while still capping a wedged step well short of GitHub's 6h limit.
    timeout-minutes: 30
    needs: [classify, coverage]
    # `always()` keeps the required gate reaching a conclusion even when
    # an upstream `coverage` matrix leg fails, is cancelled, or is SKIPPED
    # entirely (skip-safe PR — `classify` said no native build). The
    # "Evaluate coverage gate preconditions" step below distinguishes the
    # three cases explicitly so the required check always reports a real
    # conclusion instead of staying eligible-but-stuck.
    if: always() && github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Evaluate coverage gate preconditions
        id: gate_preconditions
        # The REQUIRED diff-coverage gate has exactly three terminal cases
        # (Codex-validated). This step decides which one applies and sets
        # `native_required` for the step-level `if:` on every diff-cover
        # step below. The real diff-cover work runs ONLY when
        # native_required == 'true'.
        #
        #   1. classify did not succeed       → fail RED (untrusted output;
        #                                        fail the required gate closed)
        #   2. native build NOT required      → pass GREEN (classifier-approved
        #                                        skip-safe PR; no coverage owed)
        #   3. native required, coverage ≠ ok → fail RED (the coverage matrix
        #                                        was supposed to run and didn't
        #                                        succeed)
        #
        # When native_required == true AND coverage succeeded, this step
        # falls through and the diff-cover steps below run for real.
        shell: bash
        run: |
          classify_result="${{ needs.classify.result }}"
          native_required="${{ needs.classify.outputs.native_build_required }}"
          coverage_result="${{ needs.coverage.result }}"
          echo "native_required=${native_required}" >> "$GITHUB_OUTPUT"
          if [ "$classify_result" != "success" ]; then
            echo "::error::classify failed; failing required coverage gate closed"; exit 1
          fi
          if [ "$native_required" != "true" ]; then
            echo "Skip-safe PR; no native coverage required."; exit 0
          fi
          if [ "$coverage_result" != "success" ]; then
            echo "::error::coverage job result was $coverage_result; failing required coverage gate"; exit 1
          fi
          # native_required==true AND coverage succeeded: run the real diff-cover steps.
          echo "Native coverage required and coverage job succeeded — running diff-cover."

      - uses: actions/checkout@v5
        if: steps.gate_preconditions.outputs.native_required == 'true'
        with:
          # diff-cover compares HEAD against --compare-branch using real
          # git history, so we need enough depth to include the merge
          # base with origin/${{ github.base_ref }}. fetch-depth: 0
          # avoids guessing a shallow depth that works for most PRs but
          # breaks on long-lived branches.
          fetch-depth: 0
          submodules: false
          lfs: false

      - name: Ensure base branch is fetched
        if: steps.gate_preconditions.outputs.native_required == 'true'
        # actions/checkout fetches the PR head and the merge-ref but not
        # the full base branch history. diff-cover needs origin/<base>
        # to resolve --compare-branch, so fetch it explicitly.
        run: git fetch --no-tags origin "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"
        shell: bash

      - name: Download Cobertura XML from coverage job (Linux)
        # Linux artifact uses the historical name
        # `coverage-cobertura-${sha}`. macOS and Windows use OS-suffixed
        # names (see the matrix `coverage` job's upload step). On
        # `pull_request` events only the macOS leg runs (per-PR coverage
        # is macOS-only — see `matrix-config`), so this Linux artifact
        # legitimately does NOT exist and the download fails; that is
        # tolerated via `continue-on-error: true` and the merge step
        # writes a macOS-only XML. On push-to-main / workflow_dispatch
        # all three artifacts exist and are merged. The gate only reaches
        # this step when the classifier said native coverage IS required,
        # so if EVERY input is missing the merge step fails RED (see
        # "Merge per-OS Cobertura XMLs" below) rather than silently
        # passing the required gate.
        if: steps.gate_preconditions.outputs.native_required == 'true'
        uses: actions/download-artifact@v6
        with:
          name: coverage-cobertura-${{ github.sha }}
          path: coverage-artifact-linux/
        continue-on-error: true

      - name: Download Cobertura XML from coverage job (macOS)
        # Always present — macOS is the one leg that runs on every event,
        # including `pull_request`.
        if: steps.gate_preconditions.outputs.native_required == 'true'
        uses: actions/download-artifact@v6
        with:
          name: coverage-cobertura-macos-${{ github.sha }}
          path: coverage-artifact-macos/
        continue-on-error: true

      - name: Download Cobertura XML from coverage job (Windows)
        # Like the Linux artifact above: absent on `pull_request` events
        # (per-PR coverage is macOS-only), present on push / dispatch.
        if: steps.gate_preconditions.outputs.native_required == 'true'
        uses: actions/download-artifact@v6
        with:
          name: coverage-cobertura-windows-${{ github.sha }}
          path: coverage-artifact-windows/
        continue-on-error: true

      - name: Install diff-cover
        # Pinned to >=9 for the --markdown-report flag; earlier
        # releases only supported --html-report.
        if: steps.gate_preconditions.outputs.native_required == 'true'
        run: python3 -m pip install --user 'diff-cover>=9'
        shell: bash

      - name: coverage_diff_comment.py fixture tests
        # Guard the PR-comment renderer the same way the upstream
        # `coverage` job guards scripts/run_coverage.sh — run the
        # unit tests before we depend on the script in a live step
        # so a regression fails fast without waiting on diff-cover.
        if: steps.gate_preconditions.outputs.native_required == 'true'
        run: python3 tools/scripts/test_coverage_diff_comment.py
        shell: bash

      - name: merge_cobertura.py fixture tests (#635)
        # Same guard pattern: validate the merge tool before we
        # depend on its output in the live diff-cover step. A
        # regression in merge_cobertura would otherwise show up as
        # a confusing diff-cover number drift before anyone realised
        # the merge was the cause.
        if: steps.gate_preconditions.outputs.native_required == 'true'
        run: python3 tools/scripts/test_merge_cobertura.py
        shell: bash

      - name: Merge per-OS Cobertura XMLs into one
        # Unions whatever per-OS Cobertura artifacts exist into one XML,
        # taking max(hits) per (filename, line) so a line counted as
        # covered on any OS is treated as covered overall.
        #
        # On `pull_request` events only the macOS artifact exists
        # (per-PR coverage is macOS-only), so the merge is effectively a
        # pass-through of the macOS XML — diff-cover then gates the
        # macOS development surface. On push-to-main / workflow_dispatch
        # all three per-OS artifacts are merged, giving Codecov's main
        # head a true cross-OS picture. Platform-specific files absent
        # from the macOS XML are surfaced per-PR by the "Note
        # platform-specific paths…" step, not gated here.
        #
        # Exit-code policy (Codex P1 reviews on PR #654 + PR #660):
        # The script uses a DEDICATED exit code (2) for the
        # "every input XML missing/empty" case; exit 1 is the
        # conventional Python "real error" code (uncaught exception,
        # ParseError on a malformed Cobertura artifact, etc.).
        # Both MUST fail this gate. This step only runs once the
        # classifier confirmed the PR needs native coverage
        # (`native_required == true`), so a missing/empty XML here is a
        # real failure of the coverage matrix — NOT a skip-safe PR.
        # Letting the all-missing case pass GREEN would silently bypass
        # the required 75% coverage check (the old "all XML missing →
        # pass" fallback). Only the classifier-approved skip-safe path
        # (handled by the "Evaluate coverage gate preconditions" step)
        # gets a no-coverage green; everything that reaches this step
        # owes a real coverage report.
        if: steps.gate_preconditions.outputs.native_required == 'true'
        shell: bash
        run: |
          set +e
          python3 tools/scripts/merge_cobertura.py \
              --out coverage-artifact/coverage.cobertura.xml \
              coverage-artifact-linux/coverage.cobertura.xml \
              coverage-artifact-macos/coverage.cobertura.xml \
              coverage-artifact-windows/coverage.cobertura.xml
          rc=$?
          if [ "$rc" -eq 0 ]; then
            exit 0
          elif [ "$rc" -eq 2 ]; then
            echo "::error::merge_cobertura: every per-OS coverage XML is missing/empty, but the classifier says this PR needs native coverage. The coverage matrix failed to produce a report. Failing the required diff-coverage gate; investigate the 'coverage' matrix legs above."
            exit 1
          else
            echo "::error::merge_cobertura failed with exit ${rc} (corrupt artifact, parse error, or script bug — NOT the all-missing sentinel which is exit 2). Failing the required diff-coverage gate; investigate the per-OS coverage artifacts."
            exit "$rc"
          fi

      - name: Run diff-cover (required)
        id: diff_cover
        # Phase 3: sub-threshold diff coverage hard-fails this job.
        # The job still posts a summary comment via the downstream
        # "Render PR comment body" step so contributors see the
        # number alongside the failed check.
        # Reads the MERGED XML produced by the previous step (#635).
        #
        # Threshold comes from tools/scripts/coverage_config.json so the
        # local pre-push hook + tools/scripts/local_diff_cover.sh stay
        # in lockstep with this gate. Edit there, not here, when raising
        # or lowering the floor.
        if: steps.gate_preconditions.outputs.native_required == 'true'
        shell: bash
        run: |
          set +e
          xml="coverage-artifact/coverage.cobertura.xml"
          if [ ! -f "$xml" ]; then
            # This step only runs when the classifier said native
            # coverage IS required and the merge step succeeded — so a
            # missing merged XML here is a real failure, not a skip-safe
            # PR. Fail RED rather than silently passing the required
            # gate (the old "no XML → exit 0" path bypassed the gate).
            echo "::error::No merged Cobertura XML for a PR that needs native coverage — the coverage matrix produced no report. Failing the required diff-coverage gate."
            : > coverage-diff.md
            echo "exit_code=missing-xml" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          THRESHOLD=$(jq -r '.diff_coverage_fail_under' tools/scripts/coverage_config.json)
          if ! [[ "$THRESHOLD" =~ ^[0-9]+$ ]]; then
            echo "::error::Invalid diff_coverage_fail_under in tools/scripts/coverage_config.json: '${THRESHOLD}'"
            exit 1
          fi
          # Per-file exclusions from the same source-of-truth: thin
          # dispatchers / generated code that is exercised end-to-end via
          # shell-out tests but doesn't propagate llvm-cov line data.
          # Empty array → no --exclude flags emitted.
          # diff-cover's --exclude is nargs='+' with argparse default
          # action — repeated `--exclude=foo --exclude=bar` keeps only
          # the LAST. Pass all values under a single --exclude flag.
          # Patterns must be basenames or globs (`**/file.cpp`); literal
          # relative paths match nothing (matched only against basename
          # and absolute path via fnmatch). See coverage_config.json
          # _comment for the contract.
          mapfile -t EXCLUDES < <(jq -r '.diff_cover_excludes // [] | .[]' tools/scripts/coverage_config.json)
          EXCLUDE_ARGS=()
          if [ ${#EXCLUDES[@]} -gt 0 ]; then
            EXCLUDE_ARGS=("--exclude" "${EXCLUDES[@]}")
          fi
          echo "Diff-cover threshold from coverage_config.json: ${THRESHOLD}% (excludes: ${EXCLUDES[*]:-none})"
          python3 -m diff_cover.diff_cover_tool \
              "$xml" \
              --compare-branch="origin/${{ github.base_ref }}" \
              --fail-under="${THRESHOLD}" \
              "${EXCLUDE_ARGS[@]}" \
              --markdown-report=coverage-diff.md
          rc=$?
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"
          # Always print the report so the raw output is in the logs
          # even if the artifact upload step fails.
          if [ -f coverage-diff.md ]; then
            echo "----- coverage-diff.md -----"
            cat coverage-diff.md
            echo "----- end coverage-diff.md -----"
          fi
          # Phase 3 (landed): propagate the diff-cover exit code so
          # sub-threshold coverage fails the step AND the job, hard-blocking
          # the PR. continue-on-error was removed at the step level above.
          exit "$rc"

      - name: Install PyYAML (#566 Phase 2)
        # Installed before the fixture tests because
        # test_coverage_tier_check.py exercises ctc.load_targets() which
        # imports yaml (issue #900). Also required by the per-tier gate
        # step below.
        if: steps.gate_preconditions.outputs.native_required == 'true'
        run: python3 -m pip install --user 'pyyaml>=6'
        shell: bash

      - name: coverage_tier_check.py fixture tests (#566 Phase 2)
        # Guard the per-tier gate script the same way we guard
        # coverage_diff_comment.py — unit tests run before the live
        # invocation so a regression in classify_file / aggregate /
        # render fails fast without requiring a full coverage run.
        if: steps.gate_preconditions.outputs.native_required == 'true'
        run: python3 tools/scripts/test_coverage_tier_check.py
        shell: bash

      - name: Run per-tier coverage gate (#566 Phase 2)
        # Runs alongside the existing diff-cover gate. diff-cover
        # enforces a single global 75% floor; this step layers the
        # per-tier floors from `ci/coverage-targets.yaml` on top
        # (audio-critical 80%, user-facing 70%, infrastructure 50%).
        # Files that don't match any tier fall back to the global
        # diff-cover floor — no double gate, no gap.
        #
        # continue-on-error: true during the Phase 2 bring-up. The
        # tier-check fails loudly in logs but doesn't block merges
        # until we've observed a couple of cycles and confirmed the
        # tier definitions classify files correctly. Phase 2 flip
        # to required is a one-line removal of this continue-on-error.
        if: steps.gate_preconditions.outputs.native_required == 'true'
        continue-on-error: true
        shell: bash
        run: |
          xml="coverage-artifact/coverage.cobertura.xml"
          if [ ! -f "$xml" ]; then
            : > coverage-tier.md
            echo "tier-gate: no Cobertura XML from upstream — skipped." >&2
            exit 0
          fi
          python3 tools/scripts/coverage_tier_check.py \
              --cobertura "$xml" \
              --targets ci/coverage-targets.yaml \
              --compare-branch "origin/${{ github.base_ref }}" \
              --markdown-report coverage-tier.md

      - name: Render PR comment body
        # Required-gate failures (diff_cover exit_code != 0) used to skip
        # this step under the default `if: success()` rule, meaning
        # contributors got a red check with no comment explaining which
        # lines were uncovered. Codex #611 P2 — render + upsert on failure
        # too so the PR comment always reflects the real result.
        # Threshold is read from tools/scripts/coverage_config.json — the
        # same source diff-cover uses one step up — so the rendered
        # banner can never drift from the actual gate.
        #
        # `always() && native_required` — render on diff-cover failure
        # (Codex #611 P2) but skip entirely on classifier-approved
        # skip-safe PRs, where there is no coverage report to comment on.
        if: always() && steps.gate_preconditions.outputs.native_required == 'true'
        run: |
          # Phase 3 landed: gate is required. --no-advisory flips the
          # banner to the required-gate form; the --flip-date argument
          # is no longer needed (no upcoming flip to announce).
          THRESHOLD=$(jq -r '.diff_coverage_fail_under' tools/scripts/coverage_config.json)
          python3 tools/scripts/coverage_diff_comment.py \
              --report coverage-diff.md \
              --flip-date 2026-05-04 \
              --threshold "${THRESHOLD}" \
              --no-advisory \
              --out coverage-diff-comment.md
          # Append the per-tier section (#566 Phase 2) if the tier
          # check produced a report.
          if [ -s coverage-tier.md ]; then
            printf '\n\n' >> coverage-diff-comment.md
            cat coverage-tier.md >> coverage-diff-comment.md
          fi
          echo "----- coverage-diff-comment.md -----"
          cat coverage-diff-comment.md
          echo "----- end comment -----"
        shell: bash

      - name: Note platform-specific paths not covered by per-PR macOS coverage
        # Per-PR coverage is macOS-only (see the `matrix-config` job). The
        # merged Cobertura XML therefore contains only the macOS leg's
        # source files. A PR that touches platform-specific code —
        # `**/platform/linux/**`, `**/platform/windows/**`, `android/**`,
        # or files matching `*_linux.*` / `*_win*.*` — has those files
        # ABSENT from the macOS XML, so diff-cover silently omits them and
        # they are NOT gated per-PR.
        #
        # This step classifies the PR's changed files and, when any fall
        # under those platform-specific paths, appends a clearly-marked
        # visibility note to the coverage PR comment. It deliberately does
        # NOT fail the gate: blocking here would punish macOS-first
        # development velocity for code the nightly cross-platform lane
        # already validates. The required check's name and its pass/fail
        # semantics for macOS-reachable code are untouched.
        if: always() && steps.gate_preconditions.outputs.native_required == 'true'
        shell: bash
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          # shellcheck disable=SC2016  # backticks below are literal Markdown
          set -euo pipefail
          # Changed files in this PR, base..HEAD. `origin/<base>` was
          # fetched by the "Ensure base branch is fetched" step above.
          mapfile -t CHANGED < <(git diff --name-only "origin/${BASE_REF}...HEAD")
          PLATFORM_FILES=()
          for f in "${CHANGED[@]}"; do
            [ -n "$f" ] || continue
            base=$(basename "$f")
            case "$f" in
              */platform/linux/*|*/platform/windows/*|android/*)
                PLATFORM_FILES+=("$f"); continue ;;
            esac
            case "$base" in
              *_linux.*|*_win.*|*_win32.*|*_windows.*)
                PLATFORM_FILES+=("$f") ;;
            esac
          done
          if [ "${#PLATFORM_FILES[@]}" -eq 0 ]; then
            echo "No platform-specific changed files — no note appended."
            exit 0
          fi
          echo "Platform-specific changed files (${#PLATFORM_FILES[@]}):"
          printf '  - %s\n' "${PLATFORM_FILES[@]}"
          # Append a visibility note to the rendered PR comment body. If
          # "Render PR comment body" was skipped (it shares the same
          # native_required gate, so normally it ran), seed the file.
          if [ ! -f coverage-diff-comment.md ]; then
            : > coverage-diff-comment.md
          fi
          {
            printf '\n\n'
            printf '> [!WARNING]\n'
            printf '> **%d changed file(s) are platform-specific (linux/windows/android)' \
              "${#PLATFORM_FILES[@]}"
            printf ' and are NOT covered by per-PR macOS coverage.**\n'
            printf '> They are validated by the nightly cross-platform lane'
            printf ' (`cross-platform-check.yml`), not by this required diff-coverage gate.\n'
            printf '>\n'
            for f in "${PLATFORM_FILES[@]}"; do
              printf '> - `%s`\n' "$f"
            done
          } >> coverage-diff-comment.md
          echo "----- coverage-diff-comment.md (with platform note) -----"
          cat coverage-diff-comment.md
          echo "----- end comment -----"

      - name: Upload diff-cover report artifact
        if: always() && steps.gate_preconditions.outputs.native_required == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: coverage-diff-${{ github.sha }}
          path: |
            coverage-diff.md
            coverage-diff-comment.md
            coverage-tier.md
          retention-days: 14
          if-no-files-found: warn

      - name: Upsert PR comment with diff-coverage summary
        # Same upsert pattern as .github/workflows/ruleset-drift-check.yml:
        # find a bot comment carrying our stable marker and PATCH its
        # body in place, else POST a new one. Prevents comment spam on
        # PRs that push multiple times.
        #
        # Skip fork PRs where GITHUB_TOKEN is read-only — posting would
        # hard-fail with a 403 even though this whole job is advisory.
        # `always() && …` so required-gate failures still upsert the
        # explanatory comment (Codex #611 P2); the fork guard stays.
        # Also gated on native_required — skip-safe PRs have no coverage
        # comment to post.
        if: always() && steps.gate_preconditions.outputs.native_required == 'true' && github.event.pull_request.head.repo.full_name == github.repository
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          MARKER: '<!-- pulp-coverage-diff-gate -->'
        run: |
          set -euo pipefail
          repo='${{ github.repository }}'
          body="$(cat coverage-diff-comment.md)"

          existing=$(
              gh api -H "Accept: application/vnd.github+json" \
                  "/repos/${repo}/issues/${PR_NUMBER}/comments" \
                  --paginate \
                  --jq "[.[] | select(.body != null and (.body | contains(\"${MARKER}\")))] | first | .id // empty"
          )

          if [ -z "${existing:-}" ]; then
              echo "Creating diff-coverage comment on PR #${PR_NUMBER}."
              printf '%s' "$body" | gh pr comment "$PR_NUMBER" --repo "$repo" --body-file -
          else
              echo "Updating diff-coverage comment #${existing} on PR #${PR_NUMBER}."
              gh api \
                  --method PATCH \
                  -H "Accept: application/vnd.github+json" \
                  "/repos/${repo}/issues/comments/${existing}" \
                  -f body="$body" >/dev/null
          fi
