# Pulp's pinned Shipyard release.
#
# Shipyard is the cross-platform CI controller Pulp uses for queue,
# multi-platform validation, and merge gating. Pulp pins a specific
# Shipyard release here so every checkout uses the same version.
# This is a source-checkout contributor tool pin, not a public Pulp
# runtime/build dependency and not something the Pulp CLI installer
# installs automatically.
#
# To install or upgrade:
#   ./tools/install-shipyard.sh
#
# To check what's installed vs what's pinned:
#   ./tools/install-shipyard.sh --status
#
# To bump the pin (after verifying a new Shipyard release works on
# Pulp's CI matrix), use:
#   shipyard pin bump --to vX.Y.Z
#
# That flow owns the pin edit and worktree-safety checks; keep the
# lockstep doc skim below as part of the bump PR.
#
# Do not hand-edit the platform assets when moving to newer Shipyard
# releases. Shipyard v0.50.0+ is Rust-backed, macOS is Apple-Silicon-only,
# and the macOS asset is a signed/notarized/stapled `.dmg`; let
# `shipyard pin bump` update the version/asset shape together.
#
# Lockstep docs:
# When bumping the pin, also re-check that the following docs still
# accurately describe what Shipyard provides at the new version:
#   - README.md (Contributing + Security & CI policy section)
#   - CONTRIBUTING.md (Contributor expectations section)
#   - .agents/skills/ci/SKILL.md (tool-selection logic)
#   - docs/guides/local-ci.md (cross-references between local_ci.py
#     and shipyard, eventual removal once local_ci.py is retired)
# If a Shipyard release introduces a new command, deprecates one, or
# changes governance defaults, update those docs in the same PR that
# bumps this pin.

[shipyard]
# Lands at `~/.local/bin/shipyard` via the upstream installer delegate
# in `tools/install-shipyard.sh`. The older `~/.pulp/bin/shipyard`
# path is cleaned up on install to prevent shadow-on-PATH bugs.
#
# See `.agents/skills/ci/SKILL.md#self-hosted-runner-ops` for the
# Pulp-side quick-reference + Pulp-specific wedge gotchas (iOS AUv3
# try-compile, dev-mac window popups). Authoritative reference lives
# in Shipyard's own `skills/ci/SKILL.md`.
#
# Full Shipyard release history lives with the Shipyard release notes. Keep this
# file focused on the current Pulp pin and Pulp-specific operational reasons.
#
# The current pin also carries the still-used recovery levers from v0.66/v0.67:
# `shipyard ship/pr --adopt-head` for ship-state SHA drift (Shipyard #346),
# local-first `shipyard rescue --rerun-failed` re-resolution for failed or
# saturated gates (Shipyard #345), and self-hosted empty-log diagnostics that
# point at the uploaded ctest artifact (Shipyard #344).
#
# v0.68.0 (current pin) — durable-queue dead-worker recovery (Shipyard #351): a killed
#   `shipyard ship`/`pr` worker left its job stuck `running` in the queue,
#   which blocked every later same-PR ship with `SamePrShipRunning` —
#   unrecoverable without hand-editing `queue.json` (the startup reaper only
#   runs on daemon restart). v0.68.0 reaps a dead-worker job (heartbeat stale
#   >180s) at ship-submit time and on each drain pass, race-safely (the reap
#   re-checks staleness under the queue lock, so a live worker between
#   heartbeats is never killed, and a revived job defers conflicting starts
#   rather than double-running the PR). This is why Pulp moves to this pin —
#   it removes a whole class of "wedged same-PR ship" stalls. Bundles #349
#   (self-hosted empty-log diagnostics point at the ctest artifact).
version = "v0.70.0"

# Public release source. The bootstrap script downloads from
# https://github.com/{repo}/releases/download/{version}/{asset}
repo = "danielraffel/Shipyard"

# SHA-256 verification asset name (downloaded alongside the binary).
checksums_asset = "checksums.sha256"

# Per-platform binary asset names. The bootstrap script picks the
# right one for the current host.
[shipyard.assets]
darwin-arm64  = "shipyard-macos-arm64"
darwin-x64    = "shipyard-macos-x64"
linux-arm64   = "shipyard-linux-arm64"
linux-x64     = "shipyard-linux-x64"
windows-x64   = "shipyard-windows-x64.exe"
