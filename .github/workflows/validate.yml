name: Plugin Validation

on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  validate-macos:
    runs-on: macos-14
    name: Validate Plugins (macOS ARM64)

    steps:
      - uses: actions/checkout@v4

      - name: Clone VST3 SDK
        run: |
          git clone --depth 1 --branch v3.7.12 \
            https://github.com/steinbergmedia/vst3sdk.git \
            external/vst3sdk
          cd external/vst3sdk && git submodule update --init --recursive --depth 1

      - name: Clone AudioUnitSDK
        run: |
          git clone --depth 1 \
            https://github.com/apple/AudioUnitSDK.git \
            external/AudioUnitSDK

      - name: Install pluginval
        run: |
          curl -sL https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_macOS.zip -o pluginval.zip
          unzip -q pluginval.zip
          # pluginval.app is a macOS app bundle — the binary is inside
          PLUGINVAL_BIN="pluginval.app/Contents/MacOS/pluginval"
          if [ -f "$PLUGINVAL_BIN" ]; then
            sudo cp "$PLUGINVAL_BIN" /usr/local/bin/pluginval
            chmod +x /usr/local/bin/pluginval
          else
            echo "pluginval binary not found at expected path, listing contents:"
            find pluginval* -type f | head -20
          fi

      - name: Install clap-validator
        run: |
          # clap-validator is available via cargo or as a release binary
          # Try downloading a pre-built release first
          CLAP_VAL_URL="https://github.com/free-audio/clap-validator/releases/latest/download/clap-validator-macos-arm64"
          if curl -sL --fail "$CLAP_VAL_URL" -o /usr/local/bin/clap-validator 2>/dev/null; then
            chmod +x /usr/local/bin/clap-validator
          else
            echo "clap-validator pre-built binary not available — skipping"
            echo "CLAP validation will use dlopen tests only"
          fi

      - name: Configure and Build
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j$(sysctl -n hw.ncpu)

      - name: Run Unit Tests
        run: ctest --test-dir build --output-on-failure -j$(sysctl -n hw.ncpu)

      - name: Validate VST3 plugins (pluginval)
        run: |
          if command -v pluginval &>/dev/null; then
            for plugin in build/VST3/*.vst3; do
              echo "=== Validating $(basename $plugin) with pluginval ==="
              pluginval --validate "$plugin" --strictness-level 5 --timeout-ms 30000 || true
            done
          else
            echo "pluginval not available — running CMake VST3 label tests only"
            ctest --test-dir build -L vst3 --output-on-failure
          fi

      - name: Validate CLAP plugins
        run: |
          # Run built-in dlopen tests
          ctest --test-dir build -L clap --output-on-failure

          # Run clap-validator if available
          if command -v clap-validator &>/dev/null; then
            for plugin in build/CLAP/*.clap; do
              echo "=== Validating $(basename $plugin) with clap-validator ==="
              clap-validator validate "$plugin" || true
            done
          fi

      - name: Validate AU plugins (auval)
        run: |
          # Install AU plugins to user library for auval
          AU_DIR="$HOME/Library/Audio/Plug-Ins/Components"
          mkdir -p "$AU_DIR"
          for plugin in build/AU/*.component; do
            echo "Installing $(basename $plugin) for auval..."
            cp -R "$plugin" "$AU_DIR/"
          done

          # Kill AudioComponentRegistrar to force rescan
          killall -9 AudioComponentRegistrar 2>/dev/null || true
          sleep 2

          # Run auval on each AU plugin
          # Note: auval may fail in CI due to codesigning requirements
          for plugin in build/AU/*.component; do
            name=$(basename "$plugin" .component)
            echo "=== Validating $name with auval ==="
            # auval needs component type, subtype, and manufacturer codes
            # These are defined in each plugin's AU entry point
            # For now, list registered AUs to verify they loaded
            auval -a 2>&1 | grep -i "pulp" || echo "AU $name not found in auval scan (may need signing)"
          done

      - name: Check codesigning (unsigned expected in CI)
        run: |
          for plugin in build/CLAP/*.clap; do
            echo "Checking $(basename $plugin)..."
            codesign --verify "$plugin" 2>&1 || echo "Not signed (expected in CI)"
          done
