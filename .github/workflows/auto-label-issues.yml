name: Auto-label Issues

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const body = (context.payload.issue.body || '').toLowerCase();
            const text = title + ' ' + body;
            const labels = [];

            // Category detection
            if (/\bci\b|local.ci|namespace|github.actions|workflow|runner/.test(text)) labels.push('ci');
            if (/\bcli\b|pulp (build|test|create|ship|doctor|run|validate)/.test(text)) labels.push('cli');
            if (/\bsdk\b|install|package|release|binary/.test(text)) labels.push('sdk');
            if (/\bfaust\b|cmajor|jsfx|dsl/.test(text)) labels.push('dsl');
            if (/widget|view|layout|flex|css|theme|knob|fader|toggle/.test(text)) labels.push('ui');
            if (/dawn|skia|webgpu|gpu|metal|vulkan|d3d12|shader/.test(text)) labels.push('gpu');
            if (/windows|linux|ios|wasm|cross.platform|ubuntu/.test(text)) labels.push('platform');
            if (/design.tool|figma|pencil|stitch|import.design|token/.test(text)) labels.push('design-tool');
            if (/hot.reload|live.reload|file.watch/.test(text)) labels.push('hot-reload');
            if (/automat|mcp|screenshot|simulate|click|plugin.host/.test(text)) labels.push('automation');
            if (/doc|readme|guide|tutorial/.test(text)) labels.push('docs');

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                labels: labels
              });
            }
