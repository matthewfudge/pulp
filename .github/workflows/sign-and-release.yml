name: Sign and Release

on:
  push:
    tags: ['v*']

# Never cancel in-flight signing/notarization. Partial notarization
# artifacts are hard to recover; serialize instead.
concurrency:
  group: sign-and-release-${{ github.ref }}
  cancel-in-progress: false

env:
  BUILD_TYPE: Release

jobs:
  build-and-sign-macos:
    runs-on: macos-14
    name: Build, Sign, Notarize (macOS)
    # pulp #724: without `contents: write`, the final `Create GitHub Release`
    # step fails with "Resource not accessible by integration" because
    # softprops/action-gh-release@v2 calls the generate-release-notes API,
    # which requires the scope. The workflow inherits a read-only token
    # otherwise, and the whole sign+notarize+publish pipeline silently fails
    # even though every prior step succeeded. release-cli.yml explicitly
    # sets this on its release-creating job (line ~360) for the same reason.
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Clone VST3 SDK
        run: |
          git clone --depth 1 --branch v3.7.12_build_20 \
            https://github.com/steinbergmedia/vst3sdk.git \
            external/vst3sdk
          cd external/vst3sdk && git submodule update --init --recursive --depth 1

      - name: Clone AudioUnitSDK
        run: |
          # Pinned to 1.3.0 — 1.4.0 introduced <expected> (C++23) in its
          # headers, and AppleClang/libc++ on GitHub-hosted macOS runners
          # doesn't yet expose std::expected even at -std=c++23. See #155.
          git clone --depth 1 --branch AudioUnitSDK-1.3.0 \
            https://github.com/apple/AudioUnitSDK.git \
            external/AudioUnitSDK

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} -j$(sysctl -n hw.ncpu)

      - name: Test
        # Skip the `validation` label suite (auval / pluginval / clap-validator).
        # Those gates are owned by .github/workflows/validate.yml on PR; on a
        # hosted GitHub macOS runner the freshly-installed .component bundle is
        # not picked up by the AudioComponentRegistrar consistently, so auval
        # returns "Cannot get Component's Name strings / Error -50" and breaks
        # the sign-and-release pipeline silently. See issue #720 for the
        # 30+ run failure backlog this fixes.
        run: ctest --test-dir build --output-on-failure -LE validation

      - name: Import signing certificate
        if: env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm certificate.p12

      - name: Sign plugins
        if: env.SIGNING_IDENTITY != ''
        env:
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
        run: |
          for plugin in build/VST3/*.vst3 build/CLAP/*.clap build/AU/*.component; do
            [ -e "$plugin" ] || continue
            echo "Signing $(basename $plugin)..."
            codesign --force --sign "$SIGNING_IDENTITY" --timestamp --options runtime \
              --entitlements ship/templates/entitlements.plist "$plugin"
          done

      - name: Create installer package
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p artifacts
          # Package each format
          for plugin in build/VST3/*.vst3; do
            [ -e "$plugin" ] || continue
            NAME=$(basename "$plugin" .vst3)
            pkgbuild --component "$plugin" \
              --identifier "com.pulp.${NAME}.vst3" \
              --version "$VERSION" \
              --install-location "/Library/Audio/Plug-Ins/VST3/" \
              "artifacts/${NAME}-VST3-${VERSION}.pkg" || true
          done
          for plugin in build/CLAP/*.clap; do
            [ -e "$plugin" ] || continue
            NAME=$(basename "$plugin" .clap)
            pkgbuild --component "$plugin" \
              --identifier "com.pulp.${NAME}.clap" \
              --version "$VERSION" \
              --install-location "/Library/Audio/Plug-Ins/CLAP/" \
              "artifacts/${NAME}-CLAP-${VERSION}.pkg" || true
          done
          for plugin in build/AU/*.component; do
            [ -e "$plugin" ] || continue
            NAME=$(basename "$plugin" .component)
            pkgbuild --component "$plugin" \
              --identifier "com.pulp.${NAME}.au" \
              --version "$VERSION" \
              --install-location "$HOME/Library/Audio/Plug-Ins/Components/" \
              "artifacts/${NAME}-AU-${VERSION}.pkg" || true
          done

      - name: Notarize packages
        if: env.APPLE_ID != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        run: |
          for pkg in artifacts/*.pkg; do
            [ -e "$pkg" ] || continue
            echo "Notarizing $(basename $pkg)..."
            xcrun notarytool submit "$pkg" \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_PASSWORD" \
              --wait || echo "Notarization failed for $pkg"
            xcrun stapler staple "$pkg" || true
          done

      - name: Generate appcast
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          DATE=$(date -u '+%a, %d %b %Y %H:%M:%S +0000')
          cat > artifacts/appcast.xml << XMLEOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>Pulp Updates</title>
              <item>
                <title>Version ${VERSION}</title>
                <pubDate>${DATE}</pubDate>
                <sparkle:version>${VERSION}</sparkle:version>
                <sparkle:minimumSystemVersion>12.0</sparkle:minimumSystemVersion>
              </item>
            </channel>
          </rss>
          XMLEOF

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: pulp-macos-${{ github.ref_name }}
          path: artifacts/
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        # v1 is too old per actionlint (GH deprecated its runner version);
        # v2 uses the Node 20 runner and is a drop-in replacement.
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          draft: true
          generate_release_notes: true
