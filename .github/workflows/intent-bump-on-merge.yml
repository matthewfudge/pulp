# Merge-time half of the intent-trailer version-bump model.
#
# WHY: PRs that edit the version files (CMakeLists VERSION, plugin.json,
# marketplace.json) collide on those exact lines every time `main` advances —
# the "version-bump merge treadmill" that re-conflicts every open branch on a
# busy main. The intent-trailer model lets a PR declare `Version-Bump:
# <surface>=<level>` and touch NO version files, then assigns the exact number
# HERE, after merge, from main's current version. No two PRs ever race on the
# version line.
#
# ROLLOUT (phased, deliberate): this workflow ships DORMANT. It only acts on a
# merged commit that carries a `Version-Bump:` intent trailer, and nothing
# produces those yet (Shipyard still applies file bumps on the PR side, and the
# CI gate still runs WITHOUT `--accept-intent-trailers`). So in phase 1 every
# run is a fast no-op. Phase 2 — flipping Shipyard/CI to emit intent trailers
# instead of file bumps — is a separate, reviewed change made only AFTER this
# workflow is verified end-to-end. See pulp #5218 follow-up / the
# version-bump-treadmill notes.
#
# REQUIRES (verify before phase 2): RELEASE_BOT_TOKEN must be allowed to push a
# COMMIT to protected `main` (it already pushes tags from auto-release.yml; a
# commit needs the bot on the branch-protection bypass list). The `chore: bump
# versions` commit pushed here triggers auto-release.yml exactly as a PR-side
# bump does today.

name: Intent Bump on Merge

on:
  push:
    branches: [main]

# Serialize: two merges landing close together must bump the version line one
# at a time, never concurrently (that would reintroduce the race on main).
concurrency:
  group: intent-bump-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  intent-bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # HEAD + HEAD~1 for the idempotency diff
          token: ${{ secrets.RELEASE_BOT_TOKEN || secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Skip the bot's own bump commit (recursion guard)
        id: guard
        run: |
          subject="$(git log -1 --format=%s HEAD)"
          if printf '%s' "$subject" | grep -qE '^chore: bump versions|^chore\(versions\): bump'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "HEAD is a version-bump commit — nothing to do."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply intent-trailer bump
        if: steps.guard.outputs.skip == 'false'
        id: apply
        run: |
          edited="$(python3 tools/scripts/apply_intent_bump.py \
            --head HEAD --base HEAD~1 --print-edited)"
          if [ -n "$edited" ]; then
            {
              echo "edited<<EOF"
              echo "$edited"
              echo "EOF"
              echo "changed=true"
            } >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No intent trailer / nothing to bump."
          fi

      - name: Commit and push the bump
        if: steps.guard.outputs.skip == 'false' && steps.apply.outputs.changed == 'true'
        run: |
          git config user.name  "pulp-release-bot"
          git config user.email "release-bot@users.noreply.github.com"
          git add -- ${{ steps.apply.outputs.edited }}
          git commit -m "chore: bump versions" \
            -m "Applied from Version-Bump intent trailer on $(git rev-parse --short HEAD)."
          git push origin HEAD:main
