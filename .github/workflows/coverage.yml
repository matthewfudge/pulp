name: Coverage

# Non-blocking coverage artifact. Informational only; no merge gate.
# Local equivalent: scripts/run_coverage.sh.
# Full design: planning/coverage-sanitizers-spec-2026-04-16.md
#              planning/coverage-tooling-decision-2026-04-21.md (Phase 0 spike)
#
# #566 Phase 1 PR 4: cross-platform coverage matrix. The `coverage`
# job runs on {ubuntu-latest, macos-latest, windows-latest}, each OS
# produces its own Cobertura XML and uploads to Codecov tagged with
# an OS-axis flag (`os-linux`, `os-macos`, `os-windows`) so Codecov
# can union same-file coverage across OSes via the flag mechanism.
# We do NOT try to merge profdata across architectures —
# llvm-profdata merge is not architecture-portable; cross-OS unions
# happen at the Codecov flag layer. See
# planning/coverage-tooling-decision-2026-04-21.md §7.

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      linux_runner_selector_json:
        description: "Optional JSON runs-on override for Linux coverage"
        required: false
        default: ""
        type: string
      macos_runner_selector_json:
        description: "Optional JSON runs-on override for macOS coverage"
        required: false
        default: ""
        type: string
      windows_runner_selector_json:
        description: "Optional JSON runs-on override for Windows coverage"
        required: false
        default: ""
        type: string

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Resolve per-OS runs-on via shared helper ───────────────────────────
  # Uses tools/scripts/resolve_runs_on.py in `default` mode (same pattern
  # as sanitizers.yml). Each OS resolves to, in priority order:
  #   1. workflow_dispatch input (e.g. linux_runner_selector_json)
  #   2. repo variable override (e.g. PULP_COVERAGE_LINUX_RUNS_ON_JSON)
  #   3. hard-coded default label (ubuntu-latest / macos-latest / windows-latest)
  # No behavior change when the repo variables are unset — matches today's
  # single-job baseline on Linux and adds macOS/Windows on the standard
  # GitHub-hosted labels. Set PULP_COVERAGE_<OS>_RUNS_ON_JSON to route any
  # one leg to Namespace without a code change.
  resolve-runners:
    runs-on: ubuntu-latest
    outputs:
      linux_runs_on: ${{ steps.resolve.outputs.linux_runs_on }}
      macos_runs_on: ${{ steps.resolve.outputs.macos_runs_on }}
      windows_runs_on: ${{ steps.resolve.outputs.windows_runs_on }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false
          lfs: false
      - id: resolve
        env:
          EXPLICIT_LINUX_RUNNER_SELECTOR_JSON: ${{ inputs.linux_runner_selector_json || '' }}
          EXPLICIT_MACOS_RUNNER_SELECTOR_JSON: ${{ inputs.macos_runner_selector_json || '' }}
          EXPLICIT_WINDOWS_RUNNER_SELECTOR_JSON: ${{ inputs.windows_runner_selector_json || '' }}
          LINUX_RUNS_ON_JSON: ${{ vars.PULP_COVERAGE_LINUX_RUNS_ON_JSON }}
          MACOS_RUNS_ON_JSON: ${{ vars.PULP_COVERAGE_MACOS_RUNS_ON_JSON }}
          WINDOWS_RUNS_ON_JSON: ${{ vars.PULP_COVERAGE_WINDOWS_RUNS_ON_JSON }}
        run: |
          set -euo pipefail
          resolve() {
            python3 tools/scripts/resolve_runs_on.py \
              --target-name "$1" \
              --mode default \
              --explicit-env "$2" \
              --override-env "$3" \
              --default-label "$4"
          }
          linux=$(resolve \
            "Coverage (Linux)" \
            EXPLICIT_LINUX_RUNNER_SELECTOR_JSON \
            LINUX_RUNS_ON_JSON \
            ubuntu-latest)
          macos=$(resolve \
            "Coverage (macOS)" \
            EXPLICIT_MACOS_RUNNER_SELECTOR_JSON \
            MACOS_RUNS_ON_JSON \
            macos-latest)
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            # Keep PR Windows coverage on GitHub-hosted runners until the
            # Namespace Windows queue is reliably assigning jobs again.
            windows='"windows-latest"'
          else
            windows=$(resolve \
              "Coverage (Windows)" \
              EXPLICIT_WINDOWS_RUNNER_SELECTOR_JSON \
              WINDOWS_RUNS_ON_JSON \
              windows-latest)
          fi
          {
            echo "linux_runs_on=${linux}"
            echo "macos_runs_on=${macos}"
            echo "windows_runs_on=${windows}"
          } >>"${GITHUB_OUTPUT}"

  coverage:
    needs: resolve-runners
    name: Coverage report (${{ matrix.label }}, Clang)
    strategy:
      # Don't cancel other OSes when one fails — coverage is advisory
      # and we want every OS to attempt an upload independently so the
      # Codecov dashboard has the widest cross-OS picture possible even
      # when one leg flakes.
      fail-fast: false
      matrix:
        include:
          - os: linux
            label: Linux
            flag: os-linux
            runs_on_json: ${{ needs.resolve-runners.outputs.linux_runs_on }}
          - os: macos
            label: macOS
            flag: os-macos
            runs_on_json: ${{ needs.resolve-runners.outputs.macos_runs_on }}
          - os: windows
            label: Windows
            flag: os-windows
            runs_on_json: ${{ needs.resolve-runners.outputs.windows_runs_on }}
    runs-on: ${{ fromJSON(matrix.runs_on_json) }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false
          lfs: true

      - name: Install Linux dependencies + Clang tooling
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang llvm lld \
            libasound2-dev libdbus-1-dev libdrm-dev libegl1-mesa-dev \
            libgbm-dev libgl1-mesa-dev libx11-dev libxext-dev libxfixes-dev \
            libxi-dev libxinerama-dev libxkbcommon-dev libxrandr-dev \
            libxrender-dev libxss-dev libxtst-dev libwayland-dev wayland-protocols

      - name: Verify Clang tooling (macOS)
        # macOS runners ship Apple Clang with llvm-cov / llvm-profdata
        # already on PATH in Xcode's toolchain. Surface any missing
        # tool early with a clear message instead of mid-build. xcrun
        # --find resolves through the active Xcode even when PATH
        # doesn't include the bin directly.
        if: matrix.os == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          for tool in clang llvm-profdata llvm-cov; do
            if ! command -v "${tool}" >/dev/null 2>&1; then
              path=$(xcrun --find "${tool}" 2>/dev/null || true)
              if [ -n "${path}" ]; then
                bin_dir=$(dirname "${path}")
                echo "Found ${tool} via xcrun: ${path}"
                # $GITHUB_PATH applies to SUBSEQUENT steps only, so also
                # export into this step's $PATH for the version checks
                # below and anything else downstream in-step.
                echo "${bin_dir}" >> "$GITHUB_PATH"
                export PATH="${bin_dir}:${PATH}"
              else
                echo "ERROR: ${tool} not found on macOS runner" >&2
                exit 1
              fi
            fi
          done
          clang --version
          llvm-profdata --help | head -1 || true
          llvm-cov --version | head -1

      - name: Install Clang toolchain (Windows)
        # windows-latest ships LLVM/Clang at C:\Program Files\LLVM\bin
        # but not always on PATH in the default shell. Add it
        # unconditionally; scripts/run_coverage.sh needs
        # clang + llvm-profdata + llvm-cov reachable from bash.
        # PULP_ENABLE_COVERAGE requires Clang — MSVC is rejected by
        # tools/cmake/PulpInstrumentation.cmake because llvm-cov and
        # MSVC's /fsanitize-coverage emit incompatible profile shapes.
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $llvmBin = "C:\Program Files\LLVM\bin"
          if (-not (Test-Path $llvmBin)) {
            Write-Host "LLVM not preinstalled, installing via choco"
            choco install llvm --no-progress -y
          }
          Add-Content $env:GITHUB_PATH $llvmBin
          Write-Host "Added $llvmBin to PATH"

      # gcovr is no longer needed — scripts/run_coverage.sh now drives
      # the LLVM → Cobertura conversion via `llvm-cov export --format=lcov`
      # plus the vendored `tools/scripts/lcov_cobertura.py` converter. The
      # old gcovr flow (via `--llvm-cov-binary` per test binary) silently
      # dropped ~99.9% of the coverage data once the `-object` set widened
      # to include `libpulp-*.a` archives. Kept as a marker so the soak
      # delete is easy to find if gcovr resurfaces for another reason.

      - name: run_coverage.sh fixture tests (#569 / #570)
        # Assert the canonical ignore-regex excludes _deps/catch2-build
        # spam (#569) AND that the stale-cache guard trips loudly
        # instead of silently producing empty profdata (#570). Runs
        # before the heavy build so a regex/guard regression fails
        # fast without burning the full coverage build. Linux-only —
        # the fixture is pure-Python and the behavior it checks is
        # script-level, not platform-specific, so one leg is enough.
        if: matrix.os == 'linux'
        run: python3 tools/scripts/test_run_coverage.py
        shell: bash

      - name: Bootstrap dependencies
        run: ./setup.sh --ci --deps-only
        shell: bash

      - name: Run coverage suite
        # Coverage never fails the run — thresholds come later per
        # the #290 hardening initiative. `continue-on-error` combined
        # with `strategy.fail-fast: false` above means a flake on any
        # one OS doesn't cancel the others, so the Codecov dashboard
        # still gets partial multi-OS coverage data.
        #
        # On Windows, pin CMAKE_GENERATOR=Ninja so cmake doesn't fall
        # back to the default "Visual Studio 17 2022" generator, which
        # ignores -DCMAKE_CXX_COMPILER=clang++ and picks MSVC cl.exe
        # instead. Pulp's coverage build requires Clang source-based
        # instrumentation (PulpInstrumentation.cmake rejects MSVC),
        # so the VS-generator path fails silently with no profraw
        # emitted. Ninja honours CMAKE_C/CXX_COMPILER cleanly.
        continue-on-error: true
        shell: bash
        env:
          CMAKE_GENERATOR: ${{ matrix.os == 'windows' && 'Ninja' || '' }}
          PULP_COVERAGE_CMAKE_ARGS: ${{ matrix.os == 'linux' && '-DPULP_BUILD_PYTHON=ON' || '' }}
          # Coverage workflow targets C++ source coverage. The Rust CLI
          # (#778, Phase 8 PR #1) gets its own `cli-rust` Codecov tier
          # via a separate cargo-llvm-cov job (planned in PR #783) —
          # this job doesn't need the Rust binary built. Skipping
          # avoids macOS-runner ring-crate build failure (#785) without
          # losing C++ coverage data.
          PULP_SKIP_RUST_CLI: '1'
        run: scripts/run_coverage.sh

      - name: Install Python coverage tooling
        # tools/scripts/** is a blind spot in the current dashboard:
        # the repo already has Python unit tests for the gate and
        # automation scripts, but their coverage never reaches
        # Codecov. Keep the first expansion intentionally narrow:
        # Linux-only, tools/scripts-only, same workflow.
        #
        # Use a dedicated venv rather than mutating the system
        # interpreter. That keeps the step working on Namespace's
        # PEP-668-strict runner image without relying on
        # `--break-system-packages`.
        if: matrix.os == 'linux'
        shell: bash
        run: |
          python3 -m venv build-coverage/python-venv
          build-coverage/python-venv/bin/python -m pip install --upgrade pip
          build-coverage/python-venv/bin/python -m pip install 'coverage>=7.10' PyYAML

      - name: Run Python tools coverage
        # Mirror scripts/run_coverage.sh semantics: keep going even if a
        # test fails so we can still emit partial coverage for review.
        if: matrix.os == 'linux'
        continue-on-error: true
        shell: bash
        run: build-coverage/python-venv/bin/python tools/scripts/run_python_coverage.py

      - name: Run Swift apple coverage
        # SwiftPM has its own coverage pipeline (`swift test
        # --enable-code-coverage`) distinct from the native Clang lane.
        # Keep it on the macOS leg where the Apple package actually
        # builds, and stage repo-relative LCOV for upload plus the
        # original Swift JSON for local summaries/debugging.
        if: matrix.os == 'macos'
        continue-on-error: true
        shell: bash
        run: python3 tools/scripts/run_swift_coverage.py

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report-${{ matrix.os }}-${{ github.sha }}
          path: build-coverage/coverage/
          retention-days: 30

      - name: Upload summary
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v6
        with:
          name: coverage-summary-${{ matrix.os }}-${{ github.sha }}
          path: build-coverage/coverage/summary.txt
          retention-days: 90

      - name: Upload Python HTML report
        if: always() && matrix.os == 'linux'
        uses: actions/upload-artifact@v6
        with:
          name: coverage-python-report-${{ github.sha }}
          path: build-coverage/python/html/
          retention-days: 30
          if-no-files-found: error

      - name: Upload Python summary
        if: always() && matrix.os == 'linux'
        continue-on-error: true
        uses: actions/upload-artifact@v6
        with:
          name: coverage-python-summary-${{ github.sha }}
          path: build-coverage/python/summary.txt
          retention-days: 90
          if-no-files-found: error

      - name: Upload Apple summary
        if: always() && matrix.os == 'macos'
        continue-on-error: true
        uses: actions/upload-artifact@v6
        with:
          name: coverage-apple-summary-${{ github.sha }}
          path: build-coverage/apple/summary.txt
          retention-days: 90
          if-no-files-found: error

      - name: Verify Cobertura XML exists
        # Fail loudly if the coverage build didn't produce a cobertura file.
        # Without this check, a silent build failure (e.g. a missing transitive
        # include that breaks under Clang strict mode) produces zero profraw
        # → no cobertura → Codecov upload "succeeds" with no files → dashboard
        # stays empty. We had exactly this class of silent failure until
        # state_tree.hpp missing <algorithm> was caught on 2026-04-21.
        #
        # Pin shell: bash so the POSIX `test` + `wc -c <` syntax works on
        # the windows runner too (default shell there is pwsh, which treats
        # `<` as a reserved redirection operator and errors out).
        shell: bash
        run: |
          xml=build-coverage/coverage.cobertura.xml
          test -s "$xml" || {
            echo "::error::coverage.cobertura.xml is missing or empty."
            echo "::error::Coverage build likely failed — check the 'Run coverage suite' step above."
            exit 1
          }
          size=$(wc -c < "$xml")
          echo "coverage.cobertura.xml size: ${size} bytes"
          # Pulp #605 — file-non-empty is necessary but not sufficient.
          # A well-formed but structurally EMPTY XML (lines-valid=0)
          # will be rejected by Codecov v5 as "Unusable report" and the
          # dashboard stays empty despite green CI and a successful
          # upload. Assert the XML actually contains coverage data
          # before we ship it.
          lines_valid=$(python3 -c "import xml.etree.ElementTree as E; print(E.parse('$xml').getroot().attrib.get('lines-valid', '0'))")
          if [ "${lines_valid}" = "0" ]; then
            echo "::error::coverage.cobertura.xml is structurally empty (lines-valid=0)."
            echo "::error::llvm-cov / lcov_cobertura filtered out every source file — check scripts/run_coverage.sh's COVERAGE_IGNORE_REGEX and -object list against the actual profraw source paths."
            exit 1
          fi
          echo "coverage.cobertura.xml has lines-valid=${lines_valid}"

      - name: Verify Python Cobertura XML exists
        # coverage.py emits Cobertura XML too. Keep the same
        # file-non-empty + lines-valid assertions we use for the native
        # report so a broken Python lane doesn't silently upload nothing.
        if: always() && matrix.os == 'linux'
        shell: bash
        run: |
          xml=build-coverage/python/coverage.python.xml
          test -s "$xml" || {
            echo "::error::coverage.python.xml is missing or empty."
            echo "::error::Python tools coverage likely failed — check the 'Run Python tools coverage' step above."
            exit 1
          }
          size=$(wc -c < "$xml")
          echo "coverage.python.xml size: ${size} bytes"
          lines_valid=$(python3 -c "import xml.etree.ElementTree as E; print(E.parse('$xml').getroot().attrib.get('lines-valid', '0'))")
          if [ "${lines_valid}" = "0" ]; then
            echo "::error::coverage.python.xml is structurally empty (lines-valid=0)."
            echo "::error::coverage.py did not record any executable tools/scripts lines."
            exit 1
          fi
          echo "coverage.python.xml has lines-valid=${lines_valid}"

      - name: Verify Apple LCOV exists
        # Swift coverage is exported to repo-relative LCOV so Codecov
        # can attribute apple/Sources/** files against the git tree
        # instead of discarding LLVM JSON with absolute runner paths.
        if: always() && matrix.os == 'macos'
        shell: bash
        run: |
          lcov=build-coverage/apple/coverage.apple.lcov
          test -s "$lcov" || {
            echo "::error::coverage.apple.lcov is missing or empty."
            echo "::error::Swift apple coverage likely failed — check the 'Run Swift apple coverage' step above."
            exit 1
          }
          count=$(grep -c '^SF:apple/Sources/' "$lcov" || true)
          if [ "$count" -eq 0 ]; then
            echo "::error::coverage.apple.lcov contains no apple/Sources entries."
            exit 1
          fi
          echo "coverage.apple.lcov has ${count} apple/Sources entries"

      - name: Upload Cobertura XML
        # Linux XML keeps the historical name `coverage-cobertura-${sha}`
        # so the downstream `coverage-diff-gate` job continues to
        # download the canonical per-SHA artifact unchanged. diff-cover
        # is a single-XML tool and pinning it to Linux keeps its
        # base-vs-head comparison architecturally stable. macOS and
        # Windows upload under OS-suffixed names so reviewers can pull
        # a specific leg's XML without ambiguity.
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.os == 'linux' && format('coverage-cobertura-{0}', github.sha) || format('coverage-cobertura-{0}-{1}', matrix.os, github.sha) }}
          path: build-coverage/coverage.cobertura.xml
          retention-days: 14
          if-no-files-found: error

      - name: Upload Python Cobertura XML
        if: always() && matrix.os == 'linux'
        uses: actions/upload-artifact@v6
        with:
          name: coverage-python-${{ github.sha }}
          path: build-coverage/python/coverage.python.xml
          retention-days: 14
          if-no-files-found: error

      - name: Upload Apple LCOV
        if: always() && matrix.os == 'macos'
        uses: actions/upload-artifact@v6
        with:
          name: coverage-apple-${{ github.sha }}
          path: build-coverage/apple/coverage.apple.lcov
          retention-days: 14
          if-no-files-found: error

      - name: Compute Codecov upload file list
        id: codecov_files
        if: always()
        shell: bash
        run: |
          files="build-coverage/coverage.cobertura.xml"
          if [ "${{ matrix.os }}" = "linux" ] && [ -f build-coverage/python/coverage.python.xml ]; then
            files="${files},build-coverage/python/coverage.python.xml"
          fi
          if [ "${{ matrix.os }}" = "macos" ] && [ -f build-coverage/apple/coverage.apple.lcov ]; then
            files="${files},build-coverage/apple/coverage.apple.lcov"
          fi
          echo "files=${files}" >> "${GITHUB_OUTPUT}"

      - name: Upload coverage to Codecov
        # #566 Phase 1 PR 4 adds a per-OS flag on each matrix leg
        # (`os-linux`, `os-macos`, `os-windows`) so Codecov can
        # cross-filter coverage by OS. Cross-OS unions of the same
        # file happen at the Codecov flag layer — NOT via
        # llvm-profdata merge, which is not architecture-portable
        # (see planning decision doc §7).
        #
        # Subsystem / platform / surface breakdown comes from the
        # `component_management` block in codecov.yml, which slices
        # each upload by path (#603 made this switch on main after
        # Codecov rejected the 20-flag-per-upload pattern with
        # "Multiple flags detected. Please ensure one flag per
        # upload."). A single per-OS flag per upload is the
        # supported shape.
        #
        # fail_ci_if_error: false — coverage is still advisory in
        # Phase 1. Phase 3 adds a diff-cover gate for per-PR
        # enforcement (see coverage-diff-gate below, pinned to Linux).
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: ${{ steps.codecov_files.outputs.files }}
          flags: ${{ matrix.flag }}
          disable_search: true
          # Token makes upload more reliable (avoids tokenless rate limits);
          # action silently falls back to tokenless if the secret is unset
          # (e.g. in forked-PR context where secrets aren't exposed).
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true

  android-kotlin-coverage:
    # Keep Android JVM coverage on the always-on Coverage workflow so
    # Codecov's main-branch head never drops back to `android: null`
    # just because a non-Android commit skipped android.yml entirely.
    # This lane measures Kotlin unit-testable source only; APK build and
    # emulator/device smoke remain in android.yml.
    name: Coverage report (Android, Kotlin)
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;30.0.14904198"

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: android-coverage-${{ runner.os }}-${{ hashFiles('android/**/*.gradle.kts', 'android/app/src/test/**/*.kt') }}
          restore-keys: |
            android-coverage-${{ runner.os }}-
            ${{ runner.os }}-gradle-

      - name: Run Kotlin unit tests + JaCoCo report
        working-directory: android
        run: ./gradlew :app:testDebugUnitTest :app:jacocoDebugUnitTestReport
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/30.0.14904198

      - name: Verify JaCoCo XML exists
        shell: bash
        run: |
          xml=android/app/build/reports/jacoco/jacocoDebugUnitTestReport/jacocoDebugUnitTestReport.xml
          test -s "$xml" || {
            echo "::error::Android JaCoCo XML is missing or empty."
            exit 1
          }
          python3 - <<'PY'
          import pathlib
          import sys
          import xml.etree.ElementTree as ET

          path = pathlib.Path(
              "android/app/build/reports/jacoco/jacocoDebugUnitTestReport/"
              "jacocoDebugUnitTestReport.xml"
          )
          root = ET.parse(path).getroot()
          line = root.find("counter[@type='LINE']")
          if line is None:
              print("::error::Android JaCoCo XML has no LINE counter.")
              sys.exit(1)
          total = int(line.attrib["missed"]) + int(line.attrib["covered"])
          if total == 0:
              print("::error::Android JaCoCo XML reports zero measured lines.")
              sys.exit(1)
          print(f"Android JaCoCo XML lines: {line.attrib['covered']}/{total}")
          PY

      - name: Upload Kotlin coverage artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: android-kotlin-coverage-${{ github.sha }}
          path: |
            android/app/build/reports/jacoco/jacocoDebugUnitTestReport/**
            android/app/build/reports/tests/testDebugUnitTest/**
          retention-days: 14
          if-no-files-found: error

      - name: Upload Android Kotlin coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: android/app/build/reports/jacoco/jacocoDebugUnitTestReport/jacocoDebugUnitTestReport.xml
          disable_search: true
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true

  coverage-diff-gate:
    # #566 Phase 1 PR 3: per-PR diff coverage advisory gate.
    # #566 Phase 1 PR 4: pinned to the Linux Cobertura XML at first.
    # #566 Phase 3 (landed): the gate is REQUIRED — sub-threshold
    # diff coverage now hard-fails the PR. The job still posts a
    # summary comment so contributors see the number alongside the
    # failing check.
    # #635 (this PR): consume a MERGED XML covering all three OSes
    # via tools/scripts/merge_cobertura.py. Earlier the Linux-only
    # pin silently skipped Apple-only / Windows-only source files
    # (the files weren't in the Linux artifact, so diff-cover never
    # saw them and the 75% gate was bypassed for any platform-
    # specific change). Merging takes max(hits) per (filename, line)
    # across the per-OS artifacts — a line covered on any OS counts
    # — so diff-cover stays a single-XML tool and still emits one
    # PR comment, but the silent-skip is closed.
    #
    # Runs only on pull_request events — the gate question "of the lines
    # this PR adds, how many are covered?" is meaningless on a direct
    # push to main where there is no diff to compute against.
    name: Diff coverage required (${{ needs.coverage.result == 'success' && '75%' || 'coverage job failed' }})
    runs-on: ubuntu-24.04
    needs: coverage
    if: always() && github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          # diff-cover compares HEAD against --compare-branch using real
          # git history, so we need enough depth to include the merge
          # base with origin/${{ github.base_ref }}. fetch-depth: 0
          # avoids guessing a shallow depth that works for most PRs but
          # breaks on long-lived branches.
          fetch-depth: 0
          submodules: false
          lfs: false

      - name: Ensure base branch is fetched
        # actions/checkout fetches the PR head and the merge-ref but not
        # the full base branch history. diff-cover needs origin/<base>
        # to resolve --compare-branch, so fetch it explicitly.
        run: git fetch --no-tags origin "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"
        shell: bash

      - name: Download Cobertura XML from coverage job (Linux)
        # Linux artifact uses the historical name
        # `coverage-cobertura-${sha}`. macOS and Windows use OS-suffixed
        # names (see the matrix `coverage` job's upload step). All three
        # are downloaded; missing artifacts are tolerated — the merge
        # step skips them and writes a partial XML, and if every input
        # is missing the merge refuses to write and the next step
        # renders the graceful "no XML" fallback.
        uses: actions/download-artifact@v6
        with:
          name: coverage-cobertura-${{ github.sha }}
          path: coverage-artifact-linux/
        continue-on-error: true

      - name: Download Cobertura XML from coverage job (macOS)
        uses: actions/download-artifact@v6
        with:
          name: coverage-cobertura-macos-${{ github.sha }}
          path: coverage-artifact-macos/
        continue-on-error: true

      - name: Download Cobertura XML from coverage job (Windows)
        uses: actions/download-artifact@v6
        with:
          name: coverage-cobertura-windows-${{ github.sha }}
          path: coverage-artifact-windows/
        continue-on-error: true

      - name: Install diff-cover
        # Pinned to >=9 for the --markdown-report flag; earlier
        # releases only supported --html-report.
        run: python3 -m pip install --user 'diff-cover>=9'
        shell: bash

      - name: coverage_diff_comment.py fixture tests
        # Guard the PR-comment renderer the same way the upstream
        # `coverage` job guards scripts/run_coverage.sh — run the
        # unit tests before we depend on the script in a live step
        # so a regression fails fast without waiting on diff-cover.
        run: python3 tools/scripts/test_coverage_diff_comment.py
        shell: bash

      - name: merge_cobertura.py fixture tests (#635)
        # Same guard pattern: validate the merge tool before we
        # depend on its output in the live diff-cover step. A
        # regression in merge_cobertura would otherwise show up as
        # a confusing diff-cover number drift before anyone realised
        # the merge was the cause.
        run: python3 tools/scripts/test_merge_cobertura.py
        shell: bash

      - name: Merge per-OS Cobertura XMLs into one (#635)
        # Closes the silent-skip identified in pulp#635. Without this
        # step diff-cover only sees the Linux artifact and reports
        # 100% coverage on Apple-only or Windows-only files because
        # they aren't in the report at all. The merge takes max(hits)
        # per (filename, line) across the inputs so a line counted
        # as covered on any OS is treated as covered overall.
        #
        # Exit-code policy (Codex P1 reviews on PR #654 + PR #660):
        # The script uses a DEDICATED exit code (2) for the
        # intentionally-tolerated "every input XML missing/empty" case;
        # the diff-cover step then renders the "no XML" fallback.
        # Exit 1 is the conventional Python "real error" code (uncaught
        # exception, ParseError on a malformed Cobertura artifact, etc.)
        # and MUST fail the gate — otherwise a corrupted upload silently
        # bypasses the required 75% coverage check.
        # Earlier the workflow tolerated any rc==1 which collapsed both
        # cases into one bypass surface; PR #660's Codex review caught
        # that. Don't merge the cases back together; if you change the
        # script's exit codes, update both ends in lockstep.
        shell: bash
        run: |
          set +e
          python3 tools/scripts/merge_cobertura.py \
              --out coverage-artifact/coverage.cobertura.xml \
              coverage-artifact-linux/coverage.cobertura.xml \
              coverage-artifact-macos/coverage.cobertura.xml \
              coverage-artifact-windows/coverage.cobertura.xml
          rc=$?
          if [ "$rc" -eq 0 ]; then
            exit 0
          elif [ "$rc" -eq 2 ]; then
            echo "::warning::merge_cobertura: every input missing — diff-cover step will render the fallback report."
            mkdir -p coverage-artifact
            exit 0
          else
            echo "::error::merge_cobertura failed with exit ${rc} (corrupt artifact, parse error, or script bug — NOT the all-missing sentinel which is exit 2). Failing the required diff-coverage gate; investigate the per-OS coverage artifacts."
            exit "$rc"
          fi

      - name: Run diff-cover (required)
        id: diff_cover
        # Phase 3: sub-threshold diff coverage hard-fails this job.
        # The job still posts a summary comment via the downstream
        # "Render PR comment body" step so contributors see the
        # number alongside the failed check.
        # Reads the MERGED XML produced by the previous step (#635).
        #
        # Threshold comes from tools/scripts/coverage_config.json so the
        # local pre-push hook + tools/scripts/local_diff_cover.sh stay
        # in lockstep with this gate. Edit there, not here, when raising
        # or lowering the floor.
        shell: bash
        run: |
          set +e
          xml="coverage-artifact/coverage.cobertura.xml"
          if [ ! -f "$xml" ]; then
            echo "No Cobertura XML from upstream jobs — writing empty diff report."
            : > coverage-diff.md
            echo "exit_code=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          THRESHOLD=$(jq -r '.diff_coverage_fail_under' tools/scripts/coverage_config.json)
          if ! [[ "$THRESHOLD" =~ ^[0-9]+$ ]]; then
            echo "::error::Invalid diff_coverage_fail_under in tools/scripts/coverage_config.json: '${THRESHOLD}'"
            exit 1
          fi
          # Per-file exclusions from the same source-of-truth: thin
          # dispatchers / generated code that is exercised end-to-end via
          # shell-out tests but doesn't propagate llvm-cov line data.
          # Empty array → no --exclude flags emitted.
          # diff-cover's --exclude is nargs='+' with argparse default
          # action — repeated `--exclude=foo --exclude=bar` keeps only
          # the LAST. Pass all values under a single --exclude flag.
          # Patterns must be basenames or globs (`**/file.cpp`); literal
          # relative paths match nothing (matched only against basename
          # and absolute path via fnmatch). See coverage_config.json
          # _comment for the contract.
          mapfile -t EXCLUDES < <(jq -r '.diff_cover_excludes // [] | .[]' tools/scripts/coverage_config.json)
          EXCLUDE_ARGS=()
          if [ ${#EXCLUDES[@]} -gt 0 ]; then
            EXCLUDE_ARGS=("--exclude" "${EXCLUDES[@]}")
          fi
          echo "Diff-cover threshold from coverage_config.json: ${THRESHOLD}% (excludes: ${EXCLUDES[*]:-none})"
          python3 -m diff_cover.diff_cover_tool \
              "$xml" \
              --compare-branch="origin/${{ github.base_ref }}" \
              --fail-under="${THRESHOLD}" \
              "${EXCLUDE_ARGS[@]}" \
              --markdown-report=coverage-diff.md
          rc=$?
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"
          # Always print the report so the raw output is in the logs
          # even if the artifact upload step fails.
          if [ -f coverage-diff.md ]; then
            echo "----- coverage-diff.md -----"
            cat coverage-diff.md
            echo "----- end coverage-diff.md -----"
          fi
          # Phase 3 (landed): propagate the diff-cover exit code so
          # sub-threshold coverage fails the step AND the job, hard-blocking
          # the PR. continue-on-error was removed at the step level above.
          exit "$rc"

      - name: Install PyYAML (#566 Phase 2)
        # Installed before the fixture tests because
        # test_coverage_tier_check.py exercises ctc.load_targets() which
        # imports yaml (issue #900). Also required by the per-tier gate
        # step below.
        run: python3 -m pip install --user 'pyyaml>=6'
        shell: bash

      - name: coverage_tier_check.py fixture tests (#566 Phase 2)
        # Guard the per-tier gate script the same way we guard
        # coverage_diff_comment.py — unit tests run before the live
        # invocation so a regression in classify_file / aggregate /
        # render fails fast without requiring a full coverage run.
        run: python3 tools/scripts/test_coverage_tier_check.py
        shell: bash

      - name: Run per-tier coverage gate (#566 Phase 2)
        # Runs alongside the existing diff-cover gate. diff-cover
        # enforces a single global 75% floor; this step layers the
        # per-tier floors from `ci/coverage-targets.yaml` on top
        # (audio-critical 80%, user-facing 70%, infrastructure 50%).
        # Files that don't match any tier fall back to the global
        # diff-cover floor — no double gate, no gap.
        #
        # continue-on-error: true during the Phase 2 bring-up. The
        # tier-check fails loudly in logs but doesn't block merges
        # until we've observed a couple of cycles and confirmed the
        # tier definitions classify files correctly. Phase 2 flip
        # to required is a one-line removal of this continue-on-error.
        continue-on-error: true
        shell: bash
        run: |
          xml="coverage-artifact/coverage.cobertura.xml"
          if [ ! -f "$xml" ]; then
            : > coverage-tier.md
            echo "tier-gate: no Cobertura XML from upstream — skipped." >&2
            exit 0
          fi
          python3 tools/scripts/coverage_tier_check.py \
              --cobertura "$xml" \
              --targets ci/coverage-targets.yaml \
              --compare-branch "origin/${{ github.base_ref }}" \
              --markdown-report coverage-tier.md

      - name: Render PR comment body
        # Required-gate failures (diff_cover exit_code != 0) used to skip
        # this step under the default `if: success()` rule, meaning
        # contributors got a red check with no comment explaining which
        # lines were uncovered. Codex #611 P2 — render + upsert on failure
        # too so the PR comment always reflects the real result.
        # Threshold is read from tools/scripts/coverage_config.json — the
        # same source diff-cover uses one step up — so the rendered
        # banner can never drift from the actual gate.
        if: always()
        run: |
          # Phase 3 landed: gate is required. --no-advisory flips the
          # banner to the required-gate form; the --flip-date argument
          # is no longer needed (no upcoming flip to announce).
          THRESHOLD=$(jq -r '.diff_coverage_fail_under' tools/scripts/coverage_config.json)
          python3 tools/scripts/coverage_diff_comment.py \
              --report coverage-diff.md \
              --flip-date 2026-05-04 \
              --threshold "${THRESHOLD}" \
              --no-advisory \
              --out coverage-diff-comment.md
          # Append the per-tier section (#566 Phase 2) if the tier
          # check produced a report.
          if [ -s coverage-tier.md ]; then
            printf '\n\n' >> coverage-diff-comment.md
            cat coverage-tier.md >> coverage-diff-comment.md
          fi
          echo "----- coverage-diff-comment.md -----"
          cat coverage-diff-comment.md
          echo "----- end comment -----"
        shell: bash

      - name: Upload diff-cover report artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-diff-${{ github.sha }}
          path: |
            coverage-diff.md
            coverage-diff-comment.md
            coverage-tier.md
          retention-days: 14
          if-no-files-found: warn

      - name: Upsert PR comment with diff-coverage summary
        # Same upsert pattern as .github/workflows/ruleset-drift-check.yml:
        # find a bot comment carrying our stable marker and PATCH its
        # body in place, else POST a new one. Prevents comment spam on
        # PRs that push multiple times.
        #
        # Skip fork PRs where GITHUB_TOKEN is read-only — posting would
        # hard-fail with a 403 even though this whole job is advisory.
        # `always() && …` so required-gate failures still upsert the
        # explanatory comment (Codex #611 P2); the fork guard stays.
        if: always() && github.event.pull_request.head.repo.full_name == github.repository
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          MARKER: '<!-- pulp-coverage-diff-gate -->'
        run: |
          set -euo pipefail
          repo='${{ github.repository }}'
          body="$(cat coverage-diff-comment.md)"

          existing=$(
              gh api -H "Accept: application/vnd.github+json" \
                  "/repos/${repo}/issues/${PR_NUMBER}/comments" \
                  --paginate \
                  --jq "[.[] | select(.body != null and (.body | contains(\"${MARKER}\")))] | first | .id // empty"
          )

          if [ -z "${existing:-}" ]; then
              echo "Creating diff-coverage comment on PR #${PR_NUMBER}."
              printf '%s' "$body" | gh pr comment "$PR_NUMBER" --repo "$repo" --body-file -
          else
              echo "Updating diff-coverage comment #${existing} on PR #${PR_NUMBER}."
              gh api \
                  --method PATCH \
                  -H "Accept: application/vnd.github+json" \
                  "/repos/${repo}/issues/comments/${existing}" \
                  -f body="$body" >/dev/null
          fi
