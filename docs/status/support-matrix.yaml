# Pulp support matrix
# Vocabulary: stable, usable, experimental, partial, planned, unsupported

platforms:
  macos:
    status: usable
    notes: Primary development platform. ARM64 and x86_64.
  windows:
    status: experimental
    notes: WASAPI audio, Win32 MIDI, NSIS installer, Authenticode signing. CI enabled.
  linux:
    status: experimental
    notes: ALSA audio, ALSA MIDI, .deb packaging. CI enabled.
  ios:
    status: experimental
    notes: Foundation in place. AVAudioSession, AUv3, UIKit views, Metal surface.
  web:
    status: planned

formats:
  vst3:
    macos: usable
    windows: partial
    linux: partial
  au_v2:
    macos: usable
    windows: unsupported
    linux: unsupported
  clap:
    macos: usable
    windows: partial
    linux: partial
  standalone:
    macos: usable
    windows: partial
    linux: partial
  auv3:
    macos: experimental
    ios: experimental
  lv2:
    linux: experimental
  aax:
    macos: planned
    windows: planned

audio_io:
  coreaudio:
    status: usable
    platform: macos
  avaudiosession:
    status: experimental
    platform: ios
  wasapi:
    status: experimental
    platform: windows
  alsa:
    status: experimental
    platform: linux

midi_io:
  coremidi:
    status: usable
    platform: macos
  win32_midi:
    status: experimental
    platform: windows
  alsa_midi:
    status: experimental
    platform: linux

rendering:
  dawn_metal:
    status: experimental
    platform: macos
    notes: Device bootstrap and presentable surface infrastructure exist. On-screen path not yet default in view hosts.
  skia_graphite:
    status: experimental
    platform: macos
    notes: Offscreen Graphite rendering works. Present-to-surface path defined but view hosts still use CoreGraphics by default.
  dawn_metal_ios:
    status: experimental
    platform: ios
    notes: CAMetalLayer helper exists. Not yet wired as active render path.
  dawn_d3d12:
    status: experimental
    platform: windows
    notes: Dawn supports D3D12. Not yet integrated with Pulp surface model.
  dawn_vulkan:
    status: experimental
    platform: linux
    notes: Dawn supports Vulkan. Not yet integrated with Pulp surface model.
  coregraphics_fallback:
    status: usable
    platform: macos
    notes: Current default render path for all macOS view hosts. Production-ready.

subsystems:
  runtime: stable
  events: usable
  audio: usable
  midi: usable
  signal: usable
  state: stable
  format: usable
  platform: usable
  canvas: experimental
  render: experimental
  view: experimental
  osc: experimental
