name: Release health

# Layer 4 of the release-watchdog system (docs/guides/release-watchdog.md).
#
# WHY this exists on top of the existing triad: the triad detected the
# 2026-06-19..06-21 outage correctly — auto-release-watchdog (auto-release.yml),
# release-cli-watchdog (release-cli.yml), and release-cadence-check (tag exists
# per VERSION bump) all fired. But the alerts were:
#   1. PER-VERSION NOISE — ~16 separate issues, each easy to dismiss; nothing
#      ever said "the pipeline has now failed N CONSECUTIVE tags = systemic".
#   2. ISSUE-ONLY — they only opened GitHub issues, a surface the owner does
#      not watch, so a loud problem stayed invisible for a week.
#   3. PER-WORKFLOW — release-cli had a watchdog; sign-and-release.yml (the
#      macOS leg that actually broke) did not, so it was only caught indirectly.
#
# This workflow is SYMPTOM-LEVEL and cause-agnostic: it asks the only question
# that matters — "are PUBLISHED releases with binaries keeping pace with the
# version tags?" — so it catches ANY release-build failure (macOS, Windows, a
# future leg) without a watchdog per workflow. On a systemic gap it:
#   - FAILS the job → a RED scheduled check on the Actions dashboard that stays
#     red until releases recover (a surface you actually watch),
#   - maintains ONE rolling, rising-severity issue (no 16-issue spam),
#   - optionally pings Discord IF the RELEASE_ALERT_DISCORD_WEBHOOK secret is
#     set (DISABLED BY DEFAULT — wiring is present; add the secret to enable).

on:
  schedule:
    - cron: '17 */2 * * *'   # every 2h, offset off the hour
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: release-health
  cancel-in-progress: false

env:
  # A release is "healthy" for a tag when a NON-draft release with >=1 asset
  # (binary) exists. Escalate once this many of the newest tags in a row lack one.
  CONSECUTIVE_THRESHOLD: '2'
  # How many newest version tags to inspect.
  LOOKBACK_TAGS: '12'

jobs:
  release-health:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history + tags)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Evaluate release health
        id: eval
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import json, os, subprocess, datetime

          repo = os.environ["REPO"]
          threshold = int(os.environ["CONSECUTIVE_THRESHOLD"])
          lookback = int(os.environ["LOOKBACK_TAGS"])

          def sh(args):
              return subprocess.run(args, capture_output=True, text=True, check=False).stdout

          # Newest-first list of semver release tags (vMAJOR.MINOR.PATCH).
          tags = [t for t in sh(["git", "tag", "-l", "v[0-9]*.[0-9]*.[0-9]*",
                                 "--sort=-version:refname"]).split() if t]
          tags = tags[:lookback]

          # Map tag -> release record (draft flag + asset count) via the API.
          rel_raw = sh(["gh", "api", "--paginate",
                        f"repos/{repo}/releases?per_page=100"])
          rel = {}
          try:
              releases = json.loads(rel_raw) if rel_raw.strip().startswith("[") else []
          except json.JSONDecodeError:
              releases = []
          for r in releases:
              rel[r.get("tag_name", "")] = {
                  "draft": bool(r.get("draft")),
                  "assets": len(r.get("assets") or []),
                  "published_at": r.get("published_at"),
              }

          def healthy(tag):
              r = rel.get(tag)
              return bool(r and not r["draft"] and r["assets"] > 0)

          # Count consecutive newest tags that are NOT healthy.
          consecutive = 0
          unpublished = []
          for t in tags:
              if healthy(t):
                  break
              consecutive += 1
              unpublished.append(t)

          # Days since the most recent healthy release.
          last_good = next((t for t in tags if healthy(t)), None)
          days = "unknown"
          if last_good and rel[last_good].get("published_at"):
              try:
                  pub = datetime.datetime.fromisoformat(
                      rel[last_good]["published_at"].replace("Z", "+00:00"))
                  days = str((datetime.datetime.now(datetime.timezone.utc) - pub).days)
              except ValueError:
                  pass

          down = consecutive >= threshold
          out = os.environ["GITHUB_OUTPUT"]
          with open(out, "a") as f:
              f.write(f"down={'true' if down else 'false'}\n")
              f.write(f"consecutive={consecutive}\n")
              f.write(f"last_good={last_good or 'none'}\n")
              f.write(f"days={days}\n")
              f.write(f"newest={tags[0] if tags else 'none'}\n")
              f.write("unpublished=" + ",".join(unpublished) + "\n")
          print(f"consecutive-unpublished={consecutive} threshold={threshold} "
                f"down={down} last_good={last_good} days={days}")
          PY

      - name: Escalate (issue + optional Discord) and fail red
        if: steps.eval.outputs.down == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          DISCORD_WEBHOOK: ${{ secrets.RELEASE_ALERT_DISCORD_WEBHOOK }}
          CONSECUTIVE: ${{ steps.eval.outputs.consecutive }}
          LAST_GOOD: ${{ steps.eval.outputs.last_good }}
          DAYS: ${{ steps.eval.outputs.days }}
          NEWEST: ${{ steps.eval.outputs.newest }}
          UNPUBLISHED: ${{ steps.eval.outputs.unpublished }}
        run: |
          set -euo pipefail
          title="🚨 Release pipeline DOWN — ${CONSECUTIVE} consecutive tags unpublished"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          {
            echo "**The release pipeline has produced no published release with binaries for"
            echo "the last ${CONSECUTIVE} version tags.** This is a SYSTEMIC failure, not a"
            echo "one-off — the version keeps bumping and tags keep being created, but"
            echo "\`sign-and-release.yml\` and/or \`release-cli.yml\` are failing on the tag, so"
            echo "no downloadable release ships."
            echo ""
            echo "- Newest tag: \`${NEWEST}\`"
            echo "- Unpublished tags (newest first): \`${UNPUBLISHED}\`"
            echo "- Last healthy release: \`${LAST_GOOD}\` (~${DAYS} days ago)"
            echo "- This check: ${run_url}"
            echo ""
            echo "**Triage:** open the most recent \`sign-and-release.yml\` and"
            echo "\`release-cli.yml\` runs for the newest tag, pull the failed job/step"
            echo "(\`gh api repos/${REPO}/actions/jobs/<id>/logs\`), fix the root cause, then"
            echo "land a version bump to re-tag. See docs/guides/release-watchdog.md and the"
            echo "ci skill's 'release macOS runner must be macOS 15' gotcha."
            echo ""
            echo "_This issue auto-updates every run and auto-closes when a published release"
            echo "with binaries catches up to the newest tag._"
          } > body.md

          existing=$(gh issue list --repo "$REPO" --state open --label release-health \
              --json number --jq '.[0].number // empty' 2>/dev/null || true)
          if [ -n "$existing" ]; then
            gh issue edit "$existing" --repo "$REPO" --title "$title" --body-file body.md
            gh issue comment "$existing" --repo "$REPO" \
              --body "Still down — ${CONSECUTIVE} consecutive tags unpublished (~${DAYS}d). ${run_url}"
          else
            gh issue create --repo "$REPO" --title "$title" --body-file body.md \
              --label release-health --label ci --label blocks-release 2>&1 || \
            gh issue create --repo "$REPO" --title "$title" --body-file body.md
          fi

          if [ -n "${DISCORD_WEBHOOK:-}" ]; then
            echo "Discord webhook configured — sending alert."
            python3 - <<'PY'
          import json, os, urllib.request
          msg = (f":rotating_light: **Pulp release pipeline DOWN** — "
                 f"{os.environ['CONSECUTIVE']} consecutive tags unpublished "
                 f"(last good {os.environ['LAST_GOOD']}, ~{os.environ['DAYS']}d ago). "
                 f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}"
                 f"/actions/runs/{os.environ['GITHUB_RUN_ID']}")
          req = urllib.request.Request(os.environ["DISCORD_WEBHOOK"],
                data=json.dumps({"content": msg[:1900]}).encode(),
                headers={"Content-Type": "application/json"})
          try:
              urllib.request.urlopen(req, timeout=15)
          except Exception as e:  # noqa: BLE001 — alert path must never hard-fail the gate
              print(f"Discord post failed (non-fatal): {e}")
          PY
          else
            echo "RELEASE_ALERT_DISCORD_WEBHOOK not set — Discord alert disabled (default)."
          fi

          echo "::error::Release pipeline DOWN — ${CONSECUTIVE} consecutive tags have no published release."
          exit 1

      - name: Recover (close issue) when healthy
        if: steps.eval.outputs.down != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          existing=$(gh issue list --repo "$REPO" --state open --label release-health \
              --json number --jq '.[0].number // empty' 2>/dev/null || true)
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "$REPO" \
              --body "✅ Recovered — a published release with binaries has caught up to the newest tag. Closing."
            gh issue close "$existing" --repo "$REPO" --reason completed
          fi
          echo "Release health OK."
