# MkDocs Material parallel build (#577 PR 1).
#
# Runs alongside docs-deploy.yml (which still deploys the custom-generator
# site). This workflow builds ONLY the Material artifact and uploads it for
# visual inspection. It does not deploy to GitHub Pages; switchover happens
# in PR 3 of #577.
name: Docs (Material preview)

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'
      - '.github/workflows/docs-material.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'
      - '.github/workflows/docs-material.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-material-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # git-revision-date plugin walks history

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install MkDocs Material
        run: pip install -r requirements-docs.txt

      - name: Build Material site
        run: mkdocs build --site-dir build/site-material

      - name: Upload artifact for visual inspection
        uses: actions/upload-artifact@v4
        with:
          name: docs-material-preview
          path: build/site-material
          retention-days: 14
          if-no-files-found: error
