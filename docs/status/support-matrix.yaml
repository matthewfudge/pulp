# Pulp support matrix
# Vocabulary: stable, usable, experimental, partial, planned, unsupported

platforms:
  macos:
    status: usable
    notes: Primary development platform. ARM64 and x86_64.
  windows:
    status: experimental
    notes: WASAPI audio, Win32 MIDI, NSIS installer, Authenticode signing. CI enabled.
  linux:
    status: experimental
    notes: ALSA audio, ALSA MIDI, .deb packaging. CI enabled.
  ios:
    status: experimental
    notes: Foundation in place. AVAudioSession, AUv3, UIKit views, Metal surface.
  web:
    status: experimental
    notes: WAMv2, WebCLAP adapters, Emscripten build pipeline, browser test host. Not yet runtime-validated in browser.

formats:
  vst3:
    macos: usable
    windows: partial
    linux: partial
  au_v2:
    macos: usable
    windows: unsupported
    linux: unsupported
  clap:
    macos: usable
    windows: partial
    linux: partial
  standalone:
    macos: usable
    windows: partial
    linux: partial
  auv3:
    macos: experimental
    ios: experimental
  lv2:
    linux: experimental
  wam_v2:
    web: experimental
  webclap:
    web: experimental
  aax:
    macos: planned
    windows: planned

audio_io:
  coreaudio:
    status: usable
    platform: macos
  avaudiosession:
    status: experimental
    platform: ios
  wasapi:
    status: experimental
    platform: windows
  alsa:
    status: experimental
    platform: linux

midi_io:
  coremidi:
    status: usable
    platform: macos
  win32_midi:
    status: experimental
    platform: windows
  alsa_midi:
    status: experimental
    platform: linux

rendering:
  dawn_metal:
    status: experimental
    platform: macos
    notes: Presentable surface via CAMetalLayer-backed NSView. GPU path opt-in via use_gpu in WindowHost and PluginViewHost. CoreGraphics remains default.
  skia_graphite:
    status: experimental
    platform: macos
    notes: Skia Graphite wired through Dawn device. Offscreen and on-screen rendering work. CoreGraphics is still the default path.
  dawn_metal_ios:
    status: experimental
    platform: ios
    notes: IOSGpuWindowHost and IOSGpuPluginViewHost implemented. Not yet runtime-validated on device.
  dawn_d3d12:
    status: experimental
    platform: windows
    notes: Surface creation via SurfaceSourceWindowsHWND implemented. SDL3 extraction for HWND. Not runtime-validated on hardware.
  dawn_vulkan:
    status: experimental
    platform: linux
    notes: Surface creation via SDL3 X11/Wayland extraction implemented. Not runtime-validated on hardware.
  coregraphics_fallback:
    status: usable
    platform: macos
    notes: Current default render path for all macOS view hosts. Production-ready.

subsystems:
  runtime: stable
  events: usable
  audio: usable
  midi: usable
  signal: usable
  state: stable
  format: usable
  platform: usable
  canvas: experimental
  render: experimental
  view: experimental
  osc: experimental
