# Per-tier coverage targets for Pulp's diff-coverage gate.
#
# The existing `coverage-diff-gate` in `.github/workflows/coverage.yml`
# enforces a single global floor (75%) on PR diff coverage. This file
# adds per-tier floors on top of that — audio-critical code has a
# higher bar than infrastructure glue, and the gate enforces the right
# bar for each file the PR changes.
#
# Structure:
#   version: schema version (bump if fields change incompatibly).
#   tiers: list of named tiers, each with:
#     name          — human-readable identifier, shown in the PR comment
#     line_target   — minimum line-coverage percentage (0-100) for the
#                     diff portion touching this tier's paths
#     paths         — list of glob-style path patterns (fnmatch semantics)
#                     that classify a file into this tier; first-match
#                     wins in order, so put narrower tiers first
#
# Fallback behavior: files that don't match any tier fall back to the
# global 75% floor from the existing diff-cover gate. New subsystems
# inherit a sane default without requiring an immediate tier assignment.
#
# Consumed by `tools/scripts/coverage_tier_check.py`, invoked from the
# `coverage-diff-gate` job alongside the existing diff-cover invocation.
#
# Coverage scope (#1056, #1886):
#   This file gates two Cobertura lanes that share one per-tier YAML:
#     1. The Clang-instrumented native diff lane (C / C++ / Obj-C).
#     2. The vitest v8 JS/TS lane in `packages/pulp-react/**`
#        (pulp #1886 Phase 1 — measure-only at first).
#   `coverage_tier_check.py::is_instrumented_source` filters non-Cobertura
#   files at aggregate time, so Kotlin (`.kt`) and Swift (`.swift`)
#   sources never bias a tier score even if their paths match a glob.
#   We classify them anyway (under `infrastructure`) so the audit recipe
#   reports zero unmatched first-party files — non-instrumented sources
#   tracked through other coverage flags (JaCoCo for Kotlin, SwiftPM for
#   Swift; see `docs/guides/coverage.md` §"Language coverage") still get
#   a deliberate home in this file rather than silently falling out.
#
#   Tier completeness is locked in structurally by
#   `tools/scripts/test_coverage_tier_check.py::TierCoverageCompleteness`
#   per the audit pattern in #1049 / #841 / #1056.

version: 1

tiers:
  - name: audio-critical
    line_target: 80
    paths:
      - core/audio/**
      - core/dsl/**
      - core/format/**
      - core/host/**
      - core/midi/**
      - core/signal/**
      - core/platform/**

  - name: user-facing
    line_target: 70
    paths:
      - core/view/**
      - core/render/**
      - inspect/**
      - tools/cli/**
      # pulp #1886 Phase 1 — JS/TS sources in @pulp/react are user-visible
      # SDK surface. Coverage data comes from the vitest v8 → Cobertura
      # pipeline in `.github/workflows/pulp-react-build.yml`, not from
      # scripts/run_coverage.sh. The per-tier gate runs continue-on-error
      # in coverage.yml so this entry is measure-only at first; Phase 2
      # flips enforcement once a stable baseline is observed.
      - packages/pulp-react/**

  - name: infrastructure
    line_target: 50
    paths:
      - core/events/**
      - core/dsl/**          # pulp #1056 — DSL processor scaffolding (Faust wrapper headers)
      - core/runtime/**
      - core/state/**
      - core/canvas/**
      - core/osc/**
      - ship/**
      - tools/**
      # Platform integration. Kotlin (`android/**.kt`) and Swift
      # (`apple/**.swift`, `apple/Package.swift`) are filtered out by
      # `is_instrumented_source` before they bias this tier's score, but
      # we classify them here so the audit completeness check has a
      # deliberate home for every first-party file. The instrumented
      # `apple/Sources/PulpSwift/PulpBridge.{cpp,h}` shim does count
      # toward the infrastructure floor, matching the rest of the
      # platform-glue surfaces.
      - android/**
      - apple/**
