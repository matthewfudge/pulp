# Docs deploy — primary pipeline for generouscorp.com/pulp.
#
# #577 PR 4 retired the legacy tools/build-docs.py generator and the
# `use_legacy_generator` workflow_dispatch fallback introduced in PR 3. This
# workflow is now MkDocs Material only. Rollback, if ever needed, is via
# `git revert` of the deletion commit — not a workflow toggle.
name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'requirements-docs.txt'
      - 'tools/mkdocs_hooks.py'
      - 'tools/build-api-docs.sh'
      - 'tools/install/install.sh'
      - 'tools/install/install.ps1'
      - 'docs/doxygen/**'
      - 'core/**/include/**'
      # `tools/build-api-docs.sh` reads `project(Pulp VERSION …)` from
      # the root CMakeLists.txt to set Doxygen's `PROJECT_NUMBER`, so a
      # version-only bump should re-deploy `/api/` with the new number
      # (#591 Codex P2 / wave-4 sweep).
      - 'CMakeLists.txt'
      - '.github/workflows/docs-deploy.yml'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # git-revision-date plugin walks history

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install Doxygen
        run: sudo apt-get install -y doxygen

      - name: Install MkDocs Material
        run: pip install -r requirements-docs.txt

      - name: Build Material site
        run: mkdocs build --site-dir build/site

      - name: Build API reference
        run: |
          chmod +x tools/build-api-docs.sh
          tools/build-api-docs.sh

      - name: Merge site and API docs
        run: |
          if [ -d build/api-docs/html ]; then
            mkdir -p build/site/api
            cp -r build/api-docs/html/. build/site/api/
            echo "API docs merged into site at /api/"
          else
            echo "::error::No API docs produced — aborting deploy" >&2
            exit 1
          fi

      - name: Copy install scripts
        run: |
          cp tools/install/install.sh build/site/install.sh
          cp tools/install/install.ps1 build/site/install.ps1
          echo "Install scripts copied to site root"

      - name: Archive Pages artifact
        run: |
          tar \
            --dereference --hard-dereference \
            --directory build/site \
            --exclude=.git \
            --exclude=.github \
            --exclude='.[^/]*' \
            -cvf "$RUNNER_TEMP/github-pages.tar" \
            .

      - name: Upload Pages artifact
        uses: actions/upload-artifact@v7
        with:
          name: github-pages
          path: ${{ runner.temp }}/github-pages.tar
          retention-days: 1
          if-no-files-found: error

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
