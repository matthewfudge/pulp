name: Coverage

# Non-blocking coverage artifact. Informational only; no merge gate.
# Local equivalent: scripts/run_coverage.sh.
# Full design: planning/coverage-sanitizers-spec-2026-04-16.md
#              planning/coverage-tooling-decision-2026-04-21.md (Phase 0 spike)
#
# #566 Phase 1 PR 4: cross-platform coverage matrix. The `coverage`
# job runs on {ubuntu-latest, macos-latest, windows-latest}, each OS
# produces its own Cobertura XML and uploads to Codecov tagged with
# an OS-axis flag (`os-linux`, `os-macos`, `os-windows`) so Codecov
# can union same-file coverage across OSes via the flag mechanism.
# We do NOT try to merge profdata across architectures —
# llvm-profdata merge is not architecture-portable; cross-OS unions
# happen at the Codecov flag layer. See
# planning/coverage-tooling-decision-2026-04-21.md §7.

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      linux_runner_selector_json:
        description: "Optional JSON runs-on override for Linux coverage"
        required: false
        default: ""
        type: string
      macos_runner_selector_json:
        description: "Optional JSON runs-on override for macOS coverage"
        required: false
        default: ""
        type: string
      windows_runner_selector_json:
        description: "Optional JSON runs-on override for Windows coverage"
        required: false
        default: ""
        type: string

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Resolve per-OS runs-on via shared helper ───────────────────────────
  # Uses tools/scripts/resolve_runs_on.py in `default` mode (same pattern
  # as sanitizers.yml). Each OS resolves to, in priority order:
  #   1. workflow_dispatch input (e.g. linux_runner_selector_json)
  #   2. repo variable override (e.g. PULP_COVERAGE_LINUX_RUNS_ON_JSON)
  #   3. hard-coded default label (ubuntu-latest / macos-latest / windows-latest)
  # No behavior change when the repo variables are unset — matches today's
  # single-job baseline on Linux and adds macOS/Windows on the standard
  # GitHub-hosted labels. Set PULP_COVERAGE_<OS>_RUNS_ON_JSON to route any
  # one leg to Namespace without a code change.
  resolve-runners:
    runs-on: ubuntu-latest
    outputs:
      linux_runs_on: ${{ steps.resolve.outputs.linux_runs_on }}
      macos_runs_on: ${{ steps.resolve.outputs.macos_runs_on }}
      windows_runs_on: ${{ steps.resolve.outputs.windows_runs_on }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false
          lfs: false
      - id: resolve
        env:
          EXPLICIT_LINUX_RUNNER_SELECTOR_JSON: ${{ inputs.linux_runner_selector_json || '' }}
          EXPLICIT_MACOS_RUNNER_SELECTOR_JSON: ${{ inputs.macos_runner_selector_json || '' }}
          EXPLICIT_WINDOWS_RUNNER_SELECTOR_JSON: ${{ inputs.windows_runner_selector_json || '' }}
          LINUX_RUNS_ON_JSON: ${{ vars.PULP_COVERAGE_LINUX_RUNS_ON_JSON }}
          MACOS_RUNS_ON_JSON: ${{ vars.PULP_COVERAGE_MACOS_RUNS_ON_JSON }}
          WINDOWS_RUNS_ON_JSON: ${{ vars.PULP_COVERAGE_WINDOWS_RUNS_ON_JSON }}
        run: |
          set -euo pipefail
          resolve() {
            python3 tools/scripts/resolve_runs_on.py \
              --target-name "$1" \
              --mode default \
              --explicit-env "$2" \
              --override-env "$3" \
              --default-label "$4"
          }
          linux=$(resolve \
            "Coverage (Linux)" \
            EXPLICIT_LINUX_RUNNER_SELECTOR_JSON \
            LINUX_RUNS_ON_JSON \
            ubuntu-latest)
          macos=$(resolve \
            "Coverage (macOS)" \
            EXPLICIT_MACOS_RUNNER_SELECTOR_JSON \
            MACOS_RUNS_ON_JSON \
            macos-latest)
          windows=$(resolve \
            "Coverage (Windows)" \
            EXPLICIT_WINDOWS_RUNNER_SELECTOR_JSON \
            WINDOWS_RUNS_ON_JSON \
            windows-latest)
          {
            echo "linux_runs_on=${linux}"
            echo "macos_runs_on=${macos}"
            echo "windows_runs_on=${windows}"
          } >>"${GITHUB_OUTPUT}"

  coverage:
    needs: resolve-runners
    name: Coverage report (${{ matrix.label }}, Clang)
    strategy:
      # Don't cancel other OSes when one fails — coverage is advisory
      # and we want every OS to attempt an upload independently so the
      # Codecov dashboard has the widest cross-OS picture possible even
      # when one leg flakes.
      fail-fast: false
      matrix:
        include:
          - os: linux
            label: Linux
            flag: os-linux
            runs_on_json: ${{ needs.resolve-runners.outputs.linux_runs_on }}
          - os: macos
            label: macOS
            flag: os-macos
            runs_on_json: ${{ needs.resolve-runners.outputs.macos_runs_on }}
          - os: windows
            label: Windows
            flag: os-windows
            runs_on_json: ${{ needs.resolve-runners.outputs.windows_runs_on }}
    runs-on: ${{ fromJSON(matrix.runs_on_json) }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false
          lfs: true

      - name: Install Linux dependencies + Clang tooling
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang llvm lld \
            libasound2-dev libdbus-1-dev libdrm-dev libegl1-mesa-dev \
            libgbm-dev libgl1-mesa-dev libx11-dev libxext-dev libxfixes-dev \
            libxi-dev libxinerama-dev libxkbcommon-dev libxrandr-dev \
            libxrender-dev libxss-dev libxtst-dev libwayland-dev wayland-protocols

      - name: Verify Clang tooling (macOS)
        # macOS runners ship Apple Clang with llvm-cov / llvm-profdata
        # already on PATH in Xcode's toolchain. Surface any missing
        # tool early with a clear message instead of mid-build. xcrun
        # --find resolves through the active Xcode even when PATH
        # doesn't include the bin directly.
        if: matrix.os == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          for tool in clang llvm-profdata llvm-cov; do
            if ! command -v "${tool}" >/dev/null 2>&1; then
              path=$(xcrun --find "${tool}" 2>/dev/null || true)
              if [ -n "${path}" ]; then
                bin_dir=$(dirname "${path}")
                echo "Found ${tool} via xcrun: ${path}"
                # $GITHUB_PATH applies to SUBSEQUENT steps only, so also
                # export into this step's $PATH for the version checks
                # below and anything else downstream in-step.
                echo "${bin_dir}" >> "$GITHUB_PATH"
                export PATH="${bin_dir}:${PATH}"
              else
                echo "ERROR: ${tool} not found on macOS runner" >&2
                exit 1
              fi
            fi
          done
          clang --version
          llvm-profdata --help | head -1 || true
          llvm-cov --version | head -1

      - name: Install Clang toolchain (Windows)
        # windows-latest ships LLVM/Clang at C:\Program Files\LLVM\bin
        # but not always on PATH in the default shell. Add it
        # unconditionally; scripts/run_coverage.sh needs
        # clang + llvm-profdata + llvm-cov reachable from bash.
        # PULP_ENABLE_COVERAGE requires Clang — MSVC is rejected by
        # tools/cmake/PulpInstrumentation.cmake because llvm-cov and
        # MSVC's /fsanitize-coverage emit incompatible profile shapes.
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $llvmBin = "C:\Program Files\LLVM\bin"
          if (-not (Test-Path $llvmBin)) {
            Write-Host "LLVM not preinstalled, installing via choco"
            choco install llvm --no-progress -y
          }
          Add-Content $env:GITHUB_PATH $llvmBin
          Write-Host "Added $llvmBin to PATH"

      - name: Install coverage reporting tools (gcovr)
        # gcovr bridges Clang source-based coverage → Cobertura XML,
        # which Codecov (PR 2) and diff-cover (PR 3) consume.
        # Pin >=8.2 for the --llvm-profdata-executable path used by
        # scripts/run_coverage.sh.
        #
        # --break-system-packages bypasses PEP 668's
        # "externally-managed-environment" block that macos-latest's
        # Homebrew Python applies by default. The runner is a throwaway
        # VM so the system-packages split is irrelevant here; this
        # matches how actions/setup-python's `--user` install would
        # behave in an isolated tooling venv, minus the extra venv step.
        # pip --user on macOS installs to $(python3 -m site --user-base)/bin
        # (e.g. /Users/runner/Library/Python/3.13/bin) which is NOT on PATH
        # by default on macos-latest runners. Add it after install so
        # scripts/run_coverage.sh can find `gcovr` later. Linux runners also
        # benefit (user-base bin is off PATH there too on some distros);
        # Windows gcovr lands in %APPDATA%\Python\Scripts which we handle
        # via the separate `shell: bash` that adds python's Scripts dir below.
        shell: bash
        run: |
          python3 -m pip install --user --break-system-packages 'gcovr>=8.2'
          user_base=$(python3 -m site --user-base)
          echo "${user_base}/bin" >> "$GITHUB_PATH"
          # Windows pip --user uses %APPDATA%\Python\PythonXY\Scripts which
          # `python3 -m site --user-base` doesn't expose — append the Scripts
          # dir directly from sysconfig on that runner only.
          if [ "${RUNNER_OS:-}" = "Windows" ]; then
            scripts=$(python3 -c 'import sysconfig; print(sysconfig.get_path("scripts", f"{sysconfig.get_default_scheme()}_user"))')
            echo "${scripts}" >> "$GITHUB_PATH"
          fi

      - name: run_coverage.sh fixture tests (#569 / #570)
        # Assert the canonical ignore-regex excludes _deps/catch2-build
        # spam (#569) AND that the stale-cache guard trips loudly
        # instead of silently producing empty profdata (#570). Runs
        # before the heavy build so a regex/guard regression fails
        # fast without burning the full coverage build. Linux-only —
        # the fixture is pure-Python and the behavior it checks is
        # script-level, not platform-specific, so one leg is enough.
        if: matrix.os == 'linux'
        run: python3 tools/scripts/test_run_coverage.py
        shell: bash

      - name: Bootstrap dependencies
        run: ./setup.sh --ci --deps-only
        shell: bash

      - name: Run coverage suite
        # Coverage never fails the run — thresholds come later per
        # the #290 hardening initiative. `continue-on-error` combined
        # with `strategy.fail-fast: false` above means a flake on any
        # one OS doesn't cancel the others, so the Codecov dashboard
        # still gets partial multi-OS coverage data.
        #
        # On Windows, pin CMAKE_GENERATOR=Ninja so cmake doesn't fall
        # back to the default "Visual Studio 17 2022" generator, which
        # ignores -DCMAKE_CXX_COMPILER=clang++ and picks MSVC cl.exe
        # instead. Pulp's coverage build requires Clang source-based
        # instrumentation (PulpInstrumentation.cmake rejects MSVC),
        # so the VS-generator path fails silently with no profraw
        # emitted. Ninja honours CMAKE_C/CXX_COMPILER cleanly.
        continue-on-error: true
        shell: bash
        env:
          CMAKE_GENERATOR: ${{ matrix.os == 'windows' && 'Ninja' || '' }}
        run: scripts/run_coverage.sh

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report-${{ matrix.os }}-${{ github.sha }}
          path: build-coverage/coverage/
          retention-days: 30

      - name: Upload summary
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-summary-${{ matrix.os }}-${{ github.sha }}
          path: build-coverage/coverage/summary.txt
          retention-days: 90

      - name: Verify Cobertura XML exists
        # Fail loudly if the coverage build didn't produce a cobertura file.
        # Without this check, a silent build failure (e.g. a missing transitive
        # include that breaks under Clang strict mode) produces zero profraw
        # → no cobertura → Codecov upload "succeeds" with no files → dashboard
        # stays empty. We had exactly this class of silent failure until
        # state_tree.hpp missing <algorithm> was caught on 2026-04-21.
        #
        # Pin shell: bash so the POSIX `test` + `wc -c <` syntax works on
        # the windows runner too (default shell there is pwsh, which treats
        # `<` as a reserved redirection operator and errors out).
        shell: bash
        run: |
          xml=build-coverage/coverage.cobertura.xml
          test -s "$xml" || {
            echo "::error::coverage.cobertura.xml is missing or empty."
            echo "::error::Coverage build likely failed — check the 'Run coverage suite' step above."
            exit 1
          }
          size=$(wc -c < "$xml")
          echo "coverage.cobertura.xml size: ${size} bytes"
          # Pulp #605 — file-non-empty is necessary but not sufficient.
          # gcovr writes a well-formed but structurally EMPTY XML when its
          # filter expressions exclude every file it can see. Codecov v5
          # rejects such reports as "Unusable report" and the dashboard
          # stays empty despite green CI and a successful upload. Assert
          # the XML actually contains coverage data before we ship it.
          lines_valid=$(python3 -c "import xml.etree.ElementTree as E; print(E.parse('$xml').getroot().attrib.get('lines-valid', '0'))")
          if [ "${lines_valid}" = "0" ]; then
            echo "::error::coverage.cobertura.xml is structurally empty (lines-valid=0)."
            echo "::error::gcovr filtered out every source file — check scripts/run_coverage.sh's --filter / --exclude regexes against the actual profraw source paths."
            exit 1
          fi
          echo "coverage.cobertura.xml has lines-valid=${lines_valid}"

      - name: Upload Cobertura XML
        # Linux XML keeps the historical name `coverage-cobertura-${sha}`
        # so the downstream `coverage-diff-gate` job continues to
        # download the canonical per-SHA artifact unchanged. diff-cover
        # is a single-XML tool and pinning it to Linux keeps its
        # base-vs-head comparison architecturally stable. macOS and
        # Windows upload under OS-suffixed names so reviewers can pull
        # a specific leg's XML without ambiguity.
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.os == 'linux' && format('coverage-cobertura-{0}', github.sha) || format('coverage-cobertura-{0}-{1}', matrix.os, github.sha) }}
          path: build-coverage/coverage.cobertura.xml
          retention-days: 14
          if-no-files-found: error

      - name: Upload coverage to Codecov
        # #566 Phase 1 PR 4 adds a per-OS flag on each matrix leg
        # (`os-linux`, `os-macos`, `os-windows`) so Codecov can
        # cross-filter coverage by OS. Cross-OS unions of the same
        # file happen at the Codecov flag layer — NOT via
        # llvm-profdata merge, which is not architecture-portable
        # (see planning decision doc §7).
        #
        # Subsystem / platform / surface breakdown comes from the
        # `component_management` block in codecov.yml, which slices
        # each upload by path (#603 made this switch on main after
        # Codecov rejected the 20-flag-per-upload pattern with
        # "Multiple flags detected. Please ensure one flag per
        # upload."). A single per-OS flag per upload is the
        # supported shape.
        #
        # fail_ci_if_error: false — coverage is still advisory in
        # Phase 1. Phase 3 adds a diff-cover gate for per-PR
        # enforcement (see coverage-diff-gate below, pinned to Linux).
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: build-coverage/coverage.cobertura.xml
          flags: ${{ matrix.flag }}
          # Token makes upload more reliable (avoids tokenless rate limits);
          # action silently falls back to tokenless if the secret is unset
          # (e.g. in forked-PR context where secrets aren't exposed).
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true

  coverage-diff-gate:
    # #566 Phase 1 PR 3: per-PR diff coverage advisory gate.
    # #566 Phase 1 PR 4: still pinned to the Linux Cobertura XML.
    # diff-cover is a single-XML tool; "of the lines this PR adds,
    # how many are covered?" is answered cleanly by one comparison.
    # Cross-OS unions happen at the Codecov dashboard layer via the
    # os-* flags. Running diff-cover against three XMLs would produce
    # three PR comments for the same metric with slightly different
    # numbers — more noise than signal for an advisory gate.
    #
    # Runs only on pull_request events — the gate question "of the lines
    # this PR adds, how many are covered?" is meaningless on a direct
    # push to main where there is no diff to compute against.
    #
    # #566 Phase 3 (landed): the gate is REQUIRED — sub-threshold diff
    # coverage now hard-fails the PR. The job still posts a summary
    # comment so contributors see the number alongside the failing check.
    name: Diff coverage required (${{ needs.coverage.result == 'success' && '75%' || 'coverage job failed' }})
    runs-on: ubuntu-24.04
    needs: coverage
    if: always() && github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          # diff-cover compares HEAD against --compare-branch using real
          # git history, so we need enough depth to include the merge
          # base with origin/${{ github.base_ref }}. fetch-depth: 0
          # avoids guessing a shallow depth that works for most PRs but
          # breaks on long-lived branches.
          fetch-depth: 0
          submodules: false
          lfs: false

      - name: Ensure base branch is fetched
        # actions/checkout fetches the PR head and the merge-ref but not
        # the full base branch history. diff-cover needs origin/<base>
        # to resolve --compare-branch, so fetch it explicitly.
        run: git fetch --no-tags origin "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"
        shell: bash

      - name: Download Cobertura XML from coverage job (Linux)
        # Downloads the Linux artifact produced by the matrix `coverage`
        # job above. Linux keeps the historical name
        # `coverage-cobertura-${sha}` so this step needs no matrix
        # awareness. If the coverage job failed or was skipped the
        # artifact may be missing; the next step handles that case by
        # rendering a graceful fallback comment instead of hard-failing.
        uses: actions/download-artifact@v6
        with:
          name: coverage-cobertura-${{ github.sha }}
          path: coverage-artifact/
        continue-on-error: true

      - name: Install diff-cover
        # Pinned to >=9 for the --markdown-report flag; earlier
        # releases only supported --html-report.
        run: python3 -m pip install --user 'diff-cover>=9'
        shell: bash

      - name: coverage_diff_comment.py fixture tests
        # Guard the PR-comment renderer the same way the upstream
        # `coverage` job guards scripts/run_coverage.sh — run the
        # unit tests before we depend on the script in a live step
        # so a regression fails fast without waiting on diff-cover.
        run: python3 tools/scripts/test_coverage_diff_comment.py
        shell: bash

      - name: Run diff-cover (required)
        id: diff_cover
        # Phase 3: sub-threshold diff coverage hard-fails this job.
        # The job still posts a summary comment via the downstream
        # "Render PR comment body" step so contributors see the
        # number alongside the failed check.
        shell: bash
        run: |
          set +e
          xml="coverage-artifact/coverage.cobertura.xml"
          if [ ! -f "$xml" ]; then
            echo "No Cobertura XML from upstream job — writing empty diff report."
            : > coverage-diff.md
            echo "exit_code=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          python3 -m diff_cover.diff_cover_tool \
              "$xml" \
              --compare-branch="origin/${{ github.base_ref }}" \
              --fail-under=75 \
              --markdown-report=coverage-diff.md
          rc=$?
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"
          # Always print the report so the raw output is in the logs
          # even if the artifact upload step fails.
          if [ -f coverage-diff.md ]; then
            echo "----- coverage-diff.md -----"
            cat coverage-diff.md
            echo "----- end coverage-diff.md -----"
          fi
          # Phase 3 (landed): propagate the diff-cover exit code so
          # sub-threshold coverage fails the step AND the job, hard-blocking
          # the PR. continue-on-error was removed at the step level above.
          exit "$rc"

      - name: coverage_tier_check.py fixture tests (#566 Phase 2)
        # Guard the per-tier gate script the same way we guard
        # coverage_diff_comment.py — unit tests run before the live
        # invocation so a regression in classify_file / aggregate /
        # render fails fast without requiring a full coverage run.
        run: python3 tools/scripts/test_coverage_tier_check.py
        shell: bash

      - name: Install PyYAML (#566 Phase 2)
        # Only this step needs it; installing here keeps the earlier
        # steps unaffected if PyYAML isn't available elsewhere.
        run: python3 -m pip install --user 'pyyaml>=6'
        shell: bash

      - name: Run per-tier coverage gate (#566 Phase 2)
        # Runs alongside the existing diff-cover gate. diff-cover
        # enforces a single global 75% floor; this step layers the
        # per-tier floors from `ci/coverage-targets.yaml` on top
        # (audio-critical 80%, user-facing 70%, infrastructure 50%).
        # Files that don't match any tier fall back to the global
        # diff-cover floor — no double gate, no gap.
        #
        # continue-on-error: true during the Phase 2 bring-up. The
        # tier-check fails loudly in logs but doesn't block merges
        # until we've observed a couple of cycles and confirmed the
        # tier definitions classify files correctly. Phase 2 flip
        # to required is a one-line removal of this continue-on-error.
        continue-on-error: true
        shell: bash
        run: |
          xml="coverage-artifact/coverage.cobertura.xml"
          if [ ! -f "$xml" ]; then
            : > coverage-tier.md
            echo "tier-gate: no Cobertura XML from upstream — skipped." >&2
            exit 0
          fi
          python3 tools/scripts/coverage_tier_check.py \
              --cobertura "$xml" \
              --targets ci/coverage-targets.yaml \
              --compare-branch "origin/${{ github.base_ref }}" \
              --markdown-report coverage-tier.md

      - name: Render PR comment body
        run: |
          # Phase 3 landed: gate is required. --no-advisory flips the
          # banner to the required-gate form; the --flip-date argument
          # is no longer needed (no upcoming flip to announce).
          python3 tools/scripts/coverage_diff_comment.py \
              --report coverage-diff.md \
              --flip-date 2026-05-04 \
              --threshold 75 \
              --no-advisory \
              --out coverage-diff-comment.md
          # Append the per-tier section (#566 Phase 2) if the tier
          # check produced a report.
          if [ -s coverage-tier.md ]; then
            printf '\n\n' >> coverage-diff-comment.md
            cat coverage-tier.md >> coverage-diff-comment.md
          fi
          echo "----- coverage-diff-comment.md -----"
          cat coverage-diff-comment.md
          echo "----- end comment -----"
        shell: bash

      - name: Upload diff-cover report artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-diff-${{ github.sha }}
          path: |
            coverage-diff.md
            coverage-diff-comment.md
            coverage-tier.md
          retention-days: 14
          if-no-files-found: warn

      - name: Upsert PR comment with diff-coverage summary
        # Same upsert pattern as .github/workflows/ruleset-drift-check.yml:
        # find a bot comment carrying our stable marker and PATCH its
        # body in place, else POST a new one. Prevents comment spam on
        # PRs that push multiple times.
        #
        # Skip fork PRs where GITHUB_TOKEN is read-only — posting would
        # hard-fail with a 403 even though this whole job is advisory.
        if: github.event.pull_request.head.repo.full_name == github.repository
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          MARKER: '<!-- pulp-coverage-diff-gate -->'
        run: |
          set -euo pipefail
          repo='${{ github.repository }}'
          body="$(cat coverage-diff-comment.md)"

          existing=$(
              gh api -H "Accept: application/vnd.github+json" \
                  "/repos/${repo}/issues/${PR_NUMBER}/comments" \
                  --paginate \
                  --jq "[.[] | select(.body != null and (.body | contains(\"${MARKER}\")))] | first | .id // empty"
          )

          if [ -z "${existing:-}" ]; then
              echo "Creating diff-coverage comment on PR #${PR_NUMBER}."
              printf '%s' "$body" | gh pr comment "$PR_NUMBER" --repo "$repo" --body-file -
          else
              echo "Updating diff-coverage comment #${existing} on PR #${PR_NUMBER}."
              gh api \
                  --method PATCH \
                  -H "Accept: application/vnd.github+json" \
                  "/repos/${repo}/issues/comments/${existing}" \
                  -f body="$body" >/dev/null
          fi
