name: Docs Consistency

on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  docs-check:
    runs-on: ubuntu-latest
    name: Validate docs consistency

    steps:
      - uses: actions/checkout@v4

      - name: Check docs consistency
        run: |
          chmod +x tools/check-docs.sh
          tools/check-docs.sh
