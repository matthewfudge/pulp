name: pulp-react build + test

on:
  pull_request:
    paths:
      - 'packages/pulp-react/**'
      - '.github/workflows/pulp-react-build.yml'
  push:
    branches: [main]
    paths:
      - 'packages/pulp-react/**'
      - '.github/workflows/pulp-react-build.yml'

concurrency:
  group: pulp-react-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build and test @pulp/react

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: packages/pulp-react/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: packages/pulp-react

      - name: Build
        run: npm run build
        working-directory: packages/pulp-react

      - name: Test
        run: npm test
        working-directory: packages/pulp-react
