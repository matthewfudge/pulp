# Pulp support matrix
# Vocabulary: stable, usable, experimental, partial, planned, unsupported

platforms:
  macos:
    status: usable
    notes: Primary development platform. ARM64 and x86_64.
  windows:
    status: experimental
    notes: WASAPI audio, Win32 MIDI, NSIS installer, Authenticode signing. CI enabled.
  linux:
    status: experimental
    notes: ALSA audio, ALSA MIDI, .deb packaging. CI enabled.
  ios:
    status: planned
  web:
    status: planned

formats:
  vst3:
    macos: usable
    windows: partial
    linux: partial
  au_v2:
    macos: usable
    windows: unsupported
    linux: unsupported
  clap:
    macos: usable
    windows: partial
    linux: partial
  standalone:
    macos: usable
    windows: partial
    linux: partial
  auv3:
    macos: experimental
    ios: planned
  lv2:
    linux: experimental
  aax:
    macos: planned
    windows: planned

audio_io:
  coreaudio:
    status: usable
    platform: macos
  wasapi:
    status: experimental
    platform: windows
  alsa:
    status: experimental
    platform: linux

midi_io:
  coremidi:
    status: usable
    platform: macos
  win32_midi:
    status: experimental
    platform: windows
  alsa_midi:
    status: experimental
    platform: linux

rendering:
  dawn_metal:
    status: experimental
    platform: macos
  skia_graphite:
    status: experimental
    platform: macos
  dawn_d3d12:
    status: experimental
    platform: windows
  dawn_vulkan:
    status: experimental
    platform: linux

subsystems:
  runtime: stable
  events: usable
  audio: usable
  midi: usable
  signal: usable
  state: stable
  format: usable
  platform: usable
  canvas: experimental
  render: experimental
  view: experimental
  osc: experimental
