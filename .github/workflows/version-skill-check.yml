name: Versioning & Skill-Sync

# Authoritative gate (Layer 3) for the versioning-v2 design:
# runs version_bump_check.py and skill_sync_check.py on every PR and
# refuses to merge when either reports a required bump or missing
# SKILL.md update that isn't explicitly bypassed on the tip commit.
#
# Pre-push hook + Shipyard stage run the same scripts locally; this
# workflow is the no-bypass enforcement layer.

on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      runner_provider:
        description: "Runner provider (github-hosted or namespace)"
        required: false
        default: github-hosted
        type: choice
        options:
          - github-hosted
          - namespace

concurrency:
  group: version-skill-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version-skill-check:
    runs-on: ubuntu-latest
    name: Enforce version & skill sync

    env:
      PULP_ENFORCE_PREPUSH: "1"

    steps:
      - name: Checkout PR head with full history
        uses: actions/checkout@v5
        with:
          # version_bump_check and skill_sync_check both diff against
          # origin/main — we need the real base to be reachable.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve diff base
        id: base
        run: |
          # On pull_request events, the merge-base with origin/main is the
          # right diff source; on workflow_dispatch, fall back to origin/main.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "ref=origin/${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=origin/main" >> "$GITHUB_OUTPUT"
          fi

      - name: Skill-sync check
        run: |
          python3 tools/scripts/skill_sync_check.py \
              --base "${{ steps.base.outputs.ref }}" \
              --config tools/scripts/versioning.json \
              --mode=report

      - name: Docs-sync check (#566 Phase 4 / #567)
        # Advisory-only during bring-up — the initial docs_sync_map.json
        # covers 4 high-value docs (coverage, cli, versioning, iwyu) and
        # the map is expected to grow as new drift patterns surface.
        # continue-on-error: true keeps a missing-doc from blocking PRs
        # while we calibrate the map. Flip to hard-fail (drop this line)
        # once the map is stable and false-positive-free for a couple of
        # PR cycles.
        continue-on-error: true
        run: |
          python3 tools/scripts/docs_sync_check.py \
              --base "${{ steps.base.outputs.ref }}" \
              --config tools/scripts/docs_sync_map.json \
              --mode=report

      - name: Version-bump check
        # On pull_request events, ALSO require that fix:/feat: PR titles
        # carry either a `chore: bump versions` commit or a top-level
        # `Version-Bump: skip reason="..."` trailer. Structural fix for
        # the 2026-04-30 incident (PR #1008 → issue #1009): a
        # user-facing fix merged without a bump and consumers were
        # stranded on main because auto-release.yml had nothing to tag.
        #
        # The flag is additive — the per-surface verdict pipeline runs
        # exactly as before. Skipped on workflow_dispatch (no PR title
        # to inspect), so this only fires on real PR triggers.
        env:
          GITHUB_PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          extra=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
              extra="--require-bump-for-fix-feat"
          fi
          python3 tools/scripts/version_bump_check.py \
              --base "${{ steps.base.outputs.ref }}" \
              --config tools/scripts/versioning.json \
              --mode=report \
              $extra

      - name: Compat-sync check (issue #1029)
        # Authoritative gate (Layer 3) for the compat-matrix sync
        # pattern. Mirrors the skill-sync / docs-sync stages above.
        # PULP_ENFORCE_PREPUSH=1 is set at the job level → drift is
        # a hard fail with no bypass other than the
        # `Compat-Update: skip prefix=<...> reason="..."` trailer.
        run: |
          python3 tools/scripts/compat_sync_check.py \
              --base "${{ steps.base.outputs.ref }}" \
              --mode=report --enforce

      - name: Source-contract registry check
        # Lightweight import-provider contract gate. The registry linter is
        # intentionally no-build and treats optional planning-submodule paths
        # as informational, so it can run on ordinary PR checkouts without
        # initializing the private planning submodule.
        run: |
          python3 tools/import-validation/check-source-contracts.py --strict
          python3 tools/import-validation/test_source_contracts.py

      - name: Gate-script fixture tests
        run: |
          python3 tools/scripts/test_gates.py
          python3 tools/scripts/test_docs_sync_check.py
          python3 tools/scripts/test_compat_sync_check.py
