name: License Audit

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: license-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    name: Audit dependency and boundaries

    steps:
      - uses: actions/checkout@v5

      - name: Verify dependency inventory
        run: python3 tools/deps/audit.py --strict

      - name: Verify and vendor boundaries
        run: python3 tools/audit.py --
