# Pulp module status
# Vocabulary: stable, usable, experimental, partial, planned, unsupported

modules:
  - name: runtime
    summary: Core utilities — SIMD (Highway), XML/JSON, ZIP, HTTP client, sockets, IPC pipes, crypto (SHA-256/AES/RSA via mbedTLS), i18n, analytics, licensing
    status: stable
    dependencies: [platform]
    docs: reference/modules.md#runtime

  - name: events
    summary: Event loop, timers, async dispatch, crash-isolated IPC, child process pool, network service discovery
    status: usable
    dependencies: [runtime]
    docs: reference/modules.md#events

  - name: audio
    summary: Multi-platform device I/O (CoreAudio, WASAPI, ALSA, JACK, Web Audio), read WAV/FLAC/MP3/OGG/AIFF/AAC, write WAV/AIFF, streaming writer, surround (5.1/7.1/Atmos), offline processing, system volume
    status: usable
    dependencies: [runtime]
    docs: reference/modules.md#audio

  - name: midi
    summary: MIDI I/O (CoreMIDI, WinMIDI, ALSA, Web MIDI), MIDI files, UMP/MIDI 2.0, MIDI-CI (device discovery, profiles, property exchange)
    status: usable
    dependencies: [runtime]
    docs: reference/modules.md#midi

  - name: signal
    summary: 30+ DSP processors — filters (IIR, FIR, SVF, ladder, Linkwitz-Riley), oscillators, convolution, compressor, limiter, reverb, chorus, delay, oversampling, FFT (vDSP), SIMD ops, dry/wet mixer
    status: usable
    dependencies: []
    docs: reference/modules.md#signal

  - name: state
    summary: Thread-safe parameters, reactive StateTree with JSON sync, PresetManager, PropertiesFile (JSON settings), EditHistory (global undo/redo with coalescing, Binding integration)
    status: stable
    dependencies: [runtime]
    docs: reference/modules.md#state

  - name: format
    summary: Plugin format adapters (VST3, AU, CLAP, standalone, headless), validation harness, diagnostic reporter
    status: usable
    dependencies: [state, audio, midi]
    docs: reference/modules.md#format

  - name: platform
    summary: Platform detection, native file dialogs, clipboard, popup menus, Windows registry, child process execution
    status: usable
    dependencies: []
    docs: reference/modules.md#platform

  - name: canvas
    summary: >
      2D GPU-accelerated drawing (CoreGraphics + Skia Graphite backends). HDR float color
      (HSV/HSL/OKLCH conversions). 14 SDF shape primitives with SkSL shaders (rect, circle,
      rounded_rect, arc, diamond, squircle, triangle, ring, stadium, cross, segments, bezier).
      Compositing layers (save_layer with opacity + blur on Skia and CoreGraphics).
      ConicGradient, FillStyle, gradient tile modes. Path builder, clipping, 16 blend modes,
      SVG, TextShaper, AttributedString with word-wrap, RectangleList, ImageConvolutionKernel.
      ViewEffect system: GpuBlurEffect, GpuBloomEffect, ChromaticAberration, Vignette,
      CustomShaderEffect (arbitrary SkSL), EffectChain.
    status: usable
    dependencies: [runtime]
    docs: reference/rendering.md#canvas

  - name: render
    summary: >
      GPU surface management (Dawn, Skia Graphite) — Metal, D3D12, Vulkan backends.
      DirtyTracker for partial repaint optimization with rect coalescing.
      Draw-call coalescing handled by Skia/Graphite Recorder; no Pulp-level batcher.
      RenderPassManager for multi-pass frame ordering and budget tracking.
      Atlas systems: ImageAtlas, GradientAtlas, GlyphAtlas, PathAtlas, BufferPool.
      GPU graph renderers: GpuGraphRenderer (1D), GpuHeatMapRenderer (2D), GpuBarRenderer.
      WebGPU compute pipeline for PMREM, PBR materials, and batch processing.
      DRACO mesh decoder (native C++, optional). KTX2 texture decoder with platform
      format detection (ASTC/BC7/ETC2). Binary transfer optimization.
    status: usable
    dependencies: [runtime, canvas]
    docs: reference/rendering.md#render

  - name: view
    summary: >
      Full widget toolkit with CSS parity: flexbox, grid layout, transforms, animations,
      backgrounds/gradients, filters, colors (CSS L4), text styling, positioned layout, z-index.
      SpriteStrip animation for designer-created knob/fader filmstrips.
      ThemeEditor widget for live theme editing with swatch grid and JSON export.
      TextDirection (LTR/RTL/vertical) and TextVerticalAlign on Label.
      Viewport-relative dimensions (vw/vh/vmin/vmax/%) via DimensionUnit with Yoga integration.
      View→WindowHost back-reference for widget access to platform features.
      Mouse relative mode for infinite knob drag (macOS CGAssociate + SDL3).
      Client-side window decoration, fixed aspect ratio, always-on-top, multi-monitor DPI.
      Canvas 2D (25 commands), ImageView, ListBox (virtualized), ComboBox, ScrollView, TextEditor
      with IME, TreeView, ProgressBar, Tooltip. Web-compat JS prelude. FrameClock animation with
      motion tokens. Hot-reload, inspector, app framework, design export. Multi-window framework.
      Pointer events, gestures, Apple Pencil. JS engine abstraction (QuickJS/JSC/V8).
      Per-source design-import parsers under core/view/src/design_import_*.cpp feed the
      pulp import-design pipeline; design_import_designmd.cpp adds the Google DESIGN.md
      (Apache-2.0) reader, parsed via vendored yaml-cpp (MIT) — see
      reference/imports/designmd.md.
      Motion observability subsystem (`pulp::view::motion`) — agent-first runtime
      sampler bound to FrameClock with epsilon-bounded Start/End burst framing,
      paint_all()-order presentation geometry walker, publish channel + firehose,
      versioned JSONL record/replay fixtures, and assertion helpers (is_monotonic,
      settling_time_seconds, overshoot, start_delay_seconds, frame_jitter_seconds).
      `MotionPreferences` (sibling of `AppearanceTracker`) reads the OS
      reduced-motion preference and exposes `MotionPolicy` (Full/Reduced/Off) +
      clamped `duration_scale`; Tween, ValueAnimation, TransitionSpec, and
      AnimatorSet honor it on start, and fixture headers record the policy used
      during recording so goldens can't silently compare across policies.
      Off by default; see guides/motion-observability.md.
    status: usable
    dependencies: [canvas, events, state]
    docs: reference/modules.md#view

  - name: dsl
    summary: DSL integration contract and FAUST offline codegen wrapper
    status: experimental
    dependencies: [format]
    docs: reference/modules.md#dsl

  - name: osc
    summary: Open Sound Control messaging
    status: experimental
    dependencies: [runtime]
    docs: reference/modules.md#osc
