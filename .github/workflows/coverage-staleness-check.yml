name: Coverage staleness check

# Loud alarm for the failure that hid silently for ~2 weeks (2026-05-25 →
# 2026-06-10): coverage.yml stopped completing on `main` (every push-triggered
# run was superseded while queued), so the C++ os-linux/os-macos/os-windows
# flags stopped uploading to Codecov and the dashboard quietly collapsed to the
# fast pulp-react Vitest lane. Nothing screamed; we only noticed by eyeballing
# the Codecov code tree.
#
# Outcome-based invariant (cause-agnostic, like release-cadence-check.yml):
#   "coverage.yml must COMPLETE SUCCESSFULLY on `main` at least once every
#    STALE_HOURS hours."
# coverage.yml itself runs a supersession-immune scheduled refresh every 8h
# (cron in coverage.yml), so a healthy repo produces a fresh success well
# inside the default 30h window. If it doesn't — superseded, broken matrix,
# runner outage, Codecov token drift, anything — this opens/updates a tracking
# issue. It does NOT inspect Codecov directly (no API token needed); a green
# main coverage run is the proxy for "the dashboard got fresh C++ data."
#
# PROXY LIMITATION (deliberate): coverage.yml's per-OS Codecov upload steps run
# `if: always()` with `fail_ci_if_error: false`, and the matrix is
# `fail-fast: false`, so a run can conclude SUCCESS while one OS leg's upload
# silently failed. This watchdog therefore catches the failure mode that
# actually bit us — runs never COMPLETING on main (superseded/cancelled, the
# 2026-05/06 incident) — but NOT a completed-but-upload-dropped run. Detecting
# the latter would require querying Codecov's API for per-flag freshness (a
# token + scope we intentionally avoid here); a dropped upload also self-heals
# on the next 8h scheduled refresh. If false-green ever becomes a real problem,
# the right fix is a separate Codecov-API freshness probe, not flipping
# fail_ci_if_error (which would make coverage red on transient Codecov outages).
#
# Closes automatically on the next sweep once a fresh success exists.

on:
  schedule:
    - cron: '23 */6 * * *'  # every 6h, offset; checks more often than the 8h refresh
  workflow_dispatch:
    inputs:
      stale_hours:
        description: 'Flag if no successful main coverage run within this many hours'
        required: false
        default: '30'
      dry_run:
        description: 'Log findings but do not touch the tracking issue'
        required: false
        default: 'false'

permissions:
  contents: read
  actions: read
  issues: write

concurrency:
  group: coverage-staleness-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    name: Check coverage freshness on main
    env:
      STALE_HOURS: ${{ github.event.inputs.stale_hours || '30' }}
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
      TRACKING_TITLE: 'Coverage stale: no successful main coverage run'
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
    steps:
      - name: Find last successful main coverage run
        id: scan
        shell: bash
        run: |
          set -euo pipefail
          stale_hours="${STALE_HOURS}"

          # Most recent SUCCESSFUL coverage.yml run on the main branch.
          last_json=$(gh run list \
            --repo "$REPO" \
            --workflow=coverage.yml \
            --branch main \
            --status success \
            --limit 1 \
            --json databaseId,createdAt,url \
            --jq '.[0] // {}')

          last_created=$(echo "$last_json" | python3 -c "import json,sys; print(json.load(sys.stdin).get('createdAt','') or '')")
          last_url=$(echo "$last_json" | python3 -c "import json,sys; print(json.load(sys.stdin).get('url','') or '')")

          stale=0
          age_hours='n/a'
          if [ -z "$last_created" ]; then
            echo "No successful main coverage run found at all."
            stale=1
          else
            age_hours=$(python3 - "$last_created" "$stale_hours" <<'PY'
          import sys, datetime
          created = datetime.datetime.fromisoformat(sys.argv[1].replace('Z', '+00:00'))
          now = datetime.datetime.now(datetime.timezone.utc)
          age = (now - created).total_seconds() / 3600.0
          print(f"{age:.1f}")
          PY
            )
            over=$(python3 -c "print(1 if float('$age_hours') > float('$stale_hours') else 0)")
            if [ "$over" = "1" ]; then stale=1; fi
            echo "Last successful main coverage run: ${last_created} (${age_hours}h ago) — ${last_url}"
          fi

          {
            echo "stale=${stale}"
            echo "age_hours=${age_hours}"
            echo "last_created=${last_created}"
            echo "last_url=${last_url}"
          } >> "$GITHUB_OUTPUT"
          echo "Stale: ${stale} (threshold ${stale_hours}h)"

      - name: Render issue body
        if: env.DRY_RUN != 'true' && steps.scan.outputs.stale == '1'
        shell: bash
        env:
          AGE_HOURS: ${{ steps.scan.outputs.age_hours }}
          LAST_CREATED: ${{ steps.scan.outputs.last_created }}
          LAST_URL: ${{ steps.scan.outputs.last_url }}
        run: |
          set -euo pipefail
          now=$(date -u +'%Y-%m-%d %H:%M UTC')
          {
            echo "_Auto-generated by \`.github/workflows/coverage-staleness-check.yml\` on ${now}._"
            echo ""
            echo "**Invariant violated:** \`coverage.yml\` has not completed successfully on"
            echo "\`main\` within the last **${STALE_HOURS}h**. While this is broken, the C++"
            echo "\`os-linux\` / \`os-macos\` / \`os-windows\` Codecov flags receive no fresh"
            echo "uploads and the dashboard silently degrades to whatever still lands (the"
            echo "fast \`@pulp/react\` Vitest lane) — the exact failure that hid for ~2 weeks"
            echo "in 2026-05/06."
            echo ""
            if [ -n "${LAST_CREATED}" ]; then
              echo "- **Last successful main coverage run:** ${LAST_CREATED} (~${AGE_HOURS}h ago)"
              echo "  ${LAST_URL}"
            else
              echo "- **No successful main coverage run found at all.**"
            fi
            echo ""
            echo "Likely root causes:"
            echo "- Push-triggered runs superseded while queued (high main churn + runner"
            echo "  backlog) AND the scheduled \`17 */8 * * *\` refresh in coverage.yml also"
            echo "  failing/superseded — check its concurrency group \`coverage-scheduled-refresh\`."
            echo "- The native coverage matrix (build/instrument/llvm-cov) is failing on one OS leg."
            echo "- Codecv upload token / \`after_n_builds\` mismatch."
            echo ""
            echo "**Resolution:** open the most recent \`coverage.yml\` run on \`main\`, find the"
            echo "failing/cancelled leg, fix it, then trigger a manual refresh:"
            echo '```bash'
            echo "gh workflow run coverage.yml --repo ${REPO} --ref main"
            echo '```'
            echo "This tracker closes automatically on the next sweep once a fresh successful"
            echo "main coverage run exists."
          } > body.md

      - name: Maintain tracking issue
        if: env.DRY_RUN != 'true'
        shell: bash
        env:
          STALE: ${{ steps.scan.outputs.stale }}
        run: |
          set -euo pipefail
          title="${TRACKING_TITLE}"
          existing_json=$(
            gh issue list --repo "$REPO" --state all \
              --search "in:title \"${title}\"" \
              --json number,title,state \
              --jq "[.[] | select(.title == \"${title}\")] | first // {}"
          )
          existing=$(echo "$existing_json" | python3 -c "import json,sys; print(json.load(sys.stdin).get('number','') or '')")
          existing_state=$(echo "$existing_json" | python3 -c "import json,sys; print(json.load(sys.stdin).get('state','') or '')")

          if [ "$STALE" = "0" ]; then
            if [ -n "${existing:-}" ] && [ "$existing_state" = "OPEN" ]; then
              echo "Coverage freshness restored — closing #${existing}."
              gh issue comment "$existing" --repo "$REPO" \
                --body "Sweep on $(date -u +%Y-%m-%d\ %H:%M) found a fresh successful main coverage run. Closing."
              gh issue close "$existing" --repo "$REPO" --reason completed
            else
              echo "Fresh coverage and no open tracker — nothing to do."
            fi
            exit 0
          fi

          if [ -z "${existing:-}" ]; then
            echo "Creating tracking issue."
            gh issue create --repo "$REPO" --title "$title" --body-file body.md --label ci 2>&1 || \
              gh issue create --repo "$REPO" --title "$title" --body-file body.md
          else
            echo "Updating tracking issue #${existing}."
            gh issue edit "$existing" --repo "$REPO" --body-file body.md
            gh issue reopen "$existing" --repo "$REPO" 2>/dev/null || true
          fi
