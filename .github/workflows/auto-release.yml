name: Auto-Release on Version Bump

# Component J of the versioning-v2 design. On every push to main, diff the
# version-bearing files against the previous push range. If a version
# moved, create the corresponding tag; the existing tag-triggered
# workflows (release-cli.yml, sign-and-release.yml) then build + publish.
#
# This workflow does NOT build binaries or create GitHub Releases
# directly — it is purely the "tag when a version moves" step that
# bridges `pulp pr`-driven merges to the binary pipeline we already have.
#
# Safety properties:
#   - concurrency group prevents overlapping tag pushes.
#   - Idempotent-strict: tagging fails loudly if the tag already points
#     elsewhere. Never silently overwrites.
#   - Release-block via commit trailer: `Release: skip reason="..."` on
#     the merging commit suppresses the tag creation.
#   - Revert detection: `Revert "..."` subject or `Revert-Of:` trailer
#     suppresses tagging for that range.
#   - Does NOT auto-delete tags on downstream failure. Manual recovery is
#     documented in docs/guides/versioning.md.

on:
  push:
    branches: [main]

concurrency:
  group: auto-release
  cancel-in-progress: false

permissions:
  contents: write   # tag push

jobs:
  tag:
    runs-on: ubuntu-latest
    name: Tag moved versions

    steps:
      - name: Checkout with range context
        uses: actions/checkout@v5
        with:
          # Need enough history to diff against the latest tag.
          fetch-depth: 0
          # Explicitly fetch tags — needed for the latest-tag diff logic
          # below. actions/checkout@v5's default fetches tags along with
          # fetch-depth=0, but spell it out for clarity.
          fetch-tags: true
          token: ${{ secrets.RELEASE_BOT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Skip on trailer or revert
        id: guard
        shell: bash
        run: |
          # Inspect the tip commit for Release: skip or Revert subject.
          subject=$(git log -1 --format=%s HEAD)
          body=$(git log -1 --format=%B HEAD)

          if echo "$body" | git interpret-trailers --parse | grep -iq '^release: skip'; then
              echo "Release: skip trailer present — no tagging."
              echo "skip=1" >> "$GITHUB_OUTPUT"
              exit 0
          fi
          if [[ "$subject" =~ ^[Rr]evert ]]; then
              echo "Revert commit — no tagging."
              echo "skip=1" >> "$GITHUB_OUTPUT"
              exit 0
          fi
          if echo "$body" | git interpret-trailers --parse | grep -iq '^revert-of:'; then
              echo "Revert-Of trailer — no tagging."
              echo "skip=1" >> "$GITHUB_OUTPUT"
              exit 0
          fi
          echo "skip=0" >> "$GITHUB_OUTPUT"

      - name: Read version files at before/after
        id: versions
        if: steps.guard.outputs.skip == '0'
        shell: bash
        run: |
          set -euo pipefail

          # Baseline selection — three-way blend:
          #
          # 1. `event.before` — this push's immediate ancestor. What the
          #    original auto-release.yml used. Breaks when multiple PRs
          #    squash-merge in quick succession and a queued run is
          #    cancelled (see 2026-04-19 cascade: v0.23.0 lost).
          #
          # 2. Latest existing tag. #498 switched to this; fixed the
          #    self-heal case but broke TWO other cases (Codex review):
          #
          #    a. `Release: skip` trailer — if a bump merges WITH the
          #       trailer, latest-tag stays at the older version. Next
          #       unrelated push sees latest-tag < HEAD-version and tags
          #       the skipped version anyway. The trailer's one-run
          #       effect silently expires.
          #
          #    b. Revert / downgrade — after reverting 0.23→0.22, the
          #       latest tag is still v0.23. Workflow tries to create
          #       v0.22 at HEAD, which already exists at an older commit,
          #       so `create_tag` fails loudly on every subsequent push
          #       until manual tag cleanup.
          #
          # Fix: baseline = MAX(event.before-version, HEAD-version). In
          # other words: only tag when HEAD-version > previous-commit-
          # version AND > latest-tag-version. Same-commit state doesn't
          # change (no-op). Revert below latest-tag → no-op (no false
          # retag). Self-heal past cancelled intermediate: if
          # event.before-version == HEAD-version (both 0.23) but latest
          # tag is v0.22, the previous-commit side says no-op AND the
          # tag-gap detector below sees tag<HEAD and creates v0.23.
          #
          # Split into two signals:
          #   - `*_prev` = version at event.before
          #   - `*_tag`  = version of latest tag
          #   - Create tag iff HEAD > prev AND HEAD > tag (strict greater)
          #
          # This preserves all three invariants:
          #   - self-heal: cancelled run gap filled on next push
          #   - skip-trailer: one push with skip stays skipped forever
          #   - revert: downgrade doesn't re-tag the old version

          extract_cmake_version() {
              local ref="$1"
              git show "${ref}:CMakeLists.txt" 2>/dev/null \
                | python3 -c 'import sys, re; m = re.search(r"project\s*\(\s*[A-Za-z_][\w]*\s+VERSION\s+(\d+\.\d+\.\d+)", sys.stdin.read(), re.M); print(m.group(1) if m else "")'
          }
          extract_json_version() {
              local ref="$1" path="$2"
              git show "${ref}:${path}" 2>/dev/null \
                | python3 -c 'import sys, json; d = json.loads(sys.stdin.read() or "{}"); print(d.get("version", ""))'
          }

          # Python helper: strict-greater semver compare. Returns "gt",
          # "eq", or "lt". Empty strings behave like "missing" — treat
          # as "lt" so HEAD always wins over nothing.
          #
          # #501 shipped this with the Python body at column 1, which
          # broke the YAML `run: |` block scalar (any line less-indented
          # than the block ends the scalar). GitHub rejected the workflow
          # file with "workflow file issue" on every push since — every
          # auto-release run silently failed, so v0.23.1 never tagged.
          # Fix: use a heredoc that python3 reads from stdin so script
          # indentation is divorced from YAML indentation.
          semver_cmp() {
              python3 - "$1" "$2" <<'PYEOF'
          import sys
          a, b = sys.argv[1], sys.argv[2]
          def parse(v):
              if not v: return None
              return tuple(int(x) for x in v.split("."))
          pa, pb = parse(a), parse(b)
          if pa is None and pb is None: print("eq")
          elif pa is None: print("lt")
          elif pb is None: print("gt")
          elif pa > pb: print("gt")
          elif pa < pb: print("lt")
          else: print("eq")
          PYEOF
          }

          # event.before — the push's immediate ancestor.
          prev='${{ github.event.before }}'
          if [ -z "$prev" ] || [ "$prev" = "0000000000000000000000000000000000000000" ]; then
              prev="HEAD~1"
          fi

          # Latest existing tag per surface.
          latest_sdk_tag=$(git tag --list 'v[0-9]*' --sort=-version:refname | head -1)
          latest_plugin_tag=$(git tag --list 'plugin-v[0-9]*' --sort=-version:refname | head -1)

          sdk_prev=$(extract_cmake_version "$prev" || true)
          sdk_tag=$(extract_cmake_version "${latest_sdk_tag:-HEAD~1}" || true)
          sdk_after=$(extract_cmake_version HEAD || true)
          plugin_prev=$(extract_json_version "$prev" .claude-plugin/plugin.json || true)
          plugin_tag=$(extract_json_version "${latest_plugin_tag:-HEAD~1}" .claude-plugin/plugin.json || true)
          plugin_after=$(extract_json_version HEAD .claude-plugin/plugin.json || true)

          # Decision: create tag iff HEAD > prev AND HEAD > latest-tag.
          sdk_should_tag=0
          if [ -n "$sdk_after" ]; then
              gt_prev=$(semver_cmp "$sdk_after" "$sdk_prev")
              gt_tag=$(semver_cmp "$sdk_after" "$sdk_tag")
              if [ "$gt_prev" = "gt" ] && [ "$gt_tag" = "gt" ]; then
                  sdk_should_tag=1
              fi
          fi

          plugin_should_tag=0
          if [ -n "$plugin_after" ]; then
              gt_prev=$(semver_cmp "$plugin_after" "$plugin_prev")
              gt_tag=$(semver_cmp "$plugin_after" "$plugin_tag")
              if [ "$gt_prev" = "gt" ] && [ "$gt_tag" = "gt" ]; then
                  plugin_should_tag=1
              fi
          fi

          # Expose the decision + context to the tagging step.
          echo "sdk_should_tag=$sdk_should_tag"       >> "$GITHUB_OUTPUT"
          echo "plugin_should_tag=$plugin_should_tag" >> "$GITHUB_OUTPUT"
          echo "sdk_before=$sdk_prev"                 >> "$GITHUB_OUTPUT"
          echo "sdk_after=$sdk_after"                 >> "$GITHUB_OUTPUT"
          echo "plugin_before=$plugin_prev"           >> "$GITHUB_OUTPUT"
          echo "plugin_after=$plugin_after"           >> "$GITHUB_OUTPUT"

          echo "sdk:    prev=$sdk_prev tag=$sdk_tag head=$sdk_after should_tag=$sdk_should_tag"
          echo "plugin: prev=$plugin_prev tag=$plugin_tag head=$plugin_after should_tag=$plugin_should_tag"
          echo "plugin_before=$plugin_before" >> "$GITHUB_OUTPUT"
          echo "plugin_after=$plugin_after"   >> "$GITHUB_OUTPUT"

          echo "sdk:    $sdk_before (from ${sdk_before_ref}) -> $sdk_after (HEAD)"
          echo "plugin: $plugin_before (from ${plugin_before_ref}) -> $plugin_after (HEAD)"

      - name: Create tags for moved surfaces
        if: steps.guard.outputs.skip == '0'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN || secrets.GITHUB_TOKEN }}
          SDK_BEFORE: ${{ steps.versions.outputs.sdk_before }}
          SDK_AFTER: ${{ steps.versions.outputs.sdk_after }}
          SDK_SHOULD_TAG: ${{ steps.versions.outputs.sdk_should_tag }}
          PLUGIN_BEFORE: ${{ steps.versions.outputs.plugin_before }}
          PLUGIN_AFTER: ${{ steps.versions.outputs.plugin_after }}
          PLUGIN_SHOULD_TAG: ${{ steps.versions.outputs.plugin_should_tag }}
        run: |
          set -euo pipefail

          git config user.name  "pulp-release-bot"
          git config user.email "pulp-release-bot@users.noreply.github.com"

          create_tag() {
              local tag="$1"

              # Idempotent-strict: if the tag already exists and points at
              # this commit, skip. If it exists and points elsewhere, fail
              # loudly — a human must reconcile before the release binaries
              # can move.
              #
              # `git ls-remote --tags origin <tag>` returns the TAG OBJECT SHA
              # for annotated tags (the default created by this workflow via
              # `git tag -a`), not the commit SHA. Compare dereferenced
              # target commits instead — the `^{}` suffix peels the tag
              # object to its referenced commit.
              if git ls-remote --tags origin "$tag" | grep -q .; then
                  remote_target=$(git ls-remote --tags origin "${tag}^{}" | awk '{print $1}')
                  # Fallback: lightweight tag (no ^{} entry) — use the ls-remote
                  # sha directly, which IS the commit SHA in that case.
                  if [ -z "$remote_target" ]; then
                      remote_target=$(git ls-remote --tags origin "$tag" | awk '{print $1}')
                  fi
                  local_sha=$(git rev-parse HEAD)
                  if [ "$remote_target" = "$local_sha" ]; then
                      echo "tag $tag already at $local_sha — no-op"
                      return 0
                  fi
                  echo "ERROR: tag $tag exists at $remote_target but HEAD is $local_sha" >&2
                  echo "Manual reconciliation required. See docs/guides/versioning.md." >&2
                  exit 1
              fi

              git tag -a "$tag" -m "Release $tag (automated by auto-release.yml)"
              git push origin "$tag"
              echo "created $tag"
          }

          # Tag iff the should_tag decision in the versions step said so
          # (HEAD > prev AND HEAD > latest-tag — captures self-heal gap
          # fills while rejecting reverts and skipped-then-revisited
          # bumps).
          if [ "$SDK_SHOULD_TAG" = "1" ] && [ -n "$SDK_AFTER" ]; then
              create_tag "v${SDK_AFTER}"
          fi

          if [ "$PLUGIN_SHOULD_TAG" = "1" ] && [ -n "$PLUGIN_AFTER" ]; then
              create_tag "plugin-v${PLUGIN_AFTER}"
          fi

      # CHANGELOG regeneration moved to .github/workflows/post-tag-sync.yml
      # (installed by `shipyard release-bot hook install`). Firing on the
      # tag push instead of inline in auto-release decouples the docs
      # sync from the binary build — if builds fail, CHANGELOG still
      # regens; if regen fails, builds aren't blocked. See shipyard
      # issue #53 + PR #73 for the full design.
