name: Build and Test

on:
  # Uncomment to re-enable cloud CI on pull requests:
  # pull_request:
  #   branches: [main, develop]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            name: macOS (ARM64)
          - os: windows-latest
            name: Windows (x64)
          - os: ubuntu-latest
            name: Linux (x64)

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libdbus-1-dev \
            libdrm-dev \
            libegl1-mesa-dev \
            libgbm-dev \
            libgl1-mesa-dev \
            libx11-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            libxrender-dev \
            libxss-dev \
            libxtst-dev \
            libwayland-dev \
            wayland-protocols

      - name: Bootstrap repository dependencies
        run: ./setup.sh --ci --deps-only
        shell: bash

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        working-directory: build
        run: ctest --output-on-failure -C Release -j4
        shell: bash

      - name: Upload plugin bundles (macOS)
        if: success() && runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: plugins-${{ matrix.os }}
          path: |
            build/VST3/*.vst3
            build/CLAP/*.clap
            build/AU/*.component
          retention-days: 7

      - name: Upload plugin bundles (Windows)
        if: success() && runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: plugins-${{ matrix.os }}
          path: |
            build/VST3/**/*.vst3
            build/CLAP/**/*.clap
          retention-days: 7

      - name: Upload plugin bundles (Linux)
        if: success() && runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: plugins-${{ matrix.os }}
          path: |
            build/VST3/**/*.so
            build/CLAP/**/*.so
          retention-days: 7
