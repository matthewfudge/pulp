name: Package Freshness Check

on:
  schedule:
    # Weekly on Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      tier:
        description: 'Check tier (1 = metadata only, 2 = full build)'
        required: false
        default: '1'
        type: choice
        options:
          - '1'
          - '2'
      package:
        description: 'Single package slug (blank = all)'
        required: false
        default: ''
        type: string

permissions:
  contents: read
  issues: write

jobs:
  freshness:
    name: Check package freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Tier 1 freshness check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARGS="--format markdown"
          if [ -n "${{ inputs.package }}" ]; then
            ARGS="$ARGS --package ${{ inputs.package }}"
          fi
          python3 tools/packages/freshness_check.py $ARGS > freshness-report.md 2>&1 || true
          cat freshness-report.md

      - name: Create issue if stale packages found
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Package freshness: $(date +%Y-%m-%d) — updates available" \
            --body "$(cat freshness-report.md)" \
            --label "dependencies"

  # Tier 2: Full build validation (monthly or on-demand)
  build-validation:
    name: Build validation (${{ matrix.package }}) — ${{ matrix.os }}
    if: inputs.tier == '2'
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
        package:
          - signalsmith-stretch
          - signalsmith-dsp
          - rtneural
          - cycfi-q
          - libsamplerate
          - dr-libs
          - pffft
          - daisysp
          - fontaudio
          - r8brain-free-src
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure stub
        run: |
          cmake -S tools/packages/test-stubs/${{ matrix.package }} \
                -B build-stub \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_POLICY_VERSION_MINIMUM=3.5
        shell: bash

      - name: Build stub
        run: cmake --build build-stub --config Release
        shell: bash

      - name: Run stub
        run: |
          if [ -f build-stub/Release/test-pkg.exe ]; then
            ./build-stub/Release/test-pkg.exe
          elif [ -f build-stub/test-pkg ]; then
            ./build-stub/test-pkg
          elif [ -f build-stub/test-pkg.exe ]; then
            ./build-stub/test-pkg.exe
          else
            echo "Binary not found" && exit 1
          fi
        shell: bash
