name: Release CLI

# End-to-end release pipeline documented in
# docs/guides/release-pipeline.md — keep that doc in sync when you change
# this workflow.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to publish as (e.g., v0.97.0)'
        required: true
      source_ref:
        description: |
          Git ref to BUILD from. Leave blank to build from `version` (the
          tag itself, normal backfill). Set to `main` only when you want
          to publish current `main` content under the `version` label —
          ill-advised unless you understand the risk. Added in #1962 so
          backfilling a broken release can run the FIXED workflow from
          `main` while still checking out the broken TAG's source code.
        required: false
        default: ''
      make_latest:
        description: |
          Update GitHub's /releases/latest pointer for this manual dispatch.
          Leave false for old-tag backfills; set true only when backfilling
          the current newest release tag after a failed automatic tag run.
        required: false
        type: boolean
        default: false

# Never cancel an in-flight release. If two tags push back-to-back,
# serialize rather than cancel — interrupting a binary build halfway
# through leaves partial artifacts on the runner and can miss
# publishing the earlier tag's release.
concurrency:
  group: release-cli-${{ github.ref }}
  cancel-in-progress: false

env:
  # Pin shipyard to the same version post-tag-sync.yml uses so
  # `shipyard changelog regenerate --release-notes` produces the
  # same output as the hook that writes CHANGELOG.md. Must track
  # tools/shipyard.toml to avoid split behavior between local flows
  # and release-time jobs (Codex P1 on PR #719).
  SHIPYARD_VERSION: "0.68.0"

jobs:
  # Resolve the macOS runner for the darwin-arm64 matrix legs.
  #
  # Priority (first set wins):
  #   1. PULP_RELEASE_MACOS_RUNS_ON_JSON — dedicated release-cli override
  #      (the "wire each lane its own runs-on var" pattern from CLAUDE.md).
  #   2. PULP_LOCAL_MACOS_RUNS_ON_JSON — the self-hosted Studio/M5 pool that
  #      already backs the required `macos` PR gate (build.yml). release-cli
  #      is low-volume (tags only) so it won't starve that gate, and the
  #      `actions/checkout` default `clean: true` (git clean -ffdx) wipes the
  #      untracked build dirs each run, so a release build on the persistent
  #      self-hosted disk is clean-by-construction (no warm-dir ODR — release
  #      also never touches the shared ccache).
  #   3. PULP_NAMESPACE_BUILD_MACOS_RUNS_ON_JSON — Namespace cloud (off for cost).
  #   4. GitHub-hosted macos-15 — last-resort fallback.
  #
  # Why this changed: the GitHub-hosted macos-15 pool repeatedly starves
  # release-cli's darwin leg for hours (2026-05-18 blocked v0.111..v0.134;
  # 2026-06-09 blocked v0.396.0+ for 3h+ while ~6 macos-15 lanes — coverage,
  # sanitizers — exhausted the hosted concurrency cap and 4 self-hosted Macs
  # sat idle). Routing the release leg to the idle self-hosted pool by default
  # removes that single point of failure for publishing.
  resolve-macos-runner:
    runs-on: ubuntu-latest
    outputs:
      runs_on_json: ${{ steps.resolve.outputs.runs_on_json }}
    steps:
      - id: resolve
        env:
          RELEASE_JSON: ${{ vars.PULP_RELEASE_MACOS_RUNS_ON_JSON }}
          LOCAL_JSON: ${{ vars.PULP_LOCAL_MACOS_RUNS_ON_JSON }}
          NAMESPACE_JSON: ${{ vars.PULP_NAMESPACE_BUILD_MACOS_RUNS_ON_JSON }}
        run: |
          if [ -n "${RELEASE_JSON:-}" ]; then
            echo "runs_on_json=${RELEASE_JSON}" >> "$GITHUB_OUTPUT"
            echo "Routing macOS release-cli via PULP_RELEASE_MACOS_RUNS_ON_JSON: ${RELEASE_JSON}"
          elif [ -n "${LOCAL_JSON:-}" ]; then
            echo "runs_on_json=${LOCAL_JSON}" >> "$GITHUB_OUTPUT"
            echo "Routing macOS release-cli via self-hosted PULP_LOCAL_MACOS_RUNS_ON_JSON: ${LOCAL_JSON}"
          elif [ -n "${NAMESPACE_JSON:-}" ]; then
            echo "runs_on_json=${NAMESPACE_JSON}" >> "$GITHUB_OUTPUT"
            echo "Routing macOS release-cli through Namespace: ${NAMESPACE_JSON}"
          else
            echo 'runs_on_json=["macos-15"]' >> "$GITHUB_OUTPUT"
            echo "Routing macOS release-cli through GitHub-hosted macos-15"
          fi

  build-cli:
    needs: resolve-macos-runner
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            platform: darwin-arm64
            artifact: pulp
          - os: ubuntu-24.04
            platform: linux-x64
            artifact: pulp
          - os: ubuntu-24.04-arm
            platform: linux-arm64
            artifact: pulp
          - os: windows-latest
            platform: windows-x64
            artifact: pulp.exe
          - os: windows-11-arm
            platform: windows-arm64
            artifact: pulp.exe

    runs-on: ${{ matrix.os == 'macos-15' && fromJSON(needs.resolve-macos-runner.outputs.runs_on_json) || matrix.os }}
    name: CLI ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v5
        with:
          # lfs: false — release-cli fetches the Skia binaries explicitly via
          # fetch_skia_for_release.py (see "Fetch Skia prebuilt binaries" below;
          # the LFS pull does NOT populate them). Pulling LFS here is redundant
          # AND fails the checkout on the self-hosted macOS runners (git-lfs not
          # configured there — the working main `macos` gate in build.yml also
          # uses lfs: false). This was an 8-second checkout failure on
          # pulp-studio-01 that blocked v0.400.0's darwin-arm64 leg.
          lfs: false
          # On `workflow_dispatch`, prefer `source_ref` if the user supplied
          # one; otherwise check out the `version` tag they typed. On
          # push-tag triggers, fall through to the default (the tag ref).
          # See pulp #1962 for the backfill safety rationale.
          ref: ${{ github.event_name == 'workflow_dispatch' && (inputs.source_ref != '' && inputs.source_ref || inputs.version) || '' }}

      - name: Set up Namespace macOS cache
        if: matrix.os == 'macos-15' && contains(needs.resolve-macos-runner.outputs.runs_on_json, 'namespace-profile')
        uses: ./.github/actions/setup-namespace-macos-cache

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        # libfontconfig1-dev added in #1970: chrome/m144 Skia exposes
        # fontconfig symbols (FcInitLoadConfigAndFonts, FcConfigGetSysRoot,
        # FcPatternGetString, etc.) that earlier Skia releases hid. Without
        # the dev package, `pkg_check_modules(FONTCONFIG fontconfig)` in
        # core/canvas/CMakeLists.txt comes up empty and the link step
        # fails on undefined references. Symptom on the v0.97.0 backfill
        # (run 25874113981, 4 of 5 matrix legs green, only linux-x64
        # failing in Build) is what motivated this addition.
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libdbus-1-dev libdrm-dev libegl1-mesa-dev \
            libfontconfig1-dev \
            libgbm-dev libgl1-mesa-dev libx11-dev libxext-dev libxfixes-dev \
            libxi-dev libxinerama-dev libxkbcommon-dev libxrandr-dev \
            libxrender-dev libxss-dev libxtst-dev libwayland-dev \
            libgtk-3-dev libwebkit2gtk-4.1-dev wayland-protocols

      - name: Bootstrap dependencies
        run: ./setup.sh --ci --deps-only
        shell: bash

      # Fetch Skia prebuilt binaries — the root fix for pulp #1817.
      #
      # The release tarball must ship the view-core archive with
      # MacGpuWindowHost compiled in, otherwise SDK consumers that pass `use_gpu=true`
      # silently fall back to CoreGraphics CPU rendering. The Skia
      # binaries are pinned in tools/deps/manifest.json and live at
      # skia-builder's GitHub release assets — neither bootstrap nor
      # actions/checkout's LFS pull populates them, so we fetch here
      # explicitly. Platforms without a published skia-builder asset
      # (windows-*) print INFO and continue without GPU;
      # PULP_REQUIRE_GPU_FOR_SDK is gated on the same condition so
      # configure doesn't trip on them.

      # Backfill safety net (pulp #1962): when a workflow_dispatch
      # backfill leaves source_ref blank, actions/checkout uses the old
      # `version` tag source tree. Tags that pre-date release-pipeline
      # fixes carry the OLD helper scripts and CMake glue, so pull the
      # current `main` copies over the checked-out tag before building.
      # This is a no-op for tag-push triggers and intentionally skipped
      # when source_ref is supplied, because that mode builds the
      # operator-selected source ref under the requested version label.
      - name: Overlay latest release-pipeline files (workflow_dispatch backfill)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.source_ref == '' }}
        shell: bash
        # Pull the current `main` copies of files that gate release-cli's
        # success but live in the source tree rather than the workflow
        # itself. Without this, a backfill against a tag created BEFORE
        # the fix landed runs the broken script / broken CMake. Add new
        # files to the list when a backfill surfaces another fix that
        # the tag's tree doesn't have.
        #
        # Current overlay set:
        #   - tools/scripts/fetch_skia_for_release.py: chrome/m144 zip
        #     arch-subdir layout flatten (#1962).
        #   - core/canvas/CMakeLists.txt: fontconfig propagation from
        #     pulp-canvas STATIC lib via PkgConfig::FONTCONFIG IMPORTED
        #     target (#1962 follow-up).
        #   - tools/deps/manifest.json: release asset inventory must
        #     include all require_gpu release Skia binaries, including
        #     linux-arm64, when backfilling older tags.
        #   - tools/scripts/package_cli.py: release packaging/rpath fixes,
        #     including macOS ad-hoc re-signing after install_name_tool rewrites.
        #
        # Do NOT wholesale-overlay tools/cli/CMakeLists.txt. That file's
        # source list drifts as CLI features land on main, and an older tag may
        # not contain newly referenced .cpp files. Patch only the fontconfig
        # tail-link block below so the tag keeps its own source list.
        run: |
          set -euo pipefail
          repo='${{ github.repository }}'
          for path in \
              tools/scripts/fetch_skia_for_release.py \
              tools/scripts/package_cli.py \
              core/canvas/CMakeLists.txt \
              tools/deps/manifest.json \
              ; do
            url="https://raw.githubusercontent.com/${repo}/main/${path}"
            echo "Overlaying ${path} from ${url}"
            curl -fsSL "$url" -o "$path"
            wc -c "$path"
          done

          python3 - <<'PY'
          import re
          from pathlib import Path

          path = Path("tools/cli/CMakeLists.txt")
          text = path.read_text(encoding="utf-8")
          if "_PULP_CLI_FONTCONFIG" in text:
              print("tools/cli/CMakeLists.txt already has the fontconfig tail-link block")
              raise SystemExit(0)

          match = re.search(r"(?m)^target_link_libraries\(pulp-cli PRIVATE[^\n]*\)\n", text)
          if not match:
              raise SystemExit("FAIL: cannot find single-line pulp-cli target_link_libraries block")

          block = """

          # Link-order fix for libskia.a -> fontconfig on Linux+GNU ld (#1962).
          # Keep this as a targeted backfill patch instead of overlaying this
          # whole CMake file from main: old tags may not have new CLI source
          # files referenced by main's add_executable() list.
          if(UNIX AND NOT APPLE AND NOT ANDROID)
              find_package(PkgConfig)
              if(PkgConfig_FOUND)
                  pkg_check_modules(_PULP_CLI_FONTCONFIG IMPORTED_TARGET fontconfig)
                  if(_PULP_CLI_FONTCONFIG_FOUND)
                      target_link_libraries(pulp-cli PRIVATE PkgConfig::_PULP_CLI_FONTCONFIG)
                  endif()
              endif()
          endif()
          """
          text = text[: match.end()] + block + text[match.end() :]
          path.write_text(text, encoding="utf-8")
          print("Patched tools/cli/CMakeLists.txt with the fontconfig tail-link block")
          PY

      - name: Fetch Skia binaries
        run: python3 tools/scripts/fetch_skia_for_release.py ${{ matrix.platform }}
        shell: bash

      # On Linux, building with PULP_BUILD_WEBVIEW=ON pulls webkit2gtk
      # → libjavascriptcoregtk-4.1 into the static pulp-view archive.
      # When the CLI binary links pulp-view (a STATIC library), CMake
      # propagates those PRIVATE deps to the final link line, so the
      # CLI ends up dynamically linked against libjavascriptcoregtk-4.1
      # which is not installed on the smoke runner (or on most user
      # machines) — the binary fails immediately with
      #   "error while loading shared libraries:
      #    libjavascriptcoregtk-4.1.so.0: cannot open shared object file"
      # Pulp's documented JS engine policy (CLAUDE.md) is QuickJS on
      # Linux, so the CLI must not link JSC-GTK at all. Issue #720.
      #
      # Ensure a WORKING Rust toolchain is on PATH before configure. The
      # user-facing `pulp` binary is the Rust CLI (experimental/pulp-rs);
      # CMake only wires that target up when find_program(cargo) succeeds at
      # CONFIGURE time, and the pulp-rs CMakeLists fail-SOFTs (STATUS, not
      # FATAL) when cargo is missing — so a broken toolchain silently drops
      # build/pulp and only surfaces far downstream as
      # `package_cli.py: FAIL: binary not at build/pulp`.
      #
      # Failure modes seen on self-hosted Macs (2026-06-10, v0.400.0):
      #   - cargo not on the non-interactive job PATH (lives at ~/.cargo/bin);
      #   - a BROKEN rustup install — ~/.cargo/bin/rustup proxy missing, so the
      #     cargo/rustc shims are dangling symlinks and won't execute even
      #     though ~/.rustup/toolchains/<tc>/bin/cargo is a perfectly good
      #     binary.
      # GitHub-hosted runners already ship a working cargo on PATH, so this
      # step is a fast no-op there. Self-heal by finding a cargo that actually
      # RUNS (PATH → ~/.cargo/bin → the toolchain's own bin, which bypasses a
      # broken proxy) and prepending its dir to GITHUB_PATH. Fail LOUD if none
      # works, so a runner without Rust never silently ships a CLI-less tarball.
      - name: Ensure a working Rust toolchain on PATH
        if: runner.os != 'Windows'
        run: |
          runs() { "$1/cargo" --version >/dev/null 2>&1; }
          use() { echo "$1" >> "$GITHUB_PATH"; echo "rust: using cargo at $1 ($("$1/cargo" --version))"; }
          if command -v cargo >/dev/null 2>&1 && cargo --version >/dev/null 2>&1; then
            echo "rust: cargo already works on PATH ($(cargo --version))"; exit 0
          fi
          if runs "$HOME/.cargo/bin"; then use "$HOME/.cargo/bin"; exit 0; fi
          # Broken rustup proxy / dangling shim — fall back to a toolchain's
          # direct bin (a real cargo binary, no proxy needed).
          for tc in "$HOME"/.rustup/toolchains/*/bin; do
            if runs "$tc"; then use "$tc"; exit 0; fi
          done
          echo "::error::No working cargo found (broken rustup? run 'rustup default stable' on this runner). release-cli needs Rust to build the user-facing build/pulp CLI — refusing to ship a CLI-less tarball." >&2
          exit 1
        shell: bash

      # Build the CLI binary WITHOUT WebView; the SDK build below
      # reconfigures with WebView=ON so plugin authors still get the
      # WebView code in the SDK tarball.
      - name: Configure (CLI, no WebView on Linux)
        # PULP_REQUIRE_GPU_FOR_SDK is an SDK-release safety net that turns the
        # silent "no Skia → CG fallback" SDK build into a hard configure-time
        # failure. Only enable it for platforms whose Skia binaries we just
        # fetched (matrix-platforms with an entry in fetch_skia_for_release.py's
        # MATRIX_TO_MANIFEST + a published release_assets entry in
        # tools/deps/manifest.json). darwin-arm64, linux-x64, and linux-arm64
        # all have published assets today; windows-* continues to build
        # without Skia until its assets ship.
        run: |
          REQUIRE_GPU="-DPULP_REQUIRE_GPU_FOR_SDK=OFF"
          case "${{ matrix.platform }}" in
            darwin-arm64|linux-x64|linux-arm64)
              REQUIRE_GPU="-DPULP_REQUIRE_GPU_FOR_SDK=ON"
              ;;
          esac
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DPULP_BUILD_TESTS=OFF \
            -DPULP_ENABLE_AUDIO_PROBES=OFF \
            $REQUIRE_GPU \
            ${{ runner.os == 'Linux' && '-DPULP_BUILD_WEBVIEW=OFF' || '-DPULP_BUILD_WEBVIEW=ON' }}
        shell: bash

      - name: Build
        # Build everything (CLI binary + all libs needed for the SDK tarball).
        # On Linux this is built WITHOUT WebView so the CLI binary stays
        # portable; the SDK reconfigure step below adds WebView back so the
        # SDK tarball still ships WebViewPanel symbols.
        run: cmake --build build --config Release
        shell: bash

      - name: Normalize CLI binary layout (Unix)
        if: runner.os != 'Windows'
        # Backfill compatibility: tags before the Rust CLI swap only build the
        # C++ CLI delegate (`build/tools/cli/pulp-cpp`) and have no top-level
        # `build/pulp`. Package those trees under the stable user-facing
        # `pulp` name without changing current releases, where `build/pulp`
        # already exists and remains the primary binary.
        run: |
          set -euo pipefail
          if [ ! -e build/pulp ] && [ -x build/tools/cli/pulp-cpp ]; then
            echo "Pre-swap CLI layout detected; copying pulp-cpp to build/pulp for packaging"
            cp -p build/tools/cli/pulp-cpp build/pulp
          fi
          test -x build/pulp
        shell: bash

      - name: Normalize CLI binary layout (Windows)
        if: runner.os == 'Windows'
        # Same backfill compatibility as Unix, adjusted for Visual Studio's
        # multi-config output directory.
        run: |
          $ErrorActionPreference = 'Stop'
          $primary = 'build/pulp.exe'
          $cpp = 'build/tools/cli/Release/pulp-cpp.exe'
          if (!(Test-Path $primary) -and (Test-Path $cpp)) {
              Write-Host 'Pre-swap CLI layout detected; copying pulp-cpp.exe to build/pulp.exe for packaging'
              Copy-Item -Path $cpp -Destination $primary
          }
          if (!(Test-Path $primary)) {
              throw "Primary CLI binary missing after normalization: $primary"
          }
        shell: pwsh

      # Phase 8: post-swap there are TWO CLI binaries shipping side by
      # side — `pulp` (Rust, the user-facing default) at the top of
      # the build dir, and `pulp-cpp` (C++, the fallthrough delegate
      # for library-linked subcommands like ship/validate/host) under
      # `tools/cli/`. The release tarball must include both.
      - name: Strip binaries (Unix)
        if: runner.os != 'Windows'
        # Linux: GNU strip works directly. macOS (Apple Silicon): binaries are
        # ad-hoc code-signed at link time, and `strip` invalidates that
        # signature — on the self-hosted Macs that surfaces as a hard `strip`
        # failure (GitHub-hosted tolerated it). Strip is only a size
        # optimization, so on macOS we strip best-effort and re-apply the
        # ad-hoc signature; a functional binary must never block the release.
        # #2067: pulp-mcp ships in the CLI tarball so the Claude Code plugin's
        # MCP launcher can resolve it on $PATH after install.
        run: |
          for bin in build/pulp build/tools/cli/pulp-cpp build/tools/mcp/pulp-mcp; do
            # Fail LOUD if a binary is missing. The strip itself is best-effort
            # on macOS (below), which would otherwise SILENTLY swallow an
            # absent binary — exactly how a skipped Rust `build/pulp` target hid
            # until package_cli.py reported it a step later (2026-06-10). Catch
            # it here with a clear message instead.
            if [ ! -f "$bin" ]; then
              echo "::error::expected release binary '$bin' is missing — the build did not produce it (e.g. 'build/pulp' means the Rust CLI target was skipped, usually a missing/broken cargo). Refusing to package an incomplete tarball." >&2
              exit 1
            fi
            if [ "${RUNNER_OS}" = "macOS" ]; then
              strip -x "$bin" 2>/dev/null || strip "$bin" 2>/dev/null || \
                echo "note: strip skipped for $bin (non-fatal)"
              codesign --force --sign - "$bin" 2>/dev/null || true
            else
              strip "$bin"
            fi
          done

      - name: Install Linux rpath helper
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y patchelf

      # Bundle the wgpu-native dynamic dependency next to the binary
      # and rewrite the rpath so the artifact is portable. Closes
      # #391 (v0.20.0 macOS tarball baked an absolute rpath pointing
      # at /Users/runner/Library/Caches/Pulp/... and crashed on every
      # user machine). The smoke-cli matrix gate (PR #395) verifies
      # the result actually runs on a clean runner.
      #
      # `package_cli.py --cpp-binary` (added on validate/phase8-integrated)
      # bundles `pulp-cpp` alongside `pulp` in the same tarball so the
      # Rust binary's fallthrough paths can find their delegate after
      # the user extracts and runs.
      #
      # `--mcp-binary` (#2067) bundles `pulp-mcp` so the Claude Code
      # plugin's MCP launcher can resolve it on $PATH after install —
      # the plugin itself ships no binaries, it relies on the CLI install.
      - name: Package CLI (Unix)
        if: runner.os != 'Windows'
        run: |
          python3 tools/scripts/package_cli.py \
            --binary build/pulp \
            --cpp-binary build/tools/cli/pulp-cpp \
            --mcp-binary build/tools/mcp/pulp-mcp \
            --build-dir build \
            --platform ${{ matrix.platform }} \
            --out pulp-${{ matrix.platform }}.tar.gz
        shell: bash

      - name: Package CLI (Windows)
        if: runner.os == 'Windows'
        run: |
          python tools/scripts/package_cli.py `
            --binary build/pulp.exe `
            --cpp-binary build/tools/cli/Release/pulp-cpp.exe `
            --mcp-binary build/tools/mcp/Release/pulp-mcp.exe `
            --build-dir build `
            --platform ${{ matrix.platform }} `
            --out pulp-${{ matrix.platform }}.zip
        shell: pwsh

      # On Linux the CLI was built with PULP_BUILD_WEBVIEW=OFF (issue
      # #720). For the SDK tarball, do a SEPARATE configure+build into
      # `build-sdk/` with WebView=ON so plugin authors who consume the
      # SDK still get WebViewPanel + make_webview_embedded_resource_fetcher
      # symbols in the split view-core archive. Using a separate build directory
      # avoids re-linking the already-built CLI binary against
      # libwebkit2gtk during the reconfigure (which would defeat the
      # purpose of the split).
      #
      # On macOS/Windows the CLI configure already used WebView=ON, so
      # we just symlink the SDK build dir to the existing build dir.
      - name: Prepare SDK build dir (Linux)
        if: runner.os == 'Linux'
        # Same PULP_REQUIRE_GPU_FOR_SDK gating as the CLI configure above —
        # the SDK lib must contain the Skia path for platforms where it's
        # supposed to. Both linux-x64 and linux-arm64 have published
        # skia-builder assets and so must trip the gate.
        run: |
          REQUIRE_GPU="-DPULP_REQUIRE_GPU_FOR_SDK=OFF"
          case "${{ matrix.platform }}" in
            linux-x64|linux-arm64)
              REQUIRE_GPU="-DPULP_REQUIRE_GPU_FOR_SDK=ON"
              ;;
          esac
          cmake -S . -B build-sdk \
            -DCMAKE_BUILD_TYPE=Release \
            -DPULP_BUILD_TESTS=OFF \
            -DPULP_ENABLE_AUDIO_PROBES=OFF \
            $REQUIRE_GPU \
            -DPULP_BUILD_WEBVIEW=ON
          # Build everything the SDK install step needs. This is a full
          # second build on Linux, but it's required to keep the CLI
          # binary (built in `build/` with WebView=OFF) portable.
          cmake --build build-sdk --config Release
        shell: bash

      - name: Prepare SDK build dir (macOS)
        if: runner.os == 'macOS'
        run: ln -snf build build-sdk
        shell: bash

      - name: Build SDK tarball (Unix)
        if: runner.os != 'Windows'
        env:
          MATRIX_PLATFORM: ${{ matrix.platform }}
        run: |
          # build-sdk on Linux is the WebView=ON build (separate dir to
          # avoid re-linking the CLI binary against libwebkit2gtk).
          # build-sdk on macOS is a symlink to build (CLI was built with
          # WebView=ON there).
          cmake --install build-sdk --prefix sdk-staging --config Release
          test -f sdk-staging/lib/libpulp-view.a
          test -f sdk-staging/lib/libpulp-view-core.a
          python3 - <<'PY'
          import os
          from pathlib import Path
          platform = os.environ["MATRIX_PLATFORM"]
          data = Path("sdk-staging/lib/libpulp-view-core.a").read_bytes()
          # WebView lane (existing).
          assert b"WebViewPanel" in data, "WebViewPanel symbol missing"
          assert b"make_webview_embedded_resource_fetcher" in data, (
              "make_webview_embedded_resource_fetcher symbol missing"
          )
          # GPU lane (new — prevents pulp #1817 from regressing).
          #
          # macOS has a dedicated MacGpuWindowHost class that is
          # #ifdef PULP_HAS_SKIA'd. Linux/Windows route GPU through SDL
          # rather than a dedicated host class, so we can't assert on a
          # single GPU host symbol there yet. linux-x64 still has the
          # PULP_REQUIRE_GPU_FOR_SDK CMake gate above to catch a missing
          # Skia at configure time; cross-platform symbol coverage is a
          # follow-up (see pulp #1817 plan, Layer 3).
          if platform == "darwin-arm64":
              assert b"MacGpuWindowHost" in data, (
                  "MacGpuWindowHost symbol missing from libpulp-view-core.a — "
                  "Skia path was #ifdef'd out at compile time. Consumers "
                  "passing use_gpu=true will silently fall back to "
                  "CoreGraphics CPU rendering. See pulp #1817."
              )
              print("OK: MacGpuWindowHost symbol present in libpulp-view-core.a")
          PY
          mv sdk-staging pulp-sdk
          tar czf pulp-sdk-${{ matrix.platform }}.tar.gz pulp-sdk
          rm -rf pulp-sdk
        shell: bash

      - name: Build SDK tarball (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake --install build --prefix sdk-staging --config Release
          if (!(Test-Path sdk-staging/lib/pulp-view.lib)) {
            throw "sdk-staging/lib/pulp-view.lib missing"
          }
          if (!(Test-Path sdk-staging/lib/pulp-view-core.lib)) {
            throw "sdk-staging/lib/pulp-view-core.lib missing"
          }
          python -c "from pathlib import Path; data = Path(r'sdk-staging/lib/pulp-view-core.lib').read_bytes(); assert b'WebViewPanel' in data; assert b'make_webview_embedded_resource_fetcher' in data"
          Rename-Item sdk-staging pulp-sdk
          Compress-Archive -Path pulp-sdk -DestinationPath pulp-sdk-${{ matrix.platform }}.tar.gz
          Remove-Item -Recurse pulp-sdk
        shell: pwsh

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v6
        with:
          name: pulp-${{ matrix.platform }}
          path: pulp-${{ matrix.platform }}.*

      - name: Upload SDK artifact
        uses: actions/upload-artifact@v6
        with:
          name: pulp-sdk-${{ matrix.platform }}
          path: pulp-sdk-${{ matrix.platform }}.*

  # ── Portable-binary smoke gate (#391) ─────────────────────────────
  #
  # Catches the class of bug v0.20.0 shipped: the macOS tarball
  # baked an LC_RPATH pointing at the GitHub Actions runner's
  # home directory (/Users/runner/Library/Caches/Pulp/...), so the
  # binary worked on the runner that built it but crashed on every
  # user machine with "Library not loaded". The build-cli job above
  # can't catch this because it runs the binary on the SAME runner
  # that built it — the bad path happens to resolve.
  #
  # Strategy: download each platform's freshly-uploaded artifact on
  # a separate runner (different runner ID = clean home directory),
  # untar to /tmp, and run `pulp help`. Any dyld / ld.so / DLL
  # error fails the release before users see it.
  #
  # Equivalent in spirit to the Windows MSVC release-path PR gate
  # added in #349, but at the artifact-portability axis instead of
  # MSVC compile-time.
  smoke-cli:
    needs: [build-cli, resolve-macos-runner]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            platform: darwin-arm64
            artifact: pulp
          - os: ubuntu-24.04
            platform: linux-x64
            artifact: pulp
          - os: ubuntu-24.04-arm
            platform: linux-arm64
            artifact: pulp
          - os: windows-latest
            platform: windows-x64
            artifact: pulp.exe
          - os: windows-11-arm
            platform: windows-arm64
            artifact: pulp.exe
    runs-on: ${{ matrix.os == 'macos-15' && fromJSON(needs.resolve-macos-runner.outputs.runs_on_json) || matrix.os }}
    name: Smoke ${{ matrix.platform }}

    steps:
      - name: Download CLI artifact for this platform
        uses: actions/download-artifact@v7
        with:
          name: pulp-${{ matrix.platform }}
          path: artifact-in/

      - name: Unpack to /tmp/pulp-smoke (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p /tmp/pulp-smoke
          tar -xzf artifact-in/pulp-${{ matrix.platform }}.tar.gz -C /tmp/pulp-smoke
          ls -la /tmp/pulp-smoke

      - name: Unpack to %TEMP%\pulp-smoke (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path $env:TEMP\pulp-smoke | Out-Null
          Expand-Archive -Force -Path artifact-in\pulp-${{ matrix.platform }}.zip -DestinationPath $env:TEMP\pulp-smoke
          Get-ChildItem $env:TEMP\pulp-smoke

      # Smoke test — the binary must run portably.
      #
      # If `pulp help` exits non-zero or produces dyld/ld.so/DLL
      # errors on stderr, the release tarball is broken on this
      # platform and we fail the release. Capture output to a file
      # so we can grep stderr for the diagnostic patterns even when
      # pulp itself exits 0 (defense-in-depth — some runtime loaders
      # warn but don't fail).
      - name: Smoke `pulp help` + `pulp-cpp help` + `pulp-mcp --version` (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          # Phase 8: tarball ships `pulp` (Rust), `pulp-cpp` (C++ delegate),
          # and pulp-mcp (#2067 — Claude plugin's MCP server) side by side.
          # Smoke all three. A broken pulp-cpp silently breaks every
          # fallthrough subcommand; a broken pulp-mcp silently breaks the
          # Claude Code plugin's `/mcp` integration on every clean install.
          #
          # pulp-mcp speaks JSON-RPC over stdin/stdout, so `help` is not a
          # meaningful smoke — we send `--version` instead. The binary must
          # at minimum load (no dyld/ld.so errors) and exit cleanly.
          smoke_cmd() {
            case "$1" in
              pulp-mcp) echo "--version" ;;
              *)        echo "help" ;;
            esac
          }
          for ART in pulp pulp-cpp pulp-mcp; do
            BIN=/tmp/pulp-smoke/$ART
            CMD=$(smoke_cmd "$ART")
            echo "===== Testing $BIN $CMD ====="
            test -x "$BIN" || { echo "FAIL: $BIN is missing or not executable (tarball did not ship it)"; exit 1; }
            file "$BIN" || true
            if [ "$RUNNER_OS" = "macOS" ]; then
              echo "--- otool -L (load commands) ---"
              otool -L "$BIN" || true
              echo "--- otool -l rpaths ---"
              otool -l "$BIN" | awk '/LC_RPATH/{flag=1} flag{print; if (/path /) {flag=0}}' | head -20 || true
            else
              echo "--- ldd ---"
              ldd "$BIN" || true
            fi
            echo "--- $ART $CMD ---"
            set +e
            "$BIN" $CMD > /tmp/$ART-smoke.out 2> /tmp/$ART-smoke.err
            rc=$?
            set -e
            echo "exit=$rc"
            echo "--- stdout ---"; cat /tmp/$ART-smoke.out || true
            echo "--- stderr ---"; cat /tmp/$ART-smoke.err || true
            if [ "$rc" -ne 0 ]; then
              echo "FAIL: $ART $CMD returned exit $rc"
              exit 1
            fi
            # Belt + suspenders: dyld/ld.so warnings shouldn't appear even on rc=0.
            if grep -qE "Library not loaded|Symbol not found|cannot open shared object|undefined symbol|@rpath/" /tmp/$ART-smoke.err; then
              echo "FAIL: dyld/ld.so error in stderr (artifact is non-portable)"
              exit 1
            fi
            # Same check for stdout (some loaders write there).
            if grep -qE "Library not loaded|Symbol not found|cannot open shared object" /tmp/$ART-smoke.out; then
              echo "FAIL: loader error in stdout"
              exit 1
            fi
            echo "OK: $ART is portable on ${{ matrix.platform }}."
          done

      - name: Smoke `pulp help` + `pulp-cpp help` + `pulp-mcp --version` (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # Phase 8: tarball ships `pulp.exe`, `pulp-cpp.exe`, and
          # `pulp-mcp.exe` (#2067) side by side. Smoke all three.
          $artCmd = @{
              "pulp.exe"      = "help"
              "pulp-cpp.exe"  = "help"
              "pulp-mcp.exe"  = "--version"
          }
          foreach ($art in $artCmd.Keys) {
              $cmd = $artCmd[$art]
              $bin = Join-Path $env:TEMP "pulp-smoke\$art"
              Write-Host "===== Testing $bin $cmd ====="
              if (-not (Test-Path $bin)) {
                  Write-Error "FAIL: $bin missing from tarball"
                  exit 1
              }
              try { dumpbin /dependents $bin 2>$null } catch { Write-Host "(dumpbin unavailable; skipping)" }
              $stdout = New-TemporaryFile
              $stderr = New-TemporaryFile
              $proc = Start-Process -FilePath $bin -ArgumentList $cmd `
                  -RedirectStandardOutput $stdout -RedirectStandardError $stderr -PassThru -Wait -NoNewWindow
              Write-Host "exit=$($proc.ExitCode)"
              Write-Host "--- stdout ---"
              Get-Content $stdout -ErrorAction SilentlyContinue
              Write-Host "--- stderr ---"
              $err = Get-Content $stderr -ErrorAction SilentlyContinue
              $err
              if ($proc.ExitCode -ne 0) {
                  Write-Error "FAIL: $art $cmd returned exit $($proc.ExitCode)"
                  exit 1
              }
              if ($err -match "DLL was not found|side-by-side|ImportError|missing.*\.dll") {
                  Write-Error "FAIL: missing-DLL error in stderr (artifact is non-portable)"
                  exit 1
              }
              Write-Host "OK: $art is portable on ${{ matrix.platform }}."
          }

  release:
    needs: [build-cli, smoke-cli]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          # regenerate_changelog.py --release-notes walks `git tag` +
          # tag-to-tag ranges; default shallow checkout has no tags so
          # the script falls back to "See CHANGELOG.md" and the release
          # body loses its per-release content. (#265 Codex P2.)
          fetch-depth: 0
          fetch-tags: true

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts/

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Install shipyard
        # Pipe to bash, not sh — install.sh uses bashisms (shipyard 0.11
        # fixed the earlier post-tag-sync.yml bug where /bin/sh (dash)
        # rejected the script).
        run: |
          curl -fsSL https://generouscorp.com/Shipyard/install.sh \
            | SHIPYARD_VERSION="$SHIPYARD_VERSION" bash

      - name: Generate release notes
        id: changelog
        # Uses `shipyard changelog regenerate --release-notes` to build the
        # same markdown shape as CHANGELOG.md itself, so the Releases page
        # and CHANGELOG.md stay in sync (one generator, one source of
        # truth — issue #262). Migrated from tools/scripts/regenerate_changelog.py
        # (shipyard issue #53 + PR #73).
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          NOTES=$(shipyard changelog regenerate --release-notes "$TAG" 2>/dev/null \
              || echo "See [CHANGELOG.md](https://github.com/danielraffel/pulp/blob/main/CHANGELOG.md) for details.")
          echo "notes<<CHANGELOG_EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "CHANGELOG_EOF" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Pulp CLI ${{ steps.version.outputs.tag }}
          body: |
            ${{ steps.changelog.outputs.notes }}

            ---

            ## Install

            **macOS / Linux:**
            ```bash
            curl -fsSL https://www.generouscorp.com/pulp/install.sh | sh
            ```

            **Windows (PowerShell):**
            ```powershell
            irm https://www.generouscorp.com/pulp/install.ps1 | iex
            ```

            These installers place the Rust `pulp` CLI and the C++ `pulp-cpp`
            delegate on your PATH. Or download the binary archive for your
            platform below.
          files: |
            artifacts/**/*
          # On a tag PUSH, keep the release a DRAFT so the parallel
          # `Sign and Release` workflow can still attach its appcast.xml — GitHub
          # now makes a PUBLISHED release immutable, so whichever workflow
          # published first locked the other out ("Cannot upload asset to an
          # immutable release"). The `Release publish coordinator`
          # (release-publish.yml) flips the draft to published once BOTH legs
          # succeed. A manual workflow_dispatch backfill (CLI-only, no
          # sign-and-release run) still publishes directly.
          draft: ${{ github.event_name == 'push' }}
          prerelease: false
          # Explicitly claim GitHub's "latest release" pointer for normal tag
          # pushes. Manual dispatches are often old-tag backfills, so they must
          # opt in with `make_latest=true`; otherwise a backfill for an older
          # tag can move `/releases/latest` backward.
          make_latest: ${{ github.event_name != 'workflow_dispatch' || inputs.make_latest }}
