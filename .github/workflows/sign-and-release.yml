name: Sign and Release

# End-to-end release pipeline documented in
# docs/guides/release-pipeline.md — keep that doc in sync when you change
# this workflow.

on:
  push:
    tags: ['v*']

# Never cancel in-flight signing/notarization. Partial notarization
# artifacts are hard to recover; serialize instead.
concurrency:
  group: sign-and-release-${{ github.ref }}
  cancel-in-progress: false

env:
  BUILD_TYPE: Release

jobs:
  # Resolve the macOS runner. When PULP_NAMESPACE_BUILD_MACOS_RUNS_ON_JSON
  # is set (the same repo variable build.yml uses for PR macOS routing
  # post-2026-05-18 cutover), route the release build through Namespace
  # cloud runners instead of the GitHub-hosted pool. Falls back to macos-15
  # when unset: the release build needs a modern Xcode 16.x Apple clang for
  # C++20 parity with the PR lane, and release-cli.yml + the Build/Test gate
  # already use macOS 15.
  # Background: 2026-05-18 SDK starvation — GitHub-hosted macos-14 queue
  # backed up for hours and blocked v0.111..v0.134 from publishing
  # (compound with the supersede bug fixed in pulp #2238 and the Skia
  # gate fix in pulp #2281).
  resolve-macos-runner:
    runs-on: ubuntu-latest
    outputs:
      runs_on_json: ${{ steps.resolve.outputs.runs_on_json }}
    steps:
      - id: resolve
        env:
          NAMESPACE_JSON: ${{ vars.PULP_NAMESPACE_BUILD_MACOS_RUNS_ON_JSON }}
        run: |
          if [ -n "${NAMESPACE_JSON:-}" ]; then
            echo "runs_on_json=${NAMESPACE_JSON}" >> "$GITHUB_OUTPUT"
            echo "Routing macOS sign-and-release through Namespace: ${NAMESPACE_JSON}"
          else
            echo 'runs_on_json=["macos-15"]' >> "$GITHUB_OUTPUT"
            echo "Routing macOS sign-and-release through GitHub-hosted macos-15"
          fi

  build-and-sign-macos:
    needs: resolve-macos-runner
    runs-on: ${{ fromJSON(needs.resolve-macos-runner.outputs.runs_on_json) }}
    name: Build, Sign, Notarize (macOS)
    # pulp #724: without `contents: write`, the final `Create GitHub Release`
    # step fails with "Resource not accessible by integration" because
    # softprops/action-gh-release@v2 calls the generate-release-notes API,
    # which requires the scope. The workflow inherits a read-only token
    # otherwise, and the whole sign+notarize+publish pipeline silently fails
    # even though every prior step succeeded. release-cli.yml explicitly
    # sets this on its release-creating job (line ~360) for the same reason.
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      # CI COVERAGE-GAP FIX: this release job once ran on macos-14, whose default
      # Xcode 15.4 Apple clang lacked C++20 P0960 (parenthesized aggregate init).
      # The self-hosted PR `macos` lane used a newer clang, so a CLI/import TU
      # (tools/import-design/import_detect.cpp) compiled on every PR but failed
      # here, silently breaking every GitHub Release from ~v0.371 to v0.391. The
      # job now falls back to macos-15, and still selects the newest installed
      # Xcode 16.x so the release build stays at C++20 parity with the PR lane.
      - name: Select modern Xcode (C++20 parity with the PR lane)
        if: runner.os == 'macOS'
        run: |
          # Pick the newest installed Xcode >= 16 on the selected macOS runner.
          # Shell-based on purpose: no third-party action dependency, and it
          # can't be blocked by an actions allowlist — the release must not be
          # held hostage to that. Falls back to the default Xcode only if none
          # is found (then the build fails loudly, which is the right signal).
          newest="$(find /Applications -maxdepth 1 -name 'Xcode_16*.app' 2>/dev/null | sort -V | tail -1)"
          if [ -n "$newest" ]; then
            sudo xcode-select -s "$newest/Contents/Developer"
          else
            echo "::warning::No Xcode 16.x found; using default $(xcode-select -p)"
          fi
          echo "Using: $(xcode-select -p)"
          c++ --version | head -1

      - name: Clone VST3 SDK
        run: |
          git clone --depth 1 --branch v3.7.12_build_20 \
            https://github.com/steinbergmedia/vst3sdk.git \
            external/vst3sdk
          cd external/vst3sdk && git submodule update --init --recursive --depth 1

      - name: Clone AudioUnitSDK
        run: |
          # Pinned to 1.3.0 — 1.4.0 introduced <expected> (C++23) in its
          # headers, and AppleClang/libc++ on GitHub-hosted macOS runners
          # doesn't yet expose std::expected even at -std=c++23. See #155.
          git clone --depth 1 --branch AudioUnitSDK-1.3.0 \
            https://github.com/apple/AudioUnitSDK.git \
            external/AudioUnitSDK

      - name: Configure
        # -DPULP_BUILD_EXAMPLES=OFF: the pulp-design-tool example hard-fails
        # configure when PULP_HAS_SKIA is FALSE (this runner has no Skia), so
        # building examples here aborts the whole sign-and-release run and no
        # GitHub Release is published. Skip examples to match build.yml's
        # release legs. Tests are also disabled: this job packages artifacts
        # and must not run Catch test discovery for GPU/display binaries on
        # GitHub-hosted macOS release runners. Audio probes are development
        # inspection surfaces and are not part of release artifacts.
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}
          -DPULP_BUILD_EXAMPLES=OFF
          -DPULP_BUILD_TESTS=OFF
          -DPULP_ENABLE_AUDIO_PROBES=OFF

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} -j$(sysctl -n hw.ncpu)

      # NOTE: the release build does NOT re-run the unit-test suite. A release-
      # artifact build is not a test gate — by the time a commit is tagged it has
      # already passed the FULL suite on the PR/merge gate (self-hosted lane with
      # real GPU/display/iOS-SDK). Re-running ctest here on a HEADLESS GitHub-
      # hosted runner is redundant AND produces false failures from environment-
      # only tests (Skia-raster screenshot -> empty pixels, cmake-require-gpu ->
      # timeout, cmake-ios-hostapp-links) that pass on real hardware — which
      # silently blocked GitHub Releases v0.372-v0.391. (The same logic already
      # excluded the `validation`/auval suite here for the same hosted-runner
      # reason — see #720; this completes it.) The Build step above is the
      # release-config compile smoke; format validators are gated by validate.yml
      # on PR. The artifact smoke below is the headless-safe replacement gate.

      - name: Smoke built plugins (headless-safe — format entry point exported)
        # If this release configuration produces CLAP artifacts, confirm each
        # built plugin exports its format C-ABI entry. Static symbol read (`nm`)
        # only: no GPU/display/audio needed on the headless runner. Zero
        # block-risk: FAILS only on a built .clap whose Mach-O lacks
        # `clap_entry`; if no artifact is found it WARNS and passes, so the
        # examples-off release configuration can still publish appcast metadata.
        run: |
          set -uo pipefail
          shopt -s nullglob
          built=0
          for clap in build/CLAP/*.clap; do
            name="$(basename "$clap" .clap)"
            bin="$clap/Contents/MacOS/$name"
            [ -f "$bin" ] || bin="$clap"               # tolerate a flat .clap
            if [ ! -f "$bin" ]; then
              echo "::warning::no Mach-O found for $clap — skipping"
              continue
            fi
            built=$((built + 1))
            if nm -gU "$bin" 2>/dev/null | grep -q "_clap_entry"; then
              echo "ok: $name exports clap_entry"
            else
              echo "::error::$bin built but does NOT export clap_entry (linkage regression)"
              exit 1
            fi
          done
          if [ "$built" -eq 0 ]; then
            echo "::warning::no .clap plugins built — nothing to smoke (not a failure)"
          fi

      - name: Import signing certificate
        if: env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm certificate.p12

      - name: Sign plugins
        if: env.SIGNING_IDENTITY != ''
        env:
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
        run: |
          for plugin in build/VST3/*.vst3 build/CLAP/*.clap build/AU/*.component; do
            [ -e "$plugin" ] || continue
            echo "Signing $(basename $plugin)..."
            codesign --force --sign "$SIGNING_IDENTITY" --timestamp --options runtime \
              --entitlements ship/templates/entitlements.plist "$plugin"
          done

      - name: Create installer package
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p artifacts
          # Package each format
          for plugin in build/VST3/*.vst3; do
            [ -e "$plugin" ] || continue
            NAME=$(basename "$plugin" .vst3)
            pkgbuild --component "$plugin" \
              --identifier "com.pulp.${NAME}.vst3" \
              --version "$VERSION" \
              --install-location "/Library/Audio/Plug-Ins/VST3/" \
              "artifacts/${NAME}-VST3-${VERSION}.pkg" || true
          done
          for plugin in build/CLAP/*.clap; do
            [ -e "$plugin" ] || continue
            NAME=$(basename "$plugin" .clap)
            pkgbuild --component "$plugin" \
              --identifier "com.pulp.${NAME}.clap" \
              --version "$VERSION" \
              --install-location "/Library/Audio/Plug-Ins/CLAP/" \
              "artifacts/${NAME}-CLAP-${VERSION}.pkg" || true
          done
          for plugin in build/AU/*.component; do
            [ -e "$plugin" ] || continue
            NAME=$(basename "$plugin" .component)
            pkgbuild --component "$plugin" \
              --identifier "com.pulp.${NAME}.au" \
              --version "$VERSION" \
              --install-location "$HOME/Library/Audio/Plug-Ins/Components/" \
              "artifacts/${NAME}-AU-${VERSION}.pkg" || true
          done

      - name: Notarize packages
        if: env.APPLE_ID != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        run: |
          for pkg in artifacts/*.pkg; do
            [ -e "$pkg" ] || continue
            echo "Notarizing $(basename $pkg)..."
            xcrun notarytool submit "$pkg" \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_PASSWORD" \
              --wait || echo "Notarization failed for $pkg"
            xcrun stapler staple "$pkg" || true
          done

      - name: Generate appcast
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          DATE=$(date -u '+%a, %d %b %Y %H:%M:%S +0000')
          cat > artifacts/appcast.xml << XMLEOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>Pulp Updates</title>
              <item>
                <title>Version ${VERSION}</title>
                <pubDate>${DATE}</pubDate>
                <sparkle:version>${VERSION}</sparkle:version>
                <sparkle:minimumSystemVersion>12.0</sparkle:minimumSystemVersion>
              </item>
            </channel>
          </rss>
          XMLEOF

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: pulp-macos-${{ github.ref_name }}
          path: artifacts/
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        # v1 is too old per actionlint (GH deprecated its runner version);
        # v2 uses the Node 20 runner and is a drop-in replacement.
        #
        # pulp #1737 — only upload appcast.xml to the release page. This
        # workflow deliberately keeps example plugins out of the release
        # configuration; if a future release configuration emits plugin .pkg
        # artifacts, actions/upload-artifact above retains them for debugging,
        # but they are still not promoted to the user-facing release page. The
        # SDK + CLI artifacts (pulp-*, pulp-sdk-*) are uploaded by
        # .github/workflows/release-cli.yml.
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/appcast.xml
          draft: true
          generate_release_notes: true
