name: Sanitizer Tests

# ASan + UBSan on every PR, TSan advisory, RTSan on-demand.
# Non-Apple RTSan needs Clang 18 from apt.llvm.org.
# Local equivalents: scripts/run_asan.sh, scripts/run_tsan.sh.
#
# Each sanitizer job's runs-on is routable via three signals (priority order):
#   1. per-target workflow_dispatch input (e.g. tsan_runner_selector_json)
#   2. repository variable override (e.g. PULP_SANITIZER_TSAN_RUNS_ON_JSON)
#   3. hard-coded default (e.g. "macos-14" / "ubuntu-24.04")
#
# When all the new repo variables are unset, this workflow resolves to
# today's hard-coded defaults — no behavior change. Opt-in via
# `gh variable set PULP_SANITIZER_<TARGET>_RUNS_ON_JSON ...` to move a
# single sanitizer (e.g. TSan) to a self-hosted Mac without editing code.
# See docs/guides/local-ci.md § "Switching a job's runner without a code
# change" for the full variable list and gh examples.

on:
  pull_request:
    branches: [main, develop]
    # Path filter: only run sanitizers when the touched code can
    # plausibly affect memory safety / threading. Docs-only and
    # workflow-YAML-only PRs skip the 30-min matrix. #412 step 5.
    paths:
      - 'core/**'
      - 'examples/**'
      - 'tools/cli/**'
      - 'test/**'
      - 'CMakeLists.txt'
      - 'tools/cmake/**'
      - '.github/workflows/sanitizers.yml'
      - 'setup.sh'
      - 'external/**'
  push:
    branches: [main]
    paths:
      - 'core/**'
      - 'examples/**'
      - 'tools/cli/**'
      - 'test/**'
      - 'CMakeLists.txt'
      - 'tools/cmake/**'
      - '.github/workflows/sanitizers.yml'
      - 'setup.sh'
      - 'external/**'
  workflow_dispatch:
    inputs:
      asan_runner_selector_json:
        description: "Optional JSON runs-on override for ASan"
        required: false
        default: ""
        type: string
      tsan_runner_selector_json:
        description: "Optional JSON runs-on override for TSan"
        required: false
        default: ""
        type: string
      ubsan_runner_selector_json:
        description: "Optional JSON runs-on override for UBSan"
        required: false
        default: ""
        type: string
      rtsan_runner_selector_json:
        description: "Optional JSON runs-on override for RTSan"
        required: false
        default: ""
        type: string

concurrency:
  group: sanitizers-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Resolve per-sanitizer runs-on via shared helper ──────────────────────
  resolve-runners:
    runs-on: ubuntu-latest
    outputs:
      asan_runs_on: ${{ steps.resolve.outputs.asan_runs_on }}
      tsan_runs_on: ${{ steps.resolve.outputs.tsan_runs_on }}
      ubsan_runs_on: ${{ steps.resolve.outputs.ubsan_runs_on }}
      rtsan_runs_on: ${{ steps.resolve.outputs.rtsan_runs_on }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false
          lfs: false
      - id: resolve
        env:
          EXPLICIT_ASAN_RUNNER_SELECTOR_JSON: ${{ inputs.asan_runner_selector_json || '' }}
          EXPLICIT_TSAN_RUNNER_SELECTOR_JSON: ${{ inputs.tsan_runner_selector_json || '' }}
          EXPLICIT_UBSAN_RUNNER_SELECTOR_JSON: ${{ inputs.ubsan_runner_selector_json || '' }}
          EXPLICIT_RTSAN_RUNNER_SELECTOR_JSON: ${{ inputs.rtsan_runner_selector_json || '' }}
          ASAN_RUNS_ON_JSON: ${{ vars.PULP_SANITIZER_ASAN_RUNS_ON_JSON }}
          TSAN_RUNS_ON_JSON: ${{ vars.PULP_SANITIZER_TSAN_RUNS_ON_JSON }}
          UBSAN_RUNS_ON_JSON: ${{ vars.PULP_SANITIZER_UBSAN_RUNS_ON_JSON }}
          RTSAN_RUNS_ON_JSON: ${{ vars.PULP_SANITIZER_RTSAN_RUNS_ON_JSON }}
        run: |
          set -euo pipefail
          resolve() {
            python3 tools/scripts/resolve_runs_on.py \
              --target-name "$1" \
              --mode default \
              --explicit-env "$2" \
              --override-env "$3" \
              --default-label "$4"
          }
          asan=$(resolve \
            "AddressSanitizer (macOS ARM64)" \
            EXPLICIT_ASAN_RUNNER_SELECTOR_JSON \
            ASAN_RUNS_ON_JSON \
            macos-14)
          tsan=$(resolve \
            "ThreadSanitizer (macOS ARM64)" \
            EXPLICIT_TSAN_RUNNER_SELECTOR_JSON \
            TSAN_RUNS_ON_JSON \
            macos-14)
          ubsan=$(resolve \
            "UndefinedBehaviorSanitizer (macOS ARM64)" \
            EXPLICIT_UBSAN_RUNNER_SELECTOR_JSON \
            UBSAN_RUNS_ON_JSON \
            macos-14)
          # RTSan only runs on workflow_dispatch (see rtsan job's
          # if:), so skip its selector resolution on pull_request/push
          # runs. Previously a malformed `PULP_SANITIZER_RTSAN_RUNS_ON_JSON`
          # (or a debugging mistake on the var) would fail resolve-runners
          # entirely and block ASan/TSan/UBSan for every PR — turning a
          # dispatch-only knob into a required-check outage.
          # See #438 P2 Codex review on #424.
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            rtsan=$(resolve \
              "RealtimeSanitizer (Linux x86_64)" \
              EXPLICIT_RTSAN_RUNNER_SELECTOR_JSON \
              RTSAN_RUNS_ON_JSON \
              ubuntu-24.04)
          else
            rtsan='"ubuntu-24.04"'
          fi
          {
            echo "asan_runs_on=${asan}"
            echo "tsan_runs_on=${tsan}"
            echo "ubsan_runs_on=${ubsan}"
            echo "rtsan_runs_on=${rtsan}"
          } >>"${GITHUB_OUTPUT}"

  asan:
    needs: resolve-runners
    runs-on: ${{ fromJSON(needs.resolve-runners.outputs.asan_runs_on) }}
    name: AddressSanitizer (macOS ARM64)
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false
          lfs: false

      - name: Bootstrap repository dependencies
        run: ./setup.sh --ci --deps-only

      - name: Configure with ASan
        run: |
          cmake -S . -B build-asan \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="-fsanitize=address -fno-omit-frame-pointer" \
            -DCMAKE_C_FLAGS="-fsanitize=address -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address" \
            -DPULP_BUILD_TESTS=ON \
            -DPULP_BUILD_EXAMPLES=OFF \
            -DPULP_ENABLE_GPU=OFF

      - name: Build
        run: cmake --build build-asan -j$(sysctl -n hw.ncpu)

      - name: Test with ASan
        env:
          ASAN_OPTIONS: "detect_leaks=0:halt_on_error=1"  # leak detection off (Catch2 false positives)
        # 120s per-test timeout — prevents a single hung test from
        # stalling the matrix. Instrumentation already slows tests 5-10×;
        # anything that can't complete in 2 minutes under ASan is a
        # flake or a real hang worth separate investigation (#412).
        run: |
          ctest --test-dir build-asan --output-on-failure \
            -j$(sysctl -n hw.ncpu) \
            --timeout 120

  tsan:
    needs: resolve-runners
    runs-on: ${{ fromJSON(needs.resolve-runners.outputs.tsan_runs_on) }}
    name: ThreadSanitizer (macOS ARM64)
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false
          lfs: false

      - name: Bootstrap repository dependencies
        run: ./setup.sh --ci --deps-only

      - name: Configure with TSan
        run: |
          cmake -S . -B build-tsan \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="-fsanitize=thread" \
            -DCMAKE_C_FLAGS="-fsanitize=thread" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=thread" \
            -DPULP_BUILD_TESTS=ON \
            -DPULP_BUILD_EXAMPLES=OFF \
            -DPULP_ENABLE_GPU=OFF

      - name: Build
        run: cmake --build build-tsan -j$(sysctl -n hw.ncpu)

      - name: Test with TSan
        env:
          TSAN_OPTIONS: "halt_on_error=1:suppressions=${{ github.workspace }}/test/tsan.supp"
        # TSan only catches races; running the full 2326-test matrix
        # under serial-required (-j1) instrumentation takes 45+ min.
        # Scope to thread-relevant TEST_CASE names: sync primitives
        # (TripleBuffer/SeqLock/SpscQueue/Atomic/Mutex), schedulers
        # (EventLoop/Timer/AsyncUpdater), state (StateStore/ParamValue),
        # IPC (InterprocessConnection/ChildProcessManager), and
        # MIDI/MPE/UMP buffer threading. Catches what TSan exists for;
        # ASan + UBSan still cover the full matrix.
        # AudioWorkgroup is a pre-existing flake (#412 step 4 will
        # replace it with a deterministic race-hammer harness).
        # 120s per-test timeout caps any future hang.
        # Full hardening (#412 steps 2/4/5): suppressions file,
        # audio-race hammer, path-gated trigger.
        run: |
          ctest --test-dir build-tsan --output-on-failure -j1 \
            --timeout 120 \
            --tests-regex 'AudioWorkgroup|EventLoop|StateStore|Timer|TripleBuffer|SeqLock|SpscQueue|ParamValue|MidiBuffer|MpeTracker|UmpCursor|AsyncUpdater|InterprocessConnection|ChildProcessManager|Atomic|Mutex|Concurrent|Race|Workgroup|AudioBridge|RingBuffer|Lockfree' \
            --exclude-regex 'AudioWorkgroup'  # Timer race fixed by the Timer::start/stop shared_ptr fix (#414)

  ubsan:
    needs: resolve-runners
    runs-on: ${{ fromJSON(needs.resolve-runners.outputs.ubsan_runs_on) }}
    name: UndefinedBehaviorSanitizer (macOS ARM64)
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false
          lfs: false

      - name: Bootstrap repository dependencies
        run: ./setup.sh --ci --deps-only

      - name: Configure with UBSan
        run: |
          cmake -S . -B build-ubsan \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="-fsanitize=undefined -fno-sanitize-recover=all" \
            -DCMAKE_C_FLAGS="-fsanitize=undefined -fno-sanitize-recover=all" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=undefined" \
            -DPULP_BUILD_TESTS=ON \
            -DPULP_BUILD_EXAMPLES=OFF \
            -DPULP_ENABLE_GPU=OFF

      - name: Build
        run: cmake --build build-ubsan -j$(sysctl -n hw.ncpu)

      - name: Test with UBSan
        # Skip "Toolbar add items" — pre-existing UBSan-only failure
        # (BUS in ToolbarItem move-ctor, libc++ alignment edge case).
        # Tracked in #411; safe to skip until the fix lands so this
        # job can gate everything else. 120s timeout prevents a single
        # hung test from stalling the matrix.
        run: |
          ctest --test-dir build-ubsan --output-on-failure \
            -j$(sysctl -n hw.ncpu) \
            --timeout 120 \
            --exclude-regex 'Toolbar add items'

  rtsan:
    needs: resolve-runners
    runs-on: ${{ fromJSON(needs.resolve-runners.outputs.rtsan_runs_on) }}
    name: RealtimeSanitizer (Linux x86_64, Clang 18)
    # RTSan requires upstream LLVM Clang 18+. Not available in Apple Clang.
    # See: https://clang.llvm.org/docs/RealtimeSanitizer.html
    #
    # Advisory-only: the apt.llvm.org Clang 18 package on ubuntu-24.04
    # ships without the compiler-rt realtime runtime, so
    # `-fsanitize=realtime` errors with "unsupported argument". Until
    # the runtime is available in that channel (or we vendor a build),
    # the job runs on workflow_dispatch only so it doesn't block PRs.
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false
          lfs: false

      - name: Install Clang 18
        # apt.llvm.org intermittently 5xx's during release cuts; retry
        # the whole install rather than bubble a transient up. #418.
        uses: ./.github/actions/retry
        with:
          label: 'Install Clang 18'
          run: |
            wget https://apt.llvm.org/llvm.sh
            chmod +x llvm.sh
            sudo ./llvm.sh 18
            sudo apt-get install -y clang-18 lld-18

      - name: Install Linux dev headers
        # setup.sh --ci hard-fails when ALSA/X11/Wayland dev headers are
        # missing. apt-get update + install can flake on mirror 5xx;
        # retry rather than rebuild the whole workflow.
        uses: ./.github/actions/retry
        with:
          label: 'Install Linux dev headers (rtsan)'
          run: |
            sudo apt-get update
            sudo apt-get install -y \
              libasound2-dev libdbus-1-dev libdrm-dev libegl1-mesa-dev \
              libgbm-dev libgl1-mesa-dev libx11-dev libxext-dev libxfixes-dev \
              libxi-dev libxinerama-dev libxkbcommon-dev libxrandr-dev \
              libxrender-dev libxss-dev libxtst-dev libwayland-dev wayland-protocols

      - name: Bootstrap repository dependencies
        run: ./setup.sh --ci --deps-only

      - name: Configure with RTSan
        run: |
          cmake -S . -B build-rtsan \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang-18 \
            -DCMAKE_CXX_COMPILER=clang++-18 \
            -DCMAKE_CXX_FLAGS="-fsanitize=realtime -fno-omit-frame-pointer" \
            -DCMAKE_C_FLAGS="-fsanitize=realtime -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=realtime" \
            -DPULP_BUILD_TESTS=ON \
            -DPULP_BUILD_EXAMPLES=OFF \
            -DPULP_ENABLE_GPU=OFF

      - name: Build
        run: cmake --build build-rtsan -j$(nproc)

      - name: Test with RTSan
        run: ctest --test-dir build-rtsan --output-on-failure -j$(nproc) --exclude-regex "GpuSurface|compileShader"
