name: Auto-Release on Version Bump

# End-to-end release pipeline documented in
# docs/guides/release-pipeline.md — keep that doc in sync when you change
# this workflow.
#
# Component J of the versioning-v2 design. On every push to main, diff the
# version-bearing files against the previous push range. If a version
# moved, create the corresponding tag; the existing tag-triggered
# workflows (release-cli.yml, sign-and-release.yml) then build + publish.
#
# This workflow does NOT build binaries or create GitHub Releases
# directly — it is purely the "tag when a version moves" step that
# bridges `pulp pr`-driven merges to the binary pipeline we already have.
#
# Safety properties:
#   - concurrency group prevents overlapping tag pushes.
#   - Idempotent-strict: tagging fails loudly if the tag already points
#     elsewhere. Never silently overwrites.
#   - Release-block via commit trailer: `Release: skip reason="..."` on
#     the merging commit suppresses the tag creation.
#   - Revert detection: `Revert "..."` subject or `Revert-Of:` trailer
#     suppresses tagging for that range.
#   - Does NOT auto-delete tags on downstream failure. Manual recovery is
#     documented in docs/guides/versioning.md.

on:
  push:
    branches: [main]

concurrency:
  group: auto-release
  cancel-in-progress: false

permissions:
  contents: write   # tag push
  issues: write     # open the "stranded fix/feat" tracker (issue #1009)
  actions: write    # cancel superseded release-cli / sign-and-release runs
                    # (see "Supersede older in-flight builds" step below)

jobs:
  tag:
    runs-on: ubuntu-latest
    name: Tag moved versions

    steps:
      - name: Checkout with range context
        uses: actions/checkout@v5
        with:
          # Need enough history to diff against the latest tag.
          fetch-depth: 0
          # Explicitly fetch tags — needed for the latest-tag diff logic
          # below. actions/checkout@v5's default fetches tags along with
          # fetch-depth=0, but spell it out for clarity.
          fetch-tags: true
          token: ${{ secrets.RELEASE_BOT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Skip on trailer or revert
        id: guard
        shell: bash
        run: |
          # Inspect the tip commit for Release: skip / Version-Bump: skip
          # / Revert subject.
          subject=$(git log -1 --format=%s HEAD)
          body=$(git log -1 --format=%B HEAD)

          if echo "$body" | git interpret-trailers --parse | grep -iq '^release: skip'; then
              echo "Release: skip trailer present — no tagging."
              echo "skip=1" >> "$GITHUB_OUTPUT"
              exit 0
          fi
          # pulp #1308 follow-up — honor `Version-Bump: skip reason="..."`
          # the same way `Release: skip` is honored. Authors use this
          # trailer for fix/feat changes that genuinely don't bump the
          # SDK or plugin (e.g. JS-only changes to packages/pulp-react/
          # which versions independently via npm, or docs fixups
          # accidentally typed as `fix:`). Without honoring it, the
          # stranded-fix-detector at the bottom of this workflow fires
          # and opens a tracker issue requiring a follow-up bump PR
          # — but the author already declared no bump is needed and a
          # follow-up bump would synthesize a release the consumers
          # don't actually need.
          #
          # The version-bump-required gate at PR time
          # (.github/workflows/version-skill-check.yml) ALREADY accepts
          # this trailer to let fix/feat merges through. Honoring it
          # here keeps the two layers in lock-step instead of having
          # the post-merge layer second-guess the explicit opt-out.
          #
          # Match shape: unscoped `Version-Bump: skip reason="<non-empty>"` ONLY.
          # Per-surface forms like `Version-Bump: sdk=skip` mean "skip
          # this surface's bump" but don't opt out of the whole release
          # gate (they're handled by the per-surface verdict pipeline
          # in version_bump_check.py). Mirrors the same matching shape
          # as `_range_has_version_bump_skip_trailer()` in
          # tools/scripts/version_bump_check.py — including the
          # requirement that the reason be NON-EMPTY (Codex P2 on the
          # original #1310 fix; the earlier regex allowed bare
          # `reason=` with no value, but the Python gate rejects it).
          # If the two layers disagreed on validity, an author could
          # write `reason=""` that passes here but fails at PR time
          # (or vice-versa) — making the bypass inconsistent.
          if echo "$body" | git interpret-trailers --parse | \
              grep -iE '^version-bump:[[:space:]]+skip\b.*reason[[:space:]]*=[[:space:]]*"[^"]+"'; then
              echo "Version-Bump: skip trailer present — no tagging."
              echo "skip=1" >> "$GITHUB_OUTPUT"
              exit 0
          fi
          if [[ "$subject" =~ ^[Rr]evert ]]; then
              echo "Revert commit — no tagging."
              echo "skip=1" >> "$GITHUB_OUTPUT"
              exit 0
          fi
          if echo "$body" | git interpret-trailers --parse | grep -iq '^revert-of:'; then
              echo "Revert-Of trailer — no tagging."
              echo "skip=1" >> "$GITHUB_OUTPUT"
              exit 0
          fi
          echo "skip=0" >> "$GITHUB_OUTPUT"

      - name: Read version files at before/after
        id: versions
        if: steps.guard.outputs.skip == '0'
        shell: bash
        run: |
          set -euo pipefail

          # Baseline selection — three-way blend:
          #
          # 1. `event.before` — this push's immediate ancestor. What the
          #    original auto-release.yml used. Breaks when multiple PRs
          #    squash-merge in quick succession and a queued run is
          #    cancelled (see 2026-04-19 cascade: v0.23.0 lost).
          #
          # 2. Latest existing tag. #498 switched to this; fixed the
          #    self-heal case but broke TWO other cases (Codex review):
          #
          #    a. `Release: skip` trailer — if a bump merges WITH the
          #       trailer, latest-tag stays at the older version. Next
          #       unrelated push sees latest-tag < HEAD-version and tags
          #       the skipped version anyway. The trailer's one-run
          #       effect silently expires.
          #
          #    b. Revert / downgrade — after reverting 0.23→0.22, the
          #       latest tag is still v0.23. Workflow tries to create
          #       v0.22 at HEAD, which already exists at an older commit,
          #       so `create_tag` fails loudly on every subsequent push
          #       until manual tag cleanup.
          #
          # Fix: baseline = MAX(event.before-version, HEAD-version). In
          # other words: only tag when HEAD-version > previous-commit-
          # version AND > latest-tag-version. Same-commit state doesn't
          # change (no-op). Revert below latest-tag → no-op (no false
          # retag). Self-heal past cancelled intermediate: if
          # event.before-version == HEAD-version (both 0.23) but latest
          # tag is v0.22, the previous-commit side says no-op AND the
          # tag-gap detector below sees tag<HEAD and creates v0.23.
          #
          # Split into two signals:
          #   - `*_prev` = version at event.before
          #   - `*_tag`  = version of latest tag
          #   - Create tag iff HEAD > prev AND HEAD > tag (strict greater)
          #
          # This preserves all three invariants:
          #   - self-heal: cancelled run gap filled on next push
          #   - skip-trailer: one push with skip stays skipped forever
          #   - revert: downgrade doesn't re-tag the old version

          extract_cmake_version() {
              local ref="$1"
              git show "${ref}:CMakeLists.txt" 2>/dev/null \
                | python3 -c 'import sys, re; m = re.search(r"project\s*\(\s*[A-Za-z_][\w]*\s+VERSION\s+(\d+\.\d+\.\d+)", sys.stdin.read(), re.M); print(m.group(1) if m else "")'
          }
          extract_json_version() {
              local ref="$1" path="$2"
              git show "${ref}:${path}" 2>/dev/null \
                | python3 -c 'import sys, json; d = json.loads(sys.stdin.read() or "{}"); print(d.get("version", ""))'
          }

          # Python helper: strict-greater semver compare. Returns "gt",
          # "eq", or "lt". Empty strings behave like "missing" — treat
          # as "lt" so HEAD always wins over nothing.
          #
          # #501 shipped this with the Python body at column 1, which
          # broke the YAML `run: |` block scalar (any line less-indented
          # than the block ends the scalar). GitHub rejected the workflow
          # file with "workflow file issue" on every push since — every
          # auto-release run silently failed, so v0.23.1 never tagged.
          # Fix: use a heredoc that python3 reads from stdin so script
          # indentation is divorced from YAML indentation.
          semver_cmp() {
              python3 - "$1" "$2" <<'PYEOF'
          import sys
          a, b = sys.argv[1], sys.argv[2]
          def parse(v):
              if not v: return None
              return tuple(int(x) for x in v.split("."))
          pa, pb = parse(a), parse(b)
          if pa is None and pb is None: print("eq")
          elif pa is None: print("lt")
          elif pb is None: print("gt")
          elif pa > pb: print("gt")
          elif pa < pb: print("lt")
          else: print("eq")
          PYEOF
          }

          # Latest existing tag per surface (HEAD~1 fallback is intentional —
          # safer to compare against HEAD~1 than a missing-tag sentinel; for
          # first-release cases the tag lookup returns empty and our
          # decision script treats empty as "less than anything").
          latest_sdk_tag=$(git tag --list 'v[0-9]*' --sort=-version:refname | head -1)
          latest_plugin_tag=$(git tag --list 'plugin-v[0-9]*' --sort=-version:refname | head -1)

          sdk_tag=$(extract_cmake_version "${latest_sdk_tag:-HEAD~1}" || true)
          sdk_after=$(extract_cmake_version HEAD || true)
          plugin_tag=$(extract_json_version "${latest_plugin_tag:-HEAD~1}" .claude-plugin/plugin.json || true)
          plugin_after=$(extract_json_version HEAD .claude-plugin/plugin.json || true)

          # #513 fix — trailer-aware bump detection. Walk history from
          # HEAD backward to find the commit that set a given version
          # file to its current value. If that bump commit carries
          # `Release: skip`, the skip is sticky (permanent for that
          # bumped value) and no future push re-evaluates it. Prior
          # logic tried to approximate this using event.before and
          # broke the self-heal case (v0.23.1 recovery on 2026-04-20
          # showed the pattern).
          find_bump_commit() {
              local file="$1"
              local extract="$2"
              local current
              current=$("$extract" HEAD "$file" 2>/dev/null || echo "")
              [ -z "$current" ] && return 1
              # Walk commits that touched the file, newest first.
              local sha
              for sha in $(git log --format=%H -- "$file" 2>/dev/null); do
                  local at prev_v
                  at=$("$extract" "$sha" "$file" 2>/dev/null || echo "")
                  prev_v=$("$extract" "${sha}~1" "$file" 2>/dev/null || echo "")
                  if [ "$at" = "$current" ] && [ "$at" != "$prev_v" ]; then
                      echo "$sha"
                      return 0
                  fi
              done
              return 1
          }
          bump_has_skip() {
              local sha="$1"
              [ -z "$sha" ] && return 1
              git log -1 --format=%B "$sha" \
                  | git interpret-trailers --parse \
                  | grep -iq '^release: skip'
          }
          # Wrap extractors to take (ref, file) for find_bump_commit's API.
          extract_sdk_version_at() {
              extract_cmake_version "$1"
          }
          extract_plugin_version_at() {
              extract_json_version "$1" "$2"
          }

          sdk_bump=$(find_bump_commit CMakeLists.txt extract_sdk_version_at || true)
          plugin_bump=$(find_bump_commit .claude-plugin/plugin.json extract_plugin_version_at || true)
          sdk_skip=0; [ -n "$sdk_bump" ] && bump_has_skip "$sdk_bump" && sdk_skip=1
          plugin_skip=0; [ -n "$plugin_bump" ] && bump_has_skip "$plugin_bump" && plugin_skip=1

          # Delegate the final decision to a pure-Python script we can
          # unit test (tools/scripts/auto_release_decision.py). Inputs
          # come from bash/git; decision logic lives somewhere diff-able
          # and exercisable outside this workflow.
          sdk_decision=$(python3 tools/scripts/auto_release_decision.py \
              --head-version "$sdk_after" \
              --tag-version "$sdk_tag" \
              --bump-commit-has-skip "$sdk_skip" \
              --surface sdk)
          plugin_decision=$(python3 tools/scripts/auto_release_decision.py \
              --head-version "$plugin_after" \
              --tag-version "$plugin_tag" \
              --bump-commit-has-skip "$plugin_skip" \
              --surface plugin)

          sdk_should_tag=$(echo "$sdk_decision" | python3 -c 'import json, sys; print(json.load(sys.stdin)["should_tag"])')
          plugin_should_tag=$(echo "$plugin_decision" | python3 -c 'import json, sys; print(json.load(sys.stdin)["should_tag"])')

          # Expose decision + inputs to the tagging step + the log.
          echo "sdk_should_tag=$sdk_should_tag"       >> "$GITHUB_OUTPUT"
          echo "plugin_should_tag=$plugin_should_tag" >> "$GITHUB_OUTPUT"
          echo "sdk_after=$sdk_after"                 >> "$GITHUB_OUTPUT"
          echo "plugin_after=$plugin_after"           >> "$GITHUB_OUTPUT"

          echo "sdk decision:    $sdk_decision"
          echo "plugin decision: $plugin_decision"

      - name: Create tags for moved surfaces
        if: steps.guard.outputs.skip == '0'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN || secrets.GITHUB_TOKEN }}
          SDK_AFTER: ${{ steps.versions.outputs.sdk_after }}
          SDK_SHOULD_TAG: ${{ steps.versions.outputs.sdk_should_tag }}
          PLUGIN_AFTER: ${{ steps.versions.outputs.plugin_after }}
          PLUGIN_SHOULD_TAG: ${{ steps.versions.outputs.plugin_should_tag }}
        run: |
          set -euo pipefail

          git config user.name  "pulp-release-bot"
          git config user.email "pulp-release-bot@users.noreply.github.com"

          create_tag() {
              local tag="$1"

              # Idempotent-strict: if the tag already exists and points at
              # this commit, skip. If it exists and points elsewhere, fail
              # loudly — a human must reconcile before the release binaries
              # can move.
              #
              # `git ls-remote --tags origin <tag>` returns the TAG OBJECT SHA
              # for annotated tags (the default created by this workflow via
              # `git tag -a`), not the commit SHA. Compare dereferenced
              # target commits instead — the `^{}` suffix peels the tag
              # object to its referenced commit.
              if git ls-remote --tags origin "$tag" | grep -q .; then
                  remote_target=$(git ls-remote --tags origin "${tag}^{}" | awk '{print $1}')
                  # Fallback: lightweight tag (no ^{} entry) — use the ls-remote
                  # sha directly, which IS the commit SHA in that case.
                  if [ -z "$remote_target" ]; then
                      remote_target=$(git ls-remote --tags origin "$tag" | awk '{print $1}')
                  fi
                  local_sha=$(git rev-parse HEAD)
                  if [ "$remote_target" = "$local_sha" ]; then
                      echo "tag $tag already at $local_sha — no-op"
                      return 0
                  fi
                  echo "ERROR: tag $tag exists at $remote_target but HEAD is $local_sha" >&2
                  echo "Manual reconciliation required. See docs/guides/versioning.md." >&2
                  exit 1
              fi

              git tag -a "$tag" -m "Release $tag (automated by auto-release.yml)"
              git push origin "$tag"
              echo "created $tag"
          }

          # Tag iff the should_tag decision in the versions step said so
          # (HEAD > prev AND HEAD > latest-tag — captures self-heal gap
          # fills while rejecting reverts and skipped-then-revisited
          # bumps).
          if [ "$SDK_SHOULD_TAG" = "1" ] && [ -n "$SDK_AFTER" ]; then
              create_tag "v${SDK_AFTER}"
          fi

          if [ "$PLUGIN_SHOULD_TAG" = "1" ] && [ -n "$PLUGIN_AFTER" ]; then
              create_tag "plugin-v${PLUGIN_AFTER}"
          fi

          # Expose the SDK tag we just created so downstream steps can
          # supersede older in-flight builds. (Plugin tags don't go
          # through release-cli, so they don't need supersede.)
          if [ "$SDK_SHOULD_TAG" = "1" ] && [ -n "$SDK_AFTER" ]; then
              echo "sdk_tag=v${SDK_AFTER}" >> "$GITHUB_OUTPUT"
          fi
        id: tag

      # ── Supersede older in-flight release-cli + sign-and-release runs ─
      #
      # Cancels release-cli.yml and sign-and-release.yml runs for any
      # strictly-older SDK tag, then deletes the corresponding draft
      # release. The intent: if v0.101.7 is mid-build and we just tagged
      # v0.102.0, v0.101.7's artifacts are obsolete — users will only
      # ever install v0.102.0. Saves github-hosted macos-15 minutes and
      # gets the latest release to users faster (see #2075 + the 2026-05-15
      # v0.101.x saga that motivated this step).
      #
      # Two opt-outs:
      #   1. vars.PULP_RELEASE_MODE=land-all — repo-wide disable
      #   2. `Release-Supersede: skip reason="..."` trailer on the tip
      #      commit — per-release disable
      #
      # Cancelling sign-and-release.yml is important: it runs on the same
      # tag push and can resurrect a draft release after release-cli is
      # cancelled (codex flagged this footgun in #2075).
      #
      # Semver via stdlib regex, not packaging.version (PEP 440 ≠ SemVer)
      # and not `sort -V` (Pulp pre-release suffixes would be a future
      # extension, but `sort -V` mis-orders them today).
      - name: Supersede older in-flight release builds
        if: steps.tag.outputs.sdk_tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_TAG: ${{ steps.tag.outputs.sdk_tag }}
          RELEASE_MODE: ${{ vars.PULP_RELEASE_MODE || 'supersede-older' }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          if [ "$RELEASE_MODE" = "land-all" ]; then
            echo "RELEASE_MODE=land-all → skipping supersede"
            exit 0
          fi

          # Per-release opt-out via commit trailer.
          if git log -1 --format=%B HEAD | \
               git interpret-trailers --parse | \
               grep -qE '^Release-Supersede:\s*skip\b'; then
            echo "Release-Supersede: skip trailer found → skipping supersede"
            exit 0
          fi

          echo "Supersede check: new tag = $NEW_TAG"

          python3 <<'PYEOF'
          import json, os, re, subprocess, sys

          NEW_TAG = os.environ["NEW_TAG"]
          REPO = os.environ["REPO"]
          SEMVER = re.compile(r"^v?(\d+)\.(\d+)\.(\d+)(?:-.+)?$")

          def parse(tag):
              m = SEMVER.match(tag)
              if not m:
                  return None
              return tuple(int(g) for g in m.groups())

          new_ver = parse(NEW_TAG)
          if not new_ver:
              print(f"NEW_TAG={NEW_TAG} is not a SemVer tag; skipping supersede")
              sys.exit(0)

          def gh(args, check=True):
              r = subprocess.run(["gh", "api", *args], capture_output=True, text=True)
              if check and r.returncode != 0:
                  print(f"gh api failed: {r.stderr}", file=sys.stderr)
                  return None
              return r.stdout

          # The 2026-05-18 starvation incident (pulp #2226 / this fix):
          # the original supersede policy "cancel any tag strictly older
          # than NEW_TAG" cascaded when main moved faster than
          # release-cli.yml could finish. Every new tag cancelled the
          # previous tag's release-cli, and itself got cancelled by the
          # NEXT tag, leaving 10 SDK versions (v0.111.0 → v0.115.0)
          # tagged-but-never-published. No watchdog caught it because
          # release-cli was `cancelled` (not `failure`), draft was
          # deleted (so draft-stuck didn't fire), and tag existed (so
          # cadence-check was happy).
          #
          # New policy: never cancel any tag ≥ the LATEST PUBLISHED
          # release. We only supersede builds that we already know are
          # obsolete (the published `latest` link has moved past them).
          # Until a newer release actually publishes, every in-flight
          # build is a candidate to be the next published release —
          # cancelling them is what creates the starvation.
          raw = gh([
              f"/repos/{REPO}/releases?per_page=100",
              "--jq", ".[] | select(.draft == false) | .tag_name",
          ])
          latest_published = None
          if raw:
              for line in raw.strip().splitlines():
                  v = parse(line.strip())
                  if v and (latest_published is None or v > latest_published):
                      latest_published = v

          if latest_published is None:
              print("No published release yet; skipping supersede entirely (cannot establish threshold).")
              sys.exit(0)

          print(f"Supersede threshold = latest published {latest_published} "
                f"(new tag {new_ver} > threshold; will cancel runs < threshold only)")

          # Workflow IDs to scan. release-cli.yml + sign-and-release.yml.
          workflows = [
              ("release-cli.yml", "release-cli"),
              ("sign-and-release.yml", "sign-and-release"),
          ]

          # Sweep ALL non-completed run states (codex P2 on #2076): the
          # ?status= filter splits queued / in_progress / requested /
          # waiting / pending into separate buckets, and a run may sit
          # in any of them at the moment we read. Listing the full
          # workflow runs page and filtering client-side by status is
          # more robust than querying each named status separately.
          NON_COMPLETED = {
              "queued", "in_progress", "requested", "waiting", "pending",
          }
          for wf_file, wf_label in workflows:
              raw = gh([
                  f"/repos/{REPO}/actions/workflows/{wf_file}/runs?per_page=100",
                  "--jq", ".workflow_runs[] | {id, head_branch, status}",
              ])
              if not raw:
                  continue
              for line in raw.strip().splitlines():
                  run = json.loads(line)
                  if run.get("status") not in NON_COMPLETED:
                      continue
                  tag = run["head_branch"]
                  old_ver = parse(tag)
                  if not old_ver:
                      continue
                  # Never cancel anything ≥ latest published. That tag
                  # might be the next release; cancelling it is what
                  # caused the v0.111..v0.115 starvation.
                  if old_ver >= latest_published:
                      continue
                  print(f"  superseding {wf_label} run {run['id']} (tag {tag} < latest published {latest_published}, status={run.get('status')})")
                  subprocess.run([
                      "gh", "api", "-X", "POST",
                      f"/repos/{REPO}/actions/runs/{run['id']}/cancel",
                  ], capture_output=True)

          # Delete drafts strictly older than the latest PUBLISHED release.
          # Never touch published. Never delete drafts ≥ latest published
          # (those drafts might still publish — deleting them recreates
          # the 2026-05-18 starvation).
          raw = gh([
              f"/repos/{REPO}/releases?per_page=50",
              "--jq", ".[] | select(.draft) | {id, tag: .tag_name}",
          ])
          if raw:
              for line in raw.strip().splitlines():
                  rel = json.loads(line)
                  old_ver = parse(rel["tag"])
                  if not old_ver or old_ver >= latest_published:
                      continue
                  print(f"  deleting draft release {rel['tag']} (id {rel['id']}; < latest published {latest_published})")
                  subprocess.run([
                      "gh", "api", "-X", "DELETE",
                      f"/repos/{REPO}/releases/{rel['id']}",
                  ], capture_output=True)
          PYEOF

      # CHANGELOG regeneration moved to .github/workflows/post-tag-sync.yml
      # (installed by `shipyard release-bot hook install`). Firing on the
      # tag push instead of inline in auto-release decouples the docs
      # sync from the binary build — if builds fail, CHANGELOG still
      # regens; if regen fails, builds aren't blocked. See shipyard
      # issue #53 + PR #73 for the full design.

      # ── Stranded fix/feat detector (issue #1009) ─────────────────────
      #
      # When SHOULD_TAG=0 across both surfaces, auto-release.yml exits
      # successfully without producing a tag. That is the *correct*
      # outcome for the vast majority of merges (docs, tests, internal
      # refactors, chore commits). It is the WRONG outcome when a
      # user-facing fix/feat merged without an accompanying bump — the
      # change is then stranded on main and consumers cannot reach it.
      #
      # Layer 1 (version-skill-check.yml) hard-fails on this case at PR
      # time, but `gh pr merge` and force-push-then-`shipyard pr` paths
      # have shown they can route around it. This step is the
      # post-merge structural backstop:
      #
      #   1. Always emit a `::warning::` annotation visible in the
      #      auto-release.yml run UI when a stranded fix/feat is
      #      detected. Visible to anyone reviewing the run.
      #   2. Open a tracking issue (`release-stuck` label, edit-in-place
      #      semantics matching the watchdog pattern in
      #      auto-release-watchdog.yml). Closed automatically by a
      #      future fix-up PR's auto-release run.
      #
      # Skipped on `Release: skip` trailer / revert merges (the
      # earlier guard step set `skip=1`). That keeps explicit opt-outs
      # silent.
      - name: Stranded fix/feat detector
        if: steps.guard.outputs.skip == '0' && steps.versions.outputs.sdk_should_tag == '0' && steps.versions.outputs.plugin_should_tag == '0'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          # Inspect the merge commit's subject. We use the squash-commit
          # subject (set by `gh pr merge --squash`) which carries the PR
          # title verbatim. Conventional Commits prefix detection mirrors
          # version_bump_check.py exactly so the two layers can never
          # disagree on what counts as user-facing.
          subject=$(git log -1 --format=%s "$HEAD_SHA")
          echo "Tip subject: ${subject}"

          # Bail early for non-fix/feat — the no-tag outcome is correct
          # for those. B1 (2026-05): classification now shells out to
          # `version_bump_check.py classify-subject` so the regex has a
          # single source of truth. Previous inline-Python heredoc copied
          # _FIX_FEAT_TITLE_RE verbatim and could silently drift; the
          # lock-step risk was documented but not enforced.
          if ! python3 tools/scripts/version_bump_check.py classify-subject "$subject"; then
              echo "Tip is not a fix:/feat: — no-tag outcome is expected. Done."
              exit 0
          fi

          # Try to find the PR number — `gh api` resolves merge commit
          # → PR via the events API. Best-effort: if it fails, we
          # still emit the warning annotation, just without the link.
          pr_number=""
          if pr_json=$(gh api "/repos/${GITHUB_REPOSITORY}/commits/${HEAD_SHA}/pulls" 2>/dev/null); then
              pr_number=$(echo "$pr_json" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d[0]['number'] if d else '')" 2>/dev/null || true)
          fi

          pr_ref="${pr_number:+#${pr_number} }"
          subject_safe="${subject//\"/\\\"}"

          # Warning annotation — surfaces in the run UI and any
          # downstream watchdog that scans warnings.
          echo "::warning::PR ${pr_ref}appears user-facing (subject: ${subject_safe}) but no version bump landed; consumers are stuck. See issue #1009."

          # Tracking issue with edit-in-place semantics. One issue per
          # tip SHA so multiple stranded merges generate distinct
          # trackers (good — each needs its own follow-up bump PR).
          title="release: stuck — fix/feat merged without bump (${HEAD_SHA:0:8})"

          # Look in OPEN+CLOSED state. If a tracker already exists for
          # this SHA, skip — Layer 2's auto-release-watchdog reopen path
          # is the one that handles re-fires.
          existing=$(
              gh issue list \
                  --repo "$GITHUB_REPOSITORY" \
                  --state all \
                  --search "in:title \"${HEAD_SHA:0:8}\"" \
                  --json number,title,state \
                  --jq "[.[] | select(.title == \"${title}\")] | first | .number // empty" \
                  2>/dev/null || true
          )

          if [ -n "${existing:-}" ]; then
              echo "Tracker already exists for ${HEAD_SHA:0:8}: #${existing}. No-op."
              exit 0
          fi

          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          {
              echo "_Auto-generated by \`.github/workflows/auto-release.yml\` on $(date -u '+%Y-%m-%d %H:%M UTC')._"
              echo
              echo "**Symptom:** A user-facing fix/feat merged to \`main\` without"
              echo "an accompanying \`chore: bump versions\` commit. \`auto-release.yml\`"
              echo "ran (this run: ${run_url}), found no version movement, and"
              echo "exited successfully without tagging. Consumers cannot reach"
              echo "this change until a follow-up bump PR lands."
              echo
              echo "**Tip commit:** \`${HEAD_SHA}\`"
              if [ -n "$pr_number" ]; then
                  echo "**PR:** #${pr_number}"
              fi
              echo "**Subject:** \`${subject_safe}\`"
              echo
              echo "**Resolution:**"
              echo
              echo "1. Open a chore PR that bumps the affected surface(s):"
              echo "   \`\`\`bash"
              echo "   git checkout -b chore/bump-after-${HEAD_SHA:0:8}"
              echo "   python3 tools/scripts/version_bump_check.py --mode=apply"
              echo "   git commit -am 'chore: bump versions (catch-up after ${HEAD_SHA:0:8})'"
              echo "   shipyard pr"
              echo "   \`\`\`"
              echo "2. After the catch-up PR merges, \`auto-release.yml\` will"
              echo "   tag the new version and consumers can pull the fix."
              echo
              echo "**Background:** structural fix tracked in issue #1009. The"
              echo "PR-time gate that should have blocked this merge lives in"
              echo "\`.github/workflows/version-skill-check.yml\` (the"
              echo "\`--require-bump-for-fix-feat\` flag on"
              echo "\`tools/scripts/version_bump_check.py\`). If this tracker"
              echo "fires, branch protection on \`main\` is the recommended"
              echo "follow-up — see \`docs/guides/release-watchdog.md\`."
          } > body.md

          gh issue create \
              --repo "$GITHUB_REPOSITORY" \
              --title "$title" \
              --body-file body.md \
              --label "bug,ci,blocks-release,release-stuck" \
              2>&1 || \
          gh issue create \
              --repo "$GITHUB_REPOSITORY" \
              --title "$title" \
              --body-file body.md
