# codecov.yml - Codecov config for public/#566 Phase 1 (measurement baseline).
#
# Primary consumers (in order): Pulp developers, dispatched agents, CI
# enforcement, contributors reading PR comments. Public dashboard is a
# byproduct, not the design goal. See #566 for the framing and
# planning/coverage-tooling-decision-2026-04-21.md for the full stack.
#
# Keep this file in sync with:
#   - scripts/run_coverage.sh COVERAGE_IGNORE_REGEX (same exclude set)
#   - .github/workflows/coverage.yml (upload step `flags:` list)
#   - docs/guides/coverage.md (human-readable explanation)
# Phase 2 adds ci/coverage-targets.yaml alongside this for the diff-cover
# gate; Phase 4 introduces doc_path_map.json to prevent drift.

# Notification gating - wait for N coverage uploads before the bot
# computes + posts the patch coverage report. Without this, Codecov
# posts as soon as it sees ANY upload, which means an OS-specific tested
# path gets reported as 0% covered against partial data. PR #1873 was a
# textbook example: a CLAP-fixture test that ran only on macOS was
# reported as "0% patch coverage" by the bot because the macOS upload
# hadn't arrived (and never did - see follow-up issue on the coverage
# workflow's `cancel-in-progress: true` concurrency policy that wipes
# in-flight runs on force-push).
#
# `after_n_builds: 1` because per-PR coverage is now macOS-only (PR
# #2540): a normal PR uploads one native Cobertura report. Android
# Kotlin, Linux, and Windows coverage are main/manual/nightly lanes, not
# PR uploads. React PRs can still add a second upload, and Codecov will
# update the report after that upload arrives. Waiting for 2 on ordinary
# PRs would leave Codecov waiting for an upload that never arrives.
#
# If you add or remove a coverage uploader, bump this number to match
# or Codecov will silently wait forever for the missing one and never
# post. After 7d it gives up and posts whatever it has - by then the
# PR has long since merged with a stale report.
codecov:
  notify:
    after_n_builds: 1

coverage:
  status:
    # Project-wide status: "did we get worse?" Not a hard gate - we
    # already have continue-on-error on the coverage job and Phase 3
    # is where per-PR enforcement lands.
    project:
      default:
        target: auto
        threshold: 1%          # allow 1% drop without failing
        informational: true    # Phase 1 is measurement; no blocking yet

    # Patch status: "is new code covered?" Advisory in the sense that
    # branch-protection does NOT require this check (so a sub-threshold
    # PR can still merge), but the check status now accurately reflects
    # the threshold check - `success` if >=75%, `failure` if <75%.
    #
    # Previously `informational: true` hardwired the status to `success`
    # even when patch coverage was 0%, which deceived devs reading the
    # check line. The bot still posted a "[fail] Patch coverage is X%"
    # comment, but the status check itself said success, masking the
    # gap. Flipping to enforcing makes the signal accurate without
    # changing merge behavior (codecov/patch is not in
    # branch-protection's required-status-checks list, so a red
    # check here lets the dev decide; it does not auto-block).
    #
    # To make this a hard merge gate later, add `codecov/patch` to
    # branch-protection's required contexts via the GitHub API or
    # repo settings. Authoritative in-tree gate lives in
    # .github/workflows/coverage.yml ("Diff coverage required") and
    # is separately tracked.
    patch:
      default:
        target: 75%

# Exclude lists mirror scripts/run_coverage.sh COVERAGE_IGNORE_REGEX
# so Codecov and our local tooling count the same set of files.
# External FetchContent sources (Dawn, Skia, mbedTLS, QuickJS,
# Catch2, etc.) and our test trees are never counted as coverage-
# bearing. See planning/coverage-tooling-decision-2026-04-21.md section 4.
#
# `ignore` is a TOP-LEVEL key in Codecov config - nesting it under
# `coverage:` silently no-ops, which would count files we explicitly
# want excluded and skew the baseline metrics. See Codecov config
# schema: https://docs.codecov.com/docs/codecov-yaml
ignore:
  - "external/**"
  - "_deps/**"
  - "test/**"
  - "apple/Tests/**"
  - "apple/.build/**"
  - "examples/**"
  - "build/**"
  - "build-coverage/**"
  - "fetchcontent-src/**"
  - "**/Catch2/**"
  - "**/catch2/**"
  # tools/sandbox-e2e/ is end-to-end CLI test harness (pulp#732).
  # It's invoked by a dedicated pytest lane against real binaries; the
  # harness itself is test code, not product code, so exclude from the
  # project/patch status the same way we exclude test/**. Keep in sync
  # with scripts/run_coverage.sh IGNORE and
  # tools/scripts/run_python_coverage.py omit_globs.
  - "tools/sandbox-e2e/**"
  # Visual harness pytest fixtures live under tools/harness/visual/tests/.
  # The Python coverage lane omits these test files while measuring the
  # harness implementation, so Codecov must not count the tests as
  # patch-coverable product code.
  - "tools/harness/visual/tests/**"
  # Targeted top-level Python helper tests live next to the tools they
  # validate, but remain test code rather than product coverage surface.
  - "tools/test_*.py"
  # Motion visual self-check scripts are executable test harnesses. The
  # Python coverage lane runs a pure helper unit test for the analyzer
  # instead of counting those dependency-gated scripts as product code.
  - "tools/motion/visual/test_*.py"
  # -- Aligned with tools/scripts/coverage_config.json `diff_cover_excludes` --
  # The Pulp gate (`Diff coverage required` in coverage.yml) excludes these
  # files because they're either thin dispatchers exercised end-to-end via
  # shell-out tests (so direct line coverage doesn't propagate cleanly), or
  # platform-specific renderer code that the cross-platform coverage matrix
  # can't instrument uniformly. Without aligning the Codecov bot's ignore
  # list to the same set, the bot's `codecov/patch` check fires red on PRs
  # whose diff is mostly in these files (e.g. PR #1984's viewport-fit lived
  # almost entirely in window_host_mac.mm - Pulp gate silent, bot screamed
  # 8.64% patch coverage). Both sides MUST count the same set.
  #
  # Drift between this list and coverage_config.json is detected by
  # tools/scripts/test_codecov_config_sync.py - keep them in sync.
  - "**/cmd_loop.cpp"
  - "**/pulp_import_design.cpp"
  - "**/cg_canvas.mm"
  - "**/window_host_mac.mm"
  - "**/scanner_clap.cpp"
  - "**/cmd_projects.cpp"
  - "**/canvas.hpp"
  - "**/skia_canvas.cpp"

# PR comment. Focused on reach + diff + flags + tree so contributors
# see "how many lines of THIS PR are covered by THIS PR's tests"
# front-and-centre. Tree view lets them jump to an uncovered file.
comment:
  layout: "reach, diff, flags, tree"
  behavior: default
  require_changes: true        # only post when coverage data is present

# Flag definitions are retained for Phase 1 PR 4 (per-OS upload jobs)
# and for future workflows that genuinely upload one file per flag.
# The main coverage.yml upload does NOT attach any flags - Codecov
# rejects single-upload multi-flag submissions with "Multiple flags
# detected. Please ensure one flag per upload." The per-subsystem /
# per-platform / per-surface breakdown comes from `component_management`
# below, which slices the single upload by path. Component IDs mirror
# these flag names 1:1 so cross-referencing stays consistent.
#
# Every top-level `core/*` directory plus the platform/surface slices
# below gets a matching flag/component pair. Adding a new subsystem
# means updating both blocks in this file; `tools/scripts/test_codecov_config.py`
# checks them against the live `core/*` tree so drift fails fast.
flags:
  # Core subsystems - one flag per top-level core/** directory.
  audio:
    paths:
      - core/audio/
    carryforward: true
  canvas:
    paths:
      - core/canvas/
    carryforward: true
  dsl:
    paths:
      - core/dsl/
    carryforward: true
  events:
    paths:
      - core/events/
    carryforward: true
  format:
    paths:
      - core/format/
    carryforward: true
  host:
    paths:
      - core/host/
    carryforward: true
  midi:
    paths:
      - core/midi/
    carryforward: true
  osc:
    paths:
      - core/osc/
    carryforward: true
  platform:
    paths:
      - core/platform/
    carryforward: true
  render:
    paths:
      - core/render/
    carryforward: true
  runtime:
    paths:
      - core/runtime/
    carryforward: true
  signal:
    paths:
      - core/signal/
    carryforward: true
  state:
    paths:
      - core/state/
    carryforward: true
  view:
    paths:
      - core/view/
    carryforward: true

  # Platform flags (4) - cross-cut the subsystem flags. "What's host
  # coverage on Windows?" is answered by cross-filtering `host AND
  # windows`. Paths cover all subsystems because any subsystem can
  # have a Windows shim under its own `platform/windows/` tree.
  android:
    paths:
      - core/platform/src/android/
      - android/
      - core/render/platform/android/
      - core/**/android/
    carryforward: true
  apple:
    paths:
      - apple/
      - core/**/macos/
      - core/**/ios/
      - core/**/mac/
    carryforward: true
  linux:
    paths:
      - core/**/linux/
      - core/**/alsa/
    carryforward: true
  windows:
    paths:
      - core/**/win/
      - core/**/windows/
      - core/**/wasapi/
    carryforward: true

  # Surface flags (4) - non-core but first-party:
  cli:
    paths:
      - tools/cli/
    carryforward: true
  inspect:
    paths:
      - inspect/
    carryforward: true
  ship:
    paths:
      - ship/
    carryforward: true
  tools:
    # Everything under tools/ except the CLI (which already has its
    # own flag above). Codecov's glob takes first-matching-flag per
    # file, and more-specific `tools/cli/` wins over the broader
    # `tools/` here.
    paths:
      - tools/
    carryforward: true

  # OS flags (3) - Phase 1 PR 4 cross-platform coverage matrix. These
  # are NOT path-scoped; every file measured on a given matrix leg is
  # tagged with that OS's flag at upload time via the corresponding
  # matrix entry in .github/workflows/coverage.yml. Federate with the
  # subsystem + platform + surface flags above for cross-filtering:
  # `host AND os-windows` answers "what fraction of core/host is
  # exercised when tests run on Windows?" - a different question from
  # `host AND windows` (which reads "what fraction of the windows/
  # shim files are covered at all"). See docs/guides/coverage.md
  # section "Multi-OS coverage" for the rationale on Codecov-flag unions vs
  # llvm-profdata merge.
  os-linux:
    carryforward: true
  os-macos:
    carryforward: true
  os-windows:
    carryforward: true

# carryforward: true on every flag - when a PR doesn't touch
# a given subsystem, carry over the last known coverage for that
# flag from main so the dashboard doesn't report a false 0%. Standard
# Codecov practice for multi-job uploads (we have one job per OS
# starting in Phase 1 PR 4).

# Components are Codecov's canonical mechanism for path-based coverage
# slicing driven by a single upload. Flags (above) are ultimately keyed
# to upload sources and come into their own once Phase 1 PR 4 splits
# the coverage job per-OS; components give us the subsystem / platform /
# surface breakdown today from the single-upload Cobertura XML without
# relying on Codecov's flag-with-paths behaviour (which is documented
# but has historically been less reliable for trend analysis across
# many flags attached to one upload).
#
# Keep component_id values aligned with the flag names above so the
# dashboard reads consistently whichever dimension you filter by.
component_management:
  default_rules:
    statuses:
      - type: project
        target: auto
        threshold: 1%
        informational: true
  individual_components:
    # Core subsystems - mirror every top-level core/** directory.
    #
    # Subsystems that house platform-specific subtrees (`audio`, `midi`,
    # `view`, `render`, `platform`, `canvas`) explicitly exclude those
    # subtrees so each first-party file lands in exactly one component
    # bucket - see #1055. Platform-specific code is owned by the
    # `apple`/`android`/`linux`/`windows` components below; without the
    # `!`-exclude here those files were silently double-counted, inflating
    # coverage for both the subsystem and the platform.
    - component_id: audio
      name: audio
      paths:
        - "core/audio/**"
        - "!core/audio/platform/**"
    - component_id: canvas
      name: canvas
      paths:
        - "core/canvas/**"
        - "!core/canvas/platform/**"
    - component_id: dsl
      name: dsl
      paths: ["core/dsl/**"]
    - component_id: events
      name: events
      paths: ["core/events/**"]
    - component_id: format
      name: format
      paths: ["core/format/**"]
    - component_id: host
      name: host
      paths: ["core/host/**"]
    - component_id: midi
      name: midi
      paths:
        - "core/midi/**"
        - "!core/midi/platform/**"
    - component_id: osc
      name: osc
      paths: ["core/osc/**"]
    - component_id: platform
      name: platform
      paths:
        - "core/platform/**"
        # Each platform-OS subtree is owned by the matching platform
        # component below. `core/platform/platform/posix/**` is kept in
        # because it is shared POSIX scaffolding, not OS-specific.
        - "!core/platform/platform/ios/**"
        - "!core/platform/platform/mac/**"
        - "!core/platform/platform/linux/**"
        - "!core/platform/platform/win/**"
        - "!core/platform/src/android/**"
        - "!core/platform/include/pulp/platform/android/**"
        - "!core/platform/include/pulp/platform/win/**"
    - component_id: render
      name: render
      paths:
        - "core/render/**"
        - "!core/render/platform/**"
    - component_id: runtime
      name: runtime
      paths: ["core/runtime/**"]
    - component_id: signal
      name: signal
      paths: ["core/signal/**"]
    - component_id: state
      name: state
      paths: ["core/state/**"]
    - component_id: view
      name: view
      paths:
        - "core/view/**"
        - "!core/view/platform/**"
    # Platform (4) - cross-cut the subsystems. Patterns within each
    # platform component must not overlap each other (Codecov double-
    # counts files matched twice within the same component, inflating
    # the line totals - caught on #1055 as `platform,android,android`
    # 3-way matches).
    - component_id: android
      name: android
      paths:
        - "android/**"
        - "core/**/android/**"
    - component_id: apple
      name: apple
      paths:
        - "apple/**"
        - "core/**/macos/**"
        - "core/**/ios/**"
        - "core/**/mac/**"
    - component_id: linux
      name: linux
      paths:
        - "core/**/linux/**"
        - "core/**/alsa/**"
    - component_id: windows
      name: windows
      paths:
        - "core/**/win/**"
        - "core/**/windows/**"
        - "core/**/wasapi/**"
    # Surface (4) - `tools` excludes `tools/cli/**` so the more specific
    # `cli` component owns those files; otherwise every CLI file is
    # double-counted (#1055).
    - component_id: cli
      name: cli
      paths: ["tools/cli/**"]
    - component_id: inspect
      name: inspect
      paths: ["inspect/**"]
    - component_id: ship
      name: ship
      paths: ["ship/**"]
    - component_id: tools
      name: tools
      paths:
        - "tools/**"
        - "!tools/cli/**"
