# Pulp's pinned Shipyard release.
#
# Shipyard is the cross-platform CI controller Pulp uses for queue,
# multi-platform validation, and merge gating. Pulp pins a specific
# Shipyard release here so every checkout uses the same version.
#
# To install or upgrade:
#   ./tools/install-shipyard.sh
#
# To check what's installed vs what's pinned:
#   ./tools/install-shipyard.sh --status
#
# To bump the pin (after verifying a new Shipyard release works on
# Pulp's CI matrix):
#   1. Edit `version` below.
#   2. Run `./tools/install-shipyard.sh` to download the new binary.
#   3. Run `shipyard run` on a feature branch to verify.
#   4. Open a PR with this file change and your verification notes.
#
# Lockstep docs:
# When bumping the pin, also re-check that the following docs still
# accurately describe what Shipyard provides at the new version:
#   - README.md (Contributing + Security & CI policy section)
#   - CONTRIBUTING.md (Contributor expectations section)
#   - .agents/skills/ci/SKILL.md (tool-selection logic)
#   - docs/guides/local-ci.md (cross-references between local_ci.py
#     and shipyard, eventual removal once local_ci.py is retired)
# If a Shipyard release introduces a new command, deprecates one, or
# changes governance defaults, update those docs in the same PR that
# bumps this pin.

[shipyard]
# v0.22.7 — seven patch releases on the v0.22.x line:
#
#   v0.22.1 — `install.sh` grew `SHIPYARD_VERSION` and
#             `SHIPYARD_INSTALL_DIR` env-var support so downstreams
#             (like Pulp's `tools/install-shipyard.sh`) can delegate
#             the download + verify path without reimplementing it.
#   v0.22.2 — completed the daemon-spawn fix that v0.22.1's commit
#             message advertised but didn't actually include.
#   v0.22.3 — removed "Automated by Shipyard." branding and "Ship"
#             internal-term leakage from auto-opened PR bodies so
#             Pulp PRs read as first-party.
#   v0.22.4 — PyInstaller bundling fix: the standalone binary was
#             missing the `encodings.idna` codec, so `shipyard daemon`
#             crashed silently the moment it tried to resolve a
#             hostname (common in the live-mode webhook listener).
#             0.22.4 adds the codec to the frozen bundle.
#   v0.22.5 — `shipyard daemon status` IPC read-loop fix: the client
#             stopped reading after the hello frame and never consumed
#             the status reply, so `status` reported "not running"
#             even when the daemon was alive. 0.22.5 also adds a CI
#             smoke test for the PyInstaller bundle so future
#             frozen-binary-only regressions (like 0.22.4's idna
#             codec omission) are caught pre-release.
#   v0.22.6 — `shipyard ship-state reconcile`: heals stale ship-state
#             entries by re-polling dispatched GitHub Actions runs
#             and mirroring their terminal status into the cached
#             shipyard queue. Closes the "PR merged upstream but
#             shipyard still thinks it's running" failure mode.
#   v0.22.7 — reconcile evidence-snapshot fix: 0.22.6 healed the
#             `dispatched_runs` layer but left `evidence_snapshot`
#             stale. The macOS GUI's ShipStatePoller applies
#             evidence_snapshot AFTER dispatched_runs and overwrote
#             the rendered status — so reconcile ran but PR cards
#             kept the old "failed" pill. 0.22.7 mirrors terminal
#             statuses into evidence_snapshot so both layers heal
#             together.
#
# Cumulative additions from earlier releases still in effect:
#   v0.4–v0.8 — release-bot helpers, `shipyard doctor release-chain`,
#   trailer shortcuts, `watch-stream`, `ship --auto-merge`, cloud
#   retarget (Shipyard PRs #45/#46/#51/#52/#54/#55/#56/#57/#59/#62/#64/#66).
#   v0.3.0 — `shipyard ship --resume` / `--no-resume`, `ship-state
#   list/show/discard`, `cleanup --ship-state`.
#   v0.2.0 — incremental bundles, `--resume-from` SSH, targets/config,
#   cloud polling timeout, ssh upload, stale queue recovery.
#
# Lands at `~/.local/bin/shipyard` via the upstream installer delegate
# in `tools/install-shipyard.sh` (v0.22.1+ `SHIPYARD_VERSION` support).
# The older `~/.pulp/bin/shipyard` path is cleaned up on install to
# prevent shadow-on-PATH bugs.
version = "v0.22.7"

# Public release source. The bootstrap script downloads from
# https://github.com/{repo}/releases/download/{version}/{asset}
repo = "danielraffel/Shipyard"

# SHA-256 verification asset name (downloaded alongside the binary).
checksums_asset = "checksums.sha256"

# Per-platform binary asset names. The bootstrap script picks the
# right one for the current host.
[shipyard.assets]
darwin-arm64  = "shipyard-macos-arm64"
darwin-x64    = "shipyard-macos-x64"
linux-arm64   = "shipyard-linux-arm64"
linux-x64     = "shipyard-linux-x64"
windows-x64   = "shipyard-windows-x64.exe"
