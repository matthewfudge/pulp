name: Build and Test

on:
  pull_request:
    branches: [main, 'develop/**']
  workflow_dispatch:
    inputs:
      runner_provider:
        description: "Runner provider to use for Linux and Windows build legs"
        required: false
        default: namespace
        type: choice
        options:
          - namespace
          - github-hosted
      linux_runner_selector_json:
        description: "Optional JSON string/array for Linux runs-on when routing through Namespace"
        required: false
        default: ""
        type: string
      windows_runner_selector_json:
        description: "Optional JSON string/array for Windows runs-on when routing through Namespace"
        required: false
        default: ""
        type: string
      macos_runner_selector_json:
        description: "Optional JSON string/array for macOS runs-on when routing through Namespace; omit to keep macOS local-only"
        required: false
        default: ""
        type: string

# Cancel superseded runs when a new commit lands on the same PR.
# Stops stale build matrix runs (20-30 min each) from eating runner
# capacity when a PR accumulates fixup commits. workflow_dispatch
# runs share the same group so a manual retrigger cancels any
# auto-triggered run in flight.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  resolve-provider:
    runs-on: ubuntu-latest
    outputs:
      provider: ${{ steps.resolve.outputs.provider }}
      matrix_json: ${{ steps.resolve.outputs.matrix_json }}
    steps:
      - uses: actions/checkout@v5
        with:
          # Shared resolver lives in the repo at tools/scripts/resolve_runs_on.py.
          # We only need the script; no LFS or submodules required.
          lfs: false
      - id: resolve
        env:
          REQUESTED_PROVIDER: ${{ inputs.runner_provider || vars.PULP_DEFAULT_RUNNER_PROVIDER || 'namespace' }}
          EXPLICIT_LINUX_RUNNER_SELECTOR_JSON: ${{ inputs.linux_runner_selector_json || '' }}
          EXPLICIT_WINDOWS_RUNNER_SELECTOR_JSON: ${{ inputs.windows_runner_selector_json || '' }}
          # macOS routing has three layers, evaluated in order (highest
          # precedence first). The Python block below composes
          # `EXPLICIT_MACOS_RUNNER_SELECTOR_JSON` from these inputs so the
          # downstream resolver still sees a single explicit env.
          #
          # 1. Operator override (workflow_dispatch input). Always wins.
          # 2. Namespace overflow (Plan B, pulp planning/2026-05-13-
          #    namespace-overflow-implementation.md). Activates when the
          #    local self-hosted Mac runner has at least
          #    LOCAL_MAC_OVERFLOW_THRESHOLD busy workers AND Namespace is
          #    configured (NAMESPACE_MACOS_RUNS_ON_JSON non-empty).
          # 3. Local default (PULP_LOCAL_MACOS_RUNS_ON_JSON). The
          #    operator's "macOS local runner: primary required gate"
          #    policy when local is idle.
          WORKFLOW_DISPATCH_MACOS_SELECTOR: ${{ inputs.macos_runner_selector_json || '' }}
          LOCAL_MACOS_RUNS_ON_JSON: ${{ vars.PULP_LOCAL_MACOS_RUNS_ON_JSON || '' }}
          # BUSY threshold for macOS overflow. With one local runner,
          # BUSY >= 1 would overflow as soon as any job is in flight —
          # Codex flagged that as too aggressive (planning doc Step 2).
          # Default 2 means "local is fully saturated AND new work is
          # coming"; when Plan A's 2nd local runner is added, bump to
          # match the new capacity.
          LOCAL_MAC_OVERFLOW_THRESHOLD: ${{ vars.PULP_LOCAL_MAC_OVERFLOW_THRESHOLD || '2' }}
          # The runner label the overflow logic queries for `busy`. Must
          # match the label PULP_LOCAL_MACOS_RUNS_ON_JSON targets.
          LOCAL_MAC_RUNNER_LABEL: ${{ vars.PULP_LOCAL_MAC_RUNNER_LABEL || 'sanitizer' }}
          NAMESPACE_LINUX_RUNS_ON_JSON: ${{ vars.PULP_NAMESPACE_BUILD_LINUX_RUNS_ON_JSON }}
          NAMESPACE_WINDOWS_RUNS_ON_JSON: ${{ vars.PULP_NAMESPACE_BUILD_WINDOWS_RUNS_ON_JSON }}
          NAMESPACE_MACOS_RUNS_ON_JSON: ${{ vars.PULP_NAMESPACE_BUILD_MACOS_RUNS_ON_JSON }}
          # gh CLI auth for the overflow-busy-count probe.
          GH_TOKEN: ${{ github.token }}
        # Uses the shared resolver at tools/scripts/resolve_runs_on.py so the
        # same precedence (explicit input → repo var → provider fallback) is
        # reused by sanitizers.yml and any future workflow. See that script's
        # module docstring and tools/scripts/test_resolve_runs_on.py for the
        # build.yml parity cases.
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import subprocess
          import sys
          from pathlib import Path

          REQUESTED = (os.environ.get("REQUESTED_PROVIDER") or "github-hosted").strip()
          EVENT_NAME = (os.environ.get("GITHUB_EVENT_NAME") or "").strip()
          RESOLVER = ["python3", "tools/scripts/resolve_runs_on.py"]
          REPOSITORY = os.environ.get("GITHUB_REPOSITORY", "")

          def run(args):
              result = subprocess.run(
                  RESOLVER + args,
                  check=False,
                  capture_output=True,
                  text=True,
                  env=os.environ.copy(),
              )
              if result.returncode != 0:
                  sys.stderr.write(result.stderr)
                  sys.exit(result.returncode)
              return result.stdout

          # ─── macOS overflow routing (Plan B, pulp #1916 follow-up) ────────
          # When the local self-hosted Mac runner is saturated and Namespace
          # is configured, route the macOS leg to Namespace cloud instead
          # of waiting in the local queue. Precedence is "operator wins,
          # then overflow, then local default" — see the env-block comment
          # above for the layer ordering. Failures of the busy probe fall
          # back to local (the safer choice — overflow is an optimization,
          # not a correctness requirement).
          #
          # Implementation note: `gh api .../actions/runners` requires
          # repo `Administration: Read` scope, which the default workflow
          # GITHUB_TOKEN does not have. The first cut of this probe used
          # that endpoint and fell back to BUSY=0 on every run — overflow
          # never engaged (pulp #1935 post-merge finding). The second cut
          # (pulp #1942) used `actions/runs?status=in_progress|queued`
          # filtered to Build-and-Test runs as a proxy for "local Mac
          # saturated" — but that over-counts: if 20 BAT runs are queued
          # ALL routing to macos-15 (overflow), local sits idle yet the
          # probe still reports BUSY=20 and routes the new PR to overflow
          # too. Local participation drops to zero during deep queues
          # (user feedback, pulp task #24).
          #
          # This probe (pulp task #24) is smarter: it counts only BAT
          # runs whose macOS job is RUNNING-ON-LOCAL. We enumerate
          # in_progress + queued BAT runs and for each one inspect its
          # macOS job's `labels` array. If the labels include
          # "self-hosted", the run is occupying the local Mac. If the
          # job hasn't been dispatched yet (resolve-provider still
          # running for that run), we conservatively count it as BUSY
          # since we can't yet tell where its macOS leg will land.
          #
          # API cost: 1 list-call + N per-run-jobs calls. With typical
          # N <= ~30 (open PRs cap), the cost is bounded. Probe failure
          # still falls back to BUSY=0 (safer to under-count than to
          # always overflow).
          def _count_busy_local_mac_runners() -> int:
              if not REPOSITORY:
                  return 0
              current_run_id = os.environ.get("GITHUB_RUN_ID", "")
              local_label = (os.environ.get("LOCAL_MAC_RUNNER_LABEL") or "self-hosted").strip()

              def _list_runs(status: str):
                  result = subprocess.run(
                      [
                          "gh", "api",
                          f"repos/{REPOSITORY}/actions/runs?status={status}&per_page=100",
                          "--jq",
                          (
                              f'[.workflow_runs[] '
                              f'| select(.name == "Build and Test") '
                              f'| select((.id | tostring) != "{current_run_id}") '
                              f'| .id] | .[]'
                          ),
                      ],
                      check=True,
                      capture_output=True,
                      text=True,
                      timeout=15,
                  )
                  return [line.strip() for line in result.stdout.splitlines() if line.strip()]

              def _macos_job_targets_local(run_id: str) -> bool:
                  # Returns True if the run's macOS job is dispatching to
                  # the local self-hosted target. Returns True (pessimistic)
                  # if the macOS job hasn't been registered yet — we can't
                  # tell where it will land, so count it as potentially
                  # local to avoid overcommitting.
                  try:
                      result = subprocess.run(
                          [
                              "gh", "api",
                              f"repos/{REPOSITORY}/actions/runs/{run_id}/jobs",
                              "--jq",
                              (
                                  f'[.jobs[] '
                                  f'| select(.name | startswith("macOS")) '
                                  f'| .labels] | flatten | join(",")'
                              ),
                          ],
                          check=True,
                          capture_output=True,
                          text=True,
                          timeout=15,
                      )
                      labels = (result.stdout or "").strip()
                      if not labels:
                          # macOS job not yet registered — pessimistic.
                          return True
                      return local_label in labels
                  except (subprocess.SubprocessError, ValueError):
                      # Defer to "potentially local" so a single API blip
                      # doesn't accidentally let two local runs in flight.
                      return True

              try:
                  ids = _list_runs("in_progress") + _list_runs("queued")
                  local_busy = sum(1 for rid in ids if _macos_job_targets_local(rid))
                  total_other = len(ids)
                  sys.stderr.write(
                      f"resolve-provider: BAT runs other than self: "
                      f"{total_other} total, {local_busy} targeting local\n"
                  )
                  return local_busy
              except (subprocess.SubprocessError, ValueError) as exc:
                  sys.stderr.write(
                      f"resolve-provider: local-busy probe failed; "
                      f"falling back to BUSY=0. ({exc})\n"
                  )
                  return 0

          workflow_dispatch_selector = (
              os.environ.get("WORKFLOW_DISPATCH_MACOS_SELECTOR") or ""
          ).strip()
          namespace_macos_selector = (
              os.environ.get("NAMESPACE_MACOS_RUNS_ON_JSON") or ""
          ).strip()
          local_macos_selector = (
              os.environ.get("LOCAL_MACOS_RUNS_ON_JSON") or ""
          ).strip()
          try:
              overflow_threshold = int(
                  (os.environ.get("LOCAL_MAC_OVERFLOW_THRESHOLD") or "2").strip()
              )
          except ValueError:
              overflow_threshold = 2

          if workflow_dispatch_selector:
              macos_route = "operator-override"
              chosen_macos_selector = workflow_dispatch_selector
          elif namespace_macos_selector and EVENT_NAME in ("pull_request", "workflow_dispatch"):
              # 2026-05-19: Namespace overflow logic now also applies to
              # workflow_dispatch (Codex post-merge P2 on PR #2269).
              # Before: condition was `EVENT_NAME == "pull_request"` only,
              # which silently routed `shipyard pr` (which uses
              # workflow_dispatch via the Shipyard `[targets.mac]
              # backend = "cloud"` path) back to the local self-hosted
              # Mac — defeating the cutover for ship cycles. The
              # explicit-override path above (workflow_dispatch_selector)
              # still wins; this branch only fires when the operator
              # didn't supply an explicit selector.
              busy = _count_busy_local_mac_runners()
              if busy >= overflow_threshold:
                  macos_route = f"overflow (BUSY={busy} >= {overflow_threshold})"
                  chosen_macos_selector = namespace_macos_selector
              else:
                  macos_route = f"local (BUSY={busy} < {overflow_threshold})"
                  chosen_macos_selector = local_macos_selector
          else:
              # Namespace not configured. Stay local.
              macos_route = "local (default)"
              chosen_macos_selector = local_macos_selector

          os.environ["EXPLICIT_MACOS_RUNNER_SELECTOR_JSON"] = chosen_macos_selector
          print(
              f"resolve-provider: macOS route = {macos_route}; "
              f"selector = {chosen_macos_selector or '(empty → falls through to provider mode)'}",
              file=sys.stderr,
          )

          linux_runs_on = run([
              "--target-name", "Linux (x64)",
              "--mode", "provider",
              "--github-hosted-label", "ubuntu-latest",
              "--explicit-env", "EXPLICIT_LINUX_RUNNER_SELECTOR_JSON",
              "--namespace-env", "NAMESPACE_LINUX_RUNS_ON_JSON",
              "--namespace-setting-name", "PULP_NAMESPACE_BUILD_LINUX_RUNS_ON_JSON",
          ])
          # Windows routes through the same provider-resolver as Linux.
          # Historical note: an earlier hardcoded override forced Windows to
          # github-hosted on PR events because Namespace Windows capacity
          # was intermittently unavailable. That override was removed on
          # 2026-04-24 — Namespace is now the default for all three legs.
          # If Namespace Windows capacity regresses and PRs start blocking,
          # re-add the override here (track it via a temporary PR rather
          # than leaving it in-tree) and revert once capacity is restored.
          windows_runs_on = run([
              "--target-name", "Windows (x64)",
              "--mode", "provider",
              "--github-hosted-label", "windows-latest",
              "--explicit-env", "EXPLICIT_WINDOWS_RUNNER_SELECTOR_JSON",
              "--namespace-env", "NAMESPACE_WINDOWS_RUNS_ON_JSON",
              "--namespace-setting-name", "PULP_NAMESPACE_BUILD_WINDOWS_RUNS_ON_JSON",
          ])
          windows_provider = REQUESTED
          # macOS leg uses `mode=provider` (same as Linux + Windows) so the
          # explicit selector env (EXPLICIT_MACOS_RUNNER_SELECTOR_JSON, which
          # falls back to the PULP_LOCAL_MACOS_RUNS_ON_JSON repo var) is
          # honored regardless of REQUESTED_PROVIDER.
          #
          # Previously this used `mode=optional-namespace` which has a hard
          # early-return when REQUESTED_PROVIDER != "namespace", silently
          # ignoring the explicit env. With DEFAULT_RUNNER_PROVIDER set to
          # "github-hosted" (operator default — Linux/Windows on GHA; macOS
          # routes to Namespace via PULP_NAMESPACE_BUILD_MACOS_RUNS_ON_JSON
          # with PULP_LOCAL_MAC_OVERFLOW_THRESHOLD=0; see 2026-05-18 cutover)
          # that meant the macOS leg always fell through to macos-15 GH-hosted
          # even when PULP_LOCAL_MACOS_RUNS_ON_JSON pointed at the local
          # self-hosted runner. Switching to provider mode wires the
          # repo-var fallback through correctly.
          #
          # Provider mode emits the github-hosted-label fallback ("macos-15")
          # when no explicit / namespace selector resolves, so the resolver
          # output is always non-empty and the matrix entry is always present.
          macos_runs_on = run([
              "--target-name", "macOS (ARM64)",
              "--mode", "provider",
              "--github-hosted-label", "macos-15",
              "--explicit-env", "EXPLICIT_MACOS_RUNNER_SELECTOR_JSON",
              "--namespace-env", "NAMESPACE_MACOS_RUNS_ON_JSON",
              "--namespace-setting-name", "PULP_NAMESPACE_BUILD_MACOS_RUNS_ON_JSON",
          ])

          include = [
              {
                  "key": "macos",
                  "name": "macOS (ARM64)",
                  "runs_on_json": macos_runs_on,
                  "provider": REQUESTED,
              },
              {
                  "key": "windows",
                  "name": "Windows (x64)",
                  "runs_on_json": windows_runs_on,
                  "provider": windows_provider,
              },
              {
                  "key": "linux",
                  "name": "Linux (x64)",
                  "runs_on_json": linux_runs_on,
                  "provider": REQUESTED,
              },
          ]

          matrix = {"include": include}

          output_path = Path(os.environ["GITHUB_OUTPUT"])
          with output_path.open("a", encoding="utf-8") as handle:
              handle.write(f"provider={REQUESTED}\n")
              handle.write(f"matrix_json={json.dumps(matrix)}\n")
          PY

  build:
    needs: resolve-provider
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.resolve-provider.outputs.matrix_json) }}

    runs-on: ${{ fromJSON(matrix.runs_on_json) }}
    name: ${{ matrix.name }} [${{ matrix.provider }}]
    env:
      # Self-hosted macOS keeps the workspace warm between workflows.
      # Keep the ordinary build matrix out of sanitizer-owned build dirs so
      # cached CMake flags such as -fsanitize=address cannot bleed into it.
      PULP_BUILD_DIR: build-${{ matrix.key }}

    steps:
      # `lfs: false` — pulp's `core.hooksPath = .githooks` (set by
      # setup.sh / install-githooks.sh per the repo's hook convention)
      # conflicts with checkout@v5's internal `git lfs install` on
      # self-hosted runners that retain prior workspace state. Symptom:
      # `git failed with exit code 2` followed by "run git lfs update
      # --force" advice in the runner log. Skia binaries are NOT in LFS
      # for this repo — they're downloaded from a mirror by setup.sh's
      # bootstrap step (`./setup.sh --ci --deps-only` below). Skipping
      # checkout's LFS pull is therefore safe.
      - uses: actions/checkout@v5
        with:
          lfs: false
          # Self-hosted runner reuses its workspace across runs so ccache,
          # FetchContent caches, and CMake configure persist between PRs.
          # GitHub-hosted runners get a fresh VM each run anyway, so the
          # default `clean: true` is wasted there too — but explicit makes
          # the intent obvious. Net win: 5-10× faster on local mac on the
          # 2nd+ run of any PR (cache + build dir stay warm).
          clean: ${{ contains(matrix.runs_on_json, 'self-hosted') == false }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          # libfontconfig1-dev added in #1970: chrome/m144 Skia exposes
          # fontconfig symbols (`FcInitLoadConfigAndFonts` et al.) that
          # earlier Skia releases hid. Without the dev package,
          # `pkg_check_modules(FONTCONFIG fontconfig)` in
          # core/canvas/CMakeLists.txt comes up empty and the Linux link
          # step fails. Mirrors the matching fix in release-cli.yml.
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libdbus-1-dev \
            libdrm-dev \
            libegl1-mesa-dev \
            libfontconfig1-dev \
            libgbm-dev \
            libgl1-mesa-dev \
            libx11-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            libxrender-dev \
            libxss-dev \
            libxtst-dev \
            libwayland-dev \
            wayland-protocols \
            ccache

      # ── Namespace cache (per Namespace team telemetry, 2026-05-19) ──
      # Namespace cache volumes persist across runs on the same workspace,
      # cutting brew-install latency and ccache miss rates substantially.
      # Detection: Namespace selectors land in matrix.runs_on_json as
      # either "namespace-profile-…" (the
      # vars.PULP_NAMESPACE_BUILD_*_RUNS_ON_JSON form configured today)
      # OR direct machine labels like "nscloud-macos-tahoe-arm64-6x14"
      # (documented in docs/guides/local-ci.md as an alternative).
      # Codex P2 on #2399 flagged that a single "namespace" substring
      # missed the nscloud-* form, so we check both prefixes.
      # No-op on self-hosted Mac (already keeps caches on local disk)
      # and github-hosted runners (have actions/cache via #420).
      - name: Namespace cache (brew + ccache + Pulp FetchContent)
        if: contains(matrix.runs_on_json, 'namespace') || contains(matrix.runs_on_json, 'nscloud')
        uses: namespacelabs/nscloud-cache-action@v1
        with:
          cache: brew
          path: |
            ~/Library/Caches/ccache
            ~/.cache/ccache
            ~/Library/Caches/Pulp/fetchcontent-src
            ~/.cache/Pulp/fetchcontent-src

      - name: Install ccache (macOS)
        if: runner.os == 'macOS'
        run: brew install ccache

      - name: Install ccache (Windows)
        if: runner.os == 'Windows'
        continue-on-error: true
        run: choco install ccache --no-progress -y

      # ── Caches (#420) ──────────────────────────────────────────────────
      # The local macOS runner keeps these paths on disk between jobs.
      # Avoid round-tripping multi-GB compiler/source caches through
      # GitHub's cloud cache there; GitHub-hosted runners restore main's
      # cache and only non-PR main runs publish fresh cache entries.
      - name: Restore FetchContent sources (GitHub-hosted)
        if: runner.os != 'macOS' || runner.environment == 'github-hosted'
        id: fetchcontent-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/Library/Caches/Pulp/fetchcontent-src
            ~/.cache/Pulp/fetchcontent-src
            ~/AppData/Local/Pulp/Cache/fetchcontent-src
          key: ${{ runner.os }}-${{ matrix.key || 'build' }}-fetchcontent-${{ hashFiles('setup.sh') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.key || 'build' }}-fetchcontent-

      - name: Restore ccache (GitHub-hosted)
        if: runner.os != 'macOS' || runner.environment == 'github-hosted'
        id: ccache-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/Library/Caches/ccache
            ~/.cache/ccache
            ~/AppData/Local/ccache
          key: ${{ runner.os }}-${{ matrix.key || 'build' }}-ccache-${{ hashFiles('**/CMakeLists.txt', 'tools/cmake/*.cmake') }}-${{ github.ref }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.key || 'build' }}-ccache-${{ hashFiles('**/CMakeLists.txt', 'tools/cmake/*.cmake') }}-
            ${{ runner.os }}-${{ matrix.key || 'build' }}-ccache-

      - name: Bootstrap repository dependencies
        run: ./setup.sh --ci --deps-only
        shell: bash

      - name: Save FetchContent sources (main non-PR GitHub-hosted)
        if: (runner.os != 'macOS' || runner.environment == 'github-hosted') && github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && steps.fetchcontent-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            ~/Library/Caches/Pulp/fetchcontent-src
            ~/.cache/Pulp/fetchcontent-src
            ~/AppData/Local/Pulp/Cache/fetchcontent-src
          key: ${{ steps.fetchcontent-cache.outputs.cache-primary-key }}

      - name: Configure
        # On pull_request events, skip example plugin builds
        # (PulpDrums / PulpSynth / PulpMpeSynth / PulpPluck /
        # AraPitchTracker × VST3/AU/CLAP format variants — the heavy
        # build targets). Tests still build + run; just not the
        # example-plugin product bundles. Trades ~10-20 min per PR
        # for a deferred validation that examples still compile —
        # which runs in full on push to main / schedule.
        # On workflow_dispatch, the full build runs
        # (PULP_BUILD_EXAMPLES default = ON).
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            cmake -S . -B "$PULP_BUILD_DIR" -DCMAKE_BUILD_TYPE=Release -DPULP_BUILD_EXAMPLES=OFF
          else
            cmake -S . -B "$PULP_BUILD_DIR" -DCMAKE_BUILD_TYPE=Release
          fi
        shell: bash

      - name: Build
        shell: bash
        run: cmake --build "$PULP_BUILD_DIR" --config Release

      - name: Ccache stats
        if: always()
        run: |
          if command -v ccache >/dev/null 2>&1; then
            ccache --show-stats
          else
            echo "ccache not available; skipping stats"
          fi
        shell: bash

      - name: Save ccache (main non-PR GitHub-hosted)
        if: (runner.os != 'macOS' || runner.environment == 'github-hosted') && github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && steps.ccache-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            ~/Library/Caches/ccache
            ~/.cache/ccache
            ~/AppData/Local/ccache
          key: ${{ steps.ccache-cache.outputs.cache-primary-key }}

      - name: Test (non-Windows)
        if: runner.os != 'Windows'
        shell: bash
        # Keep one hung ctest entry from burning the full workflow timeout.
        # Long-running tests that need more time set their own CTest TIMEOUT.
        # `-j8` (was `-j4`) — local self-hosted runner is M1 Max with 8 P-cores;
        # GH-hosted ubuntu/macos-15 runners also have ≥4 cores so this
        # doesn't regress their previous behavior. Higher parallelism
        # roughly halves test phase wall-time on multi-core hosts.
        run: ctest --test-dir "$PULP_BUILD_DIR" --output-on-failure -C Release -LE validation -j8 --timeout 120 --exclude-regex "STFT|VisualizationBridge|Clipboard|Toolbar add items"

      - name: Test (Windows — UTF-8 code page wrapped)
        # Windows needs a UTF-8 console code page so ctest's child
        # processes receive filter args (test names with em-dashes
        # like "applies_if — empty expression") without CP-1252
        # mangling. Wrapping ctest inside `cmd /c "chcp 65001 & ctest"`
        # ensures the code page applies to the cmd subshell that
        # spawns test binaries — a plain bash `chcp.com 65001` ran
        # at the outer shell level but didn't propagate to ctest's
        # children on Namespace Windows (observed on #702).
        # Shipyard v0.38.0's UTF-8 prelude only covers commands
        # Shipyard dispatches via ssh-windows; GH Actions ctest
        # calls don't go through that path.
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          chcp 65001
          ctest --test-dir "%PULP_BUILD_DIR%" --output-on-failure -C Release -LE validation -j8 --timeout 120 --exclude-regex "STFT|VisualizationBridge|Clipboard|Toolbar add items"

      # Plugin bundle uploads only run on push/schedule events — pull_request
      # events skip example plugin builds (see Configure step's
      # PULP_BUILD_EXAMPLES=OFF gating) so there are no bundles to upload.
      - name: Upload plugin bundles (macOS)
        if: success() && runner.os == 'macOS' && github.event_name != 'pull_request'
        uses: actions/upload-artifact@v5
        with:
          name: plugins-${{ matrix.key }}
          path: |
            ${{ env.PULP_BUILD_DIR }}/VST3/*.vst3
            ${{ env.PULP_BUILD_DIR }}/CLAP/*.clap
            ${{ env.PULP_BUILD_DIR }}/AU/*.component
          retention-days: 7

      - name: Upload plugin bundles (Windows)
        if: success() && runner.os == 'Windows' && github.event_name != 'pull_request'
        uses: actions/upload-artifact@v5
        with:
          name: plugins-${{ matrix.key }}
          path: |
            ${{ env.PULP_BUILD_DIR }}/VST3/**/*.vst3
            ${{ env.PULP_BUILD_DIR }}/CLAP/**/*.clap
          retention-days: 7

      - name: Upload plugin bundles (Linux)
        if: success() && runner.os == 'Linux' && github.event_name != 'pull_request'
        uses: actions/upload-artifact@v5
        with:
          name: plugins-${{ matrix.key }}
          path: |
            ${{ env.PULP_BUILD_DIR }}/VST3/**/*.so
            ${{ env.PULP_BUILD_DIR }}/CLAP/**/*.so
          retention-days: 7

  # ── Windows MSVC release-path PR gate ────────────────────────────────────
  #
  # The main `build-and-test` matrix above runs Windows via Namespace with a
  # configure that differs from release-cli.yml's. Result: MSVC-specific
  # errors (protected-member strictness, WIN32_LEAN_AND_MEAN / COM header
  # interactions, etc.) only surface AFTER a tag is pushed, when
  # release-cli.yml builds on a GitHub-hosted windows-latest runner. That's
  # how v0.15.0 / v0.16.0 / v0.17.0 shipped broken release pipelines —
  # wasapi_device.cpp and accessibility_win.cpp both hit MSVC errors that
  # the PR gate didn't catch.
  #
  # This job mirrors release-cli.yml's CLI-build configure on windows-latest
  # for every PR so MSVC errors block merge instead of silently failing at
  # tag-push time. Build-only; no test step — release-cli.yml doesn't run
  # tests either, and the main matrix above already covers Windows tests on
  # Namespace.
  windows-msvc-release-gate:
    runs-on: windows-latest
    name: Windows MSVC release-path gate
    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true

      - name: Bootstrap repository dependencies
        run: ./setup.sh --ci --deps-only
        shell: bash

      - name: Configure (matches release-cli.yml)
        run: |
          cmake -S . -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DPULP_BUILD_TESTS=OFF `
            -DPULP_BUILD_WEBVIEW=ON
        shell: pwsh

      - name: Build
        run: cmake --build build --config Release
        shell: pwsh

      - name: Verify installed SDK keeps WebView symbols
        shell: pwsh
        run: |
          cmake --install build --prefix sdk-staging --config Release
          if (!(Test-Path sdk-staging/lib/pulp-view.lib)) {
            throw "sdk-staging/lib/pulp-view.lib missing"
          }
          python -c "from pathlib import Path; data = Path(r'sdk-staging/lib/pulp-view.lib').read_bytes(); assert b'WebViewPanel' in data; assert b'make_webview_embedded_resource_fetcher' in data"

  # ── Stable-name status aliases for branch protection ──────────────────────
  # Branch-protection on `main` requires contexts literally named
  # `macos`, `linux`, `windows`. The real build jobs above are matrix
  # entries with provider-suffixed names (e.g. "macOS (ARM64) [namespace]")
  # that change whenever the runner provider flips — breaking the
  # required-contexts match. These three alias jobs expose stable
  # names that carry the build matrix's result forward.
  #
  # Each alias reads `needs.build.result` (the aggregate matrix
  # conclusion) and fails if the matrix didn't succeed. Per-platform
  # filtering at this layer would need matrix outputs plumbing; for
  # branch-protection purposes "all-build-matrix-green" is the gate
  # we actually want (no PR should merge with any platform red).
  #
  # Discovered in #401 admin-merge: without these aliases every PR
  # stays BLOCKED forever even when all checks pass.

  # Per-OS alias gates resolve to the per-matrix-leg conclusion via the
  # GitHub API (Build and Test run -> jobs[] filtered by name prefix).
  # Previously these checked needs.build.result which is the AGGREGATE
  # matrix outcome — so a Linux failure failed the macOS alias too, which
  # is the wrong shape for the operator's macOS-focus policy (Linux +
  # Windows are advisory; only macOS blocks merge).
  #
  # The aliases still exist to satisfy branch-protection's required-
  # context names (`macos`, `linux`, `windows`) which are stable across
  # provider/runner-name flips. Each alias now gates on its own platform
  # leg independently.

  macos:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Gate on macOS matrix leg only
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          conclusion=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" \
            --jq '.jobs[] | select(.name | startswith("macOS")) | .conclusion' | head -1)
          echo "macOS leg conclusion: ${conclusion:-unknown}"
          if [ "$conclusion" = "success" ]; then
            echo "macOS leg green — macos gate ✓"
            exit 0
          else
            echo "macOS leg ${conclusion:-not found} — blocking macOS gate"
            exit 1
          fi

  linux:
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Linux leg outcome (advisory)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          conclusion=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" \
            --jq '.jobs[] | select(.name | startswith("Linux")) | .conclusion' | head -1)
          echo "Linux leg conclusion: ${conclusion:-unknown}"
          if [ "$conclusion" = "success" ]; then
            echo "Linux leg green — linux gate ✓"
            exit 0
          fi
          # Linux is currently advisory per branch protection (only macOS
          # is required). This alias still surfaces RED so the GitHub UI
          # accurately reflects per-platform state, but it doesn't block
          # merge because branch protection no longer requires `linux`.
          # Operator-facing reminder: file linux failures via the
          # platform:linux + affects-only:non-macos label set (see
          # CLAUDE.md > Platform-focus policy when added).
          echo "Linux leg ${conclusion:-not found} — failing linux alias (advisory only; not required)"
          exit 1

  windows:
    needs: [build, windows-msvc-release-gate]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Windows leg outcome (advisory)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          conclusion=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs?per_page=100" \
            --jq '.jobs[] | select(.name | startswith("Windows (x64)")) | .conclusion' | head -1)
          msvc_ok="${{ needs.windows-msvc-release-gate.result }}"
          echo "Windows matrix leg: ${conclusion:-unknown}"
          echo "Windows MSVC release-path: $msvc_ok"
          if [ "$conclusion" = "success" ] && [ "$msvc_ok" = "success" ]; then
            echo "Both Windows lanes green — windows gate ✓"
            exit 0
          fi
          # Windows is currently advisory (see Linux comment above).
          echo "Windows leg ${conclusion:-not found} or MSVC=$msvc_ok — failing windows alias (advisory only; not required)"
          exit 1
