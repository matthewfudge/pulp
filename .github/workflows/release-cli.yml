name: Release CLI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.1.0)'
        required: true

# Never cancel an in-flight release. If two tags push back-to-back,
# serialize rather than cancel — interrupting a binary build halfway
# through leaves partial artifacts on the runner and can miss
# publishing the earlier tag's release.
concurrency:
  group: release-cli-${{ github.ref }}
  cancel-in-progress: false

env:
  # Pin shipyard to the same version post-tag-sync.yml uses so
  # `shipyard changelog regenerate --release-notes` produces the
  # same output as the hook that writes CHANGELOG.md. Must track
  # tools/shipyard.toml to avoid split behavior between local flows
  # and release-time jobs (Codex P1 on PR #719).
  SHIPYARD_VERSION: "0.55.0"

jobs:
  build-cli:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            platform: darwin-arm64
            artifact: pulp
          - os: ubuntu-24.04
            platform: linux-x64
            artifact: pulp
          - os: ubuntu-24.04-arm
            platform: linux-arm64
            artifact: pulp
          - os: windows-latest
            platform: windows-x64
            artifact: pulp.exe
          - os: windows-11-arm
            platform: windows-arm64
            artifact: pulp.exe

    runs-on: ${{ matrix.os }}
    name: CLI ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v5
        with:
          lfs: true

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev libdbus-1-dev libdrm-dev libegl1-mesa-dev \
            libgbm-dev libgl1-mesa-dev libx11-dev libxext-dev libxfixes-dev \
            libxi-dev libxinerama-dev libxkbcommon-dev libxrandr-dev \
            libxrender-dev libxss-dev libxtst-dev libwayland-dev \
            libgtk-3-dev libwebkit2gtk-4.1-dev wayland-protocols

      - name: Bootstrap dependencies
        run: ./setup.sh --ci --deps-only
        shell: bash

      # Fetch Skia prebuilt binaries — the root fix for pulp #1817.
      #
      # The release tarball must ship libpulp-view.a with MacGpuWindowHost
      # compiled in, otherwise SDK consumers that pass `use_gpu=true`
      # silently fall back to CoreGraphics CPU rendering. The Skia
      # binaries are pinned in tools/deps/manifest.json and live at
      # skia-builder's GitHub release assets — neither bootstrap nor
      # actions/checkout's LFS pull populates them, so we fetch here
      # explicitly. Platforms without a published skia-builder asset
      # (linux-arm64, windows-*) print INFO and continue without GPU;
      # PULP_REQUIRE_GPU_FOR_SDK is gated on the same condition so
      # configure doesn't trip on them.
      - name: Fetch Skia binaries
        run: python3 tools/scripts/fetch_skia_for_release.py ${{ matrix.platform }}
        shell: bash

      # On Linux, building with PULP_BUILD_WEBVIEW=ON pulls webkit2gtk
      # → libjavascriptcoregtk-4.1 into the static pulp-view archive.
      # When the CLI binary links pulp-view (a STATIC library), CMake
      # propagates those PRIVATE deps to the final link line, so the
      # CLI ends up dynamically linked against libjavascriptcoregtk-4.1
      # which is not installed on the smoke runner (or on most user
      # machines) — the binary fails immediately with
      #   "error while loading shared libraries:
      #    libjavascriptcoregtk-4.1.so.0: cannot open shared object file"
      # Pulp's documented JS engine policy (CLAUDE.md) is QuickJS on
      # Linux, so the CLI must not link JSC-GTK at all. Issue #720.
      #
      # Build the CLI binary WITHOUT WebView; the SDK build below
      # reconfigures with WebView=ON so plugin authors still get the
      # WebView code in the SDK tarball.
      - name: Configure (CLI, no WebView on Linux)
        # PULP_REQUIRE_GPU_FOR_SDK is an SDK-release safety net that turns the
        # silent "no Skia → CG fallback" SDK build into a hard configure-time
        # failure. Only enable it for platforms whose Skia binaries we just
        # fetched (matrix-platforms with an entry in fetch_skia_for_release.py's
        # MATRIX_TO_MANIFEST + a published release_assets entry in
        # tools/deps/manifest.json). darwin-arm64 and linux-x64 are the only
        # such platforms today; linux-arm64 + windows-* continue to build
        # without Skia until their assets ship.
        run: |
          REQUIRE_GPU="-DPULP_REQUIRE_GPU_FOR_SDK=OFF"
          case "${{ matrix.platform }}" in
            darwin-arm64|linux-x64)
              REQUIRE_GPU="-DPULP_REQUIRE_GPU_FOR_SDK=ON"
              ;;
          esac
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DPULP_BUILD_TESTS=OFF \
            $REQUIRE_GPU \
            ${{ runner.os == 'Linux' && '-DPULP_BUILD_WEBVIEW=OFF' || '-DPULP_BUILD_WEBVIEW=ON' }}
        shell: bash

      - name: Build
        # Build everything (CLI binary + all libs needed for the SDK tarball).
        # On Linux this is built WITHOUT WebView so the CLI binary stays
        # portable; the SDK reconfigure step below adds WebView back so the
        # SDK tarball still ships WebViewPanel symbols.
        run: cmake --build build --config Release
        shell: bash

      # Phase 8: post-swap there are TWO CLI binaries shipping side by
      # side — `pulp` (Rust, the user-facing default) at the top of
      # the build dir, and `pulp-cpp` (C++, the fallthrough delegate
      # for library-linked subcommands like ship/validate/host) under
      # `tools/cli/`. The release tarball must include both.
      - name: Strip binaries (Unix)
        if: runner.os != 'Windows'
        run: |
          strip build/pulp
          strip build/tools/cli/pulp-cpp

      - name: Install Linux rpath helper
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y patchelf

      # Bundle the wgpu-native dynamic dependency next to the binary
      # and rewrite the rpath so the artifact is portable. Closes
      # #391 (v0.20.0 macOS tarball baked an absolute rpath pointing
      # at /Users/runner/Library/Caches/Pulp/... and crashed on every
      # user machine). The smoke-cli matrix gate (PR #395) verifies
      # the result actually runs on a clean runner.
      #
      # `package_cli.py --cpp-binary` (added on validate/phase8-integrated)
      # bundles `pulp-cpp` alongside `pulp` in the same tarball so the
      # Rust binary's fallthrough paths can find their delegate after
      # the user extracts and runs.
      - name: Package CLI (Unix)
        if: runner.os != 'Windows'
        run: |
          python3 tools/scripts/package_cli.py \
            --binary build/pulp \
            --cpp-binary build/tools/cli/pulp-cpp \
            --build-dir build \
            --platform ${{ matrix.platform }} \
            --out pulp-${{ matrix.platform }}.tar.gz
        shell: bash

      - name: Package CLI (Windows)
        if: runner.os == 'Windows'
        run: |
          python tools/scripts/package_cli.py `
            --binary build/pulp.exe `
            --cpp-binary build/tools/cli/Release/pulp-cpp.exe `
            --build-dir build `
            --platform ${{ matrix.platform }} `
            --out pulp-${{ matrix.platform }}.zip
        shell: pwsh

      # On Linux the CLI was built with PULP_BUILD_WEBVIEW=OFF (issue
      # #720). For the SDK tarball, do a SEPARATE configure+build into
      # `build-sdk/` with WebView=ON so plugin authors who consume the
      # SDK still get WebViewPanel + make_webview_embedded_resource_fetcher
      # symbols in libpulp-view.a. Using a separate build directory
      # avoids re-linking the already-built CLI binary against
      # libwebkit2gtk during the reconfigure (which would defeat the
      # purpose of the split).
      #
      # On macOS/Windows the CLI configure already used WebView=ON, so
      # we just symlink the SDK build dir to the existing build dir.
      - name: Prepare SDK build dir (Linux)
        if: runner.os == 'Linux'
        # Same PULP_REQUIRE_GPU_FOR_SDK gating as the CLI configure above —
        # the SDK lib must contain the Skia path for platforms where it's
        # supposed to. linux-x64 has a published skia-builder asset;
        # linux-arm64 does not (yet) so it must NOT trip the gate.
        run: |
          REQUIRE_GPU="-DPULP_REQUIRE_GPU_FOR_SDK=OFF"
          case "${{ matrix.platform }}" in
            linux-x64)
              REQUIRE_GPU="-DPULP_REQUIRE_GPU_FOR_SDK=ON"
              ;;
          esac
          cmake -S . -B build-sdk \
            -DCMAKE_BUILD_TYPE=Release \
            -DPULP_BUILD_TESTS=OFF \
            $REQUIRE_GPU \
            -DPULP_BUILD_WEBVIEW=ON
          # Build everything the SDK install step needs. This is a full
          # second build on Linux, but it's required to keep the CLI
          # binary (built in `build/` with WebView=OFF) portable.
          cmake --build build-sdk --config Release
        shell: bash

      - name: Prepare SDK build dir (macOS)
        if: runner.os == 'macOS'
        run: ln -snf build build-sdk
        shell: bash

      - name: Build SDK tarball (Unix)
        if: runner.os != 'Windows'
        env:
          MATRIX_PLATFORM: ${{ matrix.platform }}
        run: |
          # build-sdk on Linux is the WebView=ON build (separate dir to
          # avoid re-linking the CLI binary against libwebkit2gtk).
          # build-sdk on macOS is a symlink to build (CLI was built with
          # WebView=ON there).
          cmake --install build-sdk --prefix sdk-staging --config Release
          test -f sdk-staging/lib/libpulp-view.a
          python3 - <<'PY'
          import os
          from pathlib import Path
          platform = os.environ["MATRIX_PLATFORM"]
          data = Path("sdk-staging/lib/libpulp-view.a").read_bytes()
          # WebView lane (existing).
          assert b"WebViewPanel" in data, "WebViewPanel symbol missing"
          assert b"make_webview_embedded_resource_fetcher" in data, (
              "make_webview_embedded_resource_fetcher symbol missing"
          )
          # GPU lane (new — prevents pulp #1817 from regressing).
          #
          # macOS has a dedicated MacGpuWindowHost class that is
          # #ifdef PULP_HAS_SKIA'd. Linux/Windows route GPU through SDL
          # rather than a dedicated host class, so we can't assert on a
          # single GPU host symbol there yet. linux-x64 still has the
          # PULP_REQUIRE_GPU_FOR_SDK CMake gate above to catch a missing
          # Skia at configure time; cross-platform symbol coverage is a
          # follow-up (see pulp #1817 plan, Layer 3).
          if platform == "darwin-arm64":
              assert b"MacGpuWindowHost" in data, (
                  "MacGpuWindowHost symbol missing from libpulp-view.a — "
                  "Skia path was #ifdef'd out at compile time. Consumers "
                  "passing use_gpu=true will silently fall back to "
                  "CoreGraphics CPU rendering. See pulp #1817."
              )
              print("OK: MacGpuWindowHost symbol present in libpulp-view.a")
          PY
          mv sdk-staging pulp-sdk
          tar czf pulp-sdk-${{ matrix.platform }}.tar.gz pulp-sdk
          rm -rf pulp-sdk
        shell: bash

      - name: Build SDK tarball (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake --install build --prefix sdk-staging --config Release
          if (!(Test-Path sdk-staging/lib/pulp-view.lib)) {
            throw "sdk-staging/lib/pulp-view.lib missing"
          }
          python -c "from pathlib import Path; data = Path(r'sdk-staging/lib/pulp-view.lib').read_bytes(); assert b'WebViewPanel' in data; assert b'make_webview_embedded_resource_fetcher' in data"
          Rename-Item sdk-staging pulp-sdk
          Compress-Archive -Path pulp-sdk -DestinationPath pulp-sdk-${{ matrix.platform }}.tar.gz
          Remove-Item -Recurse pulp-sdk
        shell: pwsh

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v6
        with:
          name: pulp-${{ matrix.platform }}
          path: pulp-${{ matrix.platform }}.*

      - name: Upload SDK artifact
        uses: actions/upload-artifact@v6
        with:
          name: pulp-sdk-${{ matrix.platform }}
          path: pulp-sdk-${{ matrix.platform }}.*

  # ── Portable-binary smoke gate (#391) ─────────────────────────────
  #
  # Catches the class of bug v0.20.0 shipped: the macOS tarball
  # baked an LC_RPATH pointing at the GitHub Actions runner's
  # home directory (/Users/runner/Library/Caches/Pulp/...), so the
  # binary worked on the runner that built it but crashed on every
  # user machine with "Library not loaded". The build-cli job above
  # can't catch this because it runs the binary on the SAME runner
  # that built it — the bad path happens to resolve.
  #
  # Strategy: download each platform's freshly-uploaded artifact on
  # a separate runner (different runner ID = clean home directory),
  # untar to /tmp, and run `pulp help`. Any dyld / ld.so / DLL
  # error fails the release before users see it.
  #
  # Equivalent in spirit to the Windows MSVC release-path PR gate
  # added in #349, but at the artifact-portability axis instead of
  # MSVC compile-time.
  smoke-cli:
    needs: build-cli
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            platform: darwin-arm64
            artifact: pulp
          - os: ubuntu-24.04
            platform: linux-x64
            artifact: pulp
          - os: ubuntu-24.04-arm
            platform: linux-arm64
            artifact: pulp
          - os: windows-latest
            platform: windows-x64
            artifact: pulp.exe
          - os: windows-11-arm
            platform: windows-arm64
            artifact: pulp.exe
    runs-on: ${{ matrix.os }}
    name: Smoke ${{ matrix.platform }}

    steps:
      - name: Download CLI artifact for this platform
        uses: actions/download-artifact@v7
        with:
          name: pulp-${{ matrix.platform }}
          path: artifact-in/

      - name: Unpack to /tmp/pulp-smoke (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p /tmp/pulp-smoke
          tar -xzf artifact-in/pulp-${{ matrix.platform }}.tar.gz -C /tmp/pulp-smoke
          ls -la /tmp/pulp-smoke

      - name: Unpack to %TEMP%\pulp-smoke (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path $env:TEMP\pulp-smoke | Out-Null
          Expand-Archive -Force -Path artifact-in\pulp-${{ matrix.platform }}.zip -DestinationPath $env:TEMP\pulp-smoke
          Get-ChildItem $env:TEMP\pulp-smoke

      # Smoke test — the binary must run portably.
      #
      # If `pulp help` exits non-zero or produces dyld/ld.so/DLL
      # errors on stderr, the release tarball is broken on this
      # platform and we fail the release. Capture output to a file
      # so we can grep stderr for the diagnostic patterns even when
      # pulp itself exits 0 (defense-in-depth — some runtime loaders
      # warn but don't fail).
      - name: Smoke `pulp help` + `pulp-cpp help` (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          # Phase 8: tarball ships both `pulp` (Rust) and `pulp-cpp`
          # (C++) side by side. Smoke both — a broken pulp-cpp delegate
          # would silently break every fallthrough subcommand the
          # moment users invoke `pulp ship`, `pulp validate`, etc.
          for ART in pulp pulp-cpp; do
            BIN=/tmp/pulp-smoke/$ART
            echo "===== Testing $BIN ====="
            file "$BIN" || true
            if [ "$RUNNER_OS" = "macOS" ]; then
              echo "--- otool -L (load commands) ---"
              otool -L "$BIN" || true
              echo "--- otool -l rpaths ---"
              otool -l "$BIN" | awk '/LC_RPATH/{flag=1} flag{print; if (/path /) {flag=0}}' | head -20 || true
            else
              echo "--- ldd ---"
              ldd "$BIN" || true
            fi
            echo "--- $ART help ---"
            set +e
            "$BIN" help > /tmp/$ART-smoke.out 2> /tmp/$ART-smoke.err
            rc=$?
            set -e
            echo "exit=$rc"
            echo "--- stdout ---"; cat /tmp/$ART-smoke.out || true
            echo "--- stderr ---"; cat /tmp/$ART-smoke.err || true
            if [ "$rc" -ne 0 ]; then
              echo "FAIL: $ART help returned exit $rc"
              exit 1
            fi
            # Belt + suspenders: dyld/ld.so warnings shouldn't appear even on rc=0.
            if grep -qE "Library not loaded|Symbol not found|cannot open shared object|undefined symbol|@rpath/" /tmp/$ART-smoke.err; then
              echo "FAIL: dyld/ld.so error in stderr (artifact is non-portable)"
              exit 1
            fi
            # Same check for stdout (some loaders write there).
            if grep -qE "Library not loaded|Symbol not found|cannot open shared object" /tmp/$ART-smoke.out; then
              echo "FAIL: loader error in stdout"
              exit 1
            fi
            echo "OK: $ART help is portable on ${{ matrix.platform }}."
          done

      - name: Smoke `pulp help` + `pulp-cpp help` (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          # Phase 8: tarball ships both `pulp.exe` (Rust) and
          # `pulp-cpp.exe` (C++) side by side. Smoke both.
          foreach ($art in @("pulp.exe", "pulp-cpp.exe")) {
              $bin = Join-Path $env:TEMP "pulp-smoke\$art"
              Write-Host "===== Testing $bin ====="
              try { dumpbin /dependents $bin 2>$null } catch { Write-Host "(dumpbin unavailable; skipping)" }
              $stdout = New-TemporaryFile
              $stderr = New-TemporaryFile
              $proc = Start-Process -FilePath $bin -ArgumentList "help" `
                  -RedirectStandardOutput $stdout -RedirectStandardError $stderr -PassThru -Wait -NoNewWindow
              Write-Host "exit=$($proc.ExitCode)"
              Write-Host "--- stdout ---"
              Get-Content $stdout -ErrorAction SilentlyContinue
              Write-Host "--- stderr ---"
              $err = Get-Content $stderr -ErrorAction SilentlyContinue
              $err
              if ($proc.ExitCode -ne 0) {
                  Write-Error "FAIL: $art help returned exit $($proc.ExitCode)"
                  exit 1
              }
              if ($err -match "DLL was not found|side-by-side|ImportError|missing.*\.dll") {
                  Write-Error "FAIL: missing-DLL error in stderr (artifact is non-portable)"
                  exit 1
              }
              Write-Host "OK: $art help is portable on ${{ matrix.platform }}."
          }

  release:
    needs: [build-cli, smoke-cli]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          # regenerate_changelog.py --release-notes walks `git tag` +
          # tag-to-tag ranges; default shallow checkout has no tags so
          # the script falls back to "See CHANGELOG.md" and the release
          # body loses its per-release content. (#265 Codex P2.)
          fetch-depth: 0
          fetch-tags: true

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts/

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Install shipyard
        # Pipe to bash, not sh — install.sh uses bashisms (shipyard 0.11
        # fixed the earlier post-tag-sync.yml bug where /bin/sh (dash)
        # rejected the script).
        run: |
          curl -fsSL https://generouscorp.com/Shipyard/install.sh \
            | SHIPYARD_VERSION="$SHIPYARD_VERSION" bash

      - name: Generate release notes
        id: changelog
        # Uses `shipyard changelog regenerate --release-notes` to build the
        # same markdown shape as CHANGELOG.md itself, so the Releases page
        # and CHANGELOG.md stay in sync (one generator, one source of
        # truth — issue #262). Migrated from tools/scripts/regenerate_changelog.py
        # (shipyard issue #53 + PR #73).
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          NOTES=$(shipyard changelog regenerate --release-notes "$TAG" 2>/dev/null \
              || echo "See [CHANGELOG.md](https://github.com/danielraffel/pulp/blob/main/CHANGELOG.md) for details.")
          echo "notes<<CHANGELOG_EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "CHANGELOG_EOF" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Pulp CLI ${{ steps.version.outputs.tag }}
          body: |
            ${{ steps.changelog.outputs.notes }}

            ---

            ## Install

            **macOS / Linux:**
            ```bash
            curl -fsSL https://www.generouscorp.com/pulp/install.sh | sh
            ```

            **Windows (PowerShell):**
            ```powershell
            irm https://www.generouscorp.com/pulp/install.ps1 | iex
            ```

            These installers place the Rust `pulp` CLI and the C++ `pulp-cpp`
            delegate on your PATH. Or download the binary archive for your
            platform below.
          files: |
            artifacts/**/*
          draft: false
          prerelease: false
