# Pulp CLI command status
# Vocabulary: stable, usable, experimental, partial, planned, unsupported

commands:
  - name: build
    status: usable
    summary: Configure and build the project. Auto-detects CMake reconfiguration needs. Works with repo and standalone projects. When configure is needed, runs the FetchContent cache preflight from `pulp doctor --caches` first and aborts with a clear remediation message on any dangling-symlink / stale-commit entry — bypass via `PULP_SKIP_CACHE_PREFLIGHT=1` (#744).
    args:
      - name: --js-engine
        kind: option
        description: "JS engine backend: auto (default), quickjs, jsc (Apple only), v8 (requires V8 libs). Forces reconfigure."
      - name: --allow-unsupported-sdk
        kind: flag
        description: Bypass the CLI-vs-project SDK compatibility guard and continue anyway (unsupported)
      - name: extra_args
        kind: passthrough
        description: Passed through to cmake --build (e.g., --target, -j)
    docs: reference/cli.md#build

  - name: test
    status: usable
    summary: Run the test suite via CTest. Builds first if needed. When a cold-start build is triggered, runs the FetchContent cache preflight from `pulp doctor --caches` first and aborts with a clear remediation message on any dangling-symlink / stale-commit entry — bypass via `PULP_SKIP_CACHE_PREFLIGHT=1` (#744). Works with repo and standalone projects.
    args:
      - name: extra_args
        kind: passthrough
        description: Passed through to ctest (e.g., -R for filtering)
    docs: reference/cli.md#test

  - name: status
    status: usable
    summary: Show project root, git info, build state, and whether the active project is in source-tree mode or sdk mode.
    docs: reference/cli.md#status

  - name: validate
    status: usable
    summary: Run plugin format validators (clap-validator, pluginval, auval, optional AAX validator) on built plugins. Supports JSON report output and strict CI enforcement.
    args:
      - name: --all
        kind: flag
        description: Run all available validators including vstvalidator and full AAX validation (graceful skip if not installed)
      - name: --json
        kind: flag
        description: Print validation report as JSON to stdout (conforms to validation-report-v1.schema.json)
      - name: --strict
        kind: flag
        description: Treat skipped-because-missing-tool as a hard failure. Use in CI to enforce the validator coverage tier.
      - name: --screenshot
        kind: flag
        description: Capture plugin editor screenshots to artifacts/screenshots/
      - name: --report
        kind: option
        description: Write JSON validation report to the given file path
    docs: reference/cli.md#validate

  - name: ship
    status: usable
    summary: Sign, notarize, package, and generate update feeds for all platforms.
    subcommands:
      - name: sign
        summary: Code-sign plugin bundles (macOS/Windows) or Android APK/AAB
        args:
          - name: --identity
            required: false
          - name: --entitlements
            required: false
          - name: --target
            required: false
          - name: --keystore
            required: false
          - name: --key-alias
            required: false
          - name: --store-pass
            required: false
          - name: --key-pass
            required: false
      - name: notarize
        summary: Submit signed bundles for Apple notarization (macOS)
        args:
          - name: --apple-id
            required: true
          - name: --team-id
            required: true
          - name: --password
            required: false
          - name: --staple
            required: false
      - name: package
        summary: Create installers (.pkg, NSIS, APK/AAB)
        args:
          - name: --version
            required: false
          - name: --target
            required: false
          - name: --keystore
            required: false
          - name: --key-alias
            required: false
          - name: --store-pass
            required: false
          - name: --key-pass
            required: false
          - name: --abi
            required: false
          - name: --apk-only
            required: false
          - name: --aab-only
            required: false
          - name: --per-user
            required: false
      - name: appcast
        summary: Generate Sparkle-compatible XML update feed
        args:
          - name: --url
            required: true
          - name: --version
            required: false
          - name: --notes
            required: false
          - name: --output
            required: false
          - name: --sign-key
            required: false
      - name: check
        summary: Check signing status of built plugins or Android artifacts
        args:
          - name: --target
            required: false
    docs: reference/cli.md#ship

  - name: pr
    status: usable
    summary: Compatibility wrapper for the Shipyard-managed PR flow. Defaults to `shipyard pr`, with explicit `github` and `manual` workflows for users who opt out of Shipyard tracking.
    args:
      - name: --base
        kind: option
        description: Diff base (default origin/main)
        required: false
      - name: --title
        kind: option
        description: PR title override (default tip commit subject)
        required: false
      - name: --workflow
        kind: option
        description: One-shot PR workflow override: shipyard, github, or manual
        required: false
      - name: --no-ship
        kind: flag
        description: Diagnostics-only native fallback flag; do not use as the normal PR path
        required: false
      - name: --no-push
        kind: flag
        description: Stop after bump commit; do not push or create PR
        required: false
      - name: --dry-run
        kind: flag
        description: Print the plan without executing steps
        required: false
      - name: --help
        kind: flag
        description: Show help for the command
        required: false
      - name: --native
        kind: flag
        description: Run in-CLI fallback orchestrator instead of delegating to shipyard pr (diagnostics only)
        required: false
    docs: reference/cli.md#pr

  - name: projects
    status: usable
    summary: Manage the ~/.pulp/projects.json registry. Populated automatically by `pulp create`; use these commands to add existing projects or prune stale entries. `pulp doctor --versions` reads this registry for per-project skew reporting. (#552)
    subcommands:
      - name: list
        summary: Show registered projects (and flag any whose path no longer exists)
      - name: add
        summary: Register a project (defaults to CWD) in the registry
        args:
          - name: path
            kind: positional
            required: false
            description: Project directory to register (default CWD)
      - name: remove
        summary: Remove a project from the registry by path
        args:
          - name: path
            kind: positional
            required: true
            description: Project directory to forget
    docs: reference/cli.md#projects

  - name: project
    status: usable
    summary: Per-project SDK pin management — bump standalone `pulp.toml` sdk_version + find_package(Pulp ...) pins, or legacy CMake pins, and undo the last batch. (#564/#244)
    subcommands:
      - name: bump
        summary: Bump the pinned Pulp SDK version (CWD by default; `--all` iterates the registry)
        args:
          - name: version
            kind: positional
            required: false
            description: Target semver (alias for --to). Defaults to the CLI's own version.
          - name: --to
            kind: value
            required: false
            description: Target semver (e.g. 0.32.0). Rejects pre-release suffixes.
          - name: --all
            kind: flag
            required: false
            description: Iterate ~/.pulp/projects.json instead of the current directory
          - name: --dry-run
            kind: flag
            required: false
            description: Show plan without writing; never mutates anything
          - name: --force-dirty
            kind: flag
            required: false
            description: Skip the git-clean check on pin-bearing files
          - name: --allow-downgrade
            kind: flag
            required: false
            description: Permit target older than current pin
          - name: --allow-cli-skew
            kind: flag
            required: false
            description: Permit target newer than the installed Pulp CLI
          - name: --allow-redundant
            kind: flag
            required: false
            description: Permit bump when origin/main already pins target-or-newer
          - name: --verify-builds
            kind: flag
            required: false
            description: Build each project after bump; roll back the pin on failure
      - name: undo
        summary: Revert the newest `pulp project bump` batch (or a specific one by timestamp)
        args:
          - name: timestamp
            kind: positional
            required: false
            description: ISO-8601 UTC stamp (as in the bump-undo-<timestamp>.json filename). Defaults to newest.
    docs: reference/cli.md#project

  - name: docs
    status: usable
    summary: Browse local documentation and status manifests.
    subcommands:
      - name: index
        summary: List available docs
      - name: search
        summary: Search docs for a string
      - name: open
        summary: Print a doc by slug
      - name: show support
        summary: Look up support status
      - name: show command
        summary: Look up a CLI command
      - name: show cmake
        summary: Look up a CMake function
      - name: show style
        summary: Show code style rules
      - name: check
        summary: Validate docs consistency against codebase
      - name: build-site
        summary: Generate static docs site
      - name: build-api
        summary: Generate API reference from public headers (Doxygen)
    docs: reference/cli.md#docs

  - name: create
    status: usable
    summary: Create a new plugin project from templates. Defaults to sdk mode for external projects, with explicit source-tree example mode for Pulp development and checkout-aware SDK reuse when run from a Pulp source tree.
    args:
      - name: name
        kind: positional
        required: true
        description: Plugin name (e.g., "My Gain")
      - name: --type
        kind: option
        description: "Plugin type: effect, instrument, app, bare (default: effect)"
      - name: --manufacturer
        kind: option
        description: "Manufacturer name (default: Pulp)"
      - name: --output
        kind: option
        description: Output directory override (otherwise uses PULP_PROJECTS_DIR, ~/.pulp/config.toml, repo sibling, or ./<name>)
      - name: --in-tree
        kind: flag
        description: "Add the project under examples/ using the local Pulp checkout (alias: --example)"
      - name: --no-build
        kind: flag
        description: Skip build after scaffolding
      - name: --no-interactive
        kind: flag
        description: "Non-interactive mode for CI/scripting (alias: --ci)"
    docs: reference/cli.md#create

  - name: cache
    status: usable
    summary: Manage SDK and asset cache at ~/.pulp/ by default.
    subcommands:
      - name: status
        summary: Show cached SDKs and assets with sizes
      - name: fetch
        summary: Download platform-specific assets (e.g., skia)
      - name: clean
        summary: Remove all cached assets
    docs: reference/cli.md#cache

  - name: run
    status: usable
    summary: Launch a standalone Pulp application from the build directory. Supports headless / screenshot / frames / watch modes for CI auto-validation (#914).
    args:
      - name: target
        kind: positional
        required: false
        description: "Target name (default: first standalone binary found)"
      - name: --headless
        kind: flag
        description: Run without a window; render offscreen. Forwarded as --headless and PULP_HEADLESS=1 env var (#914).
      - name: --screenshot
        kind: option
        description: Save a PNG screenshot to <file>; implies --headless. Forwarded as --screenshot <file> and PULP_SCREENSHOT=<file> env var (#914).
      - name: --frames
        kind: option
        description: Number of frames to render before screenshot. Default 1. Forwarded as --frames <n> and PULP_FRAMES=<n> env var (#914).
      - name: --watch
        kind: flag
        description: Re-launch the binary on source-file changes. Composes with --headless / --screenshot (#914).
    docs: reference/cli.md#run

  - name: upgrade
    status: usable
    summary: Update the Pulp CLI install to the latest or a specific version, including companion artifacts such as `pulp-cpp`. `--check-only` reports the cached latest release without downloading. `--notes` prints embedded migration notes for the upgrade hop.
    args:
      - name: version
        kind: positional
        required: false
        description: "Version to install (default: latest)"
      - name: --check-only
        kind: flag
        description: Report cached latest release and exit; no download (#547 Slice 2).
      - name: --notes
        kind: flag
        description: Print embedded migration notes for the upgrade hop; no binary swap (#548 Slice 3).
      - name: --json
        kind: flag
        description: With `--notes`, emit stable-shape JSON for agent consumers (#548 Slice 3 → Slice 4).
      - name: --from
        kind: option
        description: Override the `from` version for `--notes` (default is the installed CLI).
      - name: --to
        kind: option
        description: Override the `to` version for `--notes` (default is the cached latest).
    docs: reference/cli.md#upgrade

  - name: version
    status: usable
    summary: Show, bump, or check version consistency across Pulp framework and plugin version surfaces.
    subcommands:
      - name: bump
        summary: Increment the framework version, or plugin version when --plugin is set
      - name: check
        summary: Verify version consistency across CMake, generated SDK constants, changelog, and AU metadata
    docs: reference/cli.md#version

  - name: config
    status: usable
    summary: Read or write ~/.pulp/config.toml settings. Supports `[pr] workflow` plus the `[update]` section (mode, check_interval_hours, channel, bump_projects). `set update.mode` clears ~/.pulp/update-snooze so the new mode takes effect on the next invocation.
    subcommands:
      - name: get
        summary: Print the value for a dotted key (e.g. `pr.workflow` or `update.mode`). Empty output if unset.
      - name: set
        summary: Write a value for a dotted key. Validates PR workflow, update enums, and integer shapes. Mode changes clear the 24h snooze file.
      - name: list
        summary: Dump current supported settings with defaults filled in.
    docs: reference/cli.md#config

  - name: doctor
    status: usable
    summary: Diagnose environment issues. Default mode checks compiler, CMake, git-lfs, platform deps, and either the active checkout or the installed SDK workflow. Optional `android` and `ios` subcommands check mobile dev environments and emit per-host install hints (#8 / #355). `--versions` surfaces CLI/SDK/Plugin version skew (#499). `--validators` surfaces plugin-format validator install + signature integrity, with `--fix` healing user-owned breakage (#743). `--caches` audits the FetchContent shared-source cache for dangling symlinks, stale-commit entries, and root-owned dirs (#744); `--caches --fix` auto-heals user-owned drift without sudo.
    args:
      - name: target
        kind: positional
        description: Optional `android` or `ios` to check the mobile dev environment instead of the default core checks.
      - name: --fix
        kind: flag
        description: Auto-fix issues where possible (with confirmation). With --validators, removes broken user-owned validator copies; root-owned breakage prints a sudo one-liner instead of auto-elevating. With --caches, removes dangling symlinks and stale-commit entries the user owns; root-owned entries are reported but never auto-deleted.
      - name: --ci
        kind: flag
        description: Non-interactive mode, exit codes only
      - name: --dry-run
        kind: flag
        description: Show what --fix would do without doing it
      - name: --versions
        kind: flag
        description: Print CLI/SDK/Plugin version diagnostics and advisory skew warnings (always exits 0)
      - name: --validators
        kind: flag
        description: Discover auval / pluginval / clap-validator across well-known paths, verify each candidate's code signature is intact (catches the "ripped out of .app bundle" signature drift that causes amfid to SIGKILL pluginval mid-run), and report ✓/✗/⚠. Exit 0 only when every validator is Healthy. (#743)
      - name: --scan-parents
        kind: flag
        description: With --versions, also walk the CWD's ancestor directories for CMakeLists.txt files invoking pulp_add_* macros and surface them inline (never auto-registered; opt-in escape hatch for projects created outside `pulp create`)
      - name: --caches
        kind: flag
        description: Audit the Pulp FetchContent shared-source cache (~/Library/Caches/Pulp/fetchcontent-src on macOS, equivalent paths elsewhere). Exits 1 on any dangling-symlink, stale-commit, or root-owned entry. Same discovery code runs as a preflight inside `pulp build` and `pulp test`; bypass via PULP_SKIP_CACHE_PREFLIGHT=1 (#744).
      - name: --json
        kind: flag
        description: With --versions or --caches, emit the diagnostic as a single JSON object (stable schema — see reference/cli.md#doctor)
    docs: reference/cli.md#doctor

  - name: clean
    status: usable
    summary: Remove the build directory.
    docs: reference/cli.md#clean

  - name: config
    status: usable
    summary: Manage global developer configuration (~/.pulp/config.toml).
    subcommands:
      - name: init
        summary: Create config from template (safe — never overwrites)
        args:
          - name: --force
            required: false
      - name: set
        summary: Set a config value (e.g., signing.apple.identity)
        args:
          - name: key
            kind: positional
            required: true
          - name: value
            kind: positional
            required: true
      - name: show
        summary: Show current non-comment config values
      - name: path
        summary: Print config file path
    docs: reference/cli.md#config

  - name: coverage
    status: experimental
    summary: Local coverage tooling. Mirrors CI's `Diff coverage required` gate via `tools/scripts/local_diff_cover.sh`; threshold + filters live in `tools/scripts/coverage_config.json` (single source of truth shared with `.github/workflows/coverage.yml`).
    subcommands:
      - name: diff
        summary: Run the local diff-coverage check; build the listed targets (or all if none).
        args:
          - name: targets
            kind: passthrough
            description: Optional test targets to build for a faster targeted run (e.g., pulp-test-state)
    docs: reference/cli.md#coverage

  - name: design
    status: experimental
    summary: Build and launch the local AI-powered design tool for token and style iteration, binding to the current checkout or the SDK/build next to the CLI binary.
    args:
      - name: script
        kind: positional
        required: false
        description: Optional path to a design-tool JS file to load instead of the default example
      - name: --script
        kind: option
        required: false
        description: Explicit path to the design-tool JS file to load
      - name: --build-dir
        kind: option
        required: false
        description: Override the build directory used to configure/build and launch the tool
    docs: reference/cli.md#design

  - name: design-debug
    status: experimental
    summary: Before/after/diff runner for design-chat prompts with provider/model metadata capture and optional live GPU capture.
    args:
      - name: --prompt
        kind: option
        required: true
        description: Natural-language restyling request to evaluate
      - name: --target
        kind: option
        required: false
        description: "Target widget id or all (default: all)"
      - name: --script
        kind: option
        required: false
        description: Path to the design-tool JS file to load
      - name: --output-dir
        kind: option
        required: false
        description: Artifact directory for prompt, response, screenshots, diff, and report
      - name: --response-file
        kind: option
        required: false
        description: Replay a saved model response without invoking AI
      - name: --capture-backend
        kind: option
        required: false
        description: "Screenshot backend (skia, coregraphics, or live-gpu); live-gpu drives the real design tool renderer"
      - name: --design-tool-bin
        kind: option
        required: false
        description: Path to a built pulp-design-tool binary for live-gpu runs
      - name: --provider
        kind: option
        required: false
        description: "AI provider metadata and command routing (claude, codex)"
      - name: --model
        kind: option
        required: false
        description: Provider-specific model id captured in the JSON report
      - name: --reasoning-effort
        kind: option
        required: false
        description: Optional reasoning effort for supported models
      - name: --ai-cli
        kind: option
        required: false
        description: Override the AI CLI template
      - name: --width
        kind: option
        required: false
        description: Render width in pixels
      - name: --height
        kind: option
        required: false
        description: Render height in pixels
      - name: --scale
        kind: option
        required: false
        description: Render scale factor
      - name: --delay-ms
        kind: option
        required: false
        description: Delay before baseline capture in live-gpu mode
      - name: --after-delay-ms
        kind: option
        required: false
        description: Delay before post-apply capture in live-gpu mode
    docs: reference/cli.md#design-debug

  - name: inspect
    status: experimental
    summary: Connect to a running plugin inspector server.
    args:
      - name: --host
        kind: option
        required: false
        description: Inspector host, defaulting to 127.0.0.1
      - name: --port
        kind: option
        required: false
        description: Inspector port; defaults to auto-discovery from a temp-file hint
      - name: --command
        kind: option
        required: false
        description: Inspector method to send once before exiting
      - name: --params
        kind: option
        required: false
        description: JSON params for --command
      - name: --output
        kind: option
        required: false
        description: File path for the one-shot command response
    docs: reference/cli.md#inspect

  - name: import-design
    status: experimental
    summary: Import designs from Figma, Stitch, v0, or Pencil into Pulp web-compat JS.
    args:
      - name: --from
        kind: option
        required: true
        description: "Design source: figma, stitch, v0, pencil"
      - name: --file
        kind: option
        description: Input file path (required if --url not given)
      - name: --url
        kind: option
        description: Design URL (Figma file URL or v0 share link)
      - name: --frame
        kind: option
        description: Frame/artboard name to import (Figma)
      - name: --screen
        kind: option
        description: Screen name to import (Stitch)
      - name: --output
        kind: option
        description: "Output JS file (default: ui.js)"
      - name: --tokens
        kind: option
        description: "Output W3C token file (default: tokens.json)"
      - name: --dry-run
        kind: flag
        description: Show generated code without writing files
      - name: --no-tokens
        kind: flag
        description: Skip token extraction
      - name: --no-comments
        kind: flag
        description: Omit comments from generated code
      - name: --web-compat
        kind: flag
        description: Use DOM API instead of native Pulp API
      - name: --validate
        kind: flag
        description: Render generated JS and validate layout
      - name: --reference
        kind: option
        description: Compare render against reference screenshot PNG
      - name: --diff
        kind: option
        description: Save visual diff image PNG
      - name: --render-size
        kind: option
        description: "Render dimensions (default: 340x280)"
      - name: --preview
        kind: flag
        description: Minimal widget styling for design comparison
      - name: --debug
        kind: flag
        description: Output JSON report with metrics
      - name: --detect-only
        kind: flag
        description: "Detect (source, format-version, parser-version) for --file or --directory <path> against compat.json without parsing (pulp #1031)"
      - name: --directory
        kind: option
        description: Path to a directory export (alternative to --file)
      - name: --compat
        kind: option
        description: "compat.json override (default: discover from cwd / repo root)"
      - name: --report-new-format
        kind: flag
        description: Emit a fingerprint-diff JSON for a new compat.json[imports/<source>/detected-formats] entry. Implies --detect-only.
    docs: reference/design-import.md

  - name: export-tokens
    status: experimental
    summary: Export current theme as W3C Design Tokens JSON.
    args:
      - name: --file
        kind: option
        description: "Input theme JSON (default: built-in dark theme)"
      - name: --tokens
        kind: option
        description: "Output file (default: tokens.json)"
      - name: --dry-run
        kind: flag
        description: Print to stdout
    docs: guides/importing-designs.md#design-tokens

  - name: ci-local
    status: experimental
    summary: Local CI runner and desktop automation control plane for Mac, Ubuntu, and Windows validation.
    subcommands:
      - name: run
        summary: Queue validation and wait for completion
      - name: ship
        summary: Push, create PR, queue CI, merge on green
      - name: check
        summary: Queue validation for an existing PR by number, URL, or 'latest'
      - name: list
        summary: Show open PRs with summaries
      - name: enqueue
        summary: Queue a branch for later drain with optional priority and targets
      - name: drain
        summary: Process pending jobs if no other runner already owns the queue
      - name: bump
        summary: Reprioritize a pending queued job
      - name: cloud workflows
        summary: List supported GitHub workflows and runner providers
      - name: cloud run
        summary: Dispatch a GitHub Actions workflow through the local CI control plane
      - name: cloud status
        summary: Show tracked GitHub workflow state and refresh a selected run on demand
      - name: status
        summary: Show queue, active runner, recent results, tracked cloud runs, and VM status
      - name: desktop
        summary: Desktop automation setup, health, artifact, and interaction workflows
        subcommands:
          - name: install
            summary: Prepare one desktop automation target and record its receipt/contract
          - name: doctor
            summary: Run health checks and capability reporting for one desktop target
          - name: status
            summary: Show desktop automation config, target contracts, latest runs, and latest successful proof summaries
          - name: config show
            summary: Show desktop automation config values
          - name: config set
            summary: Set artifact_root, publish_mode, publish_branch, retention_days, or target-level optional desktop tiers
          - name: recent
            summary: Show recent desktop automation runs, including failed attempts
          - name: proof
            summary: Show successful desktop proofs grouped by target/action/source.mode/source.sha
          - name: publish
            summary: Stage a local HTML/JSON gallery from recent bundles
          - name: cleanup
            summary: Prune old desktop automation bundles
          - name: smoke
            summary: Launch an app and capture a desktop smoke bundle; supports shared source flags (--source-mode, --branch, --sha, --prepare-command, --prepare-timeout)
          - name: click
            summary: Launch an app, perform one click interaction, and capture before/after evidence; supports shared source flags (--source-mode, --branch, --sha, --prepare-command, --prepare-timeout)
          - name: inspect
            summary: Launch an app and capture screenshot plus available UI state; supports shared source flags (--source-mode, --branch, --sha, --prepare-command, --prepare-timeout)
    docs: guides/local-ci.md

  - name: harness
    status: experimental
    summary: Catalog and visual regression harness. Reports static compat coverage, validation-route accounting, and typed visual-golden coverage; delegates visual snapshots to tools/harness/visual/runner.py.
    args:
      - name: coverage
        kind: positional
        required: false
        description: Optional compatibility subcommand; accepted for the documented `pulp harness coverage` form and stripped before verifier argument parsing.
      - name: visual
        kind: positional
        required: false
        description: Run the deterministic visual snapshot harness (`pulp harness visual --verify --all`).
      - name: --surface
        kind: option
        description: Run one surface adapter or visual fixture surface, such as yoga. May be repeated.
      - name: --all
        kind: flag
        description: Run every wired coverage adapter, or all visual fixtures for the selected visual surface.
      - name: --json
        kind: flag
        description: Print the JSON report to stdout instead of writing build/docs report files.
      - name: --no-docs
        kind: flag
        description: Skip writing docs/reports/harness-coverage.md.
      - name: --verify
        kind: flag
        description: Visual subcommand only; verify fixtures against checked-in semantic goldens.
      - name: --generate
        kind: flag
        description: Visual subcommand only; regenerate checked-in semantic goldens.
      - name: --entry
        kind: option
        description: Visual subcommand only; run one fixture entry, such as yoga/box-sizing. May be repeated.
      - name: --binary
        kind: option
        description: Visual subcommand only; override the pulp-test-visual binary path.
      - name: --build-dir
        kind: option
        description: Visual subcommand only; CMake build directory used to locate pulp-test-visual.
      - name: --repo-root
        kind: option
        description: Override repo-root discovery.
    docs: reference/cli.md#harness

  - name: add
    status: usable
    summary: Add a third-party package from the registry. License check, platform check, CMake wiring, metadata updates.
    args:
      - name: package
        kind: positional
        required: true
        description: Package slug from tools/packages/registry.json
      - name: --license-override
        kind: option
        description: "Accept a rejected license (value: commercial)"
      - name: --platform-guard
        kind: flag
        description: Add with platform guard (skip prompt for unsupported targets)
      - name: --no-cmake
        kind: flag
        description: Skip CMake wiring (metadata only)
    docs: reference/cli.md#add

  - name: remove
    status: usable
    summary: Remove a previously added package. Cleans lock file, CMake, and metadata.
    args:
      - name: package
        kind: positional
        required: true
        description: Package slug to remove
    docs: reference/cli.md#remove

  - name: list
    status: usable
    summary: Show installed packages from packages.lock.json.
    args:
      - name: --json
        kind: flag
        description: Output as JSON
    docs: reference/cli.md#list

  - name: search
    status: usable
    summary: Search the package registry by name, tags, description, or category.
    args:
      - name: query
        kind: positional
        required: true
        description: Search query string
      - name: --format
        kind: option
        description: "Output format (text or json)"
    docs: reference/cli.md#search

  - name: update
    status: usable
    summary: Check for and apply package version updates.
    args:
      - name: --apply
        kind: flag
        description: Apply updates (default is dry-run)
    docs: reference/cli.md#update

  - name: suggest
    status: usable
    summary: Context-aware package recommendations.
    args:
      - name: --description
        kind: option
        description: Find packages matching a text description
      - name: --analyze
        kind: option
        description: Scan a source file for package suggestions
      - name: --alternative
        kind: option
        description: Find alternatives to a specific package
      - name: --format
        kind: option
        description: "Output format (text or json)"
    docs: reference/cli.md#suggest

  - name: target
    status: usable
    summary: Manage project platform targets in pulp.toml.
    args:
      - name: subcommand
        kind: positional
        required: true
        description: "list, add, or remove"
      - name: target
        kind: positional
        required: false
        description: "Platform-arch target (e.g., macOS-arm64, Windows-x64)"
    docs: reference/cli.md#target

  - name: audio
    status: experimental
    summary: Repo-level audio analysis tooling. Manage offline audio models (text-to-audio retrieval) and read reproducible excerpt bundles.
    subcommands:
      - name: model list
        summary: List registered audio models with backend and tags
      - name: model status
        summary: Show the configured model, resolved checkpoint, and whether it is loadable
      - name: model activate
        summary: Select the active model and persist the state file
      - name: excerpt-find
        summary: Score audio files against a text query and emit an excerpt bundle
        args:
          - name: --text
            required: true
          - name: --input
            required: true
          - name: --model
            required: false
          - name: --recursive
            kind: flag
          - name: --top
            kind: option
          - name: --window-ms
            kind: option
          - name: --hop-ms
            kind: option
          - name: --min-score
            kind: option
          - name: --max-candidates-per-file
            kind: option
          - name: --bundle-out
            kind: option
          - name: --dry-run
            kind: flag
      - name: read-bundle
        summary: Pretty-print a previously emitted excerpt bundle
    docs: reference/cli.md#audio

  - name: sdk
    status: usable
    summary: Manage the pinned Pulp SDK installation at ~/.pulp/sdk*/ used by standalone projects.
    subcommands:
      - name: install
        summary: Download and cache the pinned SDK from GitHub releases; --local builds from the current checkout; --version X.Y.Z pins a version
        args:
          - name: --version
            kind: option
            required: false
          - name: --local
            kind: flag
            required: false
      - name: status
        summary: Show cached and locally-built SDK versions
      - name: clean
        summary: Remove all cached SDK versions
    docs: reference/cli.md#sdk

  - name: dev
    status: usable
    summary: Unified development loop — watch, rebuild, and optionally test, validate, or relaunch an app on every change.
    args:
      - name: --test
        kind: flag
        description: Run tests after each successful build
      - name: --test-filter
        kind: option
        description: Run only tests matching PATTERN (implies --test)
      - name: --validate
        kind: flag
        description: Run quick plugin dlopen validation after build
      - name: --run
        kind: option
        description: Launch a build-dir binary and relaunch it on rebuild
      - name: --design
        kind: option
        description: Build pulp-design-tool and launch it with the given JS script
      - name: --target
        kind: option
        description: Pass --target to cmake --build
      - name: --allow-unsupported-sdk
        kind: flag
        description: Bypass the CLI-vs-project SDK compatibility guard and continue anyway (unsupported)
      - name: passthrough
        kind: passthrough
        description: Arguments after `--` are forwarded to the launched binary
    docs: reference/cli.md#dev

  - name: loop
    status: experimental
    summary: Leveraged-prototype focus mode (#940) — explicit "single-platform iteration" switch. Persists a focus_platform marker in `~/.pulp/config.toml` under [loop] so subsequent invocations stay pinned, then drives the same watch + rebuild + screencap loop as `pulp dev` without paying the cross-platform configure cost. Pair with `shipyard pr` / `pulp pr` at land time to restore full cross-platform validation.
    args:
      - name: --platform
        kind: option
        description: "Override the auto-detected host platform. One of: macos, linux, windows."
      - name: --off
        kind: flag
        description: Restore cross-platform mode by clearing the focus marker
      - name: --status
        kind: flag
        description: Print the current focus state and exit
      - name: --no-watch
        kind: flag
        description: Persist focus state and exit without entering the watch loop (CI/test friendly)
      - name: --watch-issues
        kind: option
        description: "(Slice 3, deferred — issue #947) Poll `gh pr list` for state flips on PRs referencing the named issues. Today prints a deferred hint."
      - name: --ar-swap-from
        kind: option
        description: "(Slice 2, deferred — issue #946) Validate header/library ABI and swap built `.o` files from another worktree into the pinned SDK's static archive. Today prints a deferred hint."
      - name: --test
        kind: flag
        description: Run tests after each successful build
      - name: --test-filter
        kind: option
        description: Run only tests matching PATTERN (implies --test)
      - name: --validate
        kind: flag
        description: Run quick plugin dlopen validation after build
      - name: --run
        kind: option
        description: Launch a build-dir binary and relaunch it on rebuild
      - name: --target
        kind: option
        description: Pass --target to cmake --build
      - name: --allow-unsupported-sdk
        kind: flag
        description: Bypass the CLI-vs-project SDK compatibility guard and continue anyway (unsupported)
      - name: passthrough
        kind: passthrough
        description: Arguments after `--` are forwarded to the launched binary
    docs: reference/cli.md#loop

  - name: scan
    status: usable
    summary: Walk the OS plug-in paths and print every VST3 / AU / AUv3 / CLAP / LV2 plug-in found. Mirrors pulp::host::PluginScanner.
    args:
      - name: --format
        kind: option
        description: Restrict to one format (clap, vst3, au, auv3, lv2); default is every compiled-in format
    docs: reference/cli.md#scan

  - name: host
    status: experimental
    summary: Load a plug-in out-of-DAW and run a 256-sample synthetic block through it. Smoke-tests the hosting pipeline without a DAW.
    args:
      - name: path
        kind: positional
        required: true
        description: Path to the plug-in bundle (.clap / .vst3 / .component / .lv2)
      - name: --format
        kind: option
        description: Format selector (clap default, vst3, au, auv3, lv2)
      - name: --id
        kind: option
        description: Unique id / URI to select a specific descriptor in the bundle (LV2 and multi-plugin CLAP)
    docs: reference/cli.md#host

  - name: tool
    status: usable
    summary: Manage third-party developer tools (validators, formatters, importers) installed under ~/.pulp/tools/. Driven by tools/packages/tool-registry.json.
    subcommands:
      - name: list
        summary: Show every registered tool and its install state
      - name: install
        summary: Download and install a tool; --all installs every tool available on this platform; --force reinstalls even if present
        args:
          - name: --force
            kind: flag
            required: false
          - name: --all
            kind: flag
            required: false
      - name: uninstall
        summary: Remove a pulp-managed tool install
      - name: path
        summary: Print the absolute path to the installed tool's binary
      - name: run
        summary: Run the installed tool with pass-through arguments
      - name: doctor
        summary: Health check — which tools are installed, missing, or unavailable on this platform
    docs: reference/cli.md#tool

  - name: audit
    status: usable
    summary: Run license and clean-room audit checks; package flags are handled natively.
    args:
      - name: --packages
        kind: flag
        description: Verify package lock-file integrity
      - name: --platforms
        kind: flag
        description: Check package/platform coverage
      - name: --licenses
        kind: flag
        description: Verify package license compatibility
    docs: reference/cli.md#audit-package-extensions

  - name: help
    status: usable
    summary: Print usage information.
    docs: reference/cli.md#help
