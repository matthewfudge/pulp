# codecov.yml — Codecov config for public/#566 Phase 1 (measurement baseline).
#
# Primary consumers (in order): Pulp developers, dispatched agents, CI
# enforcement, contributors reading PR comments. Public dashboard is a
# byproduct, not the design goal. See #566 for the framing and
# planning/coverage-tooling-decision-2026-04-21.md for the full stack.
#
# Keep this file in sync with:
#   - scripts/run_coverage.sh COVERAGE_IGNORE_REGEX (same exclude set)
#   - .github/workflows/coverage.yml (upload step `flags:` list)
#   - docs/guides/coverage.md (human-readable explanation)
# Phase 2 adds ci/coverage-targets.yaml alongside this for the diff-cover
# gate; Phase 4 introduces doc_path_map.json to prevent drift.

coverage:
  status:
    # Project-wide status: "did we get worse?" Not a hard gate — we
    # already have continue-on-error on the coverage job and Phase 3
    # is where per-PR enforcement lands.
    project:
      default:
        target: auto
        threshold: 1%          # allow 1% drop without failing
        informational: true    # Phase 1 is measurement; no blocking yet

    # Patch status: "is new code covered?" Advisory in Phase 1; the
    # authoritative patch gate comes from diff-cover in Phase 3.
    patch:
      default:
        target: 75%
        informational: true

# Exclude lists mirror scripts/run_coverage.sh COVERAGE_IGNORE_REGEX
# so Codecov and our local tooling count the same set of files.
# External FetchContent sources (Dawn, Skia, mbedTLS, QuickJS,
# Catch2, etc.) and our test trees are never counted as coverage-
# bearing. See planning/coverage-tooling-decision-2026-04-21.md §4.
#
# `ignore` is a TOP-LEVEL key in Codecov config — nesting it under
# `coverage:` silently no-ops, which would count files we explicitly
# want excluded and skew the baseline metrics. See Codecov config
# schema: https://docs.codecov.com/docs/codecov-yaml
ignore:
  - "external/**"
  - "_deps/**"
  - "test/**"
  - "apple/Tests/**"
  - "apple/.build/**"
  - "examples/**"
  - "build/**"
  - "build-coverage/**"
  - "fetchcontent-src/**"
  - "**/Catch2/**"
  - "**/catch2/**"

# PR comment. Focused on reach + diff + flags + tree so contributors
# see "how many lines of THIS PR are covered by THIS PR's tests"
# front-and-centre. Tree view lets them jump to an uncovered file.
comment:
  layout: "reach, diff, flags, tree"
  behavior: default
  require_changes: true        # only post when coverage data is present

# Flag definitions are retained for Phase 1 PR 4 (per-OS upload jobs)
# and for future workflows that genuinely upload one file per flag.
# The main coverage.yml upload does NOT attach any flags — Codecov
# rejects single-upload multi-flag submissions with "Multiple flags
# detected. Please ensure one flag per upload." The per-subsystem /
# per-platform / per-surface breakdown comes from `component_management`
# below, which slices the single upload by path. Component IDs mirror
# these flag names 1:1 so cross-referencing stays consistent.
#
# Every top-level `core/*` directory plus the platform/surface slices
# below gets a matching flag/component pair. Adding a new subsystem
# means updating both blocks in this file; `tools/scripts/test_codecov_config.py`
# checks them against the live `core/*` tree so drift fails fast.
flags:
  # Core subsystems — one flag per top-level core/** directory.
  audio:
    paths:
      - core/audio/
    carryforward: true
  canvas:
    paths:
      - core/canvas/
    carryforward: true
  dsl:
    paths:
      - core/dsl/
    carryforward: true
  events:
    paths:
      - core/events/
    carryforward: true
  format:
    paths:
      - core/format/
    carryforward: true
  host:
    paths:
      - core/host/
    carryforward: true
  midi:
    paths:
      - core/midi/
    carryforward: true
  osc:
    paths:
      - core/osc/
    carryforward: true
  platform:
    paths:
      - core/platform/
    carryforward: true
  render:
    paths:
      - core/render/
    carryforward: true
  runtime:
    paths:
      - core/runtime/
    carryforward: true
  signal:
    paths:
      - core/signal/
    carryforward: true
  state:
    paths:
      - core/state/
    carryforward: true
  view:
    paths:
      - core/view/
    carryforward: true

  # Platform flags (4) — cross-cut the subsystem flags. "What's host
  # coverage on Windows?" is answered by cross-filtering `host AND
  # windows`. Paths cover all subsystems because any subsystem can
  # have a Windows shim under its own `platform/windows/` tree.
  android:
    paths:
      - core/platform/src/android/
      - android/
      - core/render/platform/android/
      - core/**/android/
    carryforward: true
  apple:
    paths:
      - apple/
      - core/**/macos/
      - core/**/ios/
      - core/**/mac/
    carryforward: true
  linux:
    paths:
      - core/**/linux/
      - core/**/alsa/
    carryforward: true
  windows:
    paths:
      - core/**/win/
      - core/**/windows/
      - core/**/wasapi/
    carryforward: true

  # Surface flags (3) — non-core but first-party:
  cli:
    paths:
      - tools/cli/
    carryforward: true
  ship:
    paths:
      - ship/
    carryforward: true
  tools:
    # Everything under tools/ except the CLI (which already has its
    # own flag above). Codecov's glob takes first-matching-flag per
    # file, and more-specific `tools/cli/` wins over the broader
    # `tools/` here.
    paths:
      - tools/
    carryforward: true

  # OS flags (3) — Phase 1 PR 4 cross-platform coverage matrix. These
  # are NOT path-scoped; every file measured on a given matrix leg is
  # tagged with that OS's flag at upload time via the corresponding
  # matrix entry in .github/workflows/coverage.yml. Federate with the
  # subsystem + platform + surface flags above for cross-filtering:
  # `host AND os-windows` answers "what fraction of core/host is
  # exercised when tests run on Windows?" — a different question from
  # `host AND windows` (which reads "what fraction of the windows/
  # shim files are covered at all"). See docs/guides/coverage.md
  # §"Multi-OS coverage" for the rationale on Codecov-flag unions vs
  # llvm-profdata merge.
  os-linux:
    carryforward: true
  os-macos:
    carryforward: true
  os-windows:
    carryforward: true

# carryforward: true on every flag — when a PR doesn't touch
# a given subsystem, carry over the last known coverage for that
# flag from main so the dashboard doesn't report a false 0%. Standard
# Codecov practice for multi-job uploads (we have one job per OS
# starting in Phase 1 PR 4).

# Components are Codecov's canonical mechanism for path-based coverage
# slicing driven by a single upload. Flags (above) are ultimately keyed
# to upload sources and come into their own once Phase 1 PR 4 splits
# the coverage job per-OS; components give us the subsystem / platform /
# surface breakdown today from the single-upload Cobertura XML without
# relying on Codecov's flag-with-paths behaviour (which is documented
# but has historically been less reliable for trend analysis across
# many flags attached to one upload).
#
# Keep component_id values aligned with the flag names above so the
# dashboard reads consistently whichever dimension you filter by.
component_management:
  default_rules:
    statuses:
      - type: project
        target: auto
        threshold: 1%
        informational: true
  individual_components:
    # Core subsystems — mirror every top-level core/** directory.
    - component_id: audio
      name: audio
      paths: ["core/audio/**"]
    - component_id: canvas
      name: canvas
      paths: ["core/canvas/**"]
    - component_id: dsl
      name: dsl
      paths: ["core/dsl/**"]
    - component_id: events
      name: events
      paths: ["core/events/**"]
    - component_id: format
      name: format
      paths: ["core/format/**"]
    - component_id: host
      name: host
      paths: ["core/host/**"]
    - component_id: midi
      name: midi
      paths: ["core/midi/**"]
    - component_id: osc
      name: osc
      paths: ["core/osc/**"]
    - component_id: platform
      name: platform
      paths: ["core/platform/**"]
    - component_id: render
      name: render
      paths: ["core/render/**"]
    - component_id: runtime
      name: runtime
      paths: ["core/runtime/**"]
    - component_id: signal
      name: signal
      paths: ["core/signal/**"]
    - component_id: state
      name: state
      paths: ["core/state/**"]
    - component_id: view
      name: view
      paths: ["core/view/**"]
    # Platform (4) — cross-cut the subsystems.
    - component_id: android
      name: android
      paths:
        - "core/platform/src/android/**"
        - "android/**"
        - "core/render/platform/android/**"
        - "core/**/android/**"
    - component_id: apple
      name: apple
      paths:
        - "apple/**"
        - "core/**/macos/**"
        - "core/**/ios/**"
        - "core/**/mac/**"
    - component_id: linux
      name: linux
      paths:
        - "core/**/linux/**"
        - "core/**/alsa/**"
    - component_id: windows
      name: windows
      paths:
        - "core/**/win/**"
        - "core/**/windows/**"
        - "core/**/wasapi/**"
    # Surface (3)
    - component_id: cli
      name: cli
      paths: ["tools/cli/**"]
    - component_id: ship
      name: ship
      paths: ["ship/**"]
    - component_id: tools
      name: tools
      paths: ["tools/**"]
