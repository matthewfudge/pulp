<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PulpGain — WebCLAP browser host</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0; padding: 2rem; font: 15px/1.5 system-ui, sans-serif;
      background: #14161a; color: #e7e9ee;
    }
    main { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 1.25rem; margin: 0 0 .25rem; }
    .sub { color: #8b93a7; margin: 0 0 1.5rem; }
    .card { background: #1d212a; border: 1px solid #2b313d; border-radius: 10px;
            padding: 1.25rem 1.5rem; margin-bottom: 1.25rem; }
    .param { display: grid; grid-template-columns: 8rem 1fr 4.5rem; align-items: center;
             gap: .75rem; margin: .6rem 0; }
    .param label { color: #cbd2e1; }
    .param output { font-variant-numeric: tabular-nums; text-align: right; color: #9fe0a8; }
    input[type=range] { width: 100%; accent-color: #5b8cff; }
    button { background: #5b8cff; color: #0b0d10; border: 0; border-radius: 7px;
             padding: .55rem 1rem; font-weight: 600; cursor: pointer; }
    button:disabled { opacity: .5; cursor: default; }
    canvas { width: 100%; height: 96px; background: #0f1116; border-radius: 7px; display: block; }
    .status { font-variant-numeric: tabular-nums; color: #8b93a7; white-space: pre-wrap;
              font-family: ui-monospace, monospace; font-size: 13px; }
    .ok { color: #9fe0a8; } .err { color: #ff8c8c; }
    .row { display: flex; gap: .75rem; align-items: center; margin-top: 1rem; }
  </style>
</head>
<body>
  <main>
    <h1 id="title">Loading WebCLAP…</h1>
    <p class="sub" id="subtitle">A CLAP-in-WebAssembly plugin, hosted entirely in the browser.</p>

    <div class="card">
      <div id="params"></div>
      <div class="row">
        <button id="render" disabled>Render &amp; play</button>
        <span class="status" id="meter"></span>
      </div>
      <canvas id="scope" width="608" height="96" style="margin-top:1rem"></canvas>
    </div>

    <div class="card">
      <div class="status" id="log"></div>
    </div>
  </main>
  <script type="module" src="./main.js"></script>
</body>
</html>
